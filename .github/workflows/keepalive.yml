name: Keep Render awake

# Pings the live app so the Render free-tier instance doesn't spin down
# (free web services sleep after ~15 min of no inbound traffic).
# Public repo => GitHub Actions minutes are free.

on:
  schedule:
    # Every 10 minutes (UTC). GitHub may delay scheduled runs under load;
    # 10 min leaves a buffer under Render's ~15 min idle timeout.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

# If a run is still going when the next fires, cancel the old one.
concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /ping (with cold-start retries)
        run: |
          URL="https://eduaakashaa.onrender.com/ping"
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -L -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "App is awake."
              exit 0
            fi
            sleep 25
          done
          # A transient miss shouldn't spam failure emails; don't fail the job.
          echo "::warning::Ping did not return 200 after retries (instance may be cold-starting)."
          exit 0
