{#- Custom on-brand line icons (navy stroke, 2px). Replaces emoji across the site.
    Usage: {% import "_ea_icons.html" as icons %} … {{ icons.ic('globe') }} -#}
{% macro ic(name) -%}
<svg class="ea-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
{%- if name == 'globe' -%}
<circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/>

<path d="M4 20V4"/><path d="M4 20h16"/><rect x="7" y="12" width="3" height="5"/><rect x="12" y="8" width="3" height="9"/><rect x="17" y="5" width="3" height="12"/>
{%- elif name == 'target' -%}
<circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1"/>
{%- elif name == 'building' -%}
<path d="M4 21V5l8-3 8 3v16"/><path d="M4 21h16"/><path d="M9 9h.01M15 9h.01M9 13h.01M15 13h.01M9 17h.01M15 17h.01"/>
{%- elif name == 'award' -%}
<circle cx="12" cy="9" r="5"/><path d="M9 13.5 7.5 21l4.5-2.5L16.5 21 15 13.5"/>
{%- elif name == 'file' -%}
<path d="M6 2h8l4 4v16H6z"/><path d="M14 2v4h4"/><path d="M9 12h6M9 16h6"/>
{%- elif name == 'predict' -%}
<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/><path d="M11 8v6M8 11h6" stroke-width="1.4"/>
{%- elif name == 'grid' -%}
<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
{%- elif name == 'trend' -%}
<path d="M3 17 9 11l4 4 8-8"/><path d="M16 7h5v5"/>
{%- elif name == 'shield' -%}
<path d="M12 3 5 6v5c0 4.5 3 8 7 9 4-1 7-4.5 7-9V6z"/><path d="m9 12 2 2 4-4"/>
{%- elif name == 'users' -%}
<circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.2a3.2 3.2 0 0 1 0 5.9M17.5 20a5.5 5.5 0 0 0-3-4.9"/>

<circle cx="12" cy="12" r="9"/><path d="m15.5 8.5-2 5-5 2 2-5z"/>

<rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4a1.5 1.5 0 0 1 1.5-1.5h3A1.5 1.5 0 0 1 15 4v1H9z"/><path d="m9 12 2 2 3.5-3.5"/>
{%- elif name == 'search' -%}
<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
{%- elif name == 'edit' -%}
<path d="M4 20h4L18.5 9.5a2 2 0 0 0-3-3L5 17z"/><path d="M14 7l3 3"/>
{%- elif name == 'check' -%}
<circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5L16 9"/>
{%- elif name == 'book' -%}
<path d="M4 5a2 2 0 0 1 2-2h12v16H6a2 2 0 0 0-2 2z"/><path d="M4 19a2 2 0 0 1 2-2h12"/>

<rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M3 12h18"/>
{%- elif name == 'cap' -%}
<path d="m12 4 9 4-9 4-9-4z"/><path d="M6 10v5c0 1.5 3 3 6 3s6-1.5 6-3v-5"/>
{%- elif name == 'institution' -%}
<path d="M3 9 12 4l9 5"/><path d="M4 9v10M20 9v10M8 10v7M12 10v7M16 10v7"/><path d="M3 21h18"/>
{%- elif name == 'money' -%}
<circle cx="12" cy="12" r="9"/><path d="M14.5 9.2a3 3 0 0 0-5.2 2 3 3 0 0 0 3 3 3 3 0 0 1 0 6 3 3 0 0 1-2.6-1.5M12 6.5v1.7M12 15.8v1.7"/>
{%- elif name == 'gear' -%}
<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/>

<path d="M6 3h3l1.5 5-2 1.5a12 12 0 0 0 6 6l1.5-2 5 1.5v3a2 2 0 0 1-2 2A16 16 0 0 1 4 5a2 2 0 0 1 2-2z"/>
{%- elif name == 'monitor' -%}
<rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/>
{%- elif name == 'flask' -%}
<path d="M9 3h6M10 3v6l-5 9a2 2 0 0 0 1.8 3h10.4a2 2 0 0 0 1.8-3l-5-9V3"/><path d="M7.5 15h9"/>
{%- elif name == 'bulb' -%}
<path d="M9 18h6M10 21h4"/><path d="M12 3a6 6 0 0 0-4 10.5c.7.7 1 1.2 1 2.5h6c0-1.3.3-1.8 1-2.5A6 6 0 0 0 12 3z"/>
{%- elif name == 'refresh' -%}
<path d="M20 12a8 8 0 1 1-2.3-5.6"/><path d="M20 4v4h-4"/>
{%- elif name == 'lock' -%}
<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>
{%- elif name == 'clock' -%}
<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
{%- elif name == 'mail' -%}
<rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/>
{%- elif name == 'message' -%}
<path d="M5 5h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H9l-4 3v-3H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/>

<path d="M9 15 15 9"/><path d="M11 6.5 13 4.5a4 4 0 0 1 6 6l-2 2M13 17.5l-2 2a4 4 0 0 1-6-6l2-2"/>

<path d="M12 3c3 1 5 4 5 8l-3 3H10L7 11c0-4 2-7 5-8z"/><circle cx="12" cy="9" r="1.6"/><path d="M10 17c-1 1.5-1 3-1 4 1 0 2.5 0 4-1M7 14l-2 1-1 3 3-1"/>
{%- elif name == 'plane' -%}
<path d="M10 4.5 21 12 10 19.5v-5l-6-2.5 6-2.5z"/>
{%- elif name == 'scale' -%}
<path d="M12 4v16M7 20h10M12 4 5 8m7-4 7 4"/><path d="M2.5 12 5 8l2.5 4a2.5 2.5 0 0 1-5 0zM16.5 12 19 8l2.5 4a2.5 2.5 0 0 1-5 0z"/>
{%- elif name == 'help' -%}
<circle cx="12" cy="12" r="9"/><path d="M9.5 9.5a2.5 2.5 0 0 1 4.5 1.5c0 1.7-2 2-2 3.5M12 17h.01"/>
{%- elif name == 'home' -%}
<path d="M4 11 12 4l8 7"/><path d="M6 10v10h12V10"/><path d="M10 20v-6h4v6"/>
{%- elif name == 'bolt' -%}
<path d="M13 2 4 14h7l-1 8 9-12h-7z"/>
{%- elif name == 'alert' -%}
<path d="M12 4 2.5 20h19z"/><path d="M12 10v4M12 17h.01"/>
{%- elif name == 'ruler' -%}
<rect x="3" y="8" width="18" height="8" rx="1"/><path d="M7 8v3M11 8v4M15 8v3M19 8v4"/>
{%- elif name == 'health' -%}
<rect x="3" y="3" width="18" height="18" rx="4"/><path d="M12 8v8M8 12h8"/>
{%- elif name == 'calendar' -%}
<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/>
{%- elif name == 'star' -%}
<path d="m12 3 2.6 5.6 6.1.7-4.5 4.2 1.2 6L12 16.8 6.6 19.5l1.2-6L3.3 9.3l6.1-.7z"/>
{%- else -%}
<circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01" stroke-width="1.4"/>
{%- endif -%}
</svg>
{%- endmacro %}
