<style>
  .adm-nav{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:20px; }
  .adm-nav .adm-navlink, .adm-nav .adm-navtop{
    font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.12em;
    text-decoration:none; padding:8px 16px; border-radius:999px; border:1.5px solid var(--hairline);
    background:var(--paper); color:var(--ink); cursor:pointer; transition:.15s; line-height:1.4; }
  .adm-nav .adm-navlink:hover, .adm-nav .adm-navtop:hover{ border-color:var(--navy); color:var(--navy); }
  .adm-nav .adm-navlink.on{ background:var(--navy); border-color:var(--navy); color:#fff; }

  .adm-navgrp{ position:relative; }
  .adm-navgrp.on > .adm-navtop{ background:var(--navy); border-color:var(--navy); color:#fff; }
  .adm-navmenu{ position:absolute; top:calc(100% + 6px); left:0; z-index:50; min-width:200px;
    background:var(--paper); border:1.5px solid var(--hairline); border-radius:12px; padding:6px;
    box-shadow:0 12px 34px rgba(0,0,0,.14); display:none; flex-direction:column; gap:2px; }
  .adm-navgrp:hover > .adm-navmenu, .adm-navgrp:focus-within > .adm-navmenu{ display:flex; }
  .adm-navmenu a{ text-decoration:none; font-size:12.5px; color:var(--ink); padding:8px 12px;
    border-radius:8px; white-space:nowrap; }
  .adm-navmenu a:hover{ background:var(--cream); color:var(--navy); }
  .adm-navmenu a.cur{ background:var(--navy); color:#fff; }
</style>
<nav class="adm-nav" aria-label="Admin sections">
  <a href="{{ url_for('admin_portal.home') }}" class="adm-navlink {{ 'on' if admin_tab == 'overview' }}">Overview</a>

  <div class="adm-navgrp {{ 'on' if admin_tab in ['users', 'memberships'] }}">
    <button type="button" class="adm-navtop" aria-haspopup="true">People ▾</button>
    <div class="adm-navmenu">
      <a href="{{ url_for('membership.admin_users') }}" class="{{ 'cur' if admin_tab == 'users' }}">Members</a>
      <a href="{{ url_for('membership.admin_list') }}" class="{{ 'cur' if admin_tab == 'memberships' }}">Applications</a>
    </div>
  </div>

  <div class="adm-navgrp {{ 'on' if admin_tab in ['leads', 'inquiries'] }}">
    <button type="button" class="adm-navtop" aria-haspopup="true">Inbox ▾</button>
    <div class="adm-navmenu">
      <a href="{{ url_for('membership.admin_leads') }}" class="{{ 'cur' if admin_tab == 'leads' }}">Leads &amp; Assessments</a>
      <a href="{{ url_for('membership.admin_inquiries') }}" class="{{ 'cur' if admin_tab == 'inquiries' }}">Inquiries</a>
    </div>
  </div>

  <div class="adm-navgrp {{ 'on' if admin_tab in ['announcements', 'schedule', 'messages'] }}">
    <button type="button" class="adm-navtop" aria-haspopup="true">Broadcast ▾</button>
    <div class="adm-navmenu">
      <a href="{{ url_for('admin_portal.announcements') }}" class="{{ 'cur' if admin_tab == 'announcements' }}">Announcements</a>
      <a href="{{ url_for('admin_portal.schedule') }}" class="{{ 'cur' if admin_tab == 'schedule' }}">Schedule</a>
      <a href="{{ url_for('admin_portal.messages') }}" class="{{ 'cur' if admin_tab == 'messages' }}">Messages</a>
    </div>
  </div>

  <div class="adm-navgrp {{ 'on' if admin_tab in ['alumni', 'surveys'] }}">
    <button type="button" class="adm-navtop" aria-haspopup="true">Network ▾</button>
    <div class="adm-navmenu">
      <a href="{{ url_for('alumni.admin_list') }}" class="{{ 'cur' if admin_tab == 'alumni' }}">College Guides</a>
      <a href="{{ url_for('survey.admin_list') }}" class="{{ 'cur' if admin_tab == 'surveys' }}">College Surveys</a>
    </div>
  </div>

  <a href="{{ url_for('main.counsellor_dashboard') }}" class="adm-navlink">DASA Review ↗</a>
</nav>
