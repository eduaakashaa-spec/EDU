.innerHTML =\n    '&lt;div class=\&quot;stat-box total\&quot;&gt;&lt;div class=\&quot;snum\&quot;&gt;'+data.length+'&lt;/div&gt;&lt;div class=\&quot;slbl\&quot;&gt;Total&lt;/div&gt;&lt;/div&gt;'+\n    '&lt;div class=\&quot;stat-box safe\&quot;&gt;&lt;div class=\&quot;snum\&quot;&gt;'+safe+'&lt;/div&gt;&lt;div class=\&quot;slbl\&quot;&gt;Safe&lt;/div&gt;&lt;/div&gt;'+\n    '&lt;div class=\&quot;stat-box mod\&quot;&gt;&lt;div class=\&quot;snum\&quot;&gt;'+mod+'&lt;/div&gt;&lt;div class=\&quot;slbl\&quot;&gt;Moderate&lt;/div&gt;&lt;/div&gt;'+\n    '&lt;div class=\&quot;stat-box risk\&quot;&gt;&lt;div class=\&quot;snum\&quot;&gt;'+reach+'&lt;/div&gt;&lt;div class=\&quot;slbl\&quot;&gt;Reach&lt;/div&gt;&lt;/div&gt;'+\n    '&lt;div class=\&quot;stat-box inst\&quot;&gt;&lt;div class=\&quot;snum\&quot;&gt;'+insts+'&lt;/div&gt;&lt;div class=\&quot;slbl\&quot;&gt;Institutes&lt;/div&gt;&lt;/div&gt;'+\n    '&lt;div class=\&quot;stat-box ciwg\&quot;&gt;&lt;div class=\&quot;snum\&quot;&gt;'+ciwg+'&lt;/div&gt;&lt;div class=\&quot;slbl\&quot;&gt;CIWG&lt;/div&gt;&lt;/div&gt;'+\n    '&lt;div class=\&quot;stat-box nciwg\&quot;&gt;&lt;div class=\&quot;snum\&quot;&gt;'+nciwg+'&lt;/div&gt;&lt;div class=\&quot;slbl\&quot;&gt;Non-CIWG&lt;/div&gt;&lt;/div&gt;';\n}\n\n// ========== CHARTS ==========\nfunction renderCharts(rank, data) {\n  Object.values(chartObjs).forEach(function(c){ c.destroy(); });\n  chartObjs={};\n  var C=['#4361ee','#00897b','#e65100','#9d174d','#7c3aed','#c62828','#1565c0','#558b2f','#f57f17','#4e342e','#37474f'];\n  var catC={};\n  data.forEach(function(d){ catC[d.branch_category]=(catC[d.branch_category]||0)+1; });\n  var catE=Object.entries(catC).sort(function(a,b){ return b[1]-a[1]; });\n  chartObjs.cat=new Chart(document.getElementById('catChart'),{type:'bar',data:{labels:catE.map(function(e){ return e[0].length&gt;20?e[0].slice(0,20)+'...':e[0]; }),datasets:[{data:catE.map(function(e){ return e[1]; }),backgroundColor:C,borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});\n  var s=data.filter(function(d){ return getChance(rank,d.overall_open,d.overall_close)==='safe'; }).length;\n  var m=data.filter(function(d){ return getChance(rank,d.overall_open,d.overall_close)==='moderate'; }).length;\n  var r=data.filter(function(d){ return getChance(rank,d.overall_open,d.overall_close)==='reach'; }).length;\n  chartObjs.chance=new Chart(document.getElementById('chanceChart'),{type:'doughnut',data:{labels:['Safe','Moderate','Reach'],datasets:[{data:[s,m,r],backgroundColor:['#00897b','#f9a825','#c62828'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}});\n  var iC={};\n  data.forEach(function(d){ iC[d.institute]=(iC[d.institute]||0)+1; });\n  var tI=Object.entries(iC).sort(function(a,b){ return b[1]-a[1]; }).slice(0,8);\n  chartObjs.inst=new Chart(document.getElementById('instChart'),{type:'bar',indexAxis:'y',data:{labels:tI.map(function(e){ return e[0].length&gt;20?e[0].slice(0,20)+'...':e[0]; }),datasets:[{data:tI.map(function(e){ return e[1]; }),backgroundColor:'#7c3aed',borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}});\n  var ciwg=data.filter(function(d){ return d.quota==='CIWG'; }).length;\n  chartObjs.quota=new Chart(document.getElementById('quotaChart'),{type:'pie',data:{labels:['CIWG','Non-CIWG'],datasets:[{data:[ciwg,data.length-ciwg],backgroundColor:['#1a237e','#880e4f'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}});\n}\n\n// ========== RECOMMENDATIONS ==========\nfunction renderRec(rank, data) {\n  var safeArr =data.filter(function(d){ return getChance(rank,d.overall_open,d.overall_close)==='safe'; });\n  var modArr  =data.filter(function(d){ return getChance(rank,d.overall_open,d.overall_close)==='moderate'; });\n  var reachArr=data.filter(function(d){ return getChance(rank,d.overall_open,d.overall_close)==='reach'; });\n  function ns(arr){ return arr.slice().sort(function(a,b){ return ((a.nirf_rank||9999)-(b.nirf_rank||9999))||((a.overall_open||9e9)-(b.overall_open||9e9)); }); }\n  function card(d,cls,label){\n    var qc=d.quota==='CIWG'?'&lt;span class=\&quot;rec-quota-chip chip-ciwg\&quot;&gt;CIWG&lt;/span&gt;':'&lt;span class=\&quot;rec-quota-chip chip-non\&quot;&gt;Non-CIWG&lt;/span&gt;';\n    var nr=d.nirf_rank?'&lt;div class=\&quot;rec-nirf-tag\&quot;&gt;NIRF #'+d.nirf_rank+'&lt;/div&gt;':'&lt;div class=\&quot;rec-nirf-tag unranked\&quot;&gt;Not Ranked&lt;/div&gt;';\n    return '&lt;div class=\&quot;rec-card '+cls+'\&quot;&gt;'+qc+'&lt;div class=\&quot;rec-cat\&quot;&gt;'+label+'&lt;/div&gt;&lt;div class=\&quot;rec-inst\&quot;&gt;'+d.institute+'&lt;/div&gt;&lt;div class=\&quot;rec-branch\&quot;&gt;'+d.branch+'&lt;/div&gt;'+nr+'&lt;div class=\&quot;rec-ranks\&quot;&gt;Overall: &lt;strong&gt;'+fmt(d.overall_open)+' - '+fmt(d.overall_close)+'&lt;/strong&gt;&lt;/div&gt;&lt;/div&gt;';\n  }\n  var html='';\n  ns(reachArr).slice(0,3).forEach(function(d){ html+=card(d,'dream','Reach Pick'); });\n  ns(modArr).slice(0,3).forEach(function(d){ html+=card(d,'target','Target Choice'); });\n  ns(safeArr).slice(0,4).forEach(function(d){ html+=card(d,'safe-c','Safe Choice'); });\n  document.getElementById('recGrid').innerHTML=html||'&lt;p style=\&quot;color:var(--muted);padding:20px\&quot;&gt;No colleges found. Adjust filters.&lt;/p&gt;';\n}\n\n// ========== TABLE ==========\nfunction renderTable(rank) {\n  if (!rank) rank=parseInt(document.getElementById('rankInput').value)||0;\n  var body=document.getElementById('tblBody');\n  document.getElementById('resCount').textContent=filtered.length+' result'+(filtered.length!==1?'s':'');\n  if (!filtered.length){ body.innerHTML='&lt;tr&gt;&lt;td colspan=\&quot;12\&quot; style=\&quot;text-align:center;padding:36px;color:var(--muted)\&quot;&gt;No colleges match your filters.&lt;/td&gt;&lt;/tr&gt;'; return; }\n  var catS={'Computer / IT &amp; AI':'CS/IT','Electronics &amp; Communication':'ECE','Electrical Engineering':'EE','Mechanical &amp; Aerospace':'Mech','Architecture &amp; Planning':'Arch','Civil &amp; Environmental':'Civil','Chemical &amp; Materials':'Chem','Biotech &amp; Biomedical':'Bio','Physics, Maths &amp; Science':'Sci','Design &amp; Industrial':'Design','Other Programs':'Other'};\n  body.innerHTML=filtered.map(function(d,i){\n    var ch=getChance(rank,d.overall_open,d.overall_close);\n    var cc=ch==='safe'?'safe-chip':ch==='moderate'?'mod-chip':'reach-chip';\n    var ct=ch==='safe'?'Safe':ch==='moderate'?'Moderate':'Reach';\n    var qc=d.quota==='CIWG'?'chip-ciwg':'chip-non';\n    var nr=d.nirf_rank?'&lt;span class=\&quot;nirf-cell ranked\&quot;&gt;#'+d.nirf_rank+'&lt;/span&gt;':'&lt;span class=\&quot;nirf-cell unranked\&quot;&gt;-&lt;/span&gt;';\n    return '&lt;tr&gt;&lt;td class=\&quot;sno-cell\&quot;&gt;'+(i+1)+'&lt;/td&gt;&lt;td class=\&quot;left inst-cell\&quot;&gt;&lt;div class=\&quot;inst\&quot;&gt;'+d.institute+'&lt;/div&gt;&lt;div class=\&quot;prog\&quot;&gt;'+d.program+'&lt;/div&gt;&lt;/td&gt;&lt;td&gt;&lt;span style=\&quot;font-size:11px;color:var(--muted);font-weight:600\&quot;&gt;'+(catS[d.branch_category]||d.branch_category)+'&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;quota-chip '+qc+'\&quot;&gt;'+d.quota+'&lt;/span&gt;&lt;/td&gt;&lt;td&gt;'+nr+'&lt;/td&gt;&lt;td class=\&quot;rank-cell\&quot;&gt;'+fmt(d.overall_open)+'&lt;/td&gt;&lt;td class=\&quot;rank-cell\&quot;&gt;'+fmt(d.overall_close)+'&lt;/td&gt;&lt;td class=\&quot;rd-cell\&quot;&gt;'+rdsv(d.r1_open,d.r1_close)+'&lt;/td&gt;&lt;td class=\&quot;rd-cell\&quot;&gt;'+rdsv(d.r2_open,d.r2_close)+'&lt;/td&gt;&lt;td class=\&quot;rd-cell\&quot;&gt;'+rdsv(d.r3_open,d.r3_close)+'&lt;/td&gt;&lt;td class=\&quot;rd-cell\&quot;&gt;'+d.rounds+'&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;chance-chip '+cc+'\&quot;&gt;'+ct+'&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;';\n  }).join('');\n}\nfunction filterTable() {\n  var s=document.getElementById('srchFilter').value.toLowerCase();\n  var cat=document.getElementById('catFilter2').value;\n  var ch=document.getElementById('chanceFilter2').value;\n  var quota=document.getElementById('quotaFilter2').value;\n  var rank=parseInt(document.getElementById('rankInput').value)||0;\n  filtered=allResults.filter(function(d){\n    if(s&amp;&amp;!d.institute.toLowerCase().includes(s)&amp;&amp;!d.program.toLowerCase().includes(s)) return false;\n    if(cat&amp;&amp;d.branch_category!==cat) return false;\n    if(quota&amp;&amp;d.quota!==quota) return false;\n    if(ch&amp;&amp;getChance(rank,d.overall_open,d.overall_close)!==ch) return false;\n    return true;\n  });\n  renderTable(rank);\n}\n\n// ========== PDF ==========\nfunction generatePDF() {\n  var rank=parseInt(document.getElementById('rankInput').value);\n  var name=document.getElementById('studentName').value.trim()||'Student';\n  var email=document.getElementById('studentEmail').value.trim();\n  if(!rank){showToast('Run prediction first!','error');return;}\n  showToast('Generating PDF...','info');\n  var jsPDF=window.jspdf.jsPDF;\n  var doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});\n  var W=doc.internal.pageSize.getWidth();\n  doc.setFillColor(15,27,94);doc.rect(0,0,W,42,'F');\n  doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont('helvetica','bold');\n  doc.text('EduAakashaa - DASA &amp; CIWG 2025 College Prediction Report',W/2,14,{align:'center'});\n  doc.setFontSize(9);doc.setFont('helvetica','normal');\n  doc.text('Student: '+name+(email?' | '+email:'')+'  |  Rank: '+rank.toLocaleString('en-IN')+'  |  NIRF 2026',W/2,23,{align:'center'});\n  doc.text('Generated: '+new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'})+'  |  Programs: '+allResults.length,W/2,31,{align:'center'});\n  var rows=allResults.map(function(d,i){\n    var ch=getChance(rank,d.overall_open,d.overall_close);\n    return [i+1,d.institute,d.branch,d.branch_category,d.quota,d.nirf_rank?'#'+d.nirf_rank:'-',fmt(d.overall_open),fmt(d.overall_close),rdsv(d.r1_open,d.r1_close),rdsv(d.r2_open,d.r2_close),d.rounds,ch==='safe'?'Safe':ch==='moderate'?'Moderate':'Reach'];\n  });\n  doc.autoTable({startY:47,head:[['#','Institute','Branch','Category','Quota','NIRF','Ovrl Open','Ovrl Close','R1 Open/Close','R2 Open/Close','Rounds','Chance']],body:rows,theme:'grid',headStyles:{fillColor:[15,27,94],textColor:255,fontSize:7.5,fontStyle:'bold'},bodyStyles:{fontSize:7,cellPadding:2.5},alternateRowStyles:{fillColor:[240,242,255]},columnStyles:{0:{cellWidth:8},1:{cellWidth:42},2:{cellWidth:38},3:{cellWidth:28},4:{cellWidth:14},5:{cellWidth:15},6:{cellWidth:18},7:{cellWidth:18},8:{cellWidth:22},9:{cellWidth:22},10:{cellWidth:14},11:{cellWidth:14}},didParseCell:function(d){if(d.section==='body'&amp;&amp;d.column.index===11){if(d.cell.raw==='Safe')d.cell.styles.textColor=[46,125,50];else if(d.cell.raw==='Moderate')d.cell.styles.textColor=[230,81,0];else d.cell.styles.textColor=[198,40,40];}}});\n  var pg=doc.internal.getNumberOfPages();\n  for(var p=1;p&lt;=pg;p++){doc.setPage(p);doc.setFontSize(7);doc.setTextColor(170,170,170);doc.text('Page '+p+'/'+pg+'  |  EduAakashaa.in  |  For guidance only',W/2,doc.internal.pageSize.getHeight()-6,{align:'center'});}\n  doc.save('DASA_'+name.replace(/\\s+/g,'_')+'_Rank'+rank+'.pdf');\n  showToast('PDF downloaded!','success');\n}\n\n// ========== EXCEL ==========\nfunction generateExcel() {\n  var rank=parseInt(document.getElementById('rankInput').value);\n  var name=document.getElementById('studentName').value.trim()||'Student';\n  if(!rank){showToast('Run prediction first!','error');return;}\n  showToast('Generating Excel...','info');\n  var wb=XLSX.utils.book_new();\n  var safe=allResults.filter(function(d){ return getChance(rank,d.overall_open,d.overall_close)==='safe'; }).length;\n  var sw=XLSX.utils.aoa_to_sheet([['DASA &amp; CIWG 2025 - College Prediction'],['EduAakashaa www.eduaakashaa.in'],[],['Student',name],['Email',document.getElementById('studentEmail').value.trim()||'-'],['Rank',rank],['Date',new Date().toLocaleDateString('en-IN')],[],['Summary'],['Total',allResults.length],['Safe',safe],['Moderate',allResults.filter(function(d){ return getChance(rank,d.overall_open,d.overall_close)==='moderate'; }).length],['Reach',allResults.filter(function(d){ return getChance(rank,d.overall_open,d.overall_close)==='reach'; }).length]]);\n  sw['!cols']=[{wch:22},{wch:40}];\n  XLSX.utils.book_append_sheet(wb,sw,'Summary');\n  var hdr=['#','Institute','Program','Branch','Category','Quota','NIRF Rank','Ovrl Open','Ovrl Close','R1 Open','R1 Close','R2 Open','R2 Close','Rounds','Chance'];\n  var rows=allResults.map(function(d,i){\n    var c=getChance(rank,d.overall_open,d.overall_close);\n    return [i+1,d.institute,d.program,d.branch,d.branch_category,d.quota,d.nirf_rank||'Not Ranked',d.overall_open||'-',d.overall_close||'-',d.r1_open||'-',d.r1_close||'-',d.r2_open||'-',d.r2_close||'-',d.rounds,c==='safe'?'Safe':c==='moderate'?'Moderate':'Reach'];\n  });\n  var aw=XLSX.utils.aoa_to_sheet([hdr,...rows]);\n  aw['!cols']=[4,42,52,38,28,14,18,16,16,14,14,14,14,18,16].map(function(w){ return {wch:w}; });\n  XLSX.utils.book_append_sheet(wb,aw,'All Colleges');\n  Array.from(new Set(allResults.map(function(d){ return d.branch_category; }))).sort().forEach(function(cat){\n    var cd=allResults.filter(function(d){ return d.branch_category===cat; });\n    if(!cd.length) return;\n    var cw=XLSX.utils.aoa_to_sheet([['#','Institute','Branch','Quota','NIRF','Ovrl Open','Ovrl Close','Rounds','Chance'],...cd.map(function(d,i){\n      var c=getChance(rank,d.overall_open,d.overall_close);\n      return [i+1,d.institute,d.branch,d.quota,d.nirf_rank||'N/A',d.overall_open||'-',d.overall_close||'-',d.rounds,c==='safe'?'Safe':c==='moderate'?'Moderate':'Reach'];\n    })]);\n    cw['!cols']=[4,42,36,14,14,16,16,18,14].map(function(w){ return {wch:w}; });\n    XLSX.utils.book_append_sheet(wb,cw,cat.replace(/[/&amp;]/g,'-').slice(0,28));\n  });\n  XLSX.writeFile(wb,'DASA_'+name.replace(/\\s+/g,'_')+'_Rank'+rank+'.xlsx');\n  showToast('Excel downloaded!','success');\n}\n\n// ========== EMAIL ==========\nfunction openModal() {\n  if(!allResults.length){showToast('Run prediction first!','error');return;}\n  var email=document.getElementById('studentEmail').value.trim();\n  if(!email){showToast('Please enter student email first!','error');return;}\n  var rank=parseInt(document.getElementById('rankInput').value);\n  document.getElementById('prevEmail').textContent=email;\n  document.getElementById('prevName').textContent=document.getElementById('studentName').value.trim()||'(Not provided)';\n  document.getElementById('prevRank').textContent=rank.toLocaleString('en-IN');\n  document.getElementById('prevCount').textContent=allResults.length;\n  document.getElementById('emailModal').classList.add('show');\n}\nfunction closeModal(){ document.getElementById('emailModal').classList.remove('show'); }\nfunction sendEmail() {\n  var email=document.getElementById('studentEmail').value.trim();\n  var name=document.getElementById('studentName').value.trim()||'Student';\n  var rank=parseInt(document.getElementById('rankInput').value);\n  closeModal();\n  fetch('https://api.eduaakashaa.in/send-dasa-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:email,studentName:name,rank:rank,totalColleges:allResults.length})})\n  .then(function(r){ if(r.ok) showToast('Report emailed to '+email+'!','success',5000); else fallbackEmail(email,name,rank); })\n  .catch(function(){ fallbackEmail(email,name,rank); });\n}\nfunction fallbackEmail(email,name,rank) {\n  var sub=encodeURIComponent('DASA 2025 Prediction Report - '+name);\n  var body=encodeURIComponent('Dear '+name+',\\n\\nYour DASA &amp; CIWG 2025 report.\\nRank: '+rank.toLocaleString('en-IN')+'\\nPrograms: '+allResults.length+'\\n\\nEduAakashaa Team\\nhttps://www.eduaakashaa.in');\n  window.open('mailto:'+email+'?subject='+sub+'&amp;body='+body);\n  showToast('Opening mail client. Connect backend for automation.','info',5000);\n}\n\n// ================================================================\n//  MATRIX — uses global MX_STORE[], data-midx on cells, event delegation\n//  No JSON encoding in onclick attributes (that was the bug)\n// ================================================================\nvar MX_STORE  = [];\nvar MX_NIRF   = {};\nvar mxRankVal = 0;\nvar detailEl  = null;\nvar mxListenerAttached = false;\n\nvar CAT_LIST = [\n  'Computer / IT &amp; AI','Electronics &amp; Communication','Electrical Engineering',\n  'Mechanical &amp; Aerospace','Architecture &amp; Planning','Civil &amp; Environmental',\n  'Chemical &amp; Materials','Biotech &amp; Biomedical','Physics, Maths &amp; Science',\n  'Design &amp; Industrial','Other Programs'\n];\nvar CAT_SHORT = {\n  'Computer / IT &amp; AI':         'CS/IT/AI',\n  'Electronics &amp; Communication':'ECE',\n  'Electrical Engineering':     'Electrical',\n  'Mechanical &amp; Aerospace':     'Mechanical',\n  'Architecture &amp; Planning':    'Architecture',\n  'Civil &amp; Environmental':      'Civil/Env',\n  'Chemical &amp; Materials':       'Chemical',\n  'Biotech &amp; Biomedical':       'Biotech',\n  'Physics, Maths &amp; Science':   'Physics/Math',\n  'Design &amp; Industrial':        'Design',\n  'Other Programs':             'Other'\n};\n\nfunction buildMatrix() {\n  try {\n    var rank  = parseInt(document.getElementById('mxRank').value)  || 0;\n    var quota = document.getElementById('mxQuota').value;\n    var catF  = document.getElementById('mxCat').value;\n    mxRankVal = rank;\n\n    var dataset = RAW_DATA.filter(function(d) {\n      if (quota !== 'both' &amp;&amp; d.quota !== quota) return false;\n      if (catF &amp;&amp; d.branch_category !== catF) return false;\n      return true;\n    });\n\n    MX_NIRF = {};\n    dataset.forEach(function(d) {\n      var cur = MX_NIRF[d.institute];\n      if (cur === undefined) {\n        MX_NIRF[d.institute] = d.nirf_rank || null;\n      } else if (d.nirf_rank &amp;&amp; (!cur || d.nirf_rank &lt; cur)) {\n        MX_NIRF[d.institute] = d.nirf_rank;\n      }\n    });\n\n    var sortedInsts = Object.keys(MX_NIRF).sort(function(a,b) {\n      var na=MX_NIRF[a], nb=MX_NIRF[b];\n      if (na &amp;&amp; nb) return na-nb;\n      if (na) return -1;\n      if (nb) return 1;\n      return a.localeCompare(b);\n    });\n\n    var lookup = {};\n    dataset.forEach(function(d) {\n      if (!lookup[d.institute]) lookup[d.institute] = {};\n      if (!lookup[d.institute][d.branch_category]) lookup[d.institute][d.branch_category] = [];\n      lookup[d.institute][d.branch_category].push(d);\n    });\n\n    var cats = catF ? [catF] : CAT_LIST;\n    var activeCats = cats.filter(function(c) {\n      return sortedInsts.some(function(inst) { return lookup[inst] &amp;&amp; lookup[inst][c]; });\n    });\n\n    if (!sortedInsts.length || !activeCats.length) {\n      document.getElementById('mxTable').innerHTML = '&lt;tbody&gt;&lt;tr&gt;&lt;td style=\&quot;padding:50px;text-align:center;color:var(--muted)\&quot;&gt;No data found. Adjust filters.&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;';\n      buildSummaryCards(0, [], {}, []);\n      return;\n    }\n\n    // Reset global store\n    MX_STORE = [];\n    var safeCnt=0, modCnt=0, reachCnt=0;\n\n    // Build column headers\n    var thead = '&lt;thead&gt;&lt;tr&gt;';\n    thead += '&lt;th class=\&quot;sticky-col\&quot;&gt;&lt;div class=\&quot;th-inner\&quot;&gt;Institute&lt;br&gt;&lt;span style=\&quot;font-size:9px;font-weight:400;opacity:.7\&quot;&gt;Sorted by NIRF 2026&lt;/span&gt;&lt;/div&gt;&lt;/th&gt;';\n    activeCats.forEach(function(cat) {\n      thead += '&lt;th&gt;&lt;div class=\&quot;col-head\&quot;&gt;' + (CAT_SHORT[cat]||cat) + '&lt;/div&gt;&lt;/th&gt;';\n    });\n    thead += '&lt;/tr&gt;&lt;/thead&gt;';\n\n    // Build rows\n    var rowsHtml = '';\n    sortedInsts.forEach(function(inst) {\n      var nr = MX_NIRF[inst];\n      var rowHtml = '&lt;tr&gt;';\n      rowHtml += '&lt;td class=\&quot;sticky-col\&quot;&gt;&lt;div class=\&quot;row-head\&quot;&gt;&lt;div class=\&quot;rh-name\&quot;&gt;' + inst + '&lt;/div&gt;&lt;div class=\&quot;rh-nirf' + (nr ? '' : ' unranked') + '\&quot;&gt;' + (nr ? 'NIRF #'+nr : 'Not Ranked') + '&lt;/div&gt;&lt;/div&gt;&lt;/td&gt;';\n\n      activeCats.forEach(function(cat) {\n        var entries = (lookup[inst] &amp;&amp; lookup[inst][cat]) ? lookup[inst][cat] : [];\n\n        if (!entries.length) {\n          rowHtml += '&lt;td&gt;&lt;div class=\&quot;mx-cell empty-cell\&quot;&gt;&lt;span style=\&quot;color:#d1d5db\&quot;&gt;-&lt;/span&gt;&lt;/div&gt;&lt;/td&gt;';\n          return;\n        }\n\n        // Save to global store, use index as key\n        var midx = MX_STORE.length;\n        MX_STORE.push({ entries: entries, inst: inst, cat: cat, nirfRank: nr });\n\n        if (entries.length === 1) {\n          var d = entries[0];\n          var ch = rank ? getChance(rank, d.overall_open, d.overall_close) : 'norank';\n          if (ch==='safe') safeCnt++;\n          else if (ch==='moderate') modCnt++;\n          else if (ch==='reach') reachCnt++;\n\n          var cellCls = (ch==='safe') ? 'safe-cell' : (ch==='moderate') ? 'mod-cell' : 'reach-cell';\n          var qCls    = d.quota==='CIWG' ? 'cq-ciwg' : 'cq-non';\n          var shortB  = d.branch.replace('Engineering','Engg').replace('Computer Science','CS').replace('Electronics','ECE').replace('Information Technology','IT').replace('Artificial Intelligence','AI');\n          var chBadge = rank ? ('&lt;div class=\&quot;cell-chance '+(ch==='safe'?'safe-text':ch==='moderate'?'mod-text':'reach-text')+'\&quot;&gt;'+( ch==='safe'?'Safe':ch==='moderate'?'Moderate':'Reach')+'&lt;/div&gt;') : '';\n\n          rowHtml += '&lt;td data-midx=\&quot;' + midx + '\&quot;&gt;';\n          rowHtml += '&lt;div class=\&quot;mx-cell ' + (rank ? cellCls : 'reach-cell') + '\&quot;&gt;';\n          rowHtml += '&lt;span class=\&quot;cell-quota ' + qCls + '\&quot;&gt;' + d.quota + '&lt;/span&gt;';\n          rowHtml += '&lt;div class=\&quot;cell-ranks\&quot;&gt;' + fmt(d.overall_open) + '&lt;/div&gt;';\n          rowHtml += '&lt;div class=\&quot;cell-close\&quot;&gt;Close: ' + fmt(d.overall_close) + '&lt;/div&gt;';\n          rowHtml += '&lt;div class=\&quot;cell-prog\&quot;&gt;' + shortB.slice(0,22) + '&lt;/div&gt;';\n          rowHtml += chBadge;\n          rowHtml += '&lt;/div&gt;&lt;/td&gt;';\n\n        } else {\n          var dualHtml = '';\n          entries.forEach(function(d) {\n            var ch = rank ? getChance(rank, d.overall_open, d.overall_close) : 'norank';\n            if (ch==='safe') safeCnt++;\n            else if (ch==='moderate') modCnt++;\n            else if (ch==='reach') reachCnt++;\n            var eCls = (ch==='safe')?'safe-entry':(ch==='moderate')?'mod-entry':'reach-entry';\n            var qCls = d.quota==='CIWG'?'cq-ciwg':'cq-non';\n            var badge = rank ? (ch==='safe'?' S':ch==='moderate'?' M':' R') : '';\n            dualHtml += '&lt;div class=\&quot;dual-entry ' + eCls + '\&quot;&gt;';\n            dualHtml += '&lt;span class=\&quot;cell-quota ' + qCls + '\&quot;&gt;' + d.quota + badge + '&lt;/span&gt;';\n            dualHtml += '&lt;div style=\&quot;font-size:11px;font-weight:700;color:#1f2937;margin-top:2px\&quot;&gt;' + fmt(d.overall_open) + '&lt;/div&gt;';\n            dualHtml += '&lt;div style=\&quot;font-size:10px;color:#6b7280\&quot;&gt;Close: ' + fmt(d.overall_close) + '&lt;/div&gt;';\n            dualHtml += '&lt;/div&gt;';\n          });\n          rowHtml += '&lt;td data-midx=\&quot;' + midx + '\&quot;&gt;&lt;div class=\&quot;dual-cell\&quot;&gt;' + dualHtml + '&lt;/div&gt;&lt;/td&gt;';\n        }\n      });\n\n      rowHtml += '&lt;/tr&gt;';\n      rowsHtml += rowHtml;\n    });\n\n    document.getElementById('mxTable').innerHTML = thead + '&lt;tbody&gt;' + rowsHtml + '&lt;/tbody&gt;';\n\n    // Update stats bar\n    document.getElementById('mxInstCount').textContent = sortedInsts.length;\n    document.getElementById('mxCatCount').textContent  = activeCats.length;\n    if (rank) {\n      document.getElementById('mxSafeCount').textContent  = safeCnt;\n      document.getElementById('mxModCount').textContent   = modCnt;\n      document.getElementById('mxReachCount').textContent = reachCnt;\n      document.getElementById('mxStatsBar').style.display = 'flex';\n    } else {\n      document.getElementById('mxStatsBar').style.display = 'none';\n    }\n\n    // Attach click via event delegation (only once on the scroll wrapper)\n    if (!mxListenerAttached) {\n      document.getElementById('mxTable').addEventListener('click', function(e) {\n        var td = e.target.closest('td[data-midx]');\n        if (!td) return;\n        var idx = parseInt(td.getAttribute('data-midx'), 10);\n        if (!isNaN(idx) &amp;&amp; MX_STORE[idx]) showCellDetail(e, MX_STORE[idx]);\n      });\n      mxListenerAttached = true;\n    }\n\n    buildSummaryCards(rank, sortedInsts, lookup, activeCats);\n\n  } catch(err) {\n    document.getElementById('mxTable').innerHTML = '&lt;tbody&gt;&lt;tr&gt;&lt;td style=\&quot;padding:40px;text-align:center;color:#c62828;font-weight:600\&quot;&gt;Error: ' + err.message + '&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;';\n    console.error('Matrix error:', err);\n  }\n}\n\n// ========== CELL DETAIL POPUP ==========\nfunction showCellDetail(e, item) {\n  if (!detailEl) {\n    detailEl = document.createElement('div');\n    detailEl.className = 'cell-detail';\n    document.body.appendChild(detailEl);\n    document.addEventListener('click', function(ev) {\n      if (detailEl &amp;&amp; !detailEl.contains(ev.target)) detailEl.classList.remove('show');\n    });\n  }\n\n  var rank = mxRankVal;\n  var rowsHtml = '';\n  item.entries.forEach(function(d) {\n    var ch    = rank ? getChance(rank, d.overall_open, d.overall_close) : 'unknown';\n    var rCls  = ch==='safe'?'safe-row':ch==='moderate'?'mod-row':'reach-row';\n    var chTxt = ch==='safe'?'Safe':ch==='moderate'?'Moderate':ch==='reach'?'Reach':'Enter rank to see';\n    rowsHtml += '&lt;div class=\&quot;cd-row ' + rCls + '\&quot;&gt;';\n    rowsHtml += '&lt;span class=\&quot;cd-qt\&quot;&gt;' + d.quota + '&lt;/span&gt;';\n    rowsHtml += '&lt;div class=\&quot;cd-val\&quot;&gt;&lt;div class=\&quot;cd-lbl\&quot;&gt;Opening&lt;/div&gt;&lt;div class=\&quot;cd-num\&quot;&gt;' + fmt(d.overall_open) + '&lt;/div&gt;&lt;/div&gt;';\n    rowsHtml += '&lt;div class=\&quot;cd-val\&quot;&gt;&lt;div class=\&quot;cd-lbl\&quot;&gt;Closing&lt;/div&gt;&lt;div class=\&quot;cd-num\&quot;&gt;' + fmt(d.overall_close) + '&lt;/div&gt;&lt;/div&gt;';\n    rowsHtml += '&lt;/div&gt;';\n    rowsHtml += '&lt;div style=\&quot;font-size:11px;color:#444;padding:3px 4px 2px\&quot;&gt;&lt;b&gt;' + d.branch + '&lt;/b&gt;&lt;/div&gt;';\n    rowsHtml += '&lt;div style=\&quot;font-size:11px;color:#374151;padding:0 4px 5px\&quot;&gt;Chance: &lt;b&gt;' + chTxt + '&lt;/b&gt; &amp;middot; Rounds: ' + d.rounds + '&lt;/div&gt;';\n    if (d.r1_open) {\n      rowsHtml += '&lt;div style=\&quot;font-size:10px;color:#9ca3af;padding:0 4px 6px\&quot;&gt;R1: '+fmt(d.r1_open)+'/'+fmt(d.r1_close)+(d.r2_open?' &amp;middot; R2: '+fmt(d.r2_open)+'/'+fmt(d.r2_close):'')+(d.r3_open?' &amp;middot; R3: '+fmt(d.r3_open)+'/'+fmt(d.r3_close):'')+'&lt;/div&gt;';\n    }\n  });\n\n  detailEl.innerHTML = '&lt;div class=\&quot;cd-title\&quot;&gt;' + item.inst + '&lt;/div&gt;&lt;div class=\&quot;cd-branch\&quot;&gt;' + item.cat + (item.nirfRank ? ' &amp;middot; NIRF #'+item.nirfRank : '') + '&lt;/div&gt;' + rowsHtml;\n\n  var rect = e.target.getBoundingClientRect();\n  var x = Math.min(rect.right + 10, window.innerWidth - 345);\n  var y = Math.min(rect.top + window.scrollY - 10, document.body.scrollHeight - 340);\n  detailEl.style.position = 'absolute';\n  detailEl.style.left = x + 'px';\n  detailEl.style.top  = y + 'px';\n  setTimeout(function(){ detailEl.classList.add('show'); }, 10);\n  e.stopPropagation();\n}\n\n// ========== SUMMARY CARDS ==========\nfunction buildSummaryCards(rank, sortedInsts, lookup, activeCats) {\n  var container = document.getElementById('mxSummary');\n  if (!sortedInsts || !sortedInsts.length) {\n    container.innerHTML = '&lt;div class=\&quot;mx-sum-card\&quot; style=\&quot;color:var(--muted);font-size:13px;padding:20px\&quot;&gt;No data to analyse for current filters.&lt;/div&gt;';\n    return;\n  }\n\n  if (!rank) {\n    // Overview when no rank is entered\n    var catCnts = {};\n    activeCats.forEach(function(cat) {\n      var cnt = 0;\n      sortedInsts.forEach(function(i){ cnt += ((lookup[i]&amp;&amp;lookup[i][cat])||[]).length; });\n      if (cnt) catCnts[cat] = cnt;\n    });\n    var instCnts = {};\n    sortedInsts.forEach(function(inst) {\n      var cnt = 0;\n      activeCats.forEach(function(cat){ cnt += ((lookup[inst]&amp;&amp;lookup[inst][cat])||[]).length; });\n      if (cnt) instCnts[inst] = cnt;\n    });\n    var topInstList = Object.entries(instCnts).sort(function(a,b){ return b[1]-a[1]; }).slice(0,6);\n\n    var html = '&lt;div class=\&quot;mx-sum-card\&quot;&gt;';\n    html += '&lt;div class=\&quot;msc-title\&quot;&gt;Matrix Overview&lt;/div&gt;';\n    html += '&lt;div class=\&quot;msc-row\&quot;&gt;&lt;span class=\&quot;msc-name\&quot;&gt;Total Institutes Shown&lt;/span&gt;&lt;span class=\&quot;msc-val\&quot;&gt;'+sortedInsts.length+'&lt;/span&gt;&lt;/div&gt;';\n    html += '&lt;div class=\&quot;msc-row\&quot;&gt;&lt;span class=\&quot;msc-name\&quot;&gt;Branch Categories&lt;/span&gt;&lt;span class=\&quot;msc-val\&quot;&gt;'+activeCats.length+'&lt;/span&gt;&lt;/div&gt;';\n    var total = 0; Object.values(catCnts).forEach(function(v){ total+=v; });\n    html += '&lt;div class=\&quot;msc-row\&quot;&gt;&lt;span class=\&quot;msc-name\&quot;&gt;Total Programs in View&lt;/span&gt;&lt;span class=\&quot;msc-val\&quot;&gt;'+total+'&lt;/span&gt;&lt;/div&gt;';\n    html += '&lt;div class=\&quot;msc-row\&quot;&gt;&lt;span class=\&quot;msc-name\&quot; style=\&quot;color:var(--accent);font-style:italic\&quot;&gt;Enter rank above for Safe/Reach analysis&lt;/span&gt;&lt;/div&gt;';\n    html += '&lt;/div&gt;';\n\n    html += '&lt;div class=\&quot;mx-sum-card\&quot;&gt;&lt;div class=\&quot;msc-title\&quot;&gt;Most Programs by Institute&lt;/div&gt;';\n    topInstList.forEach(function(e) {\n      var nr=MX_NIRF[e[0]];\n      html += '&lt;div class=\&quot;msc-row\&quot;&gt;&lt;span class=\&quot;msc-name\&quot;&gt;'+(e[0].length&gt;26?e[0].slice(0,26)+'...':e[0])+(nr?'&lt;br&gt;&lt;span style=\&quot;font-size:10px;color:var(--green)\&quot;&gt;NIRF #'+nr+'&lt;/span&gt;':'')+'&lt;/span&gt;&lt;span class=\&quot;msc-val\&quot;&gt;'+e[1]+' progs&lt;/span&gt;&lt;/div&gt;';\n    });\n    html += '&lt;/div&gt;';\n\n    html += '&lt;div class=\&quot;mx-sum-card\&quot;&gt;&lt;div class=\&quot;msc-title\&quot;&gt;Programs per Category&lt;/div&gt;';\n    Object.entries(catCnts).sort(function(a,b){ return b[1]-a[1]; }).forEach(function(e) {\n      html += '&lt;div class=\&quot;msc-row\&quot;&gt;&lt;span class=\&quot;msc-name\&quot;&gt;'+e[0].replace('Engineering','Engg')+'&lt;/span&gt;&lt;span class=\&quot;msc-val\&quot;&gt;'+e[1]+'&lt;/span&gt;&lt;/div&gt;';\n    });\n    html += '&lt;/div&gt;';\n\n    container.innerHTML = html;\n    return;\n  }\n\n  // With rank\n  var bestPerCat = {};\n  activeCats.forEach(function(cat) {\n    var best = null;\n    sortedInsts.forEach(function(inst) {\n      ((lookup[inst]&amp;&amp;lookup[inst][cat])||[]).forEach(function(d) {\n        var ch = getChance(rank, d.overall_open, d.overall_close);\n        if ((ch==='safe'||ch==='moderate') &amp;&amp; (!best || d.overall_close &lt; best.close))\n          best = { name: inst, close: d.overall_close, open: d.overall_open, quota: d.quota };\n      });\n    });\n    if (best) bestPerCat[cat] = best;\n  });\n\n  var instScore = {};\n  sortedInsts.forEach(function(inst) {\n    var s=0,m=0,r=0;\n    activeCats.forEach(function(cat) {\n      ((lookup[inst]&amp;&amp;lookup[inst][cat])||[]).forEach(function(d) {\n        var ch=getChance(rank,d.overall_open,d.overall_close);\n        if(ch==='safe')s++;else if(ch==='moderate')m++;else if(ch==='reach')r++;\n      });\n    });\n    if(s+m+r&gt;0) instScore[inst]={s:s,m:m,r:r};\n  });\n  var topInsts=Object.entries(instScore).sort(function(a,b){ return b[1].s-a[1].s||(b[1].s+b[1].m)-(a[1].s+a[1].m); }).slice(0,6);\n\n  var allFlat=[];\n  sortedInsts.forEach(function(inst) {\n    activeCats.forEach(function(cat) {\n      ((lookup[inst]&amp;&amp;lookup[inst][cat])||[]).forEach(function(d) {\n        allFlat.push({d:d, inst:inst, nr:MX_NIRF[inst]});\n      });\n    });\n  });\n  var topSafe=allFlat.filter(function(x){ return getChance(rank,x.d.overall_open,x.d.overall_close)==='safe'; })\n    .sort(function(a,b){ return ((a.nr||9999)-(b.nr||9999))||(a.d.overall_close-b.d.overall_close); }).slice(0,5);\n\n  var html='';\n\n  html+='&lt;div class=\&quot;mx-sum-card\&quot;&gt;&lt;div class=\&quot;msc-title\&quot;&gt;Best Option Per Category&lt;/div&gt;';\n  var catEntries = Object.entries(bestPerCat);\n  if (catEntries.length) {\n    catEntries.slice(0,9).forEach(function(e){\n      html+='&lt;div class=\&quot;msc-row\&quot;&gt;&lt;span class=\&quot;msc-name\&quot;&gt;'+e[0].replace('Engineering','Engg')+'&lt;/span&gt;&lt;span class=\&quot;msc-val\&quot;&gt;'+fmt(e[1].close)+'&lt;/span&gt;&lt;/div&gt;';\n    });\n  } else {\n    html+='&lt;div style=\&quot;color:var(--muted);font-size:12px;padding:6px 0\&quot;&gt;No safe/moderate options for rank '+rank.toLocaleString('en-IN')+'.&lt;/div&gt;';\n  }\n  html+='&lt;/div&gt;';\n\n  html+='&lt;div class=\&quot;mx-sum-card\&quot;&gt;&lt;div class=\&quot;msc-title\&quot;&gt;Most Safe Options by Institute&lt;/div&gt;';\n  if(topInsts.length){\n    topInsts.forEach(function(e){\n      var nr=MX_NIRF[e[0]];\n      html+='&lt;div class=\&quot;msc-row\&quot;&gt;&lt;span class=\&quot;msc-name\&quot;&gt;'+(e[0].length&gt;26?e[0].slice(0,26)+'...':e[0])+(nr?'&lt;br&gt;&lt;span style=\&quot;font-size:10px;color:var(--green)\&quot;&gt;NIRF #'+nr+'&lt;/span&gt;':'')+'&lt;/span&gt;&lt;span class=\&quot;msc-val\&quot; style=\&quot;color:var(--green)\&quot;&gt;'+e[1].s+' safe&lt;/span&gt;&lt;/div&gt;';\n    });\n  } else {\n    html+='&lt;div style=\&quot;color:var(--muted);font-size:12px;padding:6px 0\&quot;&gt;No eligible institutes for rank '+rank.toLocaleString('en-IN')+'.&lt;/div&gt;';\n  }\n  html+='&lt;/div&gt;';\n\n  html+='&lt;div class=\&quot;mx-sum-card\&quot;&gt;&lt;div class=\&quot;msc-title\&quot;&gt;Top Safe Picks (NIRF Sorted)&lt;/div&gt;';\n  if(topSafe.length){\n    topSafe.forEach(function(x){\n      html+='&lt;div class=\&quot;msc-row\&quot;&gt;&lt;span class=\&quot;msc-name\&quot;&gt;'+(x.inst.length&gt;22?x.inst.slice(0,22)+'...':x.inst)+(x.nr?'&lt;br&gt;&lt;span style=\&quot;font-size:10px;color:var(--green)\&quot;&gt;NIRF #'+x.nr+'&lt;/span&gt;':'')+'&lt;br&gt;&lt;span style=\&quot;font-size:10px;color:var(--muted)\&quot;&gt;'+x.d.branch_category+'&lt;/span&gt;&lt;/span&gt;&lt;span class=\&quot;msc-val\&quot;&gt;'+fmt(x.d.overall_open)+'-'+fmt(x.d.overall_close)+'&lt;/span&gt;&lt;/div&gt;';\n    });\n  } else {\n    html+='&lt;div style=\&quot;color:var(--muted);font-size:12px;padding:6px 0\&quot;&gt;No safe options for rank '+rank.toLocaleString('en-IN')+'. Try a higher rank.&lt;/div&gt;';\n  }\n  html+='&lt;/div&gt;';\n\n  container.innerHTML=html;\n}\n\n// ========== JEE RANK &lt;=&gt; PERCENTILE CONVERTER ==========\nvar JEE_TOTAL = 1315000; // JEE Main 2025 appeared candidates\n\nfunction convFromRank() {\n  var rank = parseInt(document.getElementById('convRank').value);\n  if (!rank || rank &lt; 1) { document.getElementById('convResults').style.display='none'; return; }\n  rank = Math.min(rank, JEE_TOTAL);\n  var pct = (1 - (rank - 1) / JEE_TOTAL) * 100;\n  document.getElementById('convPct').value = pct.toFixed(4);\n  show clamp(1rem,2.5vw,1.25rem); font-weight: 700; color: #fff; margin-bottom: 22px; line-height: 1.5; }\n.qopts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }\n@media (max-width: 480px) { .qopts { grid-template-columns: 1fr; } }\n.qopt {\n  background: rgba(255,255,255,0.07);\n  border: 1.5px solid rgba(255,255,255,0.14);\n  border-radius: 12px;\n  padding: 14px 15px;\n  text-align: left;\n  color: rgba(255,255,255,0.78);\n  font-family: Arial, sans-serif;\n  font-size: 0.87rem;\n  font-weight: 600;\n  cursor: pointer;\n  transition: all 0.18s;\n  line-height: 1.4;\n}\n.qopt:hover, .qopt.sel {\n  background: rgba(201,168,76,0.18);\n  border-color: #C9A84C;\n  color: #fff;\n}\n.qnav { margin-top: 22px; }\n.qnext {\n  background: transparent;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  color: #fff;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 13px 30px;\n  border-radius: 100px;\n  cursor: pointer;\n  display: none;\n}\n.qresult { display: none; text-align: center; }\n.rbadge { display: inline-block; font-size: 2.6rem; font-weight: 900; padding: 16px 32px; border-radius: 14px; margin-bottom: 15px; }\n.rb-a  { background: #D8F3DC; color: #2D6A4F; }\n.rb-c  { background: #DBE9FF; color: #1B4F9B; }\n.rb-ca { background: #FFE0E4; color: #8B2635; }\n.rtitle { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 11px; }\n.rtext { font-family: Arial, sans-serif; font-size: 0.94rem; color: rgba(255,255,255,0.56); max-width: 420px; margin: 0 auto 22px; line-height: 1.72; }\n.btn-retry { background: #C9A84C; color: #1A1A2E; font-family: Arial, sans-serif; font-size: 0.93rem; font-weight: 700; padding: 13px 30px; border-radius: 100px; border: none; cursor: pointer; }\n\n/* FAQ */\n.faq-outer { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); background: #F9F5EE; }\n.faq-inner { max-width: 1160px; margin: 0 auto; }\n.faq-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .faq-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .faq-grid { grid-template-columns: 1fr 1fr; } }\n.fi { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid #E5DDD0; }\n.fq { font-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }\n.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }\n\n/* FOOTER */\nfooter { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work ex html;\n  document.getElementById('qNext').style.display='none';\n}\n\nfunction showRes(){\n  var keys=Object.keys(sc).sort(function(a,b){return sc[b]-sc[a];});\n  var w=keys[0];\n  var info={\n    acca:{n:'ACCA',cls:'rb-a', ti:'ACCA is your ideal match!', tx:'Your goals align with ACCA — global flexibility, modular study structure, and recognition in 180+ countries.'},\n    cfa:{n:'CFA',cls:'rb-c', ti:'CFA is your ideal match!', tx:'Your passion for investment and markets points to the CFA Charter — the gold standard for finance professionals worldwide.'},\n    ca:{n:'CA',cls:'rb-ca', ti:'CA is your ideal match!', tx:'Your preference for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}\n  }[w];\n  document.getElementById('qMain').style.display='none';\n  document.getElementById('qResult').style.display='block';\n  var b=document.getElementById('rBadge');\n  b.textContent=info.n; b.className='rbadge '+info.cls;\n  document.getElementById('rTitle').textContent=info.ti;\n  document.getElementById('rText').textContent=info.tx;\n}\n\nfunction resetQ(){\n  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;\n  document.getElementById('qResult').style.display='none';\n  document.getElementById('qMain').style.display='block';\n  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[0].q;\n  var html='';\n  for(var i=0;i&lt;Qs[0].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[0].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n&lt;/script&gt;&quot;],&quot;customHeadElements&quot;:[0,&quot;&lt;meta&gt;&lt;meta name=\&quot;viewport\&quot; content=\&quot;width=device-width, initial-scale=1.0\&quot;&gt;&lt;style&gt;\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nbody {\n  font-family: Georgia, 'Times New Roman', serif; e="--z-index:1;--grid-row:1/2;--grid-column:1/2;--m-grid-row:2/3;--m-grid-column:1/2;--bc1057f4:1740px;--ff15b110:2908px;" data-v-b6651962="" data-qa="layout-element-wrapper:zouh-p"><!--[--><!----><!----><!----><!----><!----><!----><!----><!----><!----><!----><!----><div id="zouH-P" class="grid-embed layout-element__component layout-element__component--GridEmbed" data-v-b6651962="" style="--52c726c9: 1734.09375px;" data-v-baa9f7ad="" data-qa="gridembed:zouh-p"><iframe data-v-baa9f7ad="" class="grid-embed__iframe" srcdoc="&lt;!DOCTYPE html&gt;
