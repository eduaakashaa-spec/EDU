t-size: 0.85rem; line-height: 1.72; color: #6B7280; }\n\n/* FOOTER */\nfooter { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;,s:{acca:2}}]\n  },\n  { q:\&quot;How can you dedicate time to studying?\&quot;,\n    o:[{t:\&quot;⏱️ Part-time alongside my job\&quot our ideal match!', tx:'Your passion for investment and markets points to the CFA Charter — the gold standard for finance professionals worldwide.'},\n    ca:{n:'CA',cls:'rb-ca', ti:'CA is your ideal match!', tx:'Your preference for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}\n  }[w];\n  document.getElementById('qMain').style.display='none';\n  document.getElementById('qResult').style.display='block';\n  var b=document.getElementById('rBadge');\n  b.textContent=info.n; b.className='rbadge '+info.cls;\n  document.getElementById('rTitle').textContent=info.ti;\n  document.getElementById('rText').textContent=info.tx;\n}\n\nfunction resetQ(){\n  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;\n  document.getElementById('qResult').style.display='none';\n  document.getElementById('qMain').style.display='block';\n  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[0].q;\n  var html='';\n  for(var i=0;i&lt;Qs[0].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[0].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n&lt;/script&gt;&quot;],&quot;customHeadElements&quot;:[0,&quot;&lt;meta&gt;&lt;meta name=\&quot;viewport\&quot; content=\&quot;width=device-width, initial-scale=1.0\&quot;&gt;&lt;style&gt;\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nbody {\n  font-family: Georgia, 'Times New Roman', serif;\n  background: #F9F5EE;\n  color: #2B2B2B;\n  overflow-x: hidden;\n}\n\n/* HERO */\n.hero {\n  background: #1A1A2E;\n  padding: 100px 24px 80px;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n.hero-glow {\n  position: absolute;\n  top: 0; left: 0; right: 0; bottom: 0;\n  background:\n    radial-gradient(ellipse 55% 45% at 15% 35%, rgba(45,106,79,0.35) 0%, transparent 60%),\n    radial-gradient(ellipse 50% 55% at 85% 70%, rgba(27,79,155,0.30) 0%, transparent 60%);\n  pointer-events: none;\n}\n.badge {\n  display: inline-block;\n  border: 1px solid rgba(201,168,76,0.5);\n  color: #C9A84C;\n  font-family: Arial, sans-serif;\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 2.5px;\n  text-transform: uppercase;\n  padding: 7px 20px;\n  border-radius: 100px;\n  margin-bottom: 28px;\n  position: relative;\n}\n.hero h1 {\n  font-size: clamp(2.2rem, 6vw, 4.8rem);\n  font-weight: 900;\n  color: #ffffff;\n  line-height: 1.1;\n  max-width: 800px;\n  margin: 0 auto;\n  position: relative;\n}\n.hero h1 span { color: #C9A84C; font-style: italic; }\n.hero p {\n  margin: 22px auto 0;\n  font-family: Arial, sans-serif;\n  font-size: clamp(0.95rem, 2vw, 1.15rem);\n  color: rgba(255,255,255,0.62);\n  max-width: 520px;\n  line-height: 1.75;\n  position: relative;\n}\n.hero-btns {\n  margin-top: 38px;\n  display: flex;\n  gap: 14px;\n  justify-content: center;\n  flex-wrap: wrap;\n  position: relative;\n}\n.btn-main {\n  background: #C9A84C;\n  color: #1A1A2E;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 14px 32px;\n  border-radius: 100px;\n  text-decoration: none;\n  display: inline-block;\n}\n.btn-out {\n  background: transparent;\n  color: #ffffff;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 600;\n  padding: 13px 30px;\n  border-radius: 100px;\n  text-decoration: none;\n  display: inline-block;\n}\n\n/* SECTIONS */\n.sec { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); max-width: 1160px; margin: 0 auto; }\n.sec-dark { background: #1A1A2E; }\n.sec-white { background: #ffffff; }\n.eyebrow {\n  font-family: Arial, sans-serif;\n  font-size: 10.5px;\n  font-weight: 700;\n  letter-spacing: 3px;\n  text-transform: uppercase;\n  color: #C9A84C;\n  margin-bottom: 12px;\n}\n.sec-h {\n  font-size: clamp(1.85rem, 4.2vw, 3rem);\n  font-weight: e { background: var(--green); }\n.tl-dot.active { background: var(--orange); box-shadow: 0 0 0 4px rgba(232,115,26,0.25); }\n.tl-dot.upcoming { background: var(--gray-light); }\n.tl-card {\n  padding: 18px 22px;\n  border-left: 4px solid var(--gray-light);\n}\n.tl-card.done-border { border-left-color: var(--green); }\n.tl-card.active-border { border-left-color: var(--orange); }\n.tl-date { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 2px; }\n.tl-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 4px; }\n.tl-desc { font-size: 13px; color: var(--gray); }\n\n/* ── Stats Row ── */\n.stats-row {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));\n  gap: 18px;\n  margin-bottom: 32px;\n}\n.stat-card {\n  text-align: center;\n  padding: 24px 16px;\n}\n.stat-card .num {\n  font-size: 30px;\n  font-weight: 900;\n  color: var(--orange);\n  line-height: 1;\n  margin-bottom: 4px;\n}\n.stat-card .label { font-size: 13px; color: var(--gray); font-weight: 600; }\n\n/* ── FAQ Accordion ── */\n.faq-filters {\n  display: flex;\n  justify-content: center;\n  gap: 10px;\n  margin-bottom: 28px;\n  flex-wrap: wrap;\n}\n.faq-filters button {\n  font-family: 'Outfit', sans-serif;\n  font-size: 14px;\n  font-weight: 700;\n  padding: 8px 22px;\n  border-radius: 24px;\n  border: 2px solid var(--gray-light);\n  background: var(--white);\n  color: var(--gray);\n  cursor: pointer;\n  transition: .2s;\n}\n.faq-filters button.active {\n  border-color: var(--orange);\n  background: var(--orange);\n  color: var(--white);\n}\n.faq-item {\n  border: 1px solid var(--gray-light);\n  border-radius: 12px;\n  margin-bottom: 10px;\n  overflow: hidden;\n  background: var(--white);\n  transition: .3s;\n}\n.faq-q {\n  padding: 16px 20px;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  cursor: pointer;\n  gap: 12px;\n}\n.faq-q span { font-weight: 700; font-size: 15px; color: var(--text); }\n.faq-q .toggle {\n  font-size: 20px;\n  color: var(--orange);\n  transition: .3s;\n  flex-shrink: 0;\n  font-weight: 300;\n}\n.faq-a {\n  display: none;\n  padding: 0 20px 16px;\n  font-size: 14px;\n  color: var(--gray);\n  line-height: 1.7;\n  border-left: 3px solid var(--orange);\n  margin-left: 20px;\n  padding-left: 12px;\n}\n.faq-item.open .faq-a { display: block; }\n.faq-item.open .toggle { transform: rotate(45deg); }\n.faq-item.open { border-color: rgba(232,115,26,0.3); }\n\n/* ── Skills Quiz ── */\n.quiz-q {\n  margin-bottom: 16px;\n}\n.quiz-q .q-text { font-weight: 700; font-size: 15px; margin-bottom: 10px; }\n.quiz-btns { display: flex; gap: 8px; flex-wrap: wrap; }\n.quiz-btns button {\n  width: 44px;\n  height: 44px;\n  border-radius: 10px;\n  border: 2px solid var(--gray-light);\n  background: var(--white);\n  font-family: 'Outfit', sans-serif;\n  font-weight: 800;\n  font-size: 16px;\n  color: var(--gray);\n  cursor: pointer;\n  transition: .2s;\n}\n.quiz-btns button.selected {\n  border-color: var(--orange);\n  background: var(--orange-light);\n  color: var(--orange);\n}\n.quiz-hint { font-size: 11px; color: #94A3B8; margin-left: 8px; align-self: center; }\n.btn-primary {\n  font-family: 'Outfit', sans-serif;\n  font-size: 16px;\n  font-weight: 800;\n  padding: 14px 40px;\n  border-radius: 30px;\n  border: none;\n  background: linear-gradient(135deg, var(--orange), var(--blue));\n  color: var(--white);\n  cursor: pointer;\n  transition: .3s;\n}\n.btn-primary:disabled {\n  background: var(--gray-light);\n  color: #94A3B8;\n  cursor: not-allowed;\n}\n.result-bar {\n  height: 10px;\n  background: var(--gray-light);\n  border-radius: 5px;\n  overflow: hidden;\n  margin-top: 6px;\n}\n.result-fill { height: 100%; border-radius: 5px; transition: width 1s; }\n\n/* ── CTA ── */\n.cta-section {\n  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);\n  text-align: center;\n  padding: 64px 24px;\n}\n.cta-section h2 {\n  font-family: 'Fraunces', Georgia, serif;\n  font-size: 32px;\n  font-weight: 900;\n  color: var(--white);\n  margin-bottom: 12px;\n}\n.cta-section p { color: rgba(255,255,255,0.7); font-size: 16px; max-width: 560px; margin: 0 auto 28px; }\n.cta-btns { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }\n.cta-btns a {\n  font-weight: 800;\n  font-size: 15px;\n  padding: 14px 32px;\n  border-radius: 28px;\n  display: flex;\n  align-items: center;\n  gap: 8px;\n}\n.cta-btns .btn-orange { background: var(--orange); color: var(--white); }\n.cta-btns .btn-ghost {\n  background: rgba(255,255,255,0.1);\n  color: var(--white);\n  border: 2px solid rgba(255,255,255,0.3);\n}\n.cta-btns .btn-wa { background: #25D366; color: var(--white); }\n\n/* ── Footer ── */\nfooter {\n  padding: 32px 24px;\n  background: var(--white);\n  border-top: 1px solid var(--gray-light);\n}\nfooter .container {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  flex-wrap: wrap;\n  gap: 16px;\n}\nfooter .disclaimer {\n  font-size: 11px;\n  color: #94A3B8;\n  max-width: 600px;\n  line-height: 1.6;\n  background: var(--off-white);\n  padding: 12px 16px;\n  border-radius: 8px;\n  border-left: 3px solid var(--orange);\n}\n\n/* ── Tag cloud ── */\n.tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }\n.tag {\n  font-size: 13px;\n  font-weight: 600;\n  padding: 6px 14px;\n  border-radius: 20px;\n  background: rgba(27,58,107,0.06);\n  color: var(--blue);\n  border: 1px solid rgba(27,58,107,0.12);\n}\n\n/* ── Presentation/Video Script ── */\n.script-block {\n  background: var(--off-white);\n  border: 1px solid var(--gray-light);\n  border-radius: var(--radius);\n  padding: 24px;\n  margin-bottom: 20px;\n}\n.script-block h4 {\n  font-size: 16px;\n  font-weight: 800;\n  color: var(--blue);\n  margin-bottom: 10px;\n  display: flex;\n  align-items: center;\n  gap: 8px;\n}\n.script-block p, .script-block li {\n  font-size: 14px;\n  color: var(--gray);\n  line-height: 1.7;\n}\n.script-block ul { padding-left: 18px; }\n.script-block .slide-tag {\n  display: inline-block;\n  background: var(--orange-light);\n  color: var(--orange);\n  font-size: 11px;\n  font-weight: 700;\n  padding: 2px 10px;\n  border-radius: 10px;\n  margin-bottom: 8px;\n}\n.progress-ring {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  margin-bottom: 10px;\n}\n.progress-ring .bar-bg {\n  flex: 1;\n  height: 8px;\n  background: var(--gray-light);\n  border-radius: 4px;\n  overflow: hidden;\n}\n.progress-ring .bar-fill {\n  height: 100%;\n  border-radius: 4px;\n  background: linear-gradient(90deg, var(--orange), var(--blue));\n}\n\n/* ── Responsive ── */\n@media (max-width: 768px) {\n  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }\n  .nav-row { flex-direction: column; align-items: flex-start; }\n  .quick-nav .container { gap: 4px; }\n  .stat-pills { flex-direction: column; align-items: center; }\n  .stats-row { grid-template-columns: repeat(2, 1fr); }\n}\n&lt;/style&gt;\n\n\n\n&lt;!-- ═══ CONSENT BANNER ═══ --&gt;\n&lt;div class=\&quot;consent-banner\&quot;&gt;\n  ⚠️ &lt;strong&gt;EduAakashaA&lt;/strong&gt; provides independent guidance on college &amp;#x26; branch selection. We are &lt;strong&gt;not affiliated with or a partner of any educational institution&lt;/strong&gt;. Students should always verify information from official university sources for accuracy. Visit &lt;a href=\&quot;https://www.amrita.edu/admissions/\&quot; target=\&quot;_blank\&quot; style=\&quot;color:#FFD700;text-decoration:underline\&quot;&gt;amrita.edu/admissions&lt;/a&gt; for official details.\n&lt;/div&gt;\n\n\n\n&lt;!-- ═══ HEADER ═══ --&gt;\n&lt;header class=\&quot;header\&quot;&gt;\n  &lt;div class=\&quot;header-bg\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;header-overlay\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;header-content container\&quot;&gt;\n    &lt;div class=\&quot;nav-row\&quot;&gt;\n      &lt;div class=\&quot;nav-links\&quot;&gt;\n        &lt;a href=\&quot;mailto:contact@eduaakashaa.com\&quot; class=\&quot;btn-fill\&quot;&gt;✉ Expert Guidance&lt;/a&gt;\n        &lt;a href=\&quot;https://whatsapp.com/channel/0029VbCl0sGHAdNeRF5AHz25\&quot; target=\&quot;_blank\&quot; class=\&quot;btn-whatsapp\&quot;&gt;💬 WhatsApp&lt;/a&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;hero-center\&quot;&gt;\n      &lt;span class=\&quot;hero-badge\&quot;&gt;Amrita Vishwa Vidyapeetham • Admission Support 2026&lt;/span&gt;\n      &lt;h1&gt;Your Complete Guide to &lt;span&gt;Amrita Admissions&lt;/span&gt; 2026&lt;/h1&gt;\n      &lt;p&gt;AEEE, AEEL, A-CLAT exam schedules, fee structures, campus insights, branch prediction, NRI guidance, scholarships &amp;#x26; expert counselling — everything students and parents need.&lt;/p&gt;\n      &lt;div class=\&quot;stat-pills\&quot;&gt;\n        &lt;div class=\&quot;stat-pill\&quot;&gt;⭐ NAAC A++&lt;/div&gt;\n        &lt;div class=\&quot;stat-pill\&quot;&gt;🏆 NIRF #8 University&lt;/div&gt;\n        &lt;div class=\&quot;stat-pill\&quot;&gt;💰 ₹80.4 LPA Highest CTC&lt;/div&gt;\n        &lt;div class=\&quot;stat-pill\&quot;&gt;🏫 10 Campuses&lt;/div&gt;\n        &lt;div class=\&quot;stat-pill\&quot;&gt;📚 300+ Programs&lt;/div&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/header&gt;\n\n\n&lt;!-- ═══ 1. ALL ADMISSION OPTIONS ═══ --&gt;\n&lt;section id=\&quot;admissions\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;section-head\&quot;&gt;\n      &lt;div class=\&quot;icon\&quot;&gt;🎓&lt;/div&gt;\n      &lt;h2&gt;All Admission Pathways at Amrita&lt;/h2&gt;\n      &lt;p&gt;Amrita offers multiple entrance exams and routes across engineering, life sciences, law, and more&lt;/p&gt;\n      &lt;div class=\&quot;bar\&quot;&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;card-grid grid-3\&quot;&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;icon-box\&quot; style=\&quot;background:var(--orange-light)\&quot;&gt;🔧&lt;/div&gt;\n        &lt;span class=\&quot;badge badge-orange\&quot;&gt;ENGINEERING&lt;/span&gt;\n        &lt;h4&gt;AEEE — Engineering Entrance&lt;/h4&gt;\n        &lt;p&gt;Amrita Entrance Examination – Engineering for B.Tech admission across 8 campuses (Coimbatore, Bengaluru, Chennai, Amritapuri, Amaravati, Faridabad, Nagercoil, Haridwar).&lt;/p&gt;\n        &lt;ul&gt;\n          &lt;li&gt;CBT mode, 100 MCQs, 300 marks, 150 mins&lt;/li&gt;\n          &lt;li&gt;70% seats via AEEE, 30% via JEE Main&lt;/li&gt;\n          &lt;li&gt;19 B.Tech specializations offered&lt;/li&gt;\n          &lt;li&gt;Two phases: Phase 1 (Jan-Feb) &amp;#x26; Phase 2 (Apr)&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;icon-box\&quot; style=\&quot;background:var(--green-light)\&quot;&gt;🧬&lt;/div&gt;\n        &lt;span class=\&quot;badge badge-green\&quot;&gt;LIFE SCIENCES&lt;/span&gt;\n        &lt;h4&gt;AEEL — Life Sciences, Agriculture &amp;#x26; Medical&lt;/h4&gt;\n        &lt;p&gt;Amrita Entrance Examination – Life Sciences for Nursing, Pharmacy, Agriculture, Food Science &amp;#x26; Allied Health Sciences.&lt;/p&gt;\n        &lt;ul&gt;\n          &lt;li&gt;CBT mode, 80 questions, 120 mins&lt;/li&gt;\n          &lt;li&gt;Physics, Chemistry, Biology &amp;#x26; English&lt;/li&gt;\n          &lt;li&gt;Conducted in 60+ cities across India&lt;/li&gt;\n          &lt;li&gt;Programs: B.Sc Nursing, B.Pharm, B.Sc Agriculture&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;icon-box\&quot; style=\&quot;background:var(--purple-light)\&quot;&gt;⚖️&lt;/div&gt;\n        &lt;span class=\&quot;badge badge-purple\&quot;&gt;LAW&lt;/span&gt;\n        &lt;h4&gt;A-CLAT — Law Admission Test&lt;/h4&gt;\n        &lt;p&gt;Amrita Common Law Admission Test for integrated 5-year B.A. LL.B. and B.B.A. LL.B. programmes at Coimbatore campus.&lt;/p&gt;\n        &lt;ul&gt;\n          &lt;li&gt;Also accepts CLAT / AILET scores&lt;/li&gt;\n          &lt;li&gt;60% marks in 10+2 required&lt;/li&gt;\n          &lt;li&gt;Annual fee: ₹2,25,000 + ₹20,000 deposit&lt;/li&gt;\n          &lt;li&gt;Amrita International School of Law&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;icon-box\&quot; style=\&quot;background:var(--blue-light)\&quot;&gt;📊&lt;/div&gt;\n        &lt;span class=\&quot;badge badge-blue\&quot;&gt;ALTERNATE&lt;/span&gt;\n        &lt;h4&gt;JEE Main Route (B.Tech)&lt;/h4&gt;\n        &lt;p&gt;30% of B.Tech seats allocated via JEE Main percentile. Apply through the same AEEE portal — no additional fee.&lt;/p&gt;\n        &lt;ul&gt;\n          &lt;li&gt;Separate merit list from AEEE&lt;/li&gt;\n          &lt;li&gt;Same CSAP counselling process&lt;/li&gt;\n          &lt;li&gt;Can apply for both AEEE + JEE simultaneously&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;icon-box\&quot; style=\&quot;background:var(--purple-light)\&quot;&gt;🌍&lt;/div&gt;\n        &lt;span class=\&quot;badge badge-purple\&quot;&gt;NRI / OCI&lt;/span&gt;\n        &lt;h4&gt;NRI / OCI / PIO Quota&lt;/h4&gt;\n        &lt;p&gt;Direct admission without entrance exam for foreign passport holders of Indian origin.&lt;/p&gt;\n        &lt;ul&gt;\n          &lt;li&gt;No AEEE required for OCI/PIO students&lt;/li&gt;\n          &lt;li&gt;SAT accepted as alternative&lt;/li&gt;\n          &lt;li&gt;Fee: ~USD 7,000/year for B.Tech&lt;/li&gt;\n          &lt;li&gt;All 8 engineering campuses available&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;icon-box\&quot; style=\&quot;background:var(--orange-light)\&quot;&gt;🏥&lt;/div&gt;\n        &lt;span class=\&quot;badge badge-orange\&quot;&gt;MEDICAL&lt;/span&gt;\n        &lt;h4&gt;NEET Route (MBBS/BDS/Nursing)&lt;/h4&gt;\n        &lt;p&gt;Medical, dental, and allied health admissions at Kochi &amp;#x26; Faridabad campuses via NEET scores. Amrita Hospital is a premier super-specialty institution.&lt;/p&gt;\n        &lt;ul&gt;\n          &lt;li&gt;MBBS, BDS, B.Sc Nursing via NEET&lt;/li&gt;\n          &lt;li&gt;Allied Health Sciences via AEEL&lt;/li&gt;\n          &lt;li&gt;Kochi: 1300-bed hospital campus&lt;/li&gt;\n          &lt;li&gt;Faridabad: 2000-bed hospital campus&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n    &lt;p style=\&quot;text-align:center;margin-top:24px;font-size:13px;color:var(--gray)\&quot;&gt;\n      📌 Official admission portal: &lt;a href=\&quot;https://www.amrita.edu/admissions/\&quot; target=\&quot;_blank\&quot;&gt;amrita.edu/admissions&lt;/a&gt; &nbsp;|&nbsp; AEEE portal: &lt;a href=\&quot;https://aeee.amrita.edu\&quot; target=\&quot;_blank\&quot;&gt;aeee.amrita.edu&lt;/a&gt; &nbsp;|&nbsp; UG admissions: &lt;a href=\&quot;https://applyug.amrita.edu\&quot; target=\&quot;_blank\&quot;&gt;applyug.amrita.edu&lt;/a&gt;\n    &lt;/p&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ 2. AEEE TIMELINE ═══ --&gt;\n&lt;section id=\&quot;timeline\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;section-head\&quot;&gt;\n      &lt;div class=\&quot;icon\&quot;&gt;📅&lt;/div&gt;\n      &lt;h2&gt;AEEE 2026 Admission Timeline&lt;/h2&gt;\n      &lt;p&gt;Track every milestone from registration to final seat allotment&lt;/p&gt;\n      &lt;div class=\&quot;bar\&quot;&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div style=\&quot;max-width:800px;margin:0 auto\&quot;&gt;\n      &lt;div class=\&quot;timeline\&quot;&gt;\n        &lt;div class=\&quot;tl-item\&quot;&gt;&lt;div class=\&quot;tl-dot done\&quot;&gt;&lt;/div&gt;&lt;div class=\&quot;card tl-card done-border\&quot;&gt;&lt;div class=\&quot;tl-date\&quot; style=\&quot;color:var(--green)\&quot;&gt;Oct – Nov 2025&lt;/div&gt;&lt;div class=\&quot;tl-title\&quot;&gt;AEEE 2026 Registration Opens&lt;/div&gt;&lt;div class=\&quot;tl-desc\&quot;&gt;Online registration at aeee.amrita.edu. Registration fee: ₹1,300. JEE Main option available at no extra cost.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;\n        &lt;div class=\&quot;tl-item\&quot;&gt;&lt;div class=\&quot;tl-dot done\&quot;&gt;&lt;/div&gt;&lt;div class=\&quot;card tl-card done-border\&quot;&gt;&lt;div class=\&quot;tl-date\&quot; style=\&quot;color:var(--green)\&quot;&gt;Jan 30 – Feb 1, 2026&lt;/div&gt;&lt;div class=\&quot;tl-title\&quot;&gt;AEEE Phase 1 Exam&lt;/div&gt;&lt;div class=\&quot;tl-desc\&quot;&gt;CBT mode across 109 cities including Dubai. 3 slots/day. 100 MCQs in 150 mins. New: Quantitative Aptitude section added.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;\n        &lt;div class=\&quot;tl-item\&quot;&gt;&lt;div class=\&quot;tl-dot done\&quot;&gt;&lt;/div&gt;&lt;div class=\&quot;card tl-card done-border\&quot;&gt;&lt;div class=\&quot;tl-date\&quot; style=\&quot;color:var(--green)\&quot;&gt;Feb 2026&lt;/div&gt;&lt;div class=\&quot;tl-title\&quot;&gt;Phase 1 Results Declared&lt;/div&gt;&lt;div class=\&quot;tl-desc\&quot;&gt;Results released online. Best score across both phases considered for final ranking.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;\n        &lt;div class=\&quot;tl-item\&quot;&gt;&lt;div class=\&quot;tl-dot active\&quot;&gt;&lt;/div&gt;&lt;div class=\&quot;card tl-card active-border\&quot;&gt;&lt;div class=\&quot;tl-date\&quot; style=\&quot;color:var(--orange)\&quot;&gt;Apr 10 – 20, 2026&lt;/div&gt;&lt;div class=\&quot;tl-title\&quot;&gt;Phase 2 Slot Booking ⚡ ONGOING&lt;/div&gt;&lt;div class=\&quot;tl-desc\&quot;&gt;First-come first-served slot allocation. Last date for slot booking: April 18. Choose preferred date, time &amp;#x26; city.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;\n        &lt;div class=\&quot;tl-item\&quot;&gt;&lt;div class=\&quot;tl-dot upcoming\&quot;&gt;&lt;/div&gt;&lt;div class=\&quot;card tl-card\&quot;&gt;&lt;div class=\&quot;tl-date\&quot;&gt;Apr 21, 2026&lt;/div&gt;&lt;div class=\&quot;tl-title\&quot;&gt;Phase 2 Admit Card Release&lt;/div&gt;&lt;div class=\&quot;tl-desc\&quot;&gt;Download from portal using registered Email/Mobile. Carry Aadhaar card for identity verification at centre.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;\n        &lt;div class=\&quot;tl-item\&quot;&gt;&lt;div class=\&quot;tl-dot upcoming\&quot;&gt;&lt;/div&gt;&lt;div class=\&quot;card tl-card\&quot;&gt;&lt;div class=\&quot;tl-date\&quot;&gt;Apr 24 – 30, 2026&lt;/div&gt;&lt;div class=\&quot;tl-title\&quot;&gt;AEEE Phase 2 Exam&lt;/div&gt;&lt;div class=\&quot;tl-desc\&quot;&gt;Additional fee: ₹600 for Phase 1 candidates. 3 slots daily. Arrive 1 hour early. No electronic devices permitted.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;\n        &lt;div class=\&quot;tl-item\&quot;&gt;&lt;div class=\&quot;tl-dot upcoming\&quot;&gt;&lt;/div&gt;&lt;div class=\&quot;card tl-card\&quot;&gt;&lt;div class=\&quot;tl-date\&quot;&gt;May 2026&lt;/div&gt;&lt;div class=\&quot;tl-title\&quot;&gt;Final Ranking &amp;#x26; CSAP Registration&lt;/div&gt;&lt;div class=\&quot;tl-desc\&quot;&gt;Register for CSAP with ₹5,000. Fill campus &amp;#x26; branch preferences. All allotment rounds conducted online.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;\n        &lt;div class=\&quot;tl-item\&quot;&gt;&lt;div class=\&quot;tl-dot upcoming\&quot;&gt;&lt;/div&gt;&lt;div class=\&quot;card tl-card\&quot;&gt;&lt;div class=\&quot;tl-date\&quot;&gt;Jun – Jul 2026&lt;/div&gt;&lt;div class=\&quot;tl-title\&quot;&gt;Seat Allotment &amp;#x26; Admission Confirmation&lt;/div&gt;&lt;div class=\&quot;tl-desc\&quot;&gt;Multiple CSAP rounds. Pay fees to confirm seat. Document verification on campus arrival. Class 12 marks submitted.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ 3. AEEL &amp; LAW DETAILS ═══ --&gt;\n&lt;section id=\&quot;aeel\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;section-head\&quot;&gt;\n      &lt;div class=\&quot;icon\&quot;&gt;🧬&lt;/div&gt;\n      &lt;h2&gt;AEEL &amp;#x26; Law Admissions&lt;/h2&gt;\n      &lt;p&gt;Complete details for Life Sciences, Agriculture, Nursing, Pharmacy &amp;#x26; Law programs&lt;/p&gt;\n      &lt;div class=\&quot;bar\&quot;&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;card-grid grid-2\&quot;&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;span class=\&quot;badge badge-green\&quot;&gt;AEEL 2026&lt;/span&gt;\n        &lt;h4&gt;Programs Available via AEEL&lt;/h4&gt;\n        &lt;ul&gt;\n          &lt;li&gt;&lt;strong&gt;B.Sc. (Hons) Agriculture&lt;/strong&gt; — Coimbatore (4 years)&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;B.Sc. (Hons) Food Science &amp;#x26; Nutrition&lt;/strong&gt; — Kochi (4 years, exit after 3)&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;B.Pharm (Regular)&lt;/strong&gt; — Kochi&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;B.Sc. Nursing&lt;/strong&gt; — Kochi &amp;#x26; Faridabad&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;Allied Health Sciences&lt;/strong&gt; — Cardiac Perfusion, Cardiovascular Tech, Nuclear Medicine, Diabetes Sciences, Neuro Electro Physiology, Respiratory Tech, Echocardiography, Audiology &amp;#x26; Speech, Optometry, Blood Bank Tech, Nutrition &amp;#x26; Dietetics&lt;/li&gt;\n        &lt;/ul&gt;\n        &lt;p style=\&quot;margin-top:12px\&quot;&gt;&lt;strong&gt;Eligibility:&lt;/strong&gt; 10+2 with PCB (Physics, Chemistry, Biology), minimum 60% aggregate, 55% in each subject.&lt;/p&gt;\n        &lt;p&gt;&lt;strong&gt;Contact:&lt;/strong&gt; 0114084 6644 (Toll-free) | aeel@amrita.edu&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;span class=\&quot;badge badge-purple\&quot;&gt;A-CLAT / LAW 2026&lt;/span&gt;\n        &lt;h4&gt;Amrita International School of Law&lt;/h4&gt;\n        &lt;ul&gt;\n          &lt;li&gt;&lt;strong&gt;B.A. LL.B.&lt;/strong&gt
