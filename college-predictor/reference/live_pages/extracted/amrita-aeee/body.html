  --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
  --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', system-ui, sans-serif;
  background: var(--white);
  color: var(--text);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--orange); text-decoration: none; transition: .2s; }
a:hover { color: var(--blue); }
img { max-width: 100%; display: block; }
.container { max-width: 1180px; margin: 0 auto; padding: 0 24px; }

/* ── Consent Banner ── */
.consent-banner {
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
  color: rgba(255,255,255,0.9);
  font-size: 13px;
  padding: 12px 24px;
  text-align: center;
  line-height: 1.6;
}
.consent-banner strong { color: var(--orange); }

/* ── Top Bar ── */
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-light);
  padding: 10px 0;
  font-size: 13px;
  color: var(--gray);
}
.topbar .container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.topbar a { font-weight: 600; }

/* ── Header ── */
.header {
  position: relative;
  overflow: hidden;
  background: var(--white);
}
.header-bg {
  position: absolute;
  inset: 0;
  background: url('https://images.shiksha.com/mediadata/images/1534502757phptFUzgU.jpeg') center/cover no-repeat;
  opacity: 0.3;
}
.header-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.95) 100%);
}
.header-content {
  position: relative;
  z-index: 2;
  padding: 32px 0 48px;
}
.nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 40px;
}
.logo-img { height: 60px; width: auto; }
.nav-links { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.nav-links a {
  font-size: 13px;
  font-weight: 700;
  padding: 8px 18px;
  border-radius: 24px;
  transition: .2s;
}
.nav-links .btn-outline {
  border: 2px solid var(--blue);
  color: var(--blue);
}
.nav-links .btn-outline:hover { background: var(--blue); color: var(--white); }
.nav-links .btn-fill {
  background: var(--orange);
  color: var(--white);
}
.nav-links .btn-whatsapp {
  background: #25D366;
  color: var(--white);
  display: flex;
  align-items: center;
  gap: 6px;
}
.hero-center { text-align: center; max-width: 780px; margin: 0 auto; }
.hero-badge {
  display: inline-block;
  background: var(--blue-light);
  color: var(--blue);
  font-size: 12px;
  font-weight: 700;
  padding: 6px 16px;
  border-radius: 20px;
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.hero-center h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(28px, 5vw, 50px);
  font-weight: 900;
  color: var(--blue);
  line-height: 1.12;
  margin-bottom: 16px;
}
.hero-center h1 span { color: var(--orange); }
.hero-center p { font-size: 17px; color: var(--gray); max-width: 620px; margin: 0 auto 28px; }
.stat-pills {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
}
.stat-pill {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  border: 1px solid var(--gray-light);
  border-radius: 10px;
  padding: 10px 18px;
  font-weight: 700;
  font-size: 13px;
  color: var(--blue);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── Quick Nav ── */
.quick-nav {
  background: var(--off-white);
  padding: 16px 0;
  border-bottom: 1px solid var(--gray-light);
  position: sticky;
  top: 0;
  z-index: 100;
}
.quick-nav .container {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.quick-nav a {
  white-space: nowrap;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 20px;
  color: var(--gray);
  border: 1px solid transparent;
  transition: .2s;
}
.quick-nav a:hover {
  background: var(--orange-light);
  color: var(--orange);
  border-color: var(--orange);
}

/* ── Sections ── */
section { padding: 64px 0; }
section:nth-child(even) { background: var(--off-white); }
.section-head {
  text-align: center;
  margin-bottom: 44px;
}
.section-head .icon { font-size: 36px; margin-bottom: 8px; }
.section-head h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 30px;
  font-weight: 800;
  color: var(--blue);
  margin-bottom: 8px;
}
.section-head p { color: var(--gray); font-size: 15px; max-width: 560px; margin: 0 auto; }
.section-head .bar {
  width: 56px;
  height: 4px;
  background: linear-gradient(90deg, var(--orange), var(--blue));
  border-radius: 2px;
  margin: 14px auto 0;
}

/* ── Cards ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--gray-light);
  padding: 28px;
  transition: .3s;
}
.card:hover {
  border-color: var(--orange);
  box-shadow: var(--shadow-lg);
  transform: translateY(-3px);
}
.card-grid { display: grid; gap: 22px; }
.grid-2 { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
.grid-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
.grid-4 { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
.card .icon-box {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 14px;
}
.card h4 { font-weight: 800; color: var(--blue); font-size: 17px; margin-bottom: 8px; }
.card p, .card li { font-size: 14px; color: var(--gray); }
.card ul { padding-left: 16px; }
.card li { margin-bottom: 4px; }

/* ── Badge ── */
.badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 16px;
  letter-spacing: .3px;
}
.badge-orange { background: var(--orange-light); color: var(--orange); }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-purple { background: var(--purple-light); color: var(--purple); }

/* ── Tables ── */
.table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow-sm); }
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
  min-width: 680px;
}
thead th {
  background: var(--blue);
  color: var(--white);
  padding: 13px 14px;
  text-align: center;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .3px;
  white-space: nowrap;
}
thead th:first-child { text-align: left; }
tbody td {
  padding: 11px 14px;
  text-align: center;
  border-bottom: 1px solid var(--gray-light);
  white-space: nowrap;
}
tbody td:first-child { text-align: left; font-weight: 700; color: var(--blue); }
tbody tr:nth-child(even) { background: var(--off-white); }
tbody tr:hover { background: var(--orange-light); }
table.orange-head thead th { background: var(--orange); }

/* ── Timeline ── */
.timeline { position: relative; padding-left: 36px; }
.timeline::before {
  content: '';
  position: absolute;
  left: 14px;
  top: 0;
  bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--orange), var(--blue));
  border-radius: 4px;
}
.tl-item { position: relative; margin-bottom: 22px; }
.tl-dot {
  position: absolute;
  left: -29px;
  top: 8px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 3px solid var(--white);
}
.tl-dot.done { background: var(--green); }
.tl-dot.active { background: var(--orange); box-shadow: 0 0 0 4px rgba(232,115,26,0.25); }
.tl-dot.upcoming { background: var(--gray-light); }
.tl-card {
  padding: 18px 22px;
  border-left: 4px solid var(--gray-light);
}
.tl-card.done-border { border-left-color: var(--green); }
.tl-card.active-border { border-left-color: var(--orange); }
.tl-date { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 2px; }
.tl-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.tl-desc { font-size: 13px; color: var(--gray); }

/* ── Stats Row ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 18px;
  margin-bottom: 32px;
}
.stat-card {
  text-align: center;
  padding: 24px 16px;
}
.stat-card .num {
  font-size: 30px;
  font-weight: 900;
  color: var(--orange);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-card .label { font-size: 13px; color: var(--gray); font-weight: 600; }

/* ── FAQ Accordion ── */
.faq-filters {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.faq-filters button {
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 8px 22px;
  border-radius: 24px;
  border: 2px solid var(--gray-light);
  background: var(--white);
  color: var(--gray);
  cursor: pointer;
  transition: .2s;
}
.faq-filters button.active {
  border-color: var(--orange);
  background: var(--orange);
  color: var(--white);
}
.faq-item {
  border: 1px solid var(--gray-light);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
  background: var(--white);
  transition: .3s;
}
.faq-q {
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  gap: 12px;
}
.faq-q span { font-weight: 700; font-size: 15px; color: var(--text); }
.faq-q .toggle {
  font-size: 20px;
  color: var(--orange);
  transition: .3s;
  flex-shrink: 0;
  font-weight: 300;
}
.faq-a {
  display: none;
  padding: 0 20px 16px;
  font-size: 14px;
  color: var(--gray);
  line-height: 1.7;
  border-left: 3px solid var(--orange);
  margin-left: 20px;
  padding-left: 12px;
}
.faq-item.open .faq-a { display: block; }
.faq-item.open .toggle { transform: rotate(45deg); }
.faq-item.open { border-color: rgba(232,115,26,0.3); }

/* ── Skills Quiz ── */
.quiz-q {
  margin-bottom: 16px;
}
.quiz-q .q-text { font-weight: 700; font-size: 15px; margin-bottom: 10px; }
.quiz-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.quiz-btns button {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 2px solid var(--gray-light);
  background: var(--white);
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 16px;
  color: var(--gray);
  cursor: pointer;
  transition: .2s;
}
.quiz-btns button.selected {
  border-color: var(--orange);
  background: var(--orange-light);
  color: var(--orange);
}
.quiz-hint { font-size: 11px; color: #94A3B8; margin-left: 8px; align-self: center; }
.btn-primary {
  font-family: 'Outfit', sans-serif;
  font-size: 16px;
  font-weight: 800;
  padding: 14px 40px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, var(--orange), var(--blue));
  color: var(--white);
  cursor: pointer;
  transition: .3s;
}
.btn-primary:disabled {
  background: var(--gray-light);
  color: #94A3B8;
  cursor: not-allowed;
}
.result-bar {
  height: 10px;
  background: var(--gray-light);
  border-radius: 5px;
  overflow: hidden;
  margin-top: 6px;
}
.result-fill { height: 100%; border-radius: 5px; transition: width 1s; }

/* ── CTA ── */
.cta-section {
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
  text-align: center;
  padding: 64px 24px;
}
.cta-section h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 32px;
  font-weight: 900;
  color: var(--white);
  margin-bottom: 12px;
}
.cta-section p { color: rgba(255,255,255,0.7); font-size: 16px; max-width: 560px; margin: 0 auto 28px; }
.cta-btns { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
.cta-btns a {
  font-weight: 800;
  font-size: 15px;
  padding: 14px 32px;
  border-radius: 28px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cta-btns .btn-orange { background: var(--orange); color: var(--white); }
.cta-btns .btn-ghost {
  background: rgba(255,255,255,0.1);
  color: var(--white);
  border: 2px solid rgba(255,255,255,0.3);
}
.cta-btns .btn-wa { background: #25D366; color: var(--white); }

/* ── Footer ── */
footer {
  padding: 32px 24px;
  background: var(--white);
  border-top: 1px solid var(--gray-light);
}
footer .container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}
footer .disclaimer {
  font-size: 11px;
  color: #94A3B8;
  max-width: 600px;
  line-height: 1.6;
  background: var(--off-white);
  padding: 12px 16px;
  border-radius: 8px;
  border-left: 3px solid var(--orange);
}

/* ── Tag cloud ── */
.tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
.tag {
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 20px;
  background: rgba(27,58,107,0.06);
  color: var(--blue);
  border: 1px solid rgba(27,58,107,0.12);
}

/* ── Presentation/Video Script ── */
.script-block {
  background: var(--off-white);
  border: 1px solid var(--gray-light);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
}
.script-block h4 {
  font-size: 16px;
  font-weight: 800;
  color: var(--blue);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.script-block p, .script-block li {
  font-size: 14px;
  color: var(--gray);
  line-height: 1.7;
}
.script-block ul { padding-left: 18px; }
.script-block .slide-tag {
  display: inline-block;
  background: var(--orange-light);
  color: var(--orange);
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 10px;
  margin-bottom: 8px;
}
.progress-ring {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.progress-ring .bar-bg {
  flex: 1;
  height: 8px;
  background: var(--gray-light);
  border-radius: 4px;
  overflow: hidden;
}
.progress-ring .bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--orange), var(--blue));
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .nav-row { flex-direction: column; align-items: flex-start; }
  .quick-nav .container { gap: 4px; }
  .stat-pills { flex-direction: column; align-items: center; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}

&lt;!-- ═══ 6. SCHOLARSHIPS ═══ --&gt;
&lt;section id=&quot;scholarships&quot;&gt;
  &lt;div class=&quot;container&quot;&gt;
    &lt;div class=&quot;section-head&quot;&gt;
      &lt;div class=&quot;icon&quot;&gt;🎖️&lt;/div&gt;
      &lt;h2&gt;Scholarships &amp;#x26; Fee Concessions&lt;/h2&gt;
      &lt;p&gt;Over 70% of B.Tech seats are in the scholarship category&lt;/p&gt;
      &lt;div class=&quot;bar&quot;&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card-grid grid-3&quot;&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;div class=&quot;icon-box&quot; style=&quot;background:var(--orange-light)&quot;&gt;🏆&lt;/div&gt;
        &lt;h4&gt;Chancellor's Scholarship&lt;/h4&gt;
        &lt;p&gt;&lt;strong&gt;100% tuition fee waiver&lt;/strong&gt; for candidates scoring 80%+ marks. Available for top AEEE / JEE rank holders.&lt;/p&gt;
        &lt;p style=&quot;margin-top:8px;font-size:13px&quot;&gt;Renewal: Maintain 7.0+ CGPA, 75% attendance each semester.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;div class=&quot;icon-box&quot; style=&quot;background:var(--green-light)&quot;&gt;📈&lt;/div&gt;
        &lt;h4&gt;Merit Scholarship&lt;/h4&gt;
        &lt;p&gt;&lt;strong&gt;Up to 50% tuition waiver&lt;/strong&gt; for candidates with 70-79% marks. Based on AEEE/JEE rank + Class 12 PCM performance.&lt;/p&gt;
        &lt;p style=&quot;margin-top:8px;font-size:13px&quot;&gt;One-time, renewable annually based on academic performance.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;div class=&quot;icon-box&quot; style=&quot;background:var(--blue-light)&quot;&gt;🤝&lt;/div&gt;
        &lt;h4&gt;Need-Based &amp;#x26; Reserved&lt;/h4&gt;
        &lt;p&gt;Special scholarships for SC/ST, OBC-NCL, economically weaker sections, women candidates, and persons with disabilities.&lt;/p&gt;
        &lt;p style=&quot;margin-top:8px;font-size:13px&quot;&gt;Government schemes + university's own financial aid programs.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;div class=&quot;icon-box&quot; style=&quot;background:var(--purple-light)&quot;&gt;📊&lt;/div&gt;
        &lt;h4&gt;Slab-Based Fee Relief&lt;/h4&gt;
        &lt;p&gt;70% of total seats are in scholarship slabs. Top AEEE rankers (under 1000) can get up to 90% tuition waiver. Rank 1000-2000 may get ~50%.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;div class=&quot;icon-box&quot; style=&quot;background:var(--orange-light)&quot;&gt;🔄&lt;/div&gt;
        &lt;h4&gt;Performance Upgrades&lt;/h4&gt;
        &lt;p&gt;Students can move to lower fee slabs with consistent academic performance. Slab 1 needs 8.0 CGPA; Slab 2 needs 7.5 CGPA to maintain.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot;&gt;
        &lt;div class=&quot;icon-box&quot; style=&quot;background:var(--green-light)&quot;&gt;🌍&lt;/div&gt;
        &lt;h4&gt;International Programs&lt;/h4&gt;
        &lt;p&gt;Financial assistance for student exchange programs with universities in Germany, Russia, USA, Australia. Dual degree opportunities available.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

let quizAnswers = {};

function renderQuiz() {
  let h = '';
  quizData.forEach((q,i) =&gt; {
    h += `&lt;div class=&quot;card quiz-q&quot; style=&quot;margin-bottom:14px&quot;&gt;
      &lt;div class=&quot;q-text&quot;&gt;${i+1}. ${q.q}&lt;/div&gt;

        &lt;span class=&quot;quiz-hint&quot;&gt;1=Low, 5=High&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;`;
  });
  const allDone = Object.keys(quizAnswers).length === quizData.length;
  h += `&lt;div style=&quot;text-align:center;margin-top:20px&quot;&gt;&lt;button class=&quot;btn-primary&quot; onclick=&quot;showResults()&quot; ${allDone?'':'disabled'}&gt;🎯 Get My Branch Recommendation&lt;/button&gt;&lt;/div&gt;`;

function selectQ(idx, val, el) {
  quizAnswers[idx] = val;
  renderQuiz();
}
function showResults() {
  const scores = {};
  Object.entries(quizAnswers).forEach(([idx,val]) =&gt; {
    quizData[idx].b.forEach(b =&gt; { scores[b] = (scores[b]||0) + val; });
  });
  const sorted = Object.entries(scores).sort((a,b) =&gt; b[1]-a[1]).slice(0,3);
  let h = '&lt;div class=&quot;card&quot; style=&quot;border:2px solid var(--orange);padding:28px&quot;&gt;&lt;h4 style=&quot;text-align:center;font-size:20px;margin-bottom:20px&quot;&gt;🎯 Your Recommended Branches&lt;/h4&gt;';
  const medals = ['🥇','🥈','🥉'];
  sorted.forEach(([name,score],i) =&gt; {
    const max = quizData.reduce((s,q) =&gt; s + (q.b.includes(name)?5:0), 0);

0.07);\n  border: 1.5px solid rgba(255,255,255,0.14);\n  border-radius: 12px;\n  padding: 14px 15px;\n  text-align: left;\n  color: rgba(255,255,255,0.78);\n  font-family: Arial, sans-serif;\n  font-size: 0.87rem;\n  font-weight: 600;\n  cursor: pointer;\n  transition: all 0.18s;\n  line-height: 1.4;\n}\n.qopt:hover, .qopt.sel {\n  background: rgba(201,168,76,0.18);\n  border-color: #C9A84C;\n  color: #fff;\n}\n.qnav { margin-top: 22px; }\n.qnext {\n  background: transparent;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  color: #fff;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 13px 30px;\n  border-radius: 100px;\n  cursor: pointer;\n  display: none;\n}\n.qresult { display: none; text-align: center; }\n.rbadge { display: inline-block; font-size: 2.6rem; font-weight: 900; padding: 16px 32px; border-radius: 14px; margin-bottom: 15px; }\n.rb-a  { background: #D8F3DC; color: #2D6A4F; }\n.rb-c  { background: #DBE9FF; color: #1B4F9B; }\n.rb-ca { background: #FFE0E4; color: #8B2635; }\n.rtitle { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 11px; }\n.rtext { font-family: Arial, sans-serif; font-size: 0.94rem; color: rgba(255,255,255,0.56); max-width: 420px; margin: 0 auto 22px; line-height: 1.72; }\n.btn-retry { background: #C9A84C; color: #1A1A2E; font-family: Arial, sans-serif; font-size: 0.93rem; font-weight: 700; padding: 13px 30px; border-radius: 100px; border: none; cursor: pointer; }\n\n/* FAQ */\n.faq-outer { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); background: #F9F5EE; }\n.faq-inner { max-width: 1160px; margin: 0 auto; }\n.faq-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .faq-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .faq-grid { grid-template-columns: 1fr 1fr; } }\n.fi { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid #E5DDD0; }\n.fq { font-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }\n.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }\n\n/* FOOTER */\nfooter { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot; arkets points to the CFA Charter — the gold standard for finance professionals worldwide.'},\n    ca:{n:'CA',cls:'rb-ca', ti:'CA is your ideal match!', tx:'Your preference for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}\n  }[w];\n  document.getElementById('qMain').style.display='none';\n  document.getElementById('qResult').style.display='block';\n  var b=document.getElementById('rBadge');\n  b.textContent=info.n; b.className='rbadge '+info.cls;\n  document.getElementById('rTitle').textContent=info.ti;\n  document.getElementById('rText').textContent=info.tx;\n}\n\nfunction resetQ(){\n  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;\n  document.getElementById('qResult').style.display='none';\n  document.getElementById('qMain').style.display='block';\n  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[0].q;\n  var html='';\n  for(var i=0;i&lt;Qs[0].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[0].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n&lt;/script&gt;\n\n&lt;/body&gt;\n&lt;/html&gt;&quot;],&quot;aiWebsiteType&quot;:[0,&quot;Business&quot;],&quot;defaultLocale&quot;:[0,&quot;system&quot;],&quot;ecommerceType&quot;:[0,&quot;zyro&quot;],&quot;ecommerceStoreId&quot;:[0,&quot;store_01JHQFP88TYM5V4HHK85069RHQ&quot;],&quot;customBodyElements&quot;:[0,&quot;&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{a h ACCA — global flexibility, modular study structure, and recognition in 180+ countries.'},\n    cfa:{n:'CFA',cls:'rb-c', ti:'CFA is your ideal match!', tx:'Your passion for investment and markets points to the CFA Charter — the gold standard for finance professionals worldwide.'},\n    ca:{n:'CA',cls:'rb-ca', ti:'CA is your ideal match!', tx:'Your preference for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}\n  }[w];\n  document.getElementById('qMain').style.display='none';\n  document.getElementById('qResult').style.display='block';\n  var b=document.getElementById('rBadge');\n  b.textContent=info.n; b.className='rbadge '+info.cls;\n  document.getElementById('rTitle').textContent=info.ti;\n  document.getElementById('rText').textContent=info.tx;\n}\n\nfunction resetQ(){\n  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;\n  document.getElementById('qResult').style.display='none';\n  document.getElementById('qMain').style.display='block';\n  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[0].q;\n  var html='';\n  for(var i=0;i&lt;Qs[0].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[0].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n&lt;/script&gt;&quot;],&quot;customHeadElements&quot;:[0,&quot;&lt;meta&gt;&lt;meta name=\&quot;viewport\&quot; content=\&quot;width=device-width, initial-scale=1.0\&quot;&gt;&lt;style&gt;\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nbody {\n  font-family: Georgia, 'Times New Roman', serif;\n  background: #F9F5EE;\n  color: #2B2B2B;\n  overflow-x: hidden;\n}\n\n/* HERO */\n.hero {\n  background: #1A1A2E;\n  padding: 100px 24px 80px;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n.hero-glow {\n  position: absolute;\n  top: 0; left: 0; right:
