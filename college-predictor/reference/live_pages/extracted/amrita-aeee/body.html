td&gt;₹3,50,000&lt;/td&gt;&lt;td&gt;₹3,25,000&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n\n    &lt;!-- TIER 3: Coimbatore only --&gt;\n    &lt;h3 style=\&quot;font-weight:800;color:var(--green);font-size:18px;margin-bottom:14px;display:flex;align-items:center;gap:8px\&quot;&gt;🔧 Tier 3 — Coimbatore Only &lt;span class=\&quot;badge badge-green\&quot;&gt;Specific Campus&lt;/span&gt;&lt;/h3&gt;\n    &lt;p style=\&quot;font-size:13px;color:var(--gray);margin-bottom:14px\&quot;&gt;&lt;strong&gt;Branches:&lt;/strong&gt; ARE (Automation &amp;#x26; Robotics), EEE, MEE — offered only at Coimbatore&lt;/p&gt;\n    &lt;div style=\&quot;margin-bottom:32px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px\&quot;&gt;\n      &lt;div class=\&quot;card\&quot; style=\&quot;padding:0;overflow:hidden\&quot;&gt;\n        &lt;div style=\&quot;background:var(--blue);color:var(--white);padding:12px 20px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;display:flex;justify-content:space-between\&quot;&gt;\n          &lt;span&gt;Fee Slab&lt;/span&gt;&lt;span&gt;Coimbatore (Annual)&lt;/span&gt;\n        &lt;/div&gt;\n        &lt;div style=\&quot;padding:0\&quot;&gt;\n          &lt;div style=\&quot;display:flex;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gray-light)\&quot;&gt;\n            &lt;span style=\&quot;font-weight:700;color:var(--blue);font-size:14px\&quot;&gt;Slab 1 (Scholarship)&lt;/span&gt;\n            &lt;span style=\&quot;font-weight:800;color:var(--green);font-size:15px\&quot;&gt;₹1,25,000&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div style=\&quot;display:flex;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gray-light);background:var(--off-white)\&quot;&gt;\n            &lt;span style=\&quot;font-weight:700;color:var(--blue);font-size:14px\&quot;&gt;Slab 2 (Scholarship)&lt;/span&gt;\n            &lt;span style=\&quot;font-weight:800;color:var(--orange);font-size:15px\&quot;&gt;₹2,35,000&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div style=\&quot;display:flex;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gray-light)\&quot;&gt;\n            &lt;span style=\&quot;font-weight:700;color:var(--blue);font-size:14px\&quot;&gt;Slab 3 (Scholarship)&lt;/span&gt;\n            &lt;span style=\&quot;font-weight:800;color:var(--orange);font-size:15px\&quot;&gt;₹3,00,000&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div style=\&quot;display:flex;justify-content:space-between;padding:14px 20px\&quot;&gt;\n            &lt;span style=\&quot;font-weight:700;color:var(--blue);font-size:14px\&quot;&gt;Slab 4 (Regular)&lt;/span&gt;\n            &lt;span style=\&quot;font-weight:800;color:var(--text);font-size:15px\&quot;&gt;₹3,50,000&lt;/span&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot; style=\&quot;display:flex;flex-direction:column;justify-content:center;background:var(--green-light);border-color:var(--green)\&quot;&gt;\n        &lt;div style=\&quot;font-size:32px;margin-bottom:8px\&quot;&gt;🏫&lt;/div&gt;\n        &lt;h4 style=\&quot;color:var(--green);margin-bottom:6px\&quot;&gt;Coimbatore Exclusive&lt;/h4&gt;\n        &lt;p style=\&quot;font-size:13px;color:var(--gray);margin:0\&quot;&gt;ARE, EEE, and MEE are offered &lt;strong&gt;only at the Coimbatore flagship campus&lt;/strong&gt; (400 acres). These branches have separate, more affordable fee slabs compared to CS/AI branches at the same campus.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n\n    &lt;!-- TIER 4: Core Engineering --&gt;\n    &lt;h3 style=\&quot;font-weight:800;color:var(--purple);font-size:18px;margin-bottom:14px;display:flex;align-items:center;gap:8px\&quot;&gt;🏗️ Tier 4 — Core Engineering Branches &lt;span class=\&quot;badge badge-purple\&quot;&gt;Most Affordable&lt;/span&gt;&lt;/h3&gt;\n    &lt;p style=\&quot;font-size:13px;color:var(--gray);margin-bottom:14px\&quot;&gt;&lt;strong&gt;Branches by campus:&lt;/strong&gt; Amaravati: CCE | Amritapuri: MEE, EEE, ELC | Bengaluru: MEE, EEE | Coimbatore: CIE | Chennai: CHE | Nagercoil: MEE | Faridabad: ECE&lt;/p&gt;\n    &lt;div class=\&quot;table-wrap\&quot; style=\&quot;margin-bottom:28px\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Fee Slab&lt;/th&gt;&lt;th&gt;Amaravati&lt;/th&gt;&lt;th&gt;Amritapuri&lt;/th&gt;&lt;th&gt;Bengaluru&lt;/th&gt;&lt;th&gt;Coimbatore&lt;/th&gt;&lt;th&gt;Chennai&lt;/th&gt;&lt;th&gt;Nagercoil&lt;/th&gt;&lt;th&gt;Faridabad&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Slab 1 (Scholarship)&lt;/td&gt;&lt;td&gt;₹1,00,000&lt;/td&gt;&lt;td&gt;₹1,00,000&lt;/td&gt;&lt;td&gt;₹1,00,000&lt;/td&gt;&lt;td&gt;₹1,00,000&lt;/td&gt;&lt;td&gt;₹1,00,000&lt;/td&gt;&lt;td&gt;₹1,00,000&lt;/td&gt;&lt;td&gt;₹1,00,000&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Slab 2 (Scholarship)&lt;/td&gt;&lt;td&gt;₹1,75,000&lt;/td&gt;&lt;td&gt;₹2,00,000&lt;/td&gt;&lt;td&gt;₹2,00,000&lt;/td&gt;&lt;td&gt;₹1,65,000&lt;/td&gt;&lt;td&gt;₹1,75,000&lt;/td&gt;&lt;td&gt;₹1,25,000&lt;/td&gt;&lt;td&gt;₹1,75,000&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Slab 3 (Scholarship)&lt;/td&gt;&lt;td&gt;₹2,25,000&lt;/td&gt;&lt;td&gt;₹2,00,000&lt;/td&gt;&lt;td&gt;₹2,00,000&lt;/td&gt;&lt;td&gt;₹2,00,000&lt;/td&gt;&lt;td&gt;₹2,25,000&lt;/td&gt;&lt;td&gt;₹1,50,000&lt;/td&gt;&lt;td&gt;₹2,25,000&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Slab 4 (Regular / Non-Scholarship)&lt;/td&gt;&lt;td&gt;₹2,50,000&lt;/td&gt;&lt;td&gt;₹3,00,000&lt;/td&gt;&lt;td&gt;₹3,00,000&lt;/td&gt;&lt;td&gt;₹2,50,000&lt;/td&gt;&lt;td&gt;₹3,00,000&lt;/td&gt;&lt;td&gt;₹2,00,000&lt;/td&gt;&lt;td&gt;₹2,50,000&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n\n    &lt;!-- Branch Code Reference --&gt;\n    &lt;div class=\&quot;card\&quot; style=\&quot;padding:22px;margin-bottom:20px\&quot;&gt;\n      &lt;h4 style=\&quot;margin-bottom:12px\&quot;&gt;📋 All 18 B.Tech Branch Codes&lt;/h4&gt;\n      &lt;div style=\&quot;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:6px;font-size:13px;color:var(--gray)\&quot;&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;AEE&lt;/strong&gt; — Aerospace Engineering&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;AID&lt;/strong&gt; — AI and Data Science&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;AID(M)&lt;/strong&gt; — AI &amp;#x26; DS (Medical Engineering)&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;AID(AA&amp;#x26;RS)&lt;/strong&gt; — AI &amp;#x26; DS (Autonomous Agents &amp;#x26; Robotic Systems)&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;AID(CPS&amp;#x26;S)&lt;/strong&gt; — AI &amp;#x26; DS (Cyber Physical Systems &amp;#x26; Security)&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;ARE&lt;/strong&gt; — Automation and Robotics&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;CHE&lt;/strong&gt; — Chemical Engineering&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;CIE&lt;/strong&gt; — Civil Engineering&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;CCE&lt;/strong&gt; — Computer and Communication Engineering&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;CSE&lt;/strong&gt; — Computer Science and Engineering&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;CAI&lt;/strong&gt; — CSE (Artificial Intelligence)&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;CYS&lt;/strong&gt; — CSE (Cyber Security)&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;ELC&lt;/strong&gt; — Electrical and Computer Engineering&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;EEE&lt;/strong&gt; — Electrical and Electronics Engineering&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;ECE&lt;/strong&gt; — Electronics and Communication Engineering&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;EAC&lt;/strong&gt; — Electronics and Computer Engineering&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;MEE&lt;/strong&gt; — Mechanical Engineering&lt;/div&gt;\n        &lt;div&gt;&lt;strong style=\&quot;color:var(--blue)\&quot;&gt;RAI&lt;/strong&gt; — Robotics and Artificial Intelligence&lt;/div&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n\n    &lt;div style=\&quot;text-align:center;font-size:13px;color:var(--gray);display:flex;gap:20px;justify-content:center;flex-wrap:wrap\&quot;&gt;\n      &lt;span&gt;💳 Caution Deposit: ₹10,000 (one-time, all campuses)&lt;/span&gt;\n      &lt;span&gt;🏠 Hostel &amp;#x26; Mess: Charges updated separately&lt;/span&gt;\n      &lt;span&gt;⚠️ Specialisations subject to AICTE approval&lt;/span&gt;\n    &lt;/div&gt;\n    &lt;p style=\&quot;text-align:center;margin-top:10px;font-size:12px;color:#94A3B8\&quot;&gt;✅ Source: Official Amrita B.Tech Fee Structure 2025-26 PDF | Always verify latest at &lt;a href=\&quot;https://www.amrita.edu/admissions/\&quot; target=\&quot;_blank\&quot;&gt;amrita.edu/admissions&lt;/a&gt;&lt;/p&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ 6. SCHOLARSHIPS ═══ --&gt;\n&lt;section id=\&quot;scholarships\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;section-head\&quot;&gt;\n      &lt;div class=\&quot;icon\&quot;&gt;🎖️&lt;/div&gt;\n      &lt;h2&gt;Scholarships &amp;#x26; Fee Concessions&lt;/h2&gt;\n      &lt;p&gt;Over 70% of B.Tech seats are in the scholarship category&lt;/p&gt;\n      &lt;div class=\&quot;bar\&quot;&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;card-grid grid-3\&quot;&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;icon-box\&quot; style=\&quot;background:var(--orange-light)\&quot;&gt;🏆&lt;/div&gt;\n        &lt;h4&gt;Chancellor's Scholarship&lt;/h4&gt;\n        &lt;p&gt;&lt;strong&gt;100% tuition fee waiver&lt;/strong&gt; for candidates scoring 80%+ marks. Available for top AEEE / JEE rank holders.&lt;/p&gt;\n        &lt;p style=\&quot;margin-top:8px;font-size:13px\&quot;&gt;Renewal: Maintain 7.0+ CGPA, 75% attendance each semester.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;icon-box\&quot; style=\&quot;background:var(--green-light)\&quot;&gt;📈&lt;/div&gt;\n        &lt;h4&gt;Merit Scholarship&lt;/h4&gt;\n        &lt;p&gt;&lt;strong&gt;Up to 50% tuition waiver&lt;/strong&gt; for candidates with 70-79% marks. Based on AEEE/JEE rank + Class 12 PCM performance.&lt;/p&gt;\n        &lt;p style=\&quot;margin-top:8px;font-size:13px\&quot;&gt;One-time, renewable annually based on academic performance.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;icon-box\&quot; style=\&quot;background:var(--blue-light)\&quot;&gt;🤝&lt;/div&gt;\n        &lt;h4&gt;Need-Based &amp;#x26; Reserved&lt;/h4&gt;\n        &lt;p&gt;Special scholarships for SC/ST, OBC-NCL, economically weaker sections, women candidates, and persons with disabilities.&lt;/p&gt;\n        &lt;p style=\&quot;margin-top:8px;font-size:13px\&quot;&gt;Government schemes + university's own financial aid programs.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;icon-box\&quot; style=\&quot;background:var(--purple-light)\&quot;&gt;📊&lt;/div&gt;\n        &lt;h4&gt;Slab-Based Fee Relief&lt;/h4&gt;\n        &lt;p&gt;70% of total seats are in scholarship slabs. Top AEEE rankers (under 1000) can get up to 90% tuition waiver. Rank 1000-2000 may get ~50%.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;icon-box\&quot; style=\&quot;background:var(--orange-light)\&quot;&gt;🔄&lt;/div&gt;\n        &lt;h4&gt;Performance Upgrades&lt;/h4&gt;\n        &lt;p&gt;Students can move to lower fee slabs with consistent academic performance. Slab 1 needs 8.0 CGPA; Slab 2 needs 7.5 CGPA to maintain.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;icon-box\&quot; style=\&quot;background:var(--green-light)\&quot;&gt;🌍&lt;/div&gt;\n        &lt;h4&gt;International Programs&lt;/h4&gt;\n        &lt;p&gt;Financial assistance for student exchange programs with universities in Germany, Russia, USA, Australia. Dual degree opportunities available.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ 7. RANKINGS ═══ --&gt;\n&lt;section id=\&quot;rankings\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;section-head\&quot;&gt;\n      &lt;div class=\&quot;icon\&quot;&gt;🏅&lt;/div&gt;\n      &lt;h2&gt;Quality, Rankings &amp;#x26; Accreditation&lt;/h2&gt;\n      &lt;p&gt;Why Amrita stands among India's top universities&lt;/p&gt;\n      &lt;div class=\&quot;bar\&quot;&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;card-grid grid-2\&quot;&gt;\n      &lt;div class=\&quot;card\&quot; style=\&quot;border-left:4px solid var(--blue)\&quot;&gt;\n        &lt;h4&gt;National Rankings (NIRF 2025)&lt;/h4&gt;\n        &lt;ul style=\&quot;list-style:none;padding:0\&quot;&gt;\n          &lt;li style=\&quot;padding:8px 0;border-bottom:1px solid var(--gray-light);display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;🏛️ University Category&lt;/span&gt;&lt;strong style=\&quot;color:var(--orange)\&quot;&gt;#8 in India&lt;/strong&gt;&lt;/li&gt;\n          &lt;li style=\&quot;padding:8px 0;border-bottom:1px solid var(--gray-light);display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;📊 Overall Category&lt;/span&gt;&lt;strong style=\&quot;color:var(--orange)\&quot;&gt;#17 in India&lt;/strong&gt;&lt;/li&gt;\n          &lt;li style=\&quot;padding:8px 0;border-bottom:1px solid var(--gray-light);display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;🔧 Engineering&lt;/span&gt;&lt;strong style=\&quot;color:var(--orange)\&quot;&gt;#23 in India&lt;/strong&gt;&lt;/li&gt;\n          &lt;li style=\&quot;padding:8px 0;border-bottom:1px solid var(--gray-light);display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;💼 Management&lt;/span&gt;&lt;strong style=\&quot;color:var(--orange)\&quot;&gt;#26 in India&lt;/strong&gt;&lt;/li&gt;\n          &lt;li style=\&quot;padding:8px 0;border-bottom:1px solid var(--gray-light);display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;🏥 Medicine&lt;/span&gt;&lt;strong style=\&quot;color:var(--orange)\&quot;&gt;#9 in India&lt;/strong&gt;&lt;/li&gt;\n          &lt;li style=\&quot;padding:8px 0;border-bottom:1px solid var(--gray-light);display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;💊 Pharmacy&lt;/span&gt;&lt;strong style=\&quot;color:var(--orange)\&quot;&gt;#14 in India&lt;/strong&gt;&lt;/li&gt;\n          &lt;li style=\&quot;padding:8px 0;display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;🦷 Dental&lt;/span&gt;&lt;strong style=\&quot;color:var(--orange)\&quot;&gt;#14 in India&lt;/strong&gt;&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot; style=\&quot;border-left:4px solid var(--orange)\&quot;&gt;\n        &lt;h4&gt;Global Rankings &amp;#x26; Accreditation&lt;/h4&gt;\n        &lt;ul style=\&quot;list-style:none;padding:0\&quot;&gt;\n          &lt;li style=\&quot;padding:8px 0;border-bottom:1px solid var(--gray-light);display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;🌍 QS World&lt;/span&gt;&lt;strong&gt;1001–1200&lt;/strong&gt;&lt;/li&gt;\n          &lt;li style=\&quot;padding:8px 0;border-bottom:1px solid var(--gray-light);display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;🌏 QS Asia&lt;/span&gt;&lt;strong&gt;#307&lt;/strong&gt;&lt;/li&gt;\n          &lt;li style=\&quot;padding:8px 0;border-bottom:1px solid var(--gray-light);display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;📈 THE Impact (SDG)&lt;/span&gt;&lt;strong&gt;#41 Globally&lt;/strong&gt;&lt;/li&gt;\n          &lt;li style=\&quot;padding:8px 0;border-bottom:1px solid var(--gray-light);display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;🎖️ NAAC&lt;/span&gt;&lt;strong style=\&quot;color:var(--green)\&quot;&gt;A++ (Highest)&lt;/strong&gt;&lt;/li&gt;\n          &lt;li style=\&quot;padding:8px 0;border-bottom:1px solid var(--gray-light);display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;🏅 Institute of Eminence&lt;/span&gt;&lt;strong style=\&quot;color:var(--green)\&quot;&gt;Govt. of India&lt;/strong&gt;&lt;/li&gt;\n          &lt;li style=\&quot;padding:8px 0;border-bottom:1px solid var(--gray-light);display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;💼 AACSB (Business)&lt;/span&gt;&lt;strong style=\&quot;color:var(--green)\&quot;&gt;Accredited&lt;/strong&gt;&lt;/li&gt;\n          &lt;li style=\&quot;padding:8px 0;display:flex;justify-content:space-between\&quot;&gt;&lt;span&gt;🔬 THE Interdisciplinary Science&lt;/span&gt;&lt;strong&gt;Top 100 Globally&lt;/strong&gt;&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n    &lt;p style=\&quot;text-align:center;margin-top:20px;font-size:12px;color:#94A3B8\&quot;&gt;Verify rankings at &lt;a href=\&quot;https://www.amrita.edu/rankings/\&quot; target=\&quot;_blank\&quot;&gt;amrita.edu/rankings&lt;/a&gt;&lt;/p&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ 8. CUT-OFF MATRIX ═══ --&gt;\n&lt;section&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;section-head\&quot;&gt;\n      &lt;div class=\&quot;icon\&quot;&gt;📈&lt;/div&gt;\n      &lt;h2&gt;Indicative Cut-off &amp;#x26; Branch Prediction&lt;/h2&gt;\n      &lt;p&gt;Approximate closing ranks for popular branches — varies each year&lt;/p&gt;\n      &lt;div class=\&quot;bar\&quot;&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;table-wrap\&quot;&gt;\n      &lt;table class=\&quot;orange-head\&quot;&gt;\n        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Branch&lt;/th&gt;&lt;th&gt;Coimbatore&lt;/th&gt;&lt;th&gt;Bengaluru&lt;/th&gt;&lt;th&gt;Amritapuri&lt;/th&gt;&lt;th&gt;Chennai&lt;/th&gt;&lt;th&gt;Amaravati&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;CSE&lt;/td&gt;&lt;td&gt;~400&lt;/td&gt;&lt;td&gt;~2,500&lt;/td&gt;&lt;td&gt;~3,500&lt;/td&gt;&lt;td&gt;~4,000&lt;/td&gt;&lt;td&gt;~6,000&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;CSE (AI)&lt;/td&gt;&lt;td&gt;~800&lt;/td&gt;&lt;td&gt;~3,000&lt;/td&gt;&lt;td&gt;~4,000&lt;/td&gt;&lt;td&gt;~5,000&lt;/td&gt;&lt;td&gt;~7,000&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;AI &amp;#x26; Data Science&lt;/td&gt;&lt;td&gt;~1,200&lt;/td&gt;&lt;td&gt;~3,500&lt;/td&gt;&lt;td&gt;~5,000&lt;/td&gt;&lt;td&gt;~6,000&lt;/td&gt;&lt;td&gt;~8,000&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;ECE&lt;/td&gt;&lt;td&gt;~5,000&lt;/td&gt;&lt;td&gt;~8,000&lt;/td&gt;&lt;td&gt;~12,000&lt;/td&gt;&lt;td&gt;~10,000&lt;/td&gt;&lt;td&gt;~15,000&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;EEE&lt;/td&gt;&lt;td&gt;~8,000&lt;/td&gt;&lt;td&gt;~12,000&lt;/td&gt;&lt;td&gt;~18,000&lt;/td&gt;&lt;td&gt;~15,000&lt;/td&gt;&lt;td&gt;~20,000&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Mechanical&lt;/td&gt;&lt;td&gt;~12,000&lt;/td&gt;&lt;td&gt;~18,000&lt;/td&gt;&lt;td&gt;~25,000&lt;/td&gt;&lt;td&gt;~22,000&lt;/td&gt;&lt;td&gt;~28,000&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Civil&lt;/td&gt;&lt;td&gt;~18,000&lt;/td&gt;&lt;td&gt;~25,000&lt;/td&gt;&lt;td&gt;~30,000&lt;/td&gt;&lt;td&gt;~28,000&lt;/td&gt;&lt;td&gt;~35,000&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Aerospace&lt;/td&gt;&lt;td&gt;~6,000&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n    &lt;p style=\&quot;text-align:center;margin-top:16px;font-size:13px;color:var(--gray)\&quot;&gt;\n      ⚠️ Amrita does not publish fixed cut-offs. Allocation depends on rank, preferences &amp;#x26; seat availability. For personalized prediction: &lt;a href=\&quot;mailto:contact@eduaakashaa.com\&quot; style=\&quot;font-weight:700\&quot;&gt;contact@eduaakashaa.com&lt;/a&gt;\n    &lt;/p&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ 9. CAMPUS COMPARISON ═══ --&gt;\n&lt;section id=\&quot;campuses\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;section-head\&quot;&gt;\n      &lt;div class=\&quot;icon\&quot;&gt;🏫&lt;/div&gt;\n      &lt;h2&gt;Campus Insights &amp;#x26; Student Preferences&lt;/h2&gt;\n      &lt;p&gt;All campuses share centralized placements — choose based on location, branches &amp;#x26; lifestyle&lt;/p&gt;\n      &lt;div class=\&quot;bar\&quot;&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;card-grid grid-3\&quot; id=\&quot;campus-grid\&quot;&gt;\n      &lt;!-- Rendered by JS below --&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ 10. PLACEMENTS ═══ --&gt;\n&lt;section id=\&quot;placements\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;section-head\&quot;&gt;\n      &lt;div class=\&quot;icon\&quot;&gt;💼&lt;/div&gt;\n      &lt;h2&gt;Placement Highlights 2025&lt;/h2&gt;\n      &lt;p&gt;Career outcomes across all Amrita engineering campuses&lt;/p&gt;\n      &lt;div class=\&quot;bar\&quot;&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;stats-row\&quot;&gt;\n      &lt;div class=\&quot;card stat-card\&quot;&gt;&lt;div class=\&quot;num\&quot;&gt;₹80.4L&lt;/div&gt;&lt;div class=\&quot;label\&quot;&gt;Highest CTC&lt;/div&gt;&lt;/div&gt;\n      &lt;div class=\&quot;card stat-card\&quot;&gt;&lt;div class=\&quot;num\&quot;&gt;₹9.08L&lt;/div&gt;&lt;div class=\&quot;label\&quot;&gt;Average CTC&lt;/div&gt;&lt;/div&gt;\n      &lt;div class=\&quot;card stat-card\&quot;&gt;&lt;div class=\&quot;num\&quot;&gt;₹7.75L&lt;/div&gt;&lt;div class=\&quot;label\&quot;&gt;Median CTC&lt;/div&gt;&lt;/div&gt;\n      &lt;div class=\&quot;card stat-card\&quot;&gt;&lt;div class=\&quot;num\&quot;&gt;92%&lt;/div&gt;&lt;div class=\&quot;label\&quot;&gt;Placement Rate&lt;/div&gt;&lt;/div&gt;\n      &lt;div class=\&quot;card stat-card\&quot;&gt;&lt;div class=\&quot;num\&quot;&gt;300+&lt;/div&gt;&lt;div class=\&quot;label\&quot;&gt;Recruiters&lt;/div&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;card\&quot; style=\&quot;padding:24px\&quot;&gt;\n      &lt;h4 style=\&quot;margin-bottom:14px\&quot;&gt;Top Recruiters&lt;/h4&gt;\n      &lt;div class=\&quot;tag-cloud\&quot;&gt;\n        &lt;span class=\&quot;tag\&quot;&gt;Microsoft&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Amazon&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Google&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Cisco&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Bosch&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;McKinsey&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Intuit&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Optum&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;IBM&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Wipro&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Dell&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Samsung&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;TCS&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Infosys&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Oracle&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Accenture&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Deloitte&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;HDFC Bank&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Ford&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Tech Mahindra&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Arista&lt;/span&gt;&lt;span class=\&quot;tag\&quot;&gt;Philips&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ 11. CAMPUS &amp; COURSE SELECTION TIPS ═══ --&gt;\n&lt;section id=\&quot;tips\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;section-head\&quot;&gt;\n      &lt;div class=\&quot;icon\&quot;&gt;💡&lt;/div&gt;\n      &lt;h2&gt;Tips: Campus &amp;#x26; Course Selection&lt;/h2&gt;\n      &lt;p&gt;Strategic advice from EduAakashaA experts for making the right choice&lt;/p&gt;\n      &lt;div class=\&quot;bar\&quot;&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;card-grid grid-2\&quot;&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;h4&gt;🏫 Campus Selection Tips&lt;/h4&gt;\n        &lt;ul&gt;\n          &lt;li&gt;&lt;strong&gt;Consider your state:&lt;/strong&gt; Local students (Tamil Nadu, Kerala) may get priority in certain rounds. Check if your home state aligns with a campus.&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;City vs Rural:&lt;/strong&gt; Bengaluru/Chennai offer metro-city exposure; Coimbatore/Amritapuri offer serene, focused learning environments.&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;Branch availability:&lt;/strong&gt; Not all branches are offered at every campus. Aerospace is only at Coimbatore. Verify before setting CSAP preferences.&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;Research opportunities:&lt;/strong&gt; Coimbatore (flagship) and Amritapuri have stronger research infrastructure and international collaborations.&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;Hostel life:&lt;/strong&gt; All campuses are residential. Hostels are well-maintained. Factor in climate preferences — Coimbatore is cooler; Chennai is warmer.&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;h4&gt;📚 Course Selection Tips&lt;/h4&gt;\n        &lt;ul&gt;\n          &lt;li&gt;&lt;strong&gt;Follow your aptitude:&lt;/strong&gt; Don't chase trends blindly. Use our Skills Assessment below to identify your fit.&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;CSE vs AI vs Data Science:&lt;/strong&gt; CSE gives broad software skills; AI/DS is specialized. If unsure, CSE offers more flexibility.&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;Placement potential:&lt;/strong&gt; CSE, ECE consistently see highest packages. But Mechanical, Civil have strong core-sector placements.&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;Long-term career:&lt;/strong&gt; Think 10+ years ahead. Emerging fields like Cybersecurity, AI, Quantum Computing are growing rapidly.&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;Fee vs ROI:&lt;/strong&gt; A higher scholarship slab (lower fee) in a slightly less popular branch might offer better long-term ROI than paying full fee for CSE.&lt;/li&gt;\n          &lt;li&gt;&lt;strong&gt;Talk to alumni:&lt;/strong&gt; Reach out to current students and alumni through LinkedIn or campus visits before finalizing.&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div style=\&quot;text-align:center;margin-top:24px\&quot;&gt;\n      &lt;p style=\&quot;font-size:15px;color:var(--gray)\&quot;&gt;Need personalized guidance? Our counsellors analyze your rank, preferences &amp;#x26; career goals.&lt;/p&gt;\n      &lt;a href=\&quot;mailto:contact@eduaakashaa.com\&quot; style=\&quot;font-weight:800;font-size:16px\&quot;&gt;✉ contact@eduaakashaa.com&lt;/a&gt;\n      &lt;span style=\&quot;margin:0 12px;color:var(--gray-light)\&quot;&gt;|&lt;/span&gt;\n      &lt;a href=\&quot;https://whatsapp.com/channel/0029VbCl0sGHAdNeRF5AHz25\&quot; target=\&quot;_blank\&quot; style=\&quot;color:#25D366;font-weight:800;font-size:16px\&quot;&gt;💬 Join WhatsApp Channel&lt;/a&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ 12. SKILLS ASSESSMENT ═══ --&gt;\n&lt;section id=\&quot;quiz\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;section-head\&quot;&gt;\n      &lt;div class=\&quot;icon\&quot;&gt;🧠&lt;/div&gt;\n      &lt;h2&gt;Skills Assessment &amp;#x26; Branch Finder&lt;/h2&gt;\n      &lt;p&gt;Rate your interest (1-5) to discover your best-fit B.Tech branch&lt;/p&gt;\n      &lt;div class=\&quot;bar\&quot;&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div style=\&quot;max-width:750px;margin:0 auto\&quot; id=\&quot;quiz-container\&quot;&gt;\n      &lt;!-- Rendered by JS --&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ 13. FAQ ═══ --&gt;\n&lt;section id=\&quot;faq\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;section-head\&quot;&gt;\n      &lt;div class=\&quot;icon\&quot;&gt;❓&lt;/div&gt;\n      &lt;h2&gt;Frequently Asked Questions&lt;/h2&gt;\n      &lt;p&gt;Covering the most common queries — with special focus on NRI students&lt;/p&gt;\n      &lt;div class=\&quot;bar\&quot;&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div style=\&quot;max-width:850px;margin:0 auto\&quot;&gt;\n      &lt;div class=\&quot;faq-filters\&quot;&gt;\n        &lt;button class=\&quot;active\&quot; onclick=\&quot;filterFaq(&amp;#x27;all&amp;#x27;,this)\&quot;&gt;📁 All&lt;/button&gt;\n        &lt;button onclick=\&quot;filterFaq(&amp;#x27;nri&amp;#x27;,this)\&quot;&gt;🌍 NRI&lt;/button&gt;\n        &lt;button onclick=\&quot;filterFaq(&amp;#x27;gen&amp;#x27;,this)\&quot;&gt;📋 General&lt;/button&gt;\n        &lt;button onclick=\&quot;filterFaq(&amp;#x27;fee&amp;#x27;,this)\&quot;&gt;💰 Fees&lt;/button&gt;\n        &lt;button onclick=\&quot;filterFaq(&amp;#x27;exam&amp;#x27;,this)\&quot;&gt;📝 Exam&lt;/button&gt;\n      &lt;/div&gt;\n      &lt;div id=\&quot;faq-list\&quot;&gt;&lt;!-- Rendered by JS --&gt;&lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ CTA SECTION ═══ --&gt;\n&lt;div class=\&quot;cta-section\&quot;&gt;\n  &lt;div style=\&quot;font-size:48px;margin-bottom:16px\&quot;&gt;🎓&lt;/div&gt;\n  &lt;h2&gt;Need Expert Admission Guidance?&lt;/h2&gt;\n  &lt;p&gt;Our independent counsellors help students &amp;#x26; parents with AEEE preparation, branch selection, NRI admissions, scholarship optimization, and campus choice.&lt;/p&gt;\n  &lt;div class=\&quot;cta-btns\&quot;&gt;\n    &lt;a href=\&quot;mailto:contact@eduaakashaa.com\&quot; class=\&quot;btn-orange\&quot;&gt;✉ contact@eduaakashaa.com&lt;/a&gt;\n    &lt;a href=\&quot;https://eduaakashaa.in/contact-us\&quot; target=\&quot;_blank\&quot; class=\&quot;btn-ghost\&quot;&gt;🌐 Eduaakashaa Enquiry Request&lt;/a&gt;\n    &lt;a href=\&quot;https://whatsapp.com/channel/0029VbCl0sGHAdNeRF5AHz25\&quot; target=\&quot;_blank\&quot; class=\&quot;btn-wa\&quot;&gt;💬 WhatsApp Channel&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ═══ FOOTER ═══ --&gt;\n&lt;footer&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div&gt;\n      &lt;p style=\&quot;font-size:14px;font-weight:800;color:var(--blue);margin-bottom:6px\&quot;&gt;Edu&lt;span style=\&quot;color:var(--orange)\&quot;&gt;AakashaA&lt;/span&gt;&lt;/p&gt;\n      &lt;p style=\&quot;font-size:12px;color:var(--gray)\&quot;&gt;© 2026 EduAakashaA. Independent Admission Support Services.&lt;/p&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;disclaimer\&quot;&gt;\n      &lt;strong style=\&quot;color:var(--orange)\&quot;&gt;⚠️ Important Disclaimer:&lt;/strong&gt; EduAakashaA provides independent guidance on college and branch selection process. &lt;strong&gt;We are not a partner, agent, or affiliate of Amrita Vishwa Vidyapeetham or any other educational institution.&lt;/strong&gt; Students and parents should always use official university sources for accurate and reliable information. Official website: &lt;a href=\&quot;https://www.amrita.edu/admissions/\&quot; target=\&quot;_blank\&quot;&gt;amrita.edu/admissions&lt;/a&gt;. Amrita has confirmed they have not appointed any agents for admission.\n    &lt;/div&gt;\n    &lt;div style=\&quot;display:flex;gap:16px;align-items:center\&quot;&gt;\n      &lt;a href=\&quot;https://www.eduaakashaa.in\&quot; target=\&quot;_blank\&quot; style=\&quot;font-size:13px;font-weight:600;color:var(--blue)\&quot;&gt;🌐 Website&lt;/a&gt;\n      &lt;a href=\&quot;mailto:contact@eduaakashaa.com\&quot; style=\&quot;font-size:13px;font-weight:600;color:var(--orange)\&quot;&gt;✉ Email&lt;/a&gt;\n      &lt;a href=\&quot;https://whatsapp.com/channel/0029VbCl0sGHAdNeRF5AHz25\&quot; target=\&quot;_blank\&quot; style=\&quot;font-size:13px;font-weight:600;color:#25D366\&quot;&gt;💬 WhatsApp&lt;/a&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\n// ═══ CAMPUS DATA ═══\nconst campuses = [\n  { name:\&quot;Coimbatore\&quot;, state:\&quot;Tamil Nadu\&quot;, pref:95, area:\&quot;400 acres\&quot;, highlight:\&quot;Flagship campus, most branches, Olympic pool, 81,000 sq.ft library\&quot;, branches:\&quot;CSE, ECE, ME, CE, AE, EEE, Chemical, Cyber Security\&quot;, tip:\&quot;Best for: students wanting maximum branch options &amp; research\&quot; },\n  { name:\&quot;Bengaluru\&quot;, state:\&quot;Karnataka\&quot;, pref:88, area:\&quot;Urban campus\&quot;, highlight:\&quot;Tech hub proximity, strong CSE &amp; IT placements, metro city access\&quot;, branches:\&quot;CSE, ECE, EEE, ME, Civil\&quot;, tip:\&quot;Best for: students wanting city life &amp; tech industry exposure\&quot; },\n  { name:\&quot;Amritapuri\&quot;, state:\&quot;Kerala\&quot;, pref:78, area:\&quot;Serene campus\&quot;, highlight:\&quot;Strong research, amFOSS coding club, peaceful learning environment\&quot;, branches:\&quot;CSE, ECE, EEE, ME\&quot;, tip:\&quot;Best for: students focused on research &amp; deep learning\&quot; },\n  { name:\&quot;Chennai\&quot;, state:\&quot;Tamil Nadu\&quot;, pref:72, area:\&quot;Vengal, rural-suburban\&quot;, highlight:\&quot;Growing campus, industrial exposure, Tamil Nadu state quota benefits\&quot;, branches:\&quot;CSE, ECE, EEE, ME\&quot;, tip:\&quot;Best for: TN students wanting proximity to industrial zones\&quot; },\n  { name:\&quot;Amaravati\&quot;, state:\&quot;Andhra Pradesh\&quot;, pref:65, area:\&quot;Newest campus\&quot;, highlight:\&quot;Modern infrastructure, rapidly growing, competitive entry ranks\&quot;, branches:\&quot;CSE, AI&amp;DS, ECE, EEE\&quot;, tip:\&quot;Best for: students wanting newer campus with modern facilities\&quot; },\n  { name:\&quot;Faridabad\&quot;, state:\&quot;Haryana (NCR)\&quot;, pref:60, area:\&quot;130-acre health city\&quot;, highlight:\&quot;Attached 2000-bed Amrita Hospital, NCR Delhi region access\&quot;, branches:\&quot;CSE, ECE, EEE\&quot;, tip:\&quot;Best for: students in North India wanting NCR location\&quot; },\n  { name:\&quot;Nagercoil\&quot;, state:\&quot;Tamil Nadu\&quot;, pref:55, area:\&quot;Southern tip campus\&quot;, highlight:\&quot;Peaceful, strong community, value engineering education\&quot;, branches:\&quot;CSE, ECE, ME, EEE\&quot;, tip:\&quot;Best for: focused learning in a quiet setting\&quot; },\n  { name:\&quot;Haridwar\&quot;, state:\&quot;Uttarakhand\&quot;, pref:50, area:\&quot;Spiritual &amp; scenic\&quot;, highlight:\&quot;Unique location, same centralized placements, growing programs\&quot;, branches:\&quot;CSE, ECE, EEE\&quot;, tip:\&quot;Best for: students wanting North India + spiritual campus\&quot; }\n];\nconst cg = document.getElementById('campus-grid');\ncampuses.forEach(c =&gt; {\n  cg.innerHTML += `&lt;div class=\&quot;card\&quot;&gt;\n    &lt;div style=\&quot;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px\&quot;&gt;\n      &lt;h4 style=\&quot;margin:0\&quot;&gt;${c.name}&lt;/h4&gt;\n      &lt;span class=\&quot;badge badge-blue\&quot;&gt;${c.state}&lt;/span&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;progress-ring\&quot;&gt;\n      &lt;span style=\&quot;font-size:12px;font-weight:700;color:var(--gray);min-width:90px\&quot;&gt;Preference: ${c.pref}%&lt;/span&gt;\n      &lt;div class=\&quot;bar-bg\&quot;&gt;&lt;div class=\&quot;bar-fill\&quot; style=\&quot;width:${c.pref}%\&quot;&gt;&lt;/div&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;p style=\&quot;font-size:13px;margin-bottom:6px\&quot;&gt;&lt;strong&gt;Area:&lt;/strong&gt; ${c.area}&lt;/p&gt;\n    &lt;p style=\&quot;font-size:13px;margin-bottom:6px\&quot;&gt;&lt;strong&gt;Highlight:&lt;/strong&gt; ${c.highlight}&lt;/p&gt;\n    &lt;p style=\&quot;font-size:12px;margin-bottom:6px;color:var(--gray)\&quot;&gt;&lt;strong&gt;Branches:&lt;/strong&gt; ${c.branches}&lt;/p&gt;\n    &lt;p style=\&quot;font-size:12px;background:var(--orange-light);padding:6px 10px;border-radius:8px;color:var(--orange);font-weight:600;margin-top:8px\&quot;&gt;💡 ${c.tip}&lt;/p&gt;\n  &lt;/div&gt;`;\n});\n\n// ═══ SKILLS QUIZ ═══\nconst quizData = [\n  { q:\&quot;How interested are you in programming &amp; coding?\&quot;, b:[\&quot;CSE\&quot;,\&quot;AI &amp; Data Science\&quot;,\&quot;CSE (AI)\&quot;] },\n  { q:\&quot;How comfortable are you with advanced mathematics?\&quot;, b:[\&quot;CSE\&quot;,\&quot;ECE\&quot;,\&quot;EEE\&quot;,\&quot;Aerospace\&quot;] },\n  { q:\&quot;Do you enjoy working with electronic circuits &amp; hardware?\&quot;, b:[\&quot;ECE\&quot;,\&quot;EEE\&quot;] },\n  { q:\&quot;Are you interested in designing machines or structures?\&quot;, b:[\&quot;Mechanical\&quot;,\&quot;Civil\&quot;,\&quot;Aerospace\&quot;] },\n  { q:\&quot;Do you like data analysis and finding patterns?\&quot;, b:[\&quot;AI &amp; Data Science\&quot;,\&quot;CSE (AI)\&quot;] },\n  { q:\&quot;Are you fascinated by aircraft, space &amp; aerodynamics?\&quot;, b:[\&quot;Aerospace\&quot;] },\n  { q:\&quot;Do you enjoy chemistry and chemical processes?\&quot;, b:[\&quot;Chemical Engineering\&quot;] },\n  { q:\&quot;How interested are you in AI, ML &amp; automation?\&quot;, b:[\&quot;AI &amp; Data Science\&quot;,\&quot;CSE (AI)\&quot;,\&quot;CSE\&quot;] },\n];\nlet quizAnswers = {};\nconst qc = document.getElementById('quiz-container');\nfunction renderQuiz() {\n  let h = '';\n  quizData.forEach((q,i) =&gt; {\n    h += `&lt;div class=\&quot;card quiz-q\&quot; style=\&quot;margin-bottom:14px\&quot;&gt;\n      &lt;div class=\&quot;q-text\&quot;&gt;${i+1}. ${q.q}&lt;/div&gt;\n      &lt;div class=\&quot;quiz-btns\&quot;&gt;\n        ${[1,2,3,4,5].map(v =&gt; `&lt;button onclick=\&quot;selectQ(${i},${v},this)\&quot; ${quizAnswers[i]===v?'class=\&quot;selected\&quot;':''}&gt;${v}&lt;/button&gt;`).join('')}\n        &lt;span class=\&quot;quiz-hint\&quot;&gt;1=Low, 5=High&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;`;\n  });\n  const allDone = Object.keys(quizAnswers).length === quizData.length;\n  h += `&lt;div style=\&quot;text-align:center;margin-top:20px\&quot;&gt;&lt;button class=\&quot;btn-primary\&quot; onclick=\&quot;showResults()\&quot; ${allDone?'':'disabled'}&gt;🎯 Get My Branch Recommendation&lt;/button&gt;&lt;/div&gt;`;\n  qc.innerHTML = h;\n}\nfunction selectQ(idx, val, el) {\n  quizAnswers[idx] = val;\n  renderQuiz();\n}\nfunction showResults() {\n  const scores = {};\n  Object.entries(quizAnswers).forEach(([idx,val]) =&gt; {\n    quizData[idx].b.forEach(b =&gt; { scores[b] = (scores[b]||0) + val; });\n  });\n  const sorted = Object.entries(scores).sort((a,b) =&gt; b[1]-a[1]).slice(0,3);\n  let h = '&lt;div class=\&quot;card\&quot; style=\&quot;border:2px solid var(--orange);padding:28px\&quot;&gt;&lt;h4 style=\&quot;text-align:center;font-size:20px;margin-bottom:20px\&quot;&gt;🎯 Your Recommended Branches&lt;/h4&gt;';\n  const medals = ['🥇','🥈','🥉'];\n  sorted.forEach(([name,score],i) =&gt; {\n    const max = quizData.reduce((s,q) =&gt; s + (q.b.includes(name)?5:0), 0);\n    const pct = Math.round((score/max)*100);\n    const grad = i===0 ? 'var(--orange),#FF6B2B' : 'var(--blue),#2563EB';\n    h += `&lt;div style=\&quot;margin-bottom:14px\&quot;&gt;&lt;div style=\&quot;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\&quot;&gt;&lt;span style=\&quot;font-weight:800;color:${i===0?'var(--orange)':'var(--blue)'};font-size:16px\&quot;&gt;${medals[i]} ${name}&lt;/span&gt;&lt;span style=\&quot;font-weight:700;color:var(--gray);font-size:13px\&quot;&gt;${pct}% match&lt;/span&gt;&lt;/div&gt;&lt;div class=\&quot;result-bar\&quot;&gt;&lt;div class=\&quot;result-fill\&quot; style=\&quot;width:${pct}%;background:linear-gradient(90deg,${grad})\&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;`;\n  });\n  h += `&lt;div style=\&quot;text-align:center;margin-top:20px;padding:14px;background:var(--off-white);border-radius:10px\&quot;&gt;&lt;p style=\&quot;font-size:14px;color:var(--gray);margin-bottom:6px\&quot;&gt;Want detailed, personalized counselling?&lt;/p&gt;&lt;a href=\&quot;mailto:contact@eduaakashaa.com\&quot; style=\&quot;font-weight:800;font-size:15px\&quot;&gt;✉ contact@eduaakashaa.com&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;`;\n  h += `&lt;div style=\&quot;text-align:center;margin-top:16px\&quot;&gt;&lt;button onclick=\&quot;quizAnswers={};renderQuiz()\&quot; style=\&quot;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;padding:10px 28px;border-radius:24px;border:2px solid var(--blue);background:var(--white);color:var(--blue);cursor:pointer\&quot;&gt;↻ Retake Assessment&lt;/button&gt;&lt;/div&gt;`;\n  qc.innerHTML = h;\n}\nrenderQuiz();\n\n// ═══ FAQ ═══\nconst faqs = [\n  { cat:'nri', q:'Can NRI students get direct admission without AEEE?', a:'Yes. OCI/PIO students and Indian students who completed Class 12 abroad with NRI-status parents are exempt from AEEE and can apply directly through the NRI quota at any of the 8 engineering campuses.' },\n  { cat:'nri', q:'What is the NRI fee structure for B.Tech?', a:'NRI tuition fee is approximately USD 7,000 per year. Hostel and mess charges are additional. Payment can be made via international wire transfer or demand draft.' },\n  { cat:'nri', q:'Do NRI students need SAT scores?', a:'SAT scores can be used as an alternative admission route. However, NRI/OCI/PIO status itself qualifies for direct admission without any entrance exam.' },\n  { cat:'nri', q:'What documents are needed for NRI quota?', a:'Valid passport, OCI/PIO card, Class 12 mark sheets, parent\\'s NRI status proof, passport-size photos, and address proof. All documents must be attested.' },\n  { cat:'nri', q:'Are NRI students eligible for scholarships?', a:'NRI scholarship programs are separate from AEEE-based scholarships. Contact the Directorate of Admissions at Amrita or email contact@eduaakashaa.com for guidance.' },\n  { cat:'nri', q:'Can NRI students choose any campus?', a:'Yes, NRI students can opt for any of the 8 campuses — Coimbatore, Bengaluru, Chennai, Amritapuri, Amaravati, Faridabad, Nagercoil, and Haridwar.' },\n  { cat:'gen', q:'What is CSAP counselling?', a:'CSAP (Centralized Seat Allotment Process) is held online after results. Register with ₹5,000, fill campus and branch preferences, seats allocated based on rank across multiple rounds.' },\n  { cat:'gen', q:'Is it mandatory to attend both Phase 1 and Phase 2?', a:'No. You can attend either or both. Your best score across phases is considered for ranking. Phase 2 costs an additional ₹600.' },\n  { cat:'exam', q:'Can I apply through both AEEE and JEE Main?', a:'Yes. Register for both during the AEEE application — no additional fee. 70% seats via AEEE, 30% via JEE Main. Separate merit lists are prepared.' },\n  { cat:'fee', q:'How are scholarships maintained after admission?', a:'Slab 1 requires ≥8.0 CGPA; Slab 2 requires ≥7.5 CGPA. If CGPA drops, you move to a higher fee slab. No disciplinary issues should be on record.' },\n  { cat:'gen', q:'What happens if I don\\'t get a seat in CSAP?', a:'If you don\\'t receive any preference in the last CSAP round, your ₹5,000 registration fee is refunded. You may also contact admissions for non-scholarship/institutional seats.' },\n  { cat:'gen', q:'Is Amrita recognized and accredited?', a:'Yes. NAAC A++ (highest grade), UGC recognized, Institute of Eminence by Govt. of India, NIRF #8 University, QS World 1001-1200, AACSB accredited (Business School).' },\n  { cat:'exam', q:'What is the new exam pattern change for 2026?', a:'A new Quantitative Aptitude section (10 questions, 30 marks) has been added. Physics reduced from 30 to 25 questions, Chemistry from 25 to 20. Total remains 100 questions, 300 marks.' },\n  { cat:'fee', q:'What is the non-scholarship fee for B.Tech?', a:'Non-scholarship (institutional quota) fee is approximately ₹6,00,000 per year. These seats are based on Class 12 PCM marks without entrance exam. Not donation-based.' },\n  { cat:'exam', q:'What are the AEEL exam details?', a:'AEEL is a 2-hour CBT with 80 questions covering Physics, Chemistry, Biology and English. For admission to Nursing, Pharmacy, Agriculture and Allied Health programs.' },\n  { cat:'fee', q:'Are education loans available for Amrita?', a:'Yes. Amrita has partnerships with banks like Bank of Baroda and Dhanalakshmi Bank for education loans. Installment payment options are available through the university portal.' },\n];\nfunction renderFaqs(filter) {\n  const fl = document.getElementById('faq-list');\n  const filtered = filter==='all' ? faqs : faqs.filter(f=&gt;f.cat===filter);\n  fl.innerHTML = filtered.map((f,i) =&gt; {\n    const catLabel = {nri:'🌍 NRI',gen:'📋 General',fee:'💰 Fees',exam:'📝 Exam'}[f.cat];\n    const catClass = {nri:'badge-purple',gen:'badge-blue',fee:'badge-orange',exam:'badge-green'}[f.cat];\n    return `&lt;div class=\&quot;faq-item\&quot; onclick=\&quot;toggleFaq(this)\&quot;&gt;\n      &lt;div class=\&quot;faq-q\&quot;&gt;&lt;div style=\&quot;display:flex;align-items:center;gap:10px\&quot;&gt;&lt;span class=\&quot;badge ${catClass}\&quot;&gt;${catLabel}&lt;/span&gt;&lt;span&gt;${f.q}&lt;/span&gt;&lt;/div&gt;&lt;span class=\&quot;toggle\&quot;&gt;+&lt;/span&gt;&lt;/div&gt;\n      &lt;div class=\&quot;faq-a\&quot;&gt;${f.a}&lt;/div&gt;\n    &lt;/div&gt;`;\n  }).join('');\n}\nfunction toggleFaq(el) { el.classList.toggle('open'); }\nfunction filterFaq(cat, btn) {\n  document.querySelectorAll('.faq-filters button').forEach(b=&gt;b.classList.remove('active'));\n  btn.classList.add('active');\n  renderFaqs(cat);\n}\nrenderFaqs('all');\n&lt;/script&gt;\n\n&quot;],&quot;desktop&quot;:[0,{&quot;top&quot;:[0,1],&quot;left&quot;:[0,0],&quot;width&quot;:[0,1224],&quot;height&quot;:[0,15706]}],&quot;settings&quot;:[0,{&quot;styles&quot;:[0,{}]}]}]}],&quot;nav&quot;:[1,[[0,{&quot;isHidden&quot;:[0,true],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&quot;navItemId&quot;:[0,&quot;zh7Jl1&quot;],&quot;linkedPageId&quot;:[0,&quot;zrZeq3&quot;]}],[0,{&quot;isHidden&quot;:[0,true],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&quot;navItemId&quot;:[0,&quot;z_xq_m&quot;],&quot;linkedPageId&quot;:[0,&quot;z2zzzk&quot;]}],[0,{&quot;isHidden&quot;:[0,true],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&quot;navItemId&quot;:[0,&quot;zvja5C&quot;],&quot;linkedPageId&quot;:[0,&quot;z-btxJ&quot;]}],[0,{&quot;isHidden&quot;:[0,true],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&quot;navItemId&quot;:[0,&quot;zf4msj&quot;],&quot;linkedPageId&quot;:[0,&quot;zbpWB9&quot;]}],[0,{&quot;isHidden&quot;:[0,true],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&quot;navItemId&quot;:[0,&quot;HRYnwl&quot;],&quot;linkedPageId&quot;:[0,&quot;ai-429k4&quot;]}],[0,{&quot;isHidden&quot;:[0,false],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&quot;navItemId&quot;:[0,&quot;zVtOtn&quot;],&quot;linkedPageId&quot;:[0,&quot;zU9ZRg&quot;]}],[0,{&quot;isHidden&quot;:[0,false],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[[0,{&quot;isHidden&quot;:[0,false],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&q th: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;,s:{acca:2}}]\n  },\n  { q:\&quot;How can you dedicate time to studying?\&quot;,\n    o:[{t:\&quot;⏱️ Part-time alongside my job\&quot;,s:{acca:2}},{t:\&quot;📚 Intense focused study windows\&quot;,s:{cfa:2}},{t:\&quot;🎓 Full-time with practical training\&quot;,s:{ca:2}},{t:\&quot;🔄 Flexible — whatever it takes\&quot;,s:{acca:1,cfa:1,ca:1}}]\n  },\n  { q:\&quot;What matters most in a qualification?\&quot;,\n    o:[{t:\&quot;🌐 Global recognition / working abroad\&quot;,s:{acca:3}},{t:\&quot;💰 Highest salary in investment finance\&quot;,s:{cfa:3}},{t:\&quot;🏆 Prestigious local qualification\&quot;,s:{ca:3}},{t:\&quot;⚡ Fastest route to a finance career\&quot;,s:{acca:2}}]\n  }\n];\n\nvar cur=0, sc={acca:0,cfa:0,ca:0}, pend=null;\n\nfunction pick(btn,idx){\n  var all=document.querySelectorAll('.qopt');\n  for(var i=0;i&lt;all.length;i++) all[i].classList.remove('sel');\n  btn.classList.add('sel');\n  pend=Qs[cur].o[idx].s;\n  document.getElementById('qNext').style.display='inline-block';\n}\n\nfunction nextQ(){\n  if(!pend) return;\n  for(var k in pend) sc[k]=(sc[k]||0)+pend[k];\n  pend=null; cur++;\n  if(cur&gt;=Qs.length){ showRes(); return; }\n  document.getElementById('qProg').textContent='Question '+(cur+1)+' of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[cur].q;\n  var html='';\n  for(var i=0;i&lt;Qs[cur].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[cur].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n\nfunction showRes(){\n  var keys=Object.keys(sc).sort(function(a,b){return sc[b]-sc[a];});\n  var w=keys[0];\n  var info={\n    acca:{n:'ACCA',cls:'rb-a', ti:'ACCA is your ideal match!', tx:'Your goals align with ACCA — global flexibility, modular study structure, and recognition in 180+ countries.'},\n    cfa:{n:'CFA',cls:'rb-c', ti:'CFA is your ideal match!', tx:'Your passion for investment and markets points to the CFA Charter — the gold standard for finance professionals worldwide.'},\n    ca:{n:'CA',cls:'rb-ca', ti:'CA is your ideal match!', tx:'Your preference for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}\n  }[w];\n  document.getElementById('qMain').style.display='none';\n  document.getElementById('qResult').style.display='block';\n  var b=document.getElementById('rBadge');\n  b.textContent=info.n; b.className='rb
