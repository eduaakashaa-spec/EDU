;\n  border-radius: 11px;\n  display: flex; align-items: center; justify-content: center;\n  font-size: 15px; font-weight: 900;\n  color: #fff;\n  margin-bottom: 13px;\n  font-family: Arial, sans-serif;\n}\n.ci-acca { background: #2D6A4F; }\n.ci-cfa  { background: #1B4F9B; }\n.ci-ca   { background: #8B2635; }\n\n.cn { font-size: 1.55rem; font-weight: 700; color: #1A1A2E; margin-bottom: 3px; }\n.co { font-family: Arial, sans-serif; font-size: 0.78rem; color: #6B7280; }\n\n.cb { padding: 24px; flex: 1; display: flex; flex-direction: column; gap: 17px; }\n.cd { font-family: Arial, sans-serif; font-size: 0.91rem; line-height: 1.72; color: #444; }\n\n/* Stats */\n.stats-g { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }\n.stat-b { background: #F9F5EE; border-radius: 10px; padding: 12px; border: 1px solid #E5DDD0; }\n.sl { font-family: Arial, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #6B7280; margin-bottom: 4px; }\n.sv { font-family: Arial, sans-serif; font-size: 0.9rem; font-weight: 700; color: #1A1A2E; }\n\n/* Tags */\n.tags-g { display: flex; flex-wrap: wrap; gap: 7px; }\n.tag { font-family: Arial, sans-serif; font-size: 0.73rem; font-weight: 600; padding: 5px 11px; border-radius: 100px; background: #F9F5EE; border: 1px solid #E5DDD0; color: #2B2B2B; }\n.t-acca { background: #D8F3DC; border-color: #2D6A4F; color: #2D6A4F; }\n.t-cfa  { background: #DBE9FF; border-color: #1B4F9B; color: #1B4F9B; }\n.t-ca   { background: #FFE0E4; border-color: #8B2635; color: #8B2635; }\n\n.cf { padding: 0 24px 24px; }\n.cl {\n  display: block; text-align: center;\n  padding: 13px; border-radius: 10px;\n  font-family: Arial, sans-serif; font-size: 0.88rem; font-weight: 700;\n  text-decoration: none; color: #fff;\n}\n.cl-acca { background: #2D6A4F; }\n.cl-cfa  { background: #1B4F9B; }\n.cl-ca   { background: #8B2635; }\n\n/* TABLE */\n.tbl-outer {\n  background: #1A1A2E;\n  padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px);\n}\n.tbl-inner { max-width: 1160px; margin: 0 auto; }\n.tbl-scroll { margin-top: 44px; overflow-x: auto; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); }\n\ntable { width: 100%; min-width: 580px; border-collapse: collapse; }\nthead th {\n  padding: 17px 18px;\n  text-align: left;\n  font-family: Arial, sans-serif;\n  font-size: 0.74rem;\n  font-weight: 700;\n  letter-spacing: 1.8px;\n  text-transform: uppercase;\n  border-bottom: 1px solid rgba(255,255,255,0.09);\n  background: rgba(255,255,255,0.03);\n}\nth.th0 { color: rgba(255,255,255,0.3); }\nth.th1 { color: #74c69d; }\nth.th2 { color: #90b4e8; }\nth.th3 { color: #e88a93; }\n\ntbody td {\n  padding: 14px 18px;\n  font-family: Arial, sans-serif;\n  font-size: 0.87rem;\n  border-bottom: 1px solid rgba(255,255,255,0.05);\n  color: rgba(255,255,255,0.7);\n  vertical-align: top;\n  line-height: 1.5;\n}\ntbody tr:last-child td { border-bottom: none; }\ntbody td:first-child {\n  font-size: 0.74rem; font-weight: 700;\n  letter-spacing: 0.6px; text-transform: uppercase;\n  color: rgba(255,255,255,0.3); white-space: nowrap;\n}\n\n.pill { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 0.73rem; font-weight: 700; font-family: Arial, sans-serif; }\n.pg { background: rgba(116,198,157,0.15); color: #74c69d; }\n.pb { background: rgba(144,180,232,0.15); color: #90b4e8; }\n.pr { background: rgba(232,138,147,0.15); color: #e88a93; }\n\n/* WHO */\n.who-outer { background: #fff; padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); }\n.who-inner { max-width: 1160px; margin: 0 auto; }\n.who-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .who-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .who-grid { grid-template-columns: 1fr 1fr; } }\n\n.wc { border-radius: 16px; padding: 25px 22px; border: 1.5px solid #E5DDD0; background: #fff; }\n.wi { font-size: 1.9rem; margin-bottom: 10px; display: block; }\n.wt { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; color: #1A1A2E; }\n.wp { font-family: Arial, sans-serif; font-size: 0.86rem; line-height: 1.72; color: #6B7280; }\n.wb { display: inline-block; margin-top: 13px; font-family: Arial, sans-serif; font-size: 0.73rem; font-weight: 700; padding: 4px 13px; border-radius: 100px; }\n.wb-a  { background: #D8F3DC; color: #2D6A4F; }\n.wb-c  { background: #DBE9FF; color: #1B4F9B; }\n.wb-ca { background: #FFE0E4; color: #8B2635; }\n\n/* QUIZ */\n.quiz-outer {\n  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 55%, #0F3460 100%);\n  padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px);\n  text-align: center;\n}\n.quiz-inner { max-width: 1160px; margin: 0 auto; }\n.qbox {\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.12);\n  border-radius: 20px;\n  padding: clamp(24px,5vw,48px);\n  max-width: 660px;\n  margin: 44px auto 0;\n}\n.qprog { font-family: Arial, sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.32); margin-bottom: 7px; letter-spacing: 1.2px; text-transform: uppercase; }\n.qtext { font-family: Arial, sans-serif; font-size: clamp(1rem,2.5vw,1.25rem); font-weight: 700; color: #fff; margin-bottom: 22px; line-height: 1.5; }\n.qopts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }\n@media (max-width: 480px) { .qopts { grid-template-columns: 1fr; } }\n.qopt {\n  background: rgba(255,255,255,0.07);\n  border: 1.5px solid rgba(255,255,255,0.14);\n  border-radius: 12px;\n  padding: 14px 15px;\n  text-align: left;\n  color: rgba(255,255,255,0.78);\n  font-family: Arial, sans-serif;\n  font-size: 0.87rem;\n  font-weight: 600;\n  cursor: pointer;\n  transition: all 0.18s;\n  line-height: 1.4;\n}\n.qopt:hover, .qopt.sel {\n  background: rgba(201,168,76,0.18);\n  border-color: #C9A84C;\n  color: #fff;\n}\n.qnav { margin-top: 22px; }\n.qnext {\n  background: transparent;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  color: #fff;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 13px 30px;\n  border-radius: 100px;\n  cursor: pointer;\n  display: none;\n}\n.qresult { display: none; text-align: center; }\n.rbadge { display: inline-block; font-size: 2.6rem; font-weight: 900; padding: 16px 32px; border-radius: 14px; margin-bottom: 15px; }\n.rb-a  { background: #D8F3DC; color: #2D6A4F; }\n.rb-c  { background: #DBE9FF; color: #1B4F9B; }\n.rb-ca { background: #FFE0E4; color: #8B2635; }\n.rtitle { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 11px; }\n.rtext { font-family: Arial, sans-serif; font-size: 0.94rem; color: rgba(255,255,255,0.56); max-width: 420px; margin: 0 auto 22px; line-height: 1.72; }\n.btn-retry { background: #C9A84C; color: #1A1A2E; font-family: Arial, sans-serif; font-size: 0.93rem; font-weight: 700; padding: 13px 30px; border-radius: 100px; border: none; cursor: pointer; }\n\n/* FAQ */\n.faq-outer { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); background: #F9F5EE; }\n.faq-inner { max-width: 1160px; margin: 0 auto; }\n.faq-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .faq-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .faq-grid { grid-template-columns: 1fr 1fr; } }\n.fi { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid #E5DDD0; }\n.fq { font-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }\n.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }\n\n/* FOOTER */\nfooter { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;,s:{acca:2}}]\n  },\n  { q:\&quot;How can you dedicate time to studying?\&quot;,\n    o:[{t:\&quot;⏱️ Part-time alongside my job\&quot;,s:{acca:2}},{t:\&quot;📚 Intense focused study windows\&quot;,s:{cfa:2}},{t:\&quot;🎓 Full-time with practical training\&quot;,s:{ca:2}},{t:\&quot;🔄 Flexible — whatever it takes\&quot;,s:{acca:1,cfa:1,ca:1}}]\n  },\n  { q:\&quot;What matters most in a qualification?\&quot;,\n    o:[{t:\&quot;🌐 Global recognition / working abroad\&quot;,s:{acca:3}},{t:\&quot;💰 Highest salary in investment finance\&quot;,s:{cfa:3}},{t:\&quot;🏆 Prestigious local qualification\&quot;,s:{ca:3}},{t:\&quot;⚡ Fastest route to a finance career\&quot;,s:{acca:2}}]\n  }\n];\n\nvar cur=0, sc={acca:0,cfa:0,ca:0}, pend=null;\n\nfunction pick(btn,idx){\n  var all=document.querySelectorAll('.qopt');\n  for(var i=0;i&lt;all.length;i++) all[i].classList.remove('sel');\n  btn.classList.add('sel');\n  pend=Qs[cur].o[idx].s;\n  document.getElementById('qNext').style.display='inline-block';\n}\n\nfunction nextQ(){\n  if(!pend) return;\n  for(var k in pend) sc[k]=(sc[k]||0)+pend[k];\n  pend=null; cur++;\n  if(cur&gt;=Qs.length){ showRes(); return; }\n  document.getElementById('qProg').textContent='Question '+(cur+1)+' of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[cur].q;\n  var html='';\n  for(var i=0;i&lt;Qs[cur].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[cur].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n\nfunction showRes(){\n  var keys=Object.keys(sc).sort(function(a,b){return sc[b]-sc[a];});\n  var w=keys[0];\n  var info={\n    acca:{n:'ACCA',cls:'rb-a', ti:'ACCA is your ideal match!', tx:'Your goals align with ACCA — global flexibility, modular study structure, and recognition in 180+ countries.'},\n    cfa:{n:'CFA',cls:'rb-c', ti:'CFA is your ideal match!', tx:'Your passion for investment and markets points to the CFA Charter — the gold standard for finance professionals worldwide.'},\n    ca:{n:'CA',cls:'rb-ca', ti:'CA is your ideal match!', tx:'Your preference for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}\n  }[w];\n  document.getElementById('qMain').style.display='none';\n  document.getElementById('qResult').style.display='block';\n  var b=document.getElementById('rBadge');\n  b.textContent=info.n; b.className='rbadge '+info.cls;\n  document.getElementById('rTitle').textContent body{font-family:'DM Sans','Noto Sans Tamil',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.app{max-width:880px;margin:0 auto;padding:16px;position:relative;z-index:1}
.top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px}
.lang-bar{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;gap:3px}
.lang-btn{padding:8px 20px;border:none;border-radius:7px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;background:transparent;color:var(--muted)}
.lang-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 10px rgba(245,158,11,.25)}
.sync-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:6px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--border)}
.sync-badge .sdot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.sync-badge.connected .sdot{background:var(--accent3);box-shadow:0 0 6px rgba(5,150,105,.5)}
.sync-badge.saving .sdot{background:var(--accent);animation:pulse 1s infinite}
.sync-badge.error .sdot{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header{text-align:center;padding:28px 16px 20px}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;font-size:11px;padding:4px 14px;border-radius:16px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.header h1{font-size:clamp(24px,4.5vw,36px);font-weight:800;line-height:1.3;background:linear-gradient(135deg,var(--accent2) 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:13.5px;margin-top:8px;max-width:560px;margin-inline:auto;line-height:1.7}
.stepper{display:flex;gap:4px;margin:20px 0 24px;overflow-x:auto;padding:4px 0}
.step{flex:1;min-width:40px;text-align:center;position:relative}
.step .dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);margin:0 auto 4px;transition:.3s;background:var(--surface)}
.step.active .dot{border-color:var(--accent);color:#fff;background:var(--accent);box-shadow:0 0 16px rgba(234,124,14,.3)}
.step.done .dot{border-color:var(--accent2);background:var(--accent2);color:#fff}
.step .slabel{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;margin:0 auto}
.step.active .slabel{color:var(--accent)}
.step-line{position:absolute;top:16px;left:calc(50% + 18px);width:calc(100% - 36px);height:2px;background:var(--border)}
.step:last-child .step-line{display:none}
.step.done .step-line{background:var(--accent2)}
.section{display:none;animation:fadeUp .35s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sec-card h2{font-size:18px;font-weight:700;margin-bottom:4px}
.sec-card .sub{font-size:12.5px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.form-group .label-sub{font-size:11px;color:var(--muted);font-weight:400}
.form-input{width:100%;padding:11px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;transition:.2s;outline:none}
.form-input:focus{border-color:var(--accent2)}
select.form-input{cursor:pointer}
.q-block{margin-bottom:16px}
.q-block .q-label{font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.6}
.q-block .q-sub{font-size:12px;color:var(--muted);margin-bottom:8px;font-style:italic}
.rating-row{display:flex;gap:6px;flex-wrap:wrap}
.rate-btn{padding:8px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;transition:.2s;flex:1;min-width:60px;text-align:center}
.rate-btn:hover{border-color:var(--accent2);background:rgba(59,130,246,.06)}
.rate-btn.selected{border-color:var(--accent);background:rgba(234,124,14,.1);color:#b45309;font-weight:600}
.swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:550px){.swot-grid{grid-template-columns:1fr}}
.swot-box{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px;transition:.2s}
.swot-box:focus-within{border-color:var(--accent2)}
.swot-box .sw-head{font-size:13px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.swot-box .sw-sub{font-size:11px;color:var(--muted);margin-bottom:8px}
.swot-box textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:inherit;font-size:13px;resize:vertical;min-height:70px;outline:none;line-height:1.6}
.branch-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:500px){.branch-grid{grid-template-columns:1fr}}
.branch-chip{padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:10px;font-size:13px}
.branch-chip:hover{border-color:var(--accent2)}
.branch-chip.selected{border-color:var(--accent);background:rgba(245,158,11,.1)}
.branch-chip .bcheck{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;font-size:11px}
.branch-chip.selected .bcheck{border-color:var(--accent);background:var(--accent);color:#fff}
.nav-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;margin-bottom:20px}
.btn{font-family:inherit;padding:11px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:.2s}
.btn-sec{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-sec:hover{border-color:var(--accent2)}
.btn-pri{background:linear-gradient(135deg,var(--accent2),#1e40af);color:#fff}
.btn-pri:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(29,78,216,.3)}
.btn:disabled{opacity:.35;cursor:default;transform:none!important;box-shadow:none!important}
.btn-dl{background:linear-gradient(135deg,var(--accent),#c2410c);color:#fff;font-size:15px;padding:14px 28px;width:100%;margin-top:12px}
.btn-dl:hover{box-shadow:0 5px 20px rgba(234,124,14,.3)}
#report-content{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.rpt-header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--border)}
.rpt-header h2{font-size:22px;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.rpt-header .rpt-name{font-size:16px;color:var(--accent);margin-top:4px}
.rpt-header .rpt-date{font-size:12px;color:var(--muted);margin-top:4px}
.rpt-section{margin-bottom:20px}
.rpt-section h3{font-size:15px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.rpt-section p,.rpt-section li{font-size:13px;color:var(--muted);line-height:1.75}
.rpt-section ul{padding-left:18px}
.rpt-section li{margin-bottom:4px}
.rpt-score-ring{width:140px;height:140px;margin:0 auto 16px;position:relative}
.rpt-score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.rpt-score-ring .trk{fill:none;stroke:var(--border);stroke-width:8}
.rpt-score-ring .val{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.5s ease}
.rpt-score-ring .lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rpt-score-ring .pct{font-size:34px;font-weight:800}
.rpt-score-ring .psub{font-size:11px;color:var(--muted)}
.rpt-bar{margin:8px 0}
.rpt-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.rpt-bar-label span:last-child{color:var(--accent);font-weight:600}
.rpt-bar-track{height:7px;background:var(--border);border-radius:6px;overflow:hidden}
.rpt-bar-fill{height:100%;border-radius:6px;transition:width 1s ease .2s}
.rpt-rec-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.rpt-rec-card .rank{font-size:24px;font-weight:800;color:var(--accent);float:left;margin-right:12px;line-height:1}
.rpt-rec-card h4{font-size:14px;font-weight:700;margin-bottom:3px}
.rpt-rec-card .rscore{font-size:12px;color:var(--accent3);font-weight:600}
.rpt-rec-card .rreason{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6;clear:both}
.rpt-swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
@media(max-width:500px){.rpt-swot-grid{grid-template-columns:1fr}}
.rpt-swot-box{background:var(--surface);border-radius:10px;padding:12px}
.rpt-swot-box h5{font-size:12px;font-weight:700;margin-bottom:4px}
.rpt-swot-box p{font-size:12px;color:var(--muted);line-height:1.6}
.disclaimer{text-align:center;font-size:11px;color:var(--muted);margin-top:14px;line-height:1.6;white-space:pre-line}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;gap:16px}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--muted);font-size:14px;text-align:center}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;z-index:100;transition:.4s;opacity:0;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{border-color:var(--accent3)}.toast.error{border-color:var(--danger)}
.pdf-mode{background:#fff!important;color:#1e293b!important;padding:20px 24px!important}
.pdf-mode *{color:#334155!important;border-color:#e2e8f0!important}
.pdf-mode .rpt-header h2{-webkit-text-fill-color:#1e293b!important;background:none!important}
.pdf-mode .rpt-header .rpt-name{color:#ea7c0e!important}
.pdf-mode .rpt-score-ring .pct{color:#1e293b!important}
.pdf-mode .rpt-bar-track{background:#e5e7eb!important}
.pdf-mode .rpt-rec-card,.pdf-mode .rpt-swot-box,.pdf-mode .riasec-detail,.pdf-mode .skill-gap-card{background:#f8fafc!important}
.pdf-mode .trk{stroke:#e5e7eb!important}
.pdf-mode .rpt-section h3{color:#1e293b!important}
.pdf-mode a{color:#1d4ed8!important}
.pdf-mode .rpt-sid{font-size:11px;color:#94a3b8!important;text-align:center;margin-top:4px}
.pdf-mode .rd-desc,.pdf-mode .sg-tip,.pdf-mode .rreason{color:#64748b!important}
.pdf-mode table{border-color:#cbd5e1!important}
.pdf-mode th{background:#f1f5f9!important;color:#1e293b!important;border-color:#cbd5e1!important}
.pdf-mode td{border-color:#cbd5e1!important}
.pdf-mode .rpt-section{page-break-inside:avoid}
.pdf-mode .rpt-rec-card,.pdf-mode .riasec-detail,.pdf-mode .skill-gap-card{page-break-inside:avoid}
.pdf-mode .rpt-swot-grid{page-break-inside:avoid}

.riasec-detail{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin:8px 0}
.riasec-detail .rd-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.riasec-detail .rd-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.riasec-detail .rd-type{font-size:13px;font-weight:700}
.riasec-detail .rd-score{font-size:12px;font-weight:600;margin-left:auto}
.riasec-detail .rd-desc{font-size:12px;color:var(--muted);line-height:1.7}
.riasec-detail .rd-branches{font-size:11px;margin-top:6px;padding:6px 10px;background:rgba(29,78,216,.06);border-radius:6px;color:var(--accent2)}
.skill-gap-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin:8px 0}
.skill-gap-card .sg-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.skill-gap-card .sg-name{font-size:13px;font-weight:600}
.skill-gap-card .sg-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
.skill-gap-card .sg-status.strong{background:rgba(5,150,105,.1);color:#059669}
.skill-gap-card .sg-status.adequate{background:rgba(234,124,14,.1);color:#b45309}
.skill-gap-card .sg-status.gap{background:rgba(220,38,38,.1);color:#dc2626}
.skill-gap-card .sg-bar-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.skill-gap-card .sg-bar-label{font-size:11px;color:var(--muted);width:60px}
.skill-gap-card .sg-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
.skill-gap-card .sg-bar-you{height:100%;border-radius:4px;position:absolute;left:0;top:0}
.skill-gap-card .sg-bar-need{position:absolute;height:100%;border-left:2px dashed rgba(0,0,0,.3);top:0}
.skill-gap-card .sg-tip{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;font-style:italic}

&lt;div class=&quot;app&quot;&gt;
  &lt;div class=&quot;top-bar&quot;&gt;

      &lt;button class=&quot;lang-btn active&quot; onclick=&quot;setLang(&amp;#x27;en&amp;#x27;)&quot;&gt;English&lt;/button&gt;

    &lt;div class=&quot;sync-badge&quot; id=&quot;syncBadge&quot;&gt;&lt;span class=&quot;sdot&quot;&gt;&lt;/span&gt;&lt;span id=&quot;syncText&quot;&gt;Sheets: Ready&lt;/span&gt;&lt;/div&gt;

    &lt;p id=&quot;mainSub&quot;&gt;A scientific, multi-dimensional assessment to discover your ideal engineering branch&lt;/p&gt;

      &lt;div class=&quot;sub&quot; id=&quot;s0s&quot;&gt;Let's start with some basic information about you.&lt;/div&gt;
      &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;Full Name &lt;span class=&quot;label-sub&quot;&gt;/ பெயர்&lt;/span&gt;&lt;/label&gt;&lt;input class=&quot;form-input&quot; id=&quot;inName&quot; placeholder=&quot;Enter your full name&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;Email &lt;span class=&quot;label-sub&quot;&gt;/ மின்னஞ்சல்&lt;/span&gt;&lt;/label&gt;&lt;input class=&quot;form-input&quot; type=&quot;email&quot; id=&quot;inEmail&quot; placeholder=&quot;student@email.com&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;Phone &lt;span class=&quot;label-sub&quot;&gt;/ தொலைபேசி&lt;/span&gt;&lt;/label&gt;&lt;input class=&quot;form-input&quot; type=&quot;tel&quot; id=&quot;inPhone&quot; placeholder=&quot;9876543210&quot;&gt;&lt;/div&gt;

      &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;+2 / 12th Board &lt;span class=&quot;label-sub&quot;&gt;/ 12ஆம் வகுப்பு போர்டு&lt;/span&gt;&lt;/label&gt;&lt;select class=&quot;form-input&quot; id=&quot;inStream&quot;&gt;&lt;option value=&quot;&quot;&gt;Select&lt;/option&gt;&lt;option value=&quot;CBSE&quot;&gt;CBSE&lt;/option&gt;&lt;option value=&quot;ICSE&quot;&gt;ICSE&lt;/option&gt;&lt;option value=&quot;State&quot;&gt;State Board&lt;/option&gt;&lt;/select&gt;&lt;/div&gt;
      &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;12th Percentage / Score &lt;span class=&quot;label-sub&quot;&gt;/ 12ஆம் வகுப்பு மதிப்பெண்&lt;/span&gt;&lt;/label&gt;&lt;input class=&quot;form-input&quot; type=&quot;number&quot; id=&quot;inScore&quot; placeholder=&quot;e.g. 85&quot; min=&quot;0&quot; max=&quot;100&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;form-group&quot;&gt;&lt;label&gt;JEE Main Expected/Actual Rank &lt;span class=&quot;label-sub&quot;&gt;/ JEE Main தரவரிசை&lt;/span&gt;&lt;/label&gt;&lt;input class=&quot;form-input&quot; type=&quot;number&quot; id=&quot;inCutoff&quot; placeholder=&quot;e.g. 15000&quot; min=&quot;1&quot; max=&quot;1500000&quot;&gt;&lt;/div&gt;

// ---- Google Sheets Integration ----
function isConfigured(){return APPS_SCRIPT_URL&amp;&amp;!APPS_SCRIPT_URL.includes('YOUR_');}

async function sendToSheets(action,payload){
  if(!isConfigured()){console.log('Sheets not configured, skipping:',action);return{success:false,error:'not_configured'};}
  setSyncStatus('saving');
  try{
    const r=await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,data:payload})});
    // no-cors means we can't read response, but data is sent
    setSyncStatus('connected');
    showToast(lang==='ta'?'✅ Google Sheets-இல் சேமிக்கப்பட்டது':'✅ Saved to Google Sheets','success');
    return{success:true};
  }catch(err){
    setSyncStatus('error');
    showToast(lang==='ta'?'⚠️ Sheets சேமிப்பு தோல்வி — தரவு உள்ளூரில் பாதுகாப்பாக உள்ளது':'⚠️ Sheets save failed — data is safe locally','error');
    return{success:false,error:err.toString()};
  }
}

function setSyncStatus(s){
  const el=document.getElementById('syncBadge');
  el.className='sync-badge '+s;
  const labels={connected:isConfigured()?'Sheets: Connected':'Sheets: Not configured',saving:'Sheets: Saving...',error:'Sheets: Error'};
  document.getElementById('syncText').textContent=labels[s]||'Sheets: Ready';
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+type;
  setTimeout(()=&gt;t.className='toast',3000);
}

function navigate(dir){
  if(dir===1&amp;&amp;curSec===0){
    data.name=document.getElementById('inName').value;
    data.email=document.getElementById('inEmail').value;
    data.phone=document.getElementById('inPhone').value;
    data.school=document.getElementById('inSchool').value;
    data.stream=document.getElementById('inStream').value;
    data.score=parseInt(document.getElementById('inScore').value)||0;
    data.cutoff=parseInt(document.getElementById('inCutoff').value)||0;
    data.advRank=parseInt(document.getElementById('inAdvRank')?.value)||0;
    data.category=document.getElementById('inCategory')?.value||'';
    data.homeState=document.getElementById('inHomeState')?.value||'';
    // Save profile to sheets
    sendToSheets('saveProfile',{name:data.name,email:data.email,phone:data.phone,school:data.school,stream:data.stream,score:data.score,cutoff:data.cutoff,advRank:data.advRank,category:data.category,homeState:data.homeState,lang}).then(r=&gt;{if(r.studentId)data.studentId=r.studentId;else data.studentId='JOSAA-'+Date.now().toString(36).toUpperCase();});
    if(!data.studentId)data.studentId='JOSAA-'+Date.now().toString(36).toUpperCase();
  }
  if(dir===1&amp;&amp;curSec===6){showSection(7);setTimeout(()=&gt;{analyzeAndReport();showSection(8);},2500);return;}
  if(curSec+dir&gt;=0&amp;&amp;curSec+dir&lt;totalSec)showSection(curSec+dir);
}

function showSection(idx){document.querySelectorAll('.section').forEach(s=&gt;s.classList.remove('active'));document.getElementById('sec-'+idx).classList.add('active');curSec=idx;buildStepper();updateNav();window.scrollTo({top:0,behavior:'smooth'});}

function analyzeAndReport(){
  // RIASEC scores
  const rScores={R:0,I:0,A:0,S:0,E:0,C:0},rCounts={R:0,I:0,A:0,S:0,E:0,C:0};
  L.en.riasecQs.forEach((q,i)=&gt;{const v=data.riasec[q.d+'_'+i]||0;rScores[q.d]+=v;rCounts[q.d]++;});
  const rAvg={};for(const k in rScores)rAvg[k]=rCounts[k]?rScores[k]/rCounts[k]:0;
  const rSorted=Object.entries(rAvg).sort((a,b)=&gt;b[1]-a[1]);
  const topCode=rSorted[0][0]+rSorted[1][0];

  const skillVals=Object.values(data.skills);
  const skillAvg=skillVals.length?skillVals.reduce((a,b)=&gt;a+b,0)/skillVals.length:0;

  // Score branches
  const bScores={};
  branchKeys.forEach(bk=&gt;{
    const bm=branchMap[bk];let riM=0,riX=0;

        &lt;div class=&quot;riasec-detail&quot; style=&quot;${isTop?'border-left:3px solid '+rColors[k]:''}&quot;&gt;
          &lt;div class=&quot;rd-head&quot;&gt;
            &lt;span class=&quot;rd-dot&quot; style=&quot;background:${rColors[k]}&quot;&gt;&lt;/span&gt;
            &lt;span class=&quot;rd-type&quot;&gt;${rd.name}&lt;/span&gt;
            &lt;span class=&quot;rd-score&quot; style=&quot;color:${rColors[k]}&quot;&gt;${pct}%&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rpt-bar&quot; style=&quot;margin:4px 0 8px&quot;&gt;&lt;div class=&quot;rpt-bar-track&quot;&gt;&lt;div class=&quot;rpt-bar-fill&quot; style=&quot;width:${pct}%;background:${rColors[k]}&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;rd-desc&quot;&gt;${rd.desc}&lt;/div&gt;
          ${isTop?`&lt;div style=&quot;margin-top:8px;font-size:12px&quot;&gt;&lt;span style=&quot;color:var(--accent3)&quot;&gt;✅ ${rd.strong}&lt;/span&gt;&lt;/div&gt;
          &lt;div style=&quot;margin-top:4px;font-size:12px&quot;&gt;&lt;span style=&quot;color:var(--muted)&quot;&gt;⚠️ ${rd.weak}&lt;/span&gt;&lt;/div&gt;`:``}
          &lt;div class=&quot;rd-branches&quot;&gt;🏗️ ${lang==='ta'?'பொருத்தமான பிரிவுகள்':'Matching branches'}: ${rd.branches}&lt;/div&gt;
        &lt;/div&gt;`}).join('')}
    &lt;/div&gt;
    &lt;div class=&quot;rpt-section&quot;&gt;&lt;h3&gt;📈 ${t('rptSkills')}&lt;/h3&gt;
      &lt;p style=&quot;margin-bottom:10px&quot;&gt;${lang==='ta'?'10 முக்கிய திறன் பகுதிகளில் உங்கள் சுய மதிப்பீடு. சராசரி:':'Your self-assessed proficiency across 10 key skill areas. Average:'} &lt;strong style=&quot;color:var(--accent)&quot;&gt;${skillAvg.toFixed(1)}/5&lt;/strong&gt;&lt;/p&gt;
      ${t('skillQs').map(sq=&gt;{const v=data.skills[sq.k]||0;const levelEn=['','Very Weak','Weak','Average','Good','Excellent'];const levelTa=['','மிகவும் பலவீனம்','பலவீனம்','சராசரி','நல்லது','சிறப்பு'];const lvl=lang==='ta'?levelTa[v]||'—':levelEn[v]||'—';return`&lt;div class=&quot;rpt-bar&quot;&gt;&lt;div class=&quot;rpt-bar-label&quot;&gt;&lt;span&gt;${sq.q}&lt;/span&gt;&lt;span&gt;${v}/5 — ${lvl}&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;rpt-bar-track&quot;&gt;&lt;div class=&quot;rpt-bar-fill&quot; style=&quot;width:${v/5*100}%;background:${skColors[sq.k]||'#888'}&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;`}).join('')}
    &lt;/div&gt;
    &lt;div class=&quot;rpt-section&quot;&gt;&lt;h3&gt;🎯 ${lang==='ta'?'திறன் இடைவெளி பகுப்பாய்வு — #1 பிரிவுக்கு':'Skill Gap Analysis — For Your #1 Branch'}: ${brsL[branchKeys.indexOf(topBranch)]}&lt;/h3&gt;
      &lt;p style=&quot;margin-bottom:10px&quot;&gt;${lang==='ta'?'உங்கள் #1 பரிந்துரைக்கப்பட்ட பிரிவுக்கு தேவையான திறன்களுடன் உங்கள் தற்போதைய நிலையை ஒப்பிடுகிறோம். இது மேம்படுத்த வேண்டிய பகுதிகளை அடையாளம் காண உதவும்.':'We compare your current skill levels against what your #1 recommended branch requires. This helps identify exactly where to improve.'}&lt;/p&gt;

        &lt;div class=&quot;skill-gap-card&quot;&gt;
          &lt;div class=&quot;sg-head&quot;&gt;
            &lt;span class=&quot;sg-name&quot;&gt;${sg.name}&lt;/span&gt;

          &lt;/div&gt;
          &lt;div class=&quot;sg-bar-row&quot;&gt;
            &lt;span class=&quot;sg-bar-label&quot;&gt;${lang==='ta'?'நீங்கள்':'You'}&lt;/span&gt;
            &lt;div class=&quot;sg-bar-wrap&quot;&gt;
              &lt;div class=&quot;sg-bar-you&quot; style=&quot;width:${sg.current/5*100}%;background:${sg.status==='gap'?'#dc2626':sg.status==='adequate'?'#ea7c0e':'#059669'}&quot;&gt;&lt;/div&gt;
              &lt;div class=&quot;sg-bar-need&quot; style=&quot;left:${sg.required/5*100}%&quot;&gt;&lt;/div&gt;
            &lt;/div&gt;
            &lt;span style=&quot;font-size:11px;font-weight:600;min-width:30px&quot;&gt;${sg.current}/5&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;sg-bar-row&quot;&gt;
            &lt;span class=&quot;sg-bar-label&quot;&gt;${lang==='ta'?'தேவை':'Needed'}&lt;/span&gt;
            &lt;div class=&quot;sg-bar-wrap&quot;&gt;
              &lt;div class=&quot;sg-bar-you&quot; style=&quot;width:${sg.required/5*100}%;background:var(--accent2);opacity:.3&quot;&gt;&lt;/div&gt;
            &lt;/div&gt;
            &lt;span style=&quot;font-size:11px;font-weight:600;min-width:30px;color:var(--accent2)&quot;&gt;${sg.required}/5&lt;/span&gt;
          &lt;/div&gt;
          ${sg.gap&gt;0?`&lt;div class=&quot;sg-tip&quot;&gt;💡 ${(lang==='ta'?skillGapTips.ta:skillGapTips.en)[sg.key]||''}&lt;/div&gt;`:''}
        &lt;/div&gt;`).join('')}
    &lt;/div&gt;
    &lt;div class=&quot;rpt-section&quot;&gt;&lt;h3&gt;🔍 ${t('rptSwot')}&lt;/h3&gt;
      &lt;div class=&quot;rpt-swot-grid&quot;&gt;${['s','w','o','t'].map(k=&gt;`&lt;div class=&quot;rpt-swot-box&quot;&gt;&lt;h5&gt;${t('swotLabels')[k]}&lt;/h5&gt;&lt;p&gt;${data.swot[k]||'—'}&lt;/p&gt;&lt;/div&gt;`).join('')}&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;rpt-section&quot;&gt;&lt;h3&gt;🏆 ${t('rptBranch')}&lt;/h3&gt;
      ${top5.map(([bk,sc],i)=&gt;{const bi=branchKeys.indexOf(bk);return`&lt;div class=&quot;rpt-rec-card&quot;&gt;&lt;div class=&quot;rank&quot;&gt;#${i+1}&lt;/div&gt;&lt;h4&gt;${brsL[bi]||bk}&lt;/h4&gt;&lt;div class=&quot;rscore&quot;&gt;${lang==='ta'?'பொருத்தம்':'Match'}: ${sc.total}/100&lt;/div&gt;&lt;div class=&quot;rreason&quot;&gt;${genReason(bk,sc)}&lt;/div&gt;
        &lt;div style=&quot;margin-top:8px&quot;&gt;${[['RIASEC',sc.riasec,'#3b82f6'],['Skills',sc.skills,'#8b5cf6'],['Interest',sc.interest,'#f59e0b'],['Knowledge',sc.knowledge,'#10b981']].map(([l,v,c])=&gt;`&lt;div class=&quot;rpt-bar&quot;&gt;&lt;div class=&quot;rpt-bar-label&quot;&gt;&lt;span style=&quot;font-size:11px&quot;&gt;${l}&lt;/span&gt;&lt;span style=&quot;font-size:11px&quot;&gt;${v}%&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;rpt-bar-track&quot;&gt;&lt;div class=&quot;rpt-bar-fill&quot; style=&quot;width:${v}%;background:${c}&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;`).join('')}&lt;/div&gt;&lt;/div&gt;`}).join('')}
    &lt;/div&gt;

      &lt;ul&gt;${t('careerQs').map(cq=&gt;{const v=data.career[cq.k];return v!==undefined?`&lt;li&gt;&lt;strong&gt;${cq.q}&lt;/strong&gt; ${cq.opts[v]}&lt;/li&gt;`:''}).join('')}
      ${data.vision?`&lt;li&gt;&lt;strong&gt;${lang==='ta'?'பார்வை':'Vision'}:&lt;/strong&gt; ${data.vision}&lt;/li&gt;`:''}&lt;/ul&gt;
    &lt;/div&gt;
    &lt;div class=&quot;rpt-section&quot;&gt;&lt;h3&gt;👨‍👩‍👧 ${lang==='ta'?'பெற்றோர்-மாணவர் ஒருங்கிணைப்பு பகுப்பாய்வு':'Parent-Student Alignment Analysis'}&lt;/h3&gt;
      ${data.parent.name?`&lt;p style=&quot;margin-bottom:8px&quot;&gt;${lang==='ta'?'பெற்றோர்':'Parent'}: &lt;strong&gt;${data.parent.name}&lt;/strong&gt;&lt;/p&gt;`:''}

        &lt;div style=&quot;display:inline-block;padding:10px 24px;border-radius:10px;background:${alignColor}15;border:1px solid ${alignColor}30&quot;&gt;
          &lt;span style=&quot;font-size:24px;font-weight:800;color:${alignColor}&quot;&gt;${alignmentPct}%&lt;/span&gt;

        &lt;/div&gt;
      &lt;/div&gt;

      ${studentOnly.length?`&lt;p style=&quot;margin:4px 0&quot;&gt;&lt;span style=&quot;color:var(--accent2);font-weight:600&quot;&gt;🎓 ${lang==='ta'?'மாணவர் மட்டும் விரும்பும்':'Student prefers'}:&lt;/span&gt; ${studentOnly.map(bk=&gt;brsL[branchKeys.indexOf(bk)]).join(', ')}&lt;/p&gt;`:''}
      ${parentOnly.length?`&lt;p style=&quot;margin:4px 0&quot;&gt;&lt;span style=&quot;color:var(--accent);font-weight:600&quot;&gt;👨‍👩‍👧 ${lang==='ta'?'பெற்றோர் மட்டும் விரும்பும்':'Parent prefers'}:&lt;/span&gt; ${parentOnly.map(bk=&gt;brsL[branchKeys.indexOf(bk)]).join(', ')}&lt;/p&gt;`:''}
      ${data.parent.expectation?`&lt;p style=&quot;margin-top:8px&quot;&gt;&lt;strong&gt;${lang==='ta'?'பெற்றோர் எதிர்பார்ப்பு':'Parent expectation'}:&lt;/strong&gt; ${data.parent.expectation}&lt;/p&gt;`:''}
      ${data.parent.concerns?`&lt;p style=&quot;margin-top:4px&quot;&gt;&lt;strong&gt;${lang==='ta'?'கவலைகள்':'Concerns'}:&lt;/strong&gt; ${data.parent.concerns}&lt;/p&gt;`:''}

        &lt;strong&gt;💡 ${lang==='ta'?'ஆலோசனை':'Advice'}:&lt;/strong&gt;
        ${alignmentPct&gt;=60
          ?lang==='ta'?'பெற்றோரும் மாணவரும் ஒரே திசையில் உள்ளனர். இது சிறப்பான முடிவெடுப்புக்கு உதவும். ஒருங்கிணைந்த பிரிவுகளில் கல்லூரிகளை ஆராயத் தொடங்குங்கள்.'
          :'Parent and student are well-aligned! Start exploring colleges for the agreed branches. This consensus will make the decision smoother.'
          :alignmentPct&gt;=30
          ?lang==='ta'?'சில பிரிவுகளில் ஒத்துப்போகிறது. வேறுபடும் தேர்வுகள் பற்றி திறந்த உரையாடல் நடத்துங்கள். மாணவரின் ஆர்வத்தையும் பெற்றோரின் கவலைகளையும் சமநிலைப்படுத்துங்கள்.'
          :'Some overlap exists. Have an open discussion about the different choices. Balance the student\'s genuine interest with practical family considerations.'
          :lang==='ta'?'பெற்றோருக்கும் மாணவருக்கும் இடையே குறிப்பிடத்தக்க வேறுபாடு உள்ளது. ஒரு தொழில்முறை ஆலோசகருடன் சேர்ந்து உரையாடல் நடத்துவது மிகவும் பயனுள்ளதாக இருக்கும்.'

        }

    &lt;div class=&quot;rpt-section&quot;&gt;&lt;h3&gt;🏫 ${lang==='ta'?'பரிந்துரைக்கப்பட்ட JoSAA கல்லூரிகள்':'Recommended JoSAA Colleges (IITs / NITs / IIITs)'}&lt;/h3&gt;

          &lt;h4 style=&quot;font-size:14px;color:var(--accent2);margin-bottom:8px&quot;&gt;🏗️ ${brsL[bi]||bk}&lt;/h4&gt;
          &lt;div style=&quot;overflow-x:auto&quot;&gt;&lt;table style=&quot;width:100%;border-collapse:collapse;font-size:12px&quot;&gt;
            &lt;tr style=&quot;background:var(--surface)&quot;&gt;
              &lt;th style=&quot;padding:8px 10px;text-align:left;border:1px solid var(--border);font-weight:600&quot;&gt;${lang==='ta'?'கல்லூரி':'College'}&lt;/th&gt;
              &lt;th style=&quot;padding:8px 10px;text-align:left;border:1px solid var(--border);font-weight:600&quot;&gt;${lang==='ta'?'இருப்பிடம்':'Location'}&lt;/th&gt;
              &lt;th style=&quot;padding:8px 10px;text-align:center;border:1px solid var(--border);font-weight:600&quot;&gt;NIRF&lt;/th&gt;
              &lt;th style=&quot;padding:8px 10px;text-align:center;border:1px solid var(--border);font-weight:600&quot;&gt;${lang==='ta'?'தரவரிசை கட்ஆஃப்':'Rank Cutoff'}&lt;/th&gt;
              &lt;th style=&quot;padding:8px 10px;text-align:center;border:1px solid var(--border);font-weight:600&quot;&gt;${lang==='ta'?'கட்டணம்':'Fees'}&lt;/th&gt;
            &lt;/tr&gt;
            ${colleges.map(col=&gt;`&lt;tr&gt;

              &lt;td style=&quot;padding:7px 10px;border:1px solid var(--border)&quot;&gt;${col.loc}&lt;/td&gt;
              &lt;td style=&quot;padding:7px 10px;border:1px solid var(--border);text-align:center&quot;&gt;${col.nirf}&lt;/td&gt;
              &lt;td style=&quot;padding:7px 10px;border:1px solid var(--border);text-align:center;color:var(--accent);font-weight:600&quot;&gt;${col.cutoff}&lt;/td&gt;
              &lt;td style=&quot;padding:7px 10px;border:1px solid var(--border);text-align:center&quot;&gt;${col.fee}&lt;/td&gt;
            &lt;/tr&gt;`).join('')}
          &lt;/table&gt;&lt;/div&gt;
        &lt;/div&gt;`}).join('')}
      &lt;p style=&quot;font-size:11px;color:var(--muted);margin-top:8px&quot;&gt;⚠️ ${lang==='ta'?'தரவரிசை கட்ஆஃப்கள் தோராயமானவை, கடந்த ஆண்டு போக்குகளின் அடிப்படையில். உண்மையான 2026 தரவரிசைகள் மாறுபடலாம். பிரிவு வாரியாக கட்ஆஃப்கள் வேறுபடும்.':'Rank cutoffs are approximate based on previous year General category closing ranks. Actual 2026 ranks may vary. Category-wise cutoffs differ significantly.'}&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;rpt-section&quot;&gt;&lt;h3&gt;✅ ${t('rptConclusion')}&lt;/h3&gt;
      &lt;ul&gt;
        &lt;li&gt;${lang==='ta'?'#1 பரிந்துரை':'#1 Recommendation'}: &lt;strong&gt;${brsL[branchKeys.indexOf(top5[0][0])]}&lt;/strong&gt; (${top5[0][1].total}/100)&lt;/li&gt;
        &lt;li&gt;${lang==='ta'?'JoSAA 2026 கலந்தாய்வுக்கு முன் ஆராயுங்கள்':'Explore these branches before JoSAA 2026 counselling'}&lt;/li&gt;
        &lt;li&gt;${lang==='ta'?'குறைவான திறன்களை மேம்படுத்துங்கள்':'Improve weaker skill areas'}&lt;/li&gt;
        &lt;li&gt;${lang==='ta'?'தொழில்முறை ஆலோசகரிடம் பேசுங்கள்':'Consult a professional career counsellor'}&lt;/li&gt;
      &lt;/ul&gt;

function downloadPdf(){

    pagebreak:{mode:['avoid-all','css','legacy']}
  }).from(el).toPdf().get('pdf').then(function(pdf){
    const totalPages=pdf.internal.getNumberOfPages();
    const pageW=pdf.internal.pageSize.getWidth();

    for(let i=1;i&lt;=totalPages;i++){
      pdf.setPage(i);

      pdf.setLineWidth(0.4);
      pdf.line(12,pageH-14,pageW-12,pageH-14);
      // Footer text
      pdf.setFontSize(7);
      pdf.setTextColor(100,116,139);
      pdf.text('www.eduaakashaa.in  |  For Expert Guidance: info@eduaakashaa.com  |  India: +91-9150426094  |  UAE: +971-505168081',pageW/2,pageH-10,{align:'center'});
      // Page number
      pdf.setFontSize(7);
      pdf.setTextColor(150,160,175);
      pdf.text('Page '+i+' of '+totalPages,pageW/2,pageH-7,{align:'center'});
    }
  }).save().then(()=&gt;el.classList.remove('pdf-mode'));
}
