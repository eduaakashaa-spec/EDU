&lt;style&gt;
:root {
  --primary: #2454A4; --accent: #F47B20; --dark: #1a1a2e; --green: #27ae60;
  --red: #e74c3c; --gray: #6b7280; --yellow: #f59e0b; --card: #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif; background:linear-gradient(180deg,#f8f9fc,#eef1f8); min-height:100vh; color:var(--dark); }
.header { background:#fff; border-bottom:1px solid #e5e7eb; padding:10px 18px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10; gap:12px; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:40px; height:40px; background:linear-gradient(135deg,var(--primary),var(--accent)); border-radius:10px; display:flex; align-items:center; justify-content:center; }
.logo-text { font-family:'Playfair Display',serif; font-weight:800; font-size:18px; color:var(--dark); }
.logo-sub { font-size:8px; color:var(--gray); letter-spacing:2px; text-transform:uppercase; }
.header a { font-size:10px; color:var(--primary); text-decoration:none; font-weight:600; white-space:nowrap; }
.progress-bar { width:100%; max-width:420px; }
.progress-bar .info { display:flex; justify-content:space-between; font-size:10px; color:var(--gray); margin-bottom:4px; }
.progress-track { height:5px; background:#e5e7eb; border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--accent)); border-radius:3px; transition:width .4s; }
.container { padding:22px 14px; max-width:920px; margin:0 auto; }
.step { display:none; }
.step.active { display:block; }
 
/* Buttons */
.btn { padding:11px 24px; border-radius:10px; border:none; cursor:pointer; font-weight:700; font-size:13px; transition:all .2s; }
.btn:disabled { opacity:.4; cursor:not-allowed; }
.btn-primary { background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff; box-shadow:0 4px 12px rgba(36,84,164,.25); }
.btn-secondary { background:#fff; color:var(--primary); box-shadow:0 2px 6px rgba(0,0,0,.07); }
.btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }
 
/* Typography */
h2.section-title { font-family:'Playfair Display',serif; font-size:22px; margin-bottom:6px; color:var(--dark); }
.section-desc { color:var(--gray); font-size:12px; margin-bottom:16px; }
 
/* Cards */
.card { background:#fff; border-radius:14px; padding:22px; border:1px solid #e5e7eb; margin-bottom:16px; }
.card-title { font-size:16px; font-weight:700; margin-bottom:12px; color:var(--dark); display:flex; align-items:center; gap:8px; }
 
/* Forms */
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:11px; font-weight:600; color:var(--dark); margin-bottom:3px; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:10px 12px; border-radius:8px; border:1.5px solid #e5e7eb; font-size:13.5px; outline:none; font-family:inherit; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--primary); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
 
/* Question Cards */
.qcard { background:#fff; border-radius:12px; padding:18px 22px; box-shadow:0 1px 8px rgba(0,0,0,.04); border:1px solid #e5e7eb; margin-bottom:14px; }
.qcard-header { display:flex; gap:8px; margin-bottom:10px; align-items:flex-start; }
.qcard-num { background:var(--primary); color:#fff; border-radius:6px; padding:2px 8px; font-size:10px; font-weight:700; flex-shrink:0; }
.qcard-text { font-size:13.5px; font-weight:600; color:var(--dark); line-height:1.45; }
.qcard-opts { display:grid; gap:6px; }
.qcard-opt { padding:9px 12px; border-radius:8px; border:1.5px solid #e5e7eb; background:#fff; text-align:left; cursor:pointer; font-size:12.5px; color:var(--dark); font-weight:400; transition:all .15s; font-family:inherit; }
.qcard-opt:hover { border-color:#d1d5db; }
.qcard-opt.selected { border:2px solid var(--accent); background:rgba(244,123,32,.06); font-weight:600; }
 
/* Stream preference cards */
.pref-card { padding:14px 18px; border-radius:12px; border:2px solid #e5e7eb; cursor:pointer; text-align:left; transition:all .2s; background:#fff; margin-bottom:10px; }
.pref-card:hover { border-color:#d1d5db; }
.pref-card.selected { border-color:var(--accent); background:rgba(244,123,32,.04); }
.pref-card .pref-row { display:flex; align-items:center; gap:10px; }
.pref-card .pref-emoji { font-size:24px; }
.pref-card .pref-title { font-weight:700; font-size:14px; color:var(--dark); }
.pref-card .pref-desc { font-size:11px; color:var(--gray); margin-top:2px; }
 
/* Confidence */
.conf-group { background:#fff; border-radius:12px; padding:16px 20px; border:1px solid #e5e7eb; margin-bottom:14px; }
.conf-group h3 { font-size:14px; font-weight:700; color:var(--primary); margin-bottom:12px; }
.conf-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.conf-label { width:130px; font-size:12px; font-weight:600; color:var(--dark); flex-shrink:0; }
.conf-btns { display:flex; gap:4px; flex:1; }
.conf-btn { flex:1; padding:6px 2px; border-radius:6px; font-size:9.5px; font-weight:400; border:1.5px solid #e5e7eb; background:#fff; cursor:pointer; color:var(--gray); transition:all .15s; font-family:inherit; }
.conf-btn.selected { border:2px solid var(--accent); background:rgba(244,123,32,.1); color:var(--accent); font-weight:700; }
 
/* Parent stream btns */
.par-stream-btns { display:flex; gap:6px; flex-wrap:wrap; }
.par-stream-btn { flex:1 1 auto; padding:8px 4px; border-radius:8px; border:1.5px solid #e5e7eb; background:#fff; cursor:pointer; font-size:12px; font-weight:400; font-family:inherit; }
.par-stream-btn.selected { border:2px solid var(--accent); background:rgba(244,123,32,.1); font-weight:700; }
 
/* Banner */
.banner { padding:12px 16px; border-radius:10px; display:flex; align-items:center; gap:8px; margin-bottom:16px; font-size:12.5px; font-weight:600; }
.banner-saving { background:#eff6ff; border:1px solid #93c5fd; color:var(--primary); }
.banner-success { background:#f0fdf4; border:1px solid #86efac; color:var(--green); }
.banner-error { background:#fef2f2; border:1px solid #fca5a5; color:var(--red); }
 
/* Result specific */
.rec-box { background:linear-gradient(135deg,var(--primary),var(--accent)); border-radius:16px; padding:24px; color:#fff; text-align:center; margin-bottom:16px; box-shadow:0 8px 24px rgba(36,84,164,.3); }
.rec-box .rec-label { font-size:11px; text-transform:uppercase; letter-spacing:3px; opacity:.8; }
.rec-box .rec-stream { font-size:34px; font-weight:800; font-family:'Playfair Display',serif; margin:4px 0; }
.rec-box .rec-sub { font-size:12px; opacity:.9; }
 
.score-bar { margin-bottom:10px; }
.score-bar .score-info { display:flex; justify-content:space-between; font-size:12px; font-weight:600; margin-bottom:2px; }
.score-track { height:10px; background:#f3f4f6; border-radius:5px; overflow:hidden; }
.score-fill { height:100%; border-radius:5px; transition:width 1s; }
 
.risk-flag { padding:10px 14px; border-radius:8px; margin-bottom:8px; }
.risk-warn { background:#fef3c7; border-left:4px solid var(--yellow); }
.risk-crit { background:#fef2f2; border-left:4px solid var(--red); }
.risk-title { font-weight:700; font-size:13px; }
.risk-detail { font-size:12px; color:var(--dark); margin-top:2px; }
 
.gap-box { padding:12px 16px; border-radius:10px; border-left:4px solid; margin-bottom:8px; }
.gap-ok { background:#f0fdf4; border-color:var(--green); }
.gap-warning { background:#fef3c7; border-color:var(--yellow); }
 
.three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:12px; }
.col-box { text-align:center; padding:14px; border-radius:10px; }
.col-box .col-label { font-size:10px; color:var(--gray); margin-bottom:4px; }
.col-box .col-value { font-size:18px; font-weight:800; }
 
.action-box { padding:14px 18px; background:#f0f9ff; border-radius:10px; border-left:4px solid var(--primary); font-size:12px; line-height:1.7; margin-top:14px; }
.note-box { background:#fffbeb; border:1.5px solid rgba(245,158,11,.25); padding:18px; border-radius:12px; font-size:12.5px; line-height:1.7; }
.note-item { padding:10px 14px; background:#fff; border-radius:8px; margin-bottom:8px; font-size:12px; }
 
.ai-tag { padding:2px 8px; border-radius:8px; font-size:9.5px; font-weight:700; white-space:nowrap; display:inline-block; }
.ai-low { background:#f0fdf4; color:#16a34a; }
.ai-med { background:#fffbeb; color:#d97706; }
.ai-high { background:#fef2f2; color:#dc2626; }
 
.career-table { width:100%; border-collapse:collapse; font-size:11.5px; }
.career-table th { background:var(--primary); color:#fff; padding:8px; text-align:left; }
.career-table td { padding:8px; border-bottom:1px solid #f3f4f6; vertical-align:top; }
.career-table tr:nth-child(even) { background:#fafbfc; }
 
.skill-table { width:100%; border-collapse:collapse; font-size:12px; }
.skill-table th { background:var(--primary); color:#fff; padding:8px 10px; text-align:left; }
.skill-table td { padding:8px 10px; border-bottom:1px solid #f3f4f6; }
 
.heatmap { width:100%; border-collapse:collapse; font-size:12px; }
.heatmap th { padding:8px 10px; background:var(--primary); color:#fff; text-align:center; }
.heatmap th:first-child { text-align:left; }
.heatmap td { padding:10px 12px; border:1px solid #e5e7eb; text-align:center; font-weight:700; }
.heatmap td:first-child { text-align:left; font-weight:700; }
 
.radar-wrap { display:flex; justify-content:center; margin:8px 0; }
 
.tag { padding:6px 12px; background:rgba(36,84,164,.08); border:1px solid rgba(36,84,164,.2); border-radius:6px; font-size:11.5px; font-weight:600; color:var(--primary); display:inline-block; margin:3px; }
 
.footer-box { text-align:center; padding:14px; background:rgba(36,84,164,.05); border-radius:12px; border:1px solid rgba(36,84,164,.15); }
.footer-box a { font-size:16px; font-weight:700; color:var(--primary); text-decoration:none; }
 
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
@media(max-width:700px) { .two-col,.three-col,.form-row { grid-template-columns:1fr; } }
 
.counter { font-size:11px; color:var(--gray); }
 
/* Welcome */
.welcome-icon { width:80px; height:80px; margin:0 auto 16px; background:linear-gradient(135deg,var(--primary),var(--accent)); border-radius:20px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(36,84,164,.3); }
.welcome-title { font-family:'Playfair Display',serif; font-size:30px; font-weight:800; color:var(--dark); margin-bottom:4px; }
.welcome-sub { font-size:11px; color:var(--accent); font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:18px; }
.welcome-desc { font-size:14px; color:var(--gray); line-height:1.7; margin-bottom:24px; }
.feature-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
.feature-box { background:#fff; border-radius:10px; padding:14px; border:1px solid #e5e7eb; text-align:center; }
.feature-box .emoji { font-size:22px; margin-bottom:3px; }
.feature-box .title { font-weight:700; font-size:12px; color:var(--dark); }
.feature-box .sub { font-size:10px; color:var(--gray); }
 
#printContent { display:none; }

function goStep(n) {
  document.querySelectorAll('.step').forEach(s =&gt; s.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
  currentStep = n;
  const pw = document.getElementById('progressWrap');
  if (n &gt; 0 &amp;&amp; n &lt; 8) {
    pw.style.display = 'block';
    document.getElementById('progLabel').textContent = `Step ${n}/8`;
    const pct = Math.round(n/8*100);
    document.getElementById('progPct').textContent = pct+'%';
    document.getElementById('progFill').style.width = pct+'%';
  } else { pw.style.display = 'none'; }
  window.scrollTo(0,0);
}

function renderQuestions(container, qs, ansObj, countEl, nextBtn) {
  const el = document.getElementById(container);
  el.innerHTML = '';
  qs.forEach((q, idx) =&gt; {
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `&lt;div class=&quot;qcard-header&quot;&gt;&lt;span class=&quot;qcard-num&quot;&gt;Q${idx+1}&lt;/span&gt;&lt;span class=&quot;qcard-text&quot;&gt;${q.q}&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;qcard-opts&quot; id=&quot;opts_${q.id}&quot;&gt;&lt;/div&gt;`;
    el.appendChild(card);
    const optsDiv = card.querySelector('.qcard-opts');
    q.opts.forEach((o, i) =&gt; {
      const btn = document.createElement('button');
      btn.className = 'qcard-opt' + (ansObj[q.id]===i?' selected':'');
      btn.textContent = o;
      btn.onclick = () =&gt; {
        ansObj[q.id] = i;
        optsDiv.querySelectorAll('.qcard-opt').forEach(b=&gt;b.classList.remove('selected'));
        btn.classList.add('selected');
        updateCount(qs, ansObj, countEl, nextBtn);
      };
      optsDiv.appendChild(btn);
    });
  });
  updateCount(qs, ansObj, countEl, nextBtn);
}
 
function updateCount(qs, ans, countEl, nextBtn) {
  const c = qs.filter(q=&gt;ans[q.id]!==undefined).length;
  document.getElementById(countEl).textContent = `${c}/${qs.length} answered`;
  document.getElementById(nextBtn).disabled = c &lt; qs.length;
}

// ════════════════════════════════════════
//  ANALYSIS
// ════════════════════════════════════════
function analyze() {
  let sc = {Science:0,Commerce:0,Humanities:0};
  psychometricQs.forEach(q =&gt; { const a=psyAns[q.id]; if(a!==undefined&amp;&amp;q.w[a]){sc.Science+=q.w[a][0];sc.Commerce+=q.w[a][1];sc.Humanities+=q.w[a][2];} });
  let aptScore=0; aptitudeQs.forEach(q=&gt;{if(aptAns[q.id]===q.correct)aptScore++;});
  sc.Science+=aptScore*1.5; sc.Commerce+=aptScore; sc.Humanities+=aptScore*0.5;
  Object.values(appAns).forEach(v=&gt;{if(v===0)sc.Science+=3;if(v===1)sc.Commerce+=3;if(v===2)sc.Humanities+=3;if(v===3)sc.Humanities+=2;});
  Object.entries(confData).forEach(([stream,subjects])=&gt;{const vals=Object.values(subjects);if(vals.length){const avg=vals.reduce((a,b)=&gt;a+b,0)/vals.length;if(sc[stream]!==undefined)sc[stream]+=avg*2;}});
  const tot=sc.Science+sc.Commerce+sc.Humanities||1;
  const pct={Science:Math.round(sc.Science/tot*100),Commerce:Math.round(sc.Commerce/tot*100),Humanities:Math.round(sc.Humanities/tot*100)};
  const sorted=Object.entries(sc).sort((a,b)=&gt;b[1]-a[1]);
  const recommended=sorted[0][0];
  const dims={Analytical:0,Creative:0,Social:0,Practical:0,Leadership:0,Research:0};
  psychometricQs.forEach(q=&gt;{const a=psyAns[q.id];if(a===0){dims.Analytical+=2;dims.Research+=1;}if(a===1){dims.Social+=2;dims.Creative+=1;}if(a===2){dims.Creative+=2;dims.Social+=1;}if(a===3){dims.Practical+=2;dims.Leadership+=1;}});
  const maxD=Math.max(...Object.values(dims))||1;
  const radar={}; Object.entries(dims).forEach(([k,v])=&gt;{radar[k]=Math.round(v/maxD*100);});
  const risks=[];
  if(studentPref&amp;&amp;studentPref!==&quot;Not Sure&quot;&amp;&amp;studentPref!==recommended) risks.push({flag:&quot;⚠️ Stream Preference Mismatch&quot;,detail:`You prefer ${studentPref} but assessment suggests ${recommended}. Gap: ${pct[recommended]-(pct[studentPref]||0)}%`,severity:&quot;warning&quot;});
  if(aptScore&lt;7) risks.push({flag:&quot;📉 Aptitude Below Average&quot;,detail:`Scored ${aptScore}/15. Targeted practice recommended.`,severity:&quot;warning&quot;});
  if(aptScore&lt;4) risks.push({flag:&quot;🚨 Critical Aptitude Gap&quot;,detail:`Scored ${aptScore}/15. Intensive coaching needed.`,severity:&quot;critical&quot;});
  const lowConf=[];
  if(confData[recommended]) Object.entries(confData[recommended]).forEach(([sub,lv])=&gt;{if(lv&lt;=1)lowConf.push(sub);});
  if(lowConf.length) risks.push({flag:&quot;📚 Low Subject Confidence&quot;,detail:`Low confidence in: ${lowConf.join(&quot;, &quot;)}. Bridge courses recommended.`,severity:&quot;warning&quot;});
 
  const gap = streamSkills[recommended].map(sk=&gt;({skill:sk,current:Math.floor(Math.random()*40)+30,required:Math.floor(Math.random()*20)+75}));
 
  return { scores:sc, percentages:pct, recommended, aptitudeScore:aptScore, aptitudeTotal:15, radarData:radar, risks, sorted, skillGap:gap };
}
 
// ════════════════════════════════════════
//  SVG RADAR CHART
// ════════════════════════════════════════
function radarSVG(data, size) {
  size = size || 260;
  const keys=Object.keys(data), n=keys.length, cx=size/2, cy=size/2, r=size*.38;
  const step=2*Math.PI/n;
  const pt=(i,val)=&gt;({x:cx+r*(val/100)*Math.cos(i*step-Math.PI/2),y:cy+r*(val/100)*Math.sin(i*step-Math.PI/2)});
  let svg=`&lt;svg width=&quot;${size}&quot; height=&quot;${size}&quot; viewBox=&quot;0 0 ${size} ${size}&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;`;
  [25,50,75,100].forEach(lv=&gt;{const pts=keys.map((_,i)=&gt;pt(i,lv)).map(p=&gt;`${p.x},${p.y}`).join(' ');svg+=`&lt;polygon points=&quot;${pts}&quot; fill=&quot;none&quot; stroke=&quot;#e5e7eb&quot; stroke-width=&quot;${lv===100?1.5:.5}&quot;/&gt;`;});
  keys.forEach((_,i)=&gt;{const p=pt(i,100);svg+=`&lt;line x1=&quot;${cx}&quot; y1=&quot;${cy}&quot; x2=&quot;${p.x}&quot; y2=&quot;${p.y}&quot; stroke=&quot;#e5e7eb&quot; stroke-width=&quot;.5&quot;/&gt;`;});
  const polyPts=keys.map((_,i)=&gt;{const p=pt(i,data[keys[i]]);return`${p.x},${p.y}`;}).join(' ');
  svg+=`&lt;polygon points=&quot;${polyPts}&quot; fill=&quot;rgba(36,84,164,.2)&quot; stroke=&quot;#2454A4&quot; stroke-width=&quot;2&quot;/&gt;`;
  keys.forEach((k,i)=&gt;{const p=pt(i,data[k]),lp=pt(i,118);
    svg+=`&lt;circle cx=&quot;${p.x}&quot; cy=&quot;${p.y}&quot; r=&quot;4&quot; fill=&quot;#2454A4&quot;/&gt;`;
    svg+=`&lt;text x=&quot;${lp.x}&quot; y=&quot;${lp.y}&quot; text-anchor=&quot;middle&quot; dominant-baseline=&quot;middle&quot; font-size=&quot;10&quot; font-weight=&quot;600&quot; fill=&quot;#1a1a2e&quot;&gt;${k}&lt;/text&gt;`;
    svg+=`&lt;text x=&quot;${lp.x}&quot; y=&quot;${lp.y+12}&quot; text-anchor=&quot;middle&quot; font-size=&quot;9&quot; fill=&quot;#6b7280&quot;&gt;${data[k]}%&lt;/text&gt;`;
  });
  svg+=`&lt;/svg&gt;`;
  return svg;
}

  html+=`&lt;div class=&quot;note-item&quot;&gt;&lt;strong&gt;${isTa_?'3. தொழில்களில் கவனம் செலுத்துங்கள்:':'3. Focus on careers, not just streams:'}&lt;/strong&gt; ${isTa_?'முதல் 10 தொழில்களை ஒன்றாக பாருங்கள். 10 விருப்பங்களைக் காட்டுவது கண்ணைத் திறக்கும்.':'Review Top 10 careers together. Showing 10 options can be eye-opening.'}&lt;/div&gt;`;
  html+=`&lt;div class=&quot;note-item&quot;&gt;&lt;strong&gt;${isTa_?'4. உணர்வுகளை ஏற்றுக்கொள்ளுங்கள்:':'4. Acknowledge feelings:'}&lt;/strong&gt; ${isTa_?'&quot;நான் உங்களைப் புரிந்துகொள்ள விரும்புகிறேன், உங்களை என்ன உற்சாகப்படுத்துகிறது என்று சொல்லுங்கள்.&quot;':'If there\'s a mismatch, say &quot;I hear you, help me understand what excites you.&quot;'}&lt;/div&gt;`;
  html+=`&lt;div class=&quot;note-item&quot;&gt;&lt;strong&gt;${isTa_?'5. அடுத்த படிகளை ஒன்றாக திட்டமிடுங்கள்:':'5. Plan next steps together:'}&lt;/strong&gt; ${isTa_?'செயல் திட்டத்தைப் பயன்படுத்துங்கள். சிறிய இலக்குகளை அமைக்கவும். 3-6 மாதங்களுக்குப் பிறகு மறுபரிசீலனை செய்யுங்கள்.':'Use the Action Plan. Set small goals. Revisit after 3-6 months.'}&lt;/div&gt;`;
  if(!parentMatch) html+=`&lt;p style=&quot;margin-top:10px;padding:10px 14px;background:#fef2f2;border-radius:8px;border-left:3px solid var(--red);font-size:12px&quot;&gt;&lt;strong&gt;⚠️&lt;/strong&gt; ${isTa_?`உங்கள் விருப்பம் (${par.preferredStream}) மதிப்பீட்டிலிருந்து (${r.recommended}) வேறுபடுகிறது. உள்ளார்ந்த ஊக்கம் திறனுடன் ஒத்துப்போகும்போது மாணவர்கள் சிறப்பாக செயல்படுவார்கள்.`:`Your preference (${par.preferredStream}) differs from assessment (${r.recommended}). Students perform best when intrinsic motivation aligns with ability.`}&lt;/p&gt;`;

      &lt;/a&gt;

function buildPrintContent(r,gap,stu,par,careers,subjects,board,parentMatch,prefGap,topTraits,heatData,heatDims) {
  let h = `&lt;div style=&quot;text-align:center;border-bottom:3px solid #2454A4;padding-bottom:14px;margin-bottom:18px&quot;&gt;&lt;h1 style=&quot;color:#2454A4;font-size:24px&quot;&gt;EduAakashaa&lt;/h1&gt;&lt;p style=&quot;color:#F47B20;font-size:11px;letter-spacing:3px&quot;&gt;PSYCHOMETRIC CAREER STREAM ASSESSMENT REPORT&lt;/p&gt;&lt;p style=&quot;font-size:10px;color:#888;margin-top:3px&quot;&gt;www.eduaakashaa.in | contact@eduaakashaa.in&lt;/p&gt;&lt;/div&gt;`;
  h+=`&lt;h2&gt;Student Details&lt;/h2&gt;&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;b&gt;Name&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${stu.name}&lt;/td&gt;&lt;td&gt;&lt;b&gt;Age&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${stu.age}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;b&gt;School&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${stu.school}&lt;/td&gt;&lt;td&gt;&lt;b&gt;City&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${stu.city}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;b&gt;Board&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${stu.board}&lt;/td&gt;&lt;td&gt;&lt;b&gt;Class&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${stu.currentClass}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;b&gt;Student Pref&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${studentPref}&lt;/td&gt;&lt;td&gt;&lt;b&gt;Parent Pref&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${par.preferredStream||'N/A'}&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;`;
  h+=`&lt;div style=&quot;background:#2454A4;color:#fff;text-align:center;padding:18px;border-radius:8px;margin:16px 0&quot;&gt;&lt;div style=&quot;font-size:10px;letter-spacing:3px&quot;&gt;RECOMMENDED STREAM&lt;/div&gt;&lt;div style=&quot;font-size:26px;font-weight:800&quot;&gt;${r.recommended}&lt;/div&gt;&lt;/div&gt;`;
  if(r.risks.length){h+=`&lt;h2&gt;Risk Flags&lt;/h2&gt;`;r.risks.forEach(rk=&gt;{h+=`&lt;div class=&quot;${rk.severity==='critical'?'risk-crit':'risk-warn'}&quot;&gt;&lt;b&gt;${rk.flag}&lt;/b&gt; — ${rk.detail}&lt;/div&gt;`;});}
  h+=`&lt;h2&gt;Scores&lt;/h2&gt;&lt;table&gt;&lt;tr&gt;&lt;th&gt;Stream&lt;/th&gt;&lt;th&gt;Score&lt;/th&gt;&lt;th&gt;Student&lt;/th&gt;&lt;th&gt;Parent&lt;/th&gt;&lt;th&gt;Status&lt;/th&gt;&lt;/tr&gt;`;
  [&quot;Science&quot;,&quot;Commerce&quot;,&quot;Humanities&quot;].forEach(s=&gt;{h+=`&lt;tr${s===r.recommended?' style=&quot;background:#f0f9ff&quot;':''}&gt;&lt;td&gt;&lt;b&gt;${s}&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${r.percentages[s]}%&lt;/td&gt;&lt;td&gt;${s===studentPref?'✓':''}&lt;/td&gt;&lt;td&gt;${s===par.preferredStream?'✓':''}&lt;/td&gt;&lt;td&gt;${s===r.recommended?'✅ REC':'—'}&lt;/td&gt;&lt;/tr&gt;`;});
  h+=`&lt;/table&gt;&lt;p&gt;&lt;b&gt;Aptitude:&lt;/b&gt; ${r.aptitudeScore}/${r.aptitudeTotal}&lt;/p&gt;`;
  h+=`&lt;h2&gt;Profile Strength&lt;/h2&gt;&lt;table&gt;&lt;tr&gt;&lt;th&gt;Dimension&lt;/th&gt;&lt;th&gt;Score&lt;/th&gt;&lt;/tr&gt;`;
  Object.entries(r.radarData).sort((a,b)=&gt;b[1]-a[1]).forEach(([k,v])=&gt;{h+=`&lt;tr&gt;&lt;td&gt;${k}&lt;/td&gt;&lt;td&gt;${v}%&lt;/td&gt;&lt;/tr&gt;`;});
  h+=`&lt;/table&gt;`;
  h+=`&lt;h2&gt;Why ${r.recommended}?&lt;/h2&gt;&lt;p&gt;Your profile shows strong ${topTraits.join(' and ')} traits. Combined with aptitude and application responses, ${r.recommended} is the strongest fit.${prefGap?` Your preference for ${studentPref} is noted — explore ${r.recommended} careers with an open mind.`:''}&lt;/p&gt;`;
  h+=`&lt;div class=&quot;pagebreak&quot;&gt;&lt;/div&gt;&lt;h2&gt;Top 10 Careers — ${r.recommended}&lt;/h2&gt;&lt;table&gt;&lt;tr&gt;&lt;th&gt;#&lt;/th&gt;&lt;th&gt;Career&lt;/th&gt;&lt;th&gt;Courses&lt;/th&gt;&lt;th&gt;Jobs&lt;/th&gt;&lt;th&gt;AI&lt;/th&gt;&lt;th&gt;Salary&lt;/th&gt;&lt;/tr&gt;`;
  careers.forEach((c,i)=&gt;{h+=`&lt;tr&gt;&lt;td&gt;${i+1}&lt;/td&gt;&lt;td&gt;&lt;b&gt;${c.title}&lt;/b&gt;&lt;br&gt;&lt;span style=&quot;font-size:9px&quot;&gt;${c.desc}&lt;/span&gt;&lt;/td&gt;&lt;td style=&quot;font-size:10px&quot;&gt;${c.courses.join(', ')}&lt;/td&gt;&lt;td style=&quot;font-size:10px&quot;&gt;${c.jobs.join(', ')}&lt;/td&gt;&lt;td style=&quot;text-align:center&quot;&gt;&lt;b style=&quot;color:${c.ai==='High'?'#dc2626':c.ai==='Medium'?'#d97706':'#16a34a'}&quot;&gt;${c.ai}&lt;/b&gt;&lt;/td&gt;&lt;td style=&quot;font-size:10px&quot;&gt;${c.sal}&lt;/td&gt;&lt;/tr&gt;`;});
  h+=`&lt;/table&gt;`;
  h+=`&lt;h2&gt;Skill Gap &amp; Action Plan&lt;/h2&gt;&lt;table&gt;&lt;tr&gt;&lt;th&gt;Skill&lt;/th&gt;&lt;th&gt;Current&lt;/th&gt;&lt;th&gt;Required&lt;/th&gt;&lt;th&gt;Gap&lt;/th&gt;&lt;th&gt;Action&lt;/th&gt;&lt;/tr&gt;`;
  gap.forEach(g=&gt;{const gv=g.required-g.current;h+=`&lt;tr&gt;&lt;td&gt;${g.skill}&lt;/td&gt;&lt;td&gt;${g.current}%&lt;/td&gt;&lt;td&gt;${g.required}%&lt;/td&gt;&lt;td style=&quot;color:#dc2626;font-weight:700&quot;&gt;${gv}%&lt;/td&gt;&lt;td style=&quot;font-size:10px&quot;&gt;${gv&gt;40?'Intensive coaching':'Regular practice'}&lt;/td&gt;&lt;/tr&gt;`;});
  h+=`&lt;/table&gt;&lt;h3&gt;Timeline&lt;/h3&gt;&lt;p&gt;&lt;b&gt;0-3 mo:&lt;/b&gt; Bridge gaps. Explore careers.&lt;br&gt;&lt;b&gt;3-6 mo:&lt;/b&gt; Build routines. Join communities.&lt;br&gt;&lt;b&gt;6-12 mo:&lt;/b&gt; Certifications. Career fairs.&lt;br&gt;&lt;b&gt;1-2 yr:&lt;/b&gt; Exam prep. Portfolio. Mentorship.&lt;/p&gt;`;
  h+=`&lt;h2&gt;Subjects (${board})&lt;/h2&gt;&lt;p&gt;${subjects.join(', ')}&lt;/p&gt;`;
  h+=`&lt;h2&gt;Parent Input&lt;/h2&gt;&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;b&gt;Parent&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${par.name}&lt;/td&gt;&lt;td&gt;&lt;b&gt;Contact&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${par.phone} | ${par.email}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;b&gt;Pref&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${par.preferredStream||'N/A'}&lt;/td&gt;&lt;td&gt;&lt;b&gt;Aligned&lt;/b&gt;&lt;/td&gt;&lt;td&gt;${parentMatch?'✅ Yes':'⚠️ No'}&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;`;
  h+=`&lt;h2&gt;Note to Parents&lt;/h2&gt;&lt;p&gt;This is a conversation starter. Discuss openly with ${stu.name}. Explore careers together. If mismatch exists, approach with curiosity. Consider counselling at www.eduaakashaa.in.&lt;/p&gt;`;
  // Breaking barriers in print
  if(prefGap){
    h+=`&lt;h2&gt;🔥 Breaking Barriers — Stepping Out of Comfort Zone&lt;/h2&gt;`;
    h+=`&lt;p&gt;Your preferred stream (${studentPref}) and assessment result (${r.recommended}) don't match. This is an opportunity for growth.&lt;/p&gt;`;
    h+=`&lt;p&gt;&lt;b&gt;Step 1 — Ask Yourself WHY:&lt;/b&gt; Is your preference based on genuine passion or external pressure?&lt;/p&gt;`;
    h+=`&lt;p&gt;&lt;b&gt;Step 2 — 30-Day Challenge:&lt;/b&gt; Explore one ${r.recommended}-related activity daily for 30 days.&lt;/p&gt;`;
    h+=`&lt;p&gt;&lt;b&gt;Step 3 — Find a Mentor:&lt;/b&gt; Connect with someone thriving in a ${r.recommended} career.&lt;/p&gt;`;
    h+=`&lt;p&gt;&lt;b&gt;Step 4 — Decision Deadline:&lt;/b&gt; Give yourself 3 months. Explore both paths, then decide with confidence.&lt;/p&gt;`;
    h+=`&lt;p&gt;&lt;b&gt;Step 5 — Commitment:&lt;/b&gt; &quot;I will genuinely explore ${r.recommended} for 90 days with an open mind.&quot;&lt;/p&gt;`;
  }
  // WhatsApp links in print
  const waRec = waLinks[r.recommended];
  h+=`&lt;h2&gt;📱 Join Our WhatsApp Communities&lt;/h2&gt;`;
  h+=`&lt;p&gt;&lt;b&gt;${waRec.name}&lt;/b&gt;&lt;br/&gt;${waRec.url}&lt;/p&gt;`;
  h+=`&lt;p&gt;&lt;b&gt;${waLinks.Emerging.name}&lt;/b&gt;&lt;br/&gt;${waLinks.Emerging.url}&lt;/p&gt;`;
  if(prefGap &amp;&amp; waLinks[studentPref]){h+=`&lt;p&gt;&lt;b&gt;${waLinks[studentPref].name}&lt;/b&gt; (Your preferred pathway)&lt;br/&gt;${waLinks[studentPref].url}&lt;/p&gt;`;}
  h+=`&lt;div class=&quot;footer&quot;&gt;&lt;b style=&quot;color:#2454A4&quot;&gt;EduAakashaa&lt;/b&gt; — www.eduaakashaa.in | contact@eduaakashaa.in&lt;br&gt;&lt;em&gt;Generated ${new Date().toLocaleDateString('en-IN')}. For personalized counselling, visit our website.&lt;/em&gt;&lt;/div&gt;`;
  document.getElementById('printContent').innerHTML = h;
}
 
function printReport() {
  const content = document.getElementById('printContent').innerHTML;
  const w = window.open('','_blank');
  w.document.write(`&lt;!DOCTYPE html&gt;&lt;html&gt;&lt;head&gt;&lt;title&gt;EduAakashaa Report&lt;/title&gt;&lt;style&gt;*{margin:0;padding:0;box-sizing:border-box}body{font-family:Georgia,serif;color:#1a1a2e;padding:32px;line-height:1.5;font-size:11px}table{width:100%;border-collapse:collapse;margin:8px 0}td,th{border:1px solid #ddd;padding:6px 8px;font-size:11px}th{background:#2454A4;color:#fff}h2{color:#2454A4;border-bottom:1px solid #ddd;padding-bottom:3px;margin:14px 0 8px;font-size:14px}h3{color:#F47B20;margin:10px 0 6px;font-size:12px}.risk-warn{background:#fef3c7;border-left:4px solid #f59e0b;padding:8px 12px;margin:4px 0;border-radius:4px}.risk-crit{background:#fef2f2;border-left:4px solid #dc2626;padding:8px 12px;margin:4px 0;border-radius:4px}.footer{text-align:center;margin-top:24px;padding-top:12px;border-top:3px solid #F47B20;font-size:10px;color:#888}@media print{.pagebreak{page-break-before:always}}&lt;/style&gt;&lt;/head&gt;&lt;body&gt;${content}&lt;/body&gt;&lt;/html&gt;`);
  w.document.close();

async function submitToGoogle() {
  if(APPS_SCRIPT_URL.includes('YOUR_APPS')){showBanner('error','Apps Script URL not configured. Deploy the script first.');return;}
  showBanner('saving','Saving to Google Sheets &amp; generating PDF on Drive...');
  const stu={name:document.getElementById('stuName').value,age:document.getElementById('stuAge').value,school:document.getElementById('stuSchool').value,city:document.getElementById('stuCity').value,board:document.getElementById('stuBoard').value,currentClass:document.getElementById('stuClass').value};
  const par={name:document.getElementById('parName').value,phone:document.getElementById('parPhone').value,email:document.getElementById('parEmail').value,preferredStream:parentPref,reason:document.getElementById('parReason').value,expectations:document.getElementById('parExpect').value};
  const board=stu.board==='ICSE'?'ICSE':stu.board==='State Board'?'State Board':'CBSE';
  const r=results;
  try{
    const resp=await fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'saveAssessment',studentInfo:stu,studentPreference:studentPref,personalityAns:psyAns,aptitudeAns:aptAns,applicationAns:appAns,confidenceData:confData,parentInfo:par,results:r,skillGap,reportLang,topCareers:topCareers[r.recommended],streamInfo:{subjects:(streamSubjects[r.recommended]||{})[board]||[],careers:topCareers[r.recommended].map(c=&gt;c.title)}})});
    const data=await resp.json();
    if(data.success){
      showBanner('success','✅ Saved to Sheets &amp; PDF uploaded to Drive!');
      if(data.pdfUrl){document.getElementById('pdfBtnArea').innerHTML=`&lt;div style=&quot;text-align:center;margin-bottom:16px&quot;&gt;&lt;button class=&quot;btn btn-primary&quot; onclick=&quot;window.open('${data.pdfUrl}','_blank')&quot;&gt;📄 Open PDF from Google Drive&lt;/button&gt;&lt;/div&gt;`;}
    } else { showBanner('error','Error: '+(data.error||'Unknown')); }
  }catch(e){showBanner('error','Network error: '+e.message);}
}
 
function showBanner(type,text) {
  const area = document.getElementById('bannerArea');
  if(!area) return;
  const cls = type==='saving'?'banner-saving':type==='success'?'banner-success':'banner-error';
  const icon = type==='saving'?'⏳':type==='success'?'✅':'❌';
  area.innerHTML = `&lt;div class=&quot;banner ${cls}&quot;&gt;&lt;span style=&quot;font-size:16px&quot;&gt;${icon}&lt;/span&gt;${text}&lt;/div&gt;`;
}

nt-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }\n.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }\n\n/* FOOTER */\nfooter { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot; h ACCA — global flexibility, modular study structure, and recognition in 180+ countries.'},\n    cfa:{n:'CFA',cls:'rb-c', ti:'CFA is your ideal match!', tx:'Your passion for investment and markets points to the CFA Charter — the gold standard for finance professionals worldwide.'},\n    ca:{n:'CA',cls:'rb-ca', ti:'CA is your ideal match!', tx:'Your preference for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}\n  }[w];\n  document.getElementById('qMain').style.display='none';\n  document.getElementById('qResult').style.display='block';\n  var b=document.getElementById('rBadge');\n  b.textContent=info.n; b.className='rbadge '+info.cls;\n  document.getElementById('rTitle').textContent=info.ti;\n  document.getElementById('rText').textContent=info.tx;\n}\n\nfunction resetQ(){\n  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;\n  document.getElementById('qResult').style.display='none';\n  document.getElementById('qMain').style.display='block';\n  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[0].q;\n  var html='';\n  for(var i=0;i&lt;Qs[0].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[0].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n&lt;/script&gt;&quot;],&quot;customHeadElements&quot;:[0,&quot;&lt;meta&gt;&lt;meta name=\&quot;viewport\&quot; content=\&quot;width=device-width, initial-scale=1.0\&quot;&gt;&lt;style&gt;\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nbody {\n  font-family: Georgia, 'Times New Roman', serif;\n  background: #F9F5EE;\n  color: #2B2B2B;\n  overflow-x: hidden;\n}\n\n/* HERO */\n.hero {\n  background: #1A1A2E;\n  padding: 100px 24px 80px;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n.hero-glow {\n  position: absolute;\n  top: 0; left: 0; right: var Qs = [

  { q:"What kind of work excites you most?",
    o:[{t:"📊 Auditing & financial reporting",s:{acca:2,ca:1}},{t:"📈 Stock analysis & portfolio management",s:{cfa:3}},{t:"🧾 Tax, compliance & advisory",s:{ca:2}},{t:"🔀 A mix of all finance areas",s:{acca:2}}]

  { q:"How can you dedicate time to studying?",
    o:[{t:"⏱️ Part-time alongside my job",s:{acca:2}},{t:"📚 Intense focused study windows",s:{cfa:2}},{t:"🎓 Full-time with practical training",s:{ca:2}},{t:"🔄 Flexible — whatever it takes",s:{acca:1,cfa:1,ca:1}}]
  },
  { q:"What matters most in a qualification?",
    o:[{t:"🌐 Global recognition / working abroad",s:{acca:3}},{t:"💰 Highest salary in investment finance",s:{cfa:3}},{t:"🏆 Prestigious local qualification",s:{ca:3}},{t:"⚡ Fastest route to a finance career",s:{acca:2}}]
  }
];

var cur=0, sc={acca:0,cfa:0,ca:0}, pend=null;

function pick(btn,idx){
  var all=document.querySelectorAll('.qopt');
  for(var i=0;i<all.length;i++) all[i].classList.remove('sel');
  btn.classList.add('sel');
  pend=Qs[cur].o[idx].s;
  document.getElementById('qNext').style.display='inline-block';
}

function nextQ(){
  if(!pend) return;
  for(var k in pend) sc[k]=(sc[k]||0)+pend[k];
  pend=null; cur++;
  if(cur>=Qs.length){ showRes(); return; }
  document.getElementById('qProg').textContent='Question '+(cur+1)+' of '+Qs.length;
  document.getElementById('qText').textContent=Qs[cur].q;
  var html='';
  for(var i=0;i<Qs[cur].o.length;i++) html+='<button class="qopt" onclick="pick(this,'+i+')">'+Qs[cur].o[i].t+'</button>';
  document.getElementById('qOpts').innerHTML=html;
  document.getElementById('qNext').style.display='none';
}

function showRes(){
  var keys=Object.keys(sc).sort(function(a,b){return sc[b]-sc[a];});
  var w=keys[0];
  var info={
    acca:{n:'ACCA',cls:'rb-a', ti:'ACCA is your ideal match!', tx:'Your goals align with ACCA — global flexibility, modular study structure, and recognition in 180+ countries.'},
    cfa:{n:'CFA',cls:'rb-c', ti:'CFA is your ideal match!', tx:'Your passion for investment and markets points to the CFA Charter — the gold standard for finance professionals worldwide.'},
    ca:{n:'CA',cls:'rb-ca', ti:'CA is your ideal match!', tx:'Your preference for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}
  }[w];
  document.getElementById('qMain').style.display='none';
  document.getElementById('qResult').style.display='block';
  var b=document.getElementById('rBadge');
  b.textContent=info.n; b.className='rbadge '+info.cls;
  document.getElementById('rTitle').textContent=info.ti;
  document.getElementById('rText').textContent=info.tx;
}

function resetQ(){
  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;
  document.getElementById('qResult').style.display='none';
  document.getElementById('qMain').style.display='block';
  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;
  document.getElementById('qText').textContent=Qs[0].q;
  var html='';
  for(var i=0;i<Qs[0].o.length;i++) html+='<button class="qopt" onclick="pick(this,'+i+')">'+Qs[0].o[i].t+'</button>';
  document.getElementById('qOpts').innerHTML=html;
  document.getElementById('qNext').style.display='none';
}
