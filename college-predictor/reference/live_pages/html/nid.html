* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: #F9F5EE;
  color: #2B2B2B;
  overflow-x: hidden;
}

/* HERO */
.hero {
  background: #1A1A2E;
  padding: 100px 24px 80px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero-glow {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;

    radial-gradient(ellipse 50% 55% at 85% 70%, rgba(27,79,155,0.30) 0%, transparent 60%);
  pointer-events: none;
}
.badge {
  display: inline-block;
  border: 1px solid rgba(201,168,76,0.5);
  color: #C9A84C;
  font-family: Arial, sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 7px 20px;
  border-radius: 100px;
  margin-bottom: 28px;
  position: relative;
}
.hero h1 {
  font-size: clamp(2.2rem, 6vw, 4.8rem);
  font-weight: 900;
  color: #ffffff;
  line-height: 1.1;
  max-width: 800px;
  margin: 0 auto;
  position: relative;
}
.hero h1 span { color: #C9A84C; font-style: italic; }
.hero p {
  margin: 22px auto 0;
  font-family: Arial, sans-serif;
  font-size: clamp(0.95rem, 2vw, 1.15rem);
  color: rgba(255,255,255,0.62);
  max-width: 520px;
  line-height: 1.75;
  position: relative;
}
.hero-btns {
  margin-top: 38px;
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  position: relative;
}
.btn-main {
  background: #C9A84C;
  color: #1A1A2E;
  font-family: Arial, sans-serif;
  font-size: 0.93rem;
  font-weight: 700;
  padding: 14px 32px;
  border-radius: 100px;
  text-decoration: none;
  display: inline-block;
}
.btn-out {
  background: transparent;
  color: #ffffff;
  border: 1.5px solid rgba(255,255,255,0.28);
  font-family: Arial, sans-serif;
  font-size: 0.93rem;
  font-weight: 600;
  padding: 13px 30px;
  border-radius: 100px;
  text-decoration: none;
  display: inline-block;
}

/* SECTIONS */
.sec { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); max-width: 1160px; margin: 0 auto; }
.sec-dark { background: #1A1A2E; }
.sec-white { background: #ffffff; }
.eyebrow {
  font-family: Arial, sans-serif;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #C9A84C;
  margin-bottom: 12px;
}
.sec-h {
  font-size: clamp(1.85rem, 4.2vw, 3rem);
  font-weight: 700;
  line-height: 1.15;
  color: #1A1A2E;
  margin-bottom: 12px;
}
.sec-h-w { color: #ffffff; }
.sec-p {
  font-family: Arial, sans-serif;
  font-size: 1rem;
  color: #6B7280;
  max-width: 520px;
  line-height: 1.72;
  margin-bottom: 0;
}
.sec-p-dim { color: rgba(255,255,255,0.48); }

/* CARDS GRID */
.cards-wrap {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
  margin-top: 46px;
}
@media (max-width: 900px) { .cards-wrap { grid-template-columns: 1fr; } }

.card {
  background: #ffffff;
  border-radius: 16px;
  border: 1.5px solid #E5DDD0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Card headers */
.ch-acca { background: #D8F3DC; border-bottom: 3px solid #2D6A4F; padding: 28px 24px 22px; }
.ch-cfa  { background: #DBE9FF; border-bottom: 3px solid #1B4F9B; padding: 28px 24px 22px; }
.ch-ca   { background: #FFE0E4; border-bottom: 3px solid #8B2635; padding: 28px 24px 22px; }

.ci {
  width: 48px; height: 48px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900;
  color: #fff;
  margin-bottom: 13px;
  font-family: Arial, sans-serif;
}
.ci-acca { background: #2D6A4F; }
.ci-cfa  { background: #1B4F9B; }
.ci-ca   { background: #8B2635; }

.cn { font-size: 1.55rem; font-weight: 700; color: #1A1A2E; margin-bottom: 3px; }
.co { font-family: Arial, sans-serif; font-size: 0.78rem; color: #6B7280; }

.cb { padding: 24px; flex: 1; display: flex; flex-direction: column; gap: 17px; }
.cd { font-family: Arial, sans-serif; font-size: 0.91rem; line-height: 1.72; color: #444; }

/* Stats */
.stats-g { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.stat-b { background: #F9F5EE; border-radius: 10px; padding: 12px; border: 1px solid #E5DDD0; }
.sl { font-family: Arial, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #6B7280; margin-bottom: 4px; }
.sv { font-family: Arial, sans-serif; font-size: 0.9rem; font-weight: 700; color: #1A1A2E; }

/* Tags */
.tags-g { display: flex; flex-wrap: wrap; gap: 7px; }
.tag { font-family: Arial, sans-serif; font-size: 0.73rem; font-weight: 600; padding: 5px 11px; border-radius: 100px; background: #F9F5EE; border: 1px solid #E5DDD0; color: #2B2B2B; }
.t-acca { background: #D8F3DC; border-color: #2D6A4F; color: #2D6A4F; }
.t-cfa  { background: #DBE9FF; border-color: #1B4F9B; color: #1B4F9B; }
.t-ca   { background: #FFE0E4; border-color: #8B2635; color: #8B2635; }

.cf { padding: 0 24px 24px; }
.cl {
  display: block; text-align: center;
  padding: 13px; border-radius: 10px;
  font-family: Arial, sans-serif; font-size: 0.88rem; font-weight: 700;
  text-decoration: none; color: #fff;
}
.cl-acca { background: #2D6A4F; }
.cl-cfa  { background: #1B4F9B; }
.cl-ca   { background: #8B2635; }

}
.tbl-inner { max-width: 1160px; margin: 0 auto; }
.tbl-scroll { margin-top: 44px; overflow-x: auto; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); }

table { width: 100%; min-width: 580px; border-collapse: collapse; }
thead th {
  padding: 17px 18px;
  text-align: left;
  font-family: Arial, sans-serif;
  font-size: 0.74rem;
  font-weight: 700;
  letter-spacing: 1.8px;
  text-transform: uppercase;

tbody td {
  padding: 14px 18px;
  font-family: Arial, sans-serif;
  font-size: 0.87rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.7);

}
tbody tr:last-child td { border-bottom: none; }
tbody td:first-child {

.who-inner { max-width: 1160px; margin: 0 auto; }
.who-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }

.wc { border-radius: 16px; padding: 25px 22px; border: 1.5px solid #E5DDD0; background: #fff; }

}
.quiz-inner { max-width: 1160px; margin: 0 auto; }
.qbox {
  background: rgba(255,255,255,0.06);

@media (min-width: 600px) and (max-width: 900px) { .faq-grid { grid-template-columns: 1fr 1fr; } }
.fi { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid #E5DDD0; }
.fq { font-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }
.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }

iv-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;,s:{acca:2}}]\n  },\n  { q:\&quot;How can you dedicate time to studying?\&quot;,\n    o:[{t:\&quot;⏱️ Part-time alongside my job\&quot;,s:{acca:2}},{t:\&quot;📚 Intense focused study windows\&quot;,s:{cfa:2}},{t:\&quot;🎓 Full-time with practical training\&quot;,s:{ca:2}},{t:\&quot;🔄 Flexible — whatever it takes\&quot;,s:{acca:1,cfa:1,ca:1}}]\n  },\n  { q:\&quot;What matters most in a qualification?\&quot;,\n    o:[{t:\&quot;🌐 Glob the perfect qualification.'}\n  }[w];\n  document.getElementById('qMain').style.display='none';\n  document.getElementById('qResult').style.display='block';\n  var b=document.getElementById('rBadge');\n  b.textContent=info.n; b.className='rbadge '+info.cls;\n  document.getElementById('rTitle').textContent=info.ti;\n  document.getElementById('rText').textContent=info.tx;\n}\n\nfunction resetQ(){\n  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;\n  document.getElementById('qResult').style.display='none';\n  document.getElementById('qMain').style.display='block';\n  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[0].q;\n  var html='';\n  for(var i=0;i&lt;Qs[0].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[0].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n&lt;/script&gt;&quot;],&quot;customHeadElements&quot;:[0,&quot;&lt;meta&gt;&lt;meta name=\&quot;viewport\&quot; content=\&quot;width=device-width, initial-scale=1.0\&quot;&gt;&lt;style&gt;\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nbody {\n  font-family: Georgia, 'Times New Roman', serif;\n  background: #F9F5EE;\n  color: #2B2B2B;\n  overflow-x: hidden;\n}\n\n/* HERO */\n.hero {\n  background: #1A1A2E;\n  padding: 100px 24px 80px;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n.hero-glow {\n  position: absolute;\n  top: 0; left: 0; right: 0; bottom: 0;\n  background:\n    radial-gradient(ellipse 55% 45% at 15% 35%, rgba(45,106,79,0.35) 0%, transparent 60%),\n    radial-gradient(ellipse 50% 55% at 85% 70%, rgba(27,79,155,0.30) 0%, transparent 60%);\n  pointer-events: none;\n}\n.badge {\n  display: inline-block;\n  border: 1px solid rgba(201,168,76,0.5);\n  color: #C9A84C;\n  font-family: Arial, sans-serif;\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 2.5px;\n  text-transform: uppercase;\n  padding: 7px 20px;\n  border-radius: 100px;\n  margin-bottom: 28px;\n  position: relative;\n}\n.hero h1 {\n  font-size: clamp(2.2rem, 6vw, 4.8rem);\n  font-weight: 900;\n  color: #ffffff;\n  line-height: 1.1;\n  max-width: 800px;\n  margin: 0 auto;\n  position: relative;\n}\n.hero h1 span { color: #C9A84C; font-style: italic; }\n.hero p {\n  margin: 22px auto 0;\n  font-family: Arial, sans-serif;\n  font-size: clamp(0.95rem, 2vw, 1.15rem);\n  color: rgba(255,255,255,0.62);\n  max-width: 520px;\n  line-height: 1.75;\n  position: relative;\n}\n.hero-btns {\n  margin-top: 38px;\n  display: flex;\n  gap: 14px;\n  justify-content: center;\n  flex-wrap: wrap;\n  position: relative;\n}\n.btn-main {\n  background: #C9A84C;\n  color: #1A1A2E;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 14px 32px;\n  border-radius: 100px;\n  text-decoration: none;\n  display: inline-block;\n}\n.btn-out {\n  background: transparent;\n  color: #ffffff;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 600;\n  padding: 13px 30px;\n  border-radius: 100px;\n  text-decoration: none;\n  display: inline-block;\n}\n\n/* SECTIONS */\n.sec { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); max-width: 1160px; margin: 0 auto; }\n.sec-dark { background: #1A1A2E; }\n.sec-white { background: #ffffff; }\n.eyebrow {\n  font-family: Arial, sans-serif;\n  font-size: 10.5px;\n  font-weight: 700;\n  letter-spacing: 3px;\n  text-transform: uppercase;\n  color: #C9A84C;\n  margin-bottom: 12px;\n}\n.sec-h {\n  font-size: clamp(1.85rem, 4.2vw, 3rem);\n  font-weight: 700;\n  line-height: 1.15;\n  color: #1A1A2E;\n  margin-bottom: 12px;\n}\n.sec-h-w { color: #ffffff; }\n.sec-p {\n  font-family: Arial, sans-serif;\n  font-size: 1rem;\n  color: #6B7280;\n  max-width: 520px;\n  line-height: 1.72;\n  margin-bottom: 0;\n}\n.sec-p-dim { color: rgba(255,255,255,0.48); 0; box-sizing: border-box; }\n\n  body {\n    font-family: Arial, Helvetica, sans-serif;\n    background: var(--bg);\n    color: var(--text);\n    line-height: 1.7;\n    overflow-x: hidden;\n  }\n\n  /* ── HEADER ── */\n  .top-bar {\n    background: var(--primary);\n    color: #fff;\n    font-size: 0.82rem;\n    padding: 6px 0;\n    text-align: center;\n    letter-spacing: 0.5px;\n  }\n  .top-bar a { color: var(--accent-light); text-decoration: none; }\n\n  header {\n    background: var(--card);\n    box-shadow: 0 2px 12px rgba(0,0,0,0.06);\n    position: sticky; top: 0; z-index: 100;\n  }\n  .header-inner {\n    max-width: 1260px; margin: auto;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 12px 24px;\n  }\n  .logo-group { display: flex; align-items: center; gap: 14px; }\n  .logo-group img { height: 48px; }\n  .logo-text { font-size: 1.45rem; font-weight: bold; color: var(--primary); }\n  .logo-text span { color: var(--accent); }\n\n  nav { display: flex; gap: 6px; flex-wrap: wrap; }\n  nav a {\n    font-size: 0.82rem; font-weight: 600; color: var(--primary);\n    padding: 6px 14px; border-radius: 6px; text-decoration: none;\n    transition: all 0.2s;\n  }\n  nav a:hover, nav a.active { background: var(--primary); color: #fff; }\n\n  /* ── HERO ── */\n  .hero {\n    background: var(--gradient-1);\n    color: #fff; padding: 72px 24px 64px; text-align: center;\n    position: relative; overflow: hidden;\n  }\n  .hero::after {\n    content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 60px;\n    background: var(--bg);\n    clip-path: ellipse(55% 100% at 50% 100%);\n  }\n  .hero h1 { font-size: 2.6rem; margin-bottom: 14px; letter-spacing: -0.5px; }\n  .hero p { font-size: 1.15rem; opacity: 0.92; max-width: 720px; margin: 0 auto 28px; }\n  .hero-badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }\n  .badge {\n    background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3);\n    padding: 8px 20px; border-radius: 50px; font-size: 0.88rem; font-weight: 600;\n    backdrop-filter: blur(4px);\n  }\n\n  /* ── SECTIONS ── */\n  .container { max-width: 1220px; margin: auto; padding: 0 24px; }\n  section { padding: 56px 0; }\n  .section-title {\n    font-size: 1.7rem; color: var(--primary); margin-bottom: 8px; position: relative;\n    display: inline-block;\n  }\n  .section-title::after {\n    content: ''; display: block; width: 50px; height: 4px;\n    background: var(--accent); border-radius: 2px; margin-top: 8px;\n  }\n  .section-subtitle { color: var(--muted); font-size: 1rem; margin-bottom: 36px; }\n\n  /* ── CARDS ── */\n  .card {\n    background: var(--card); border-radius: 14px; padding: 28px;\n    box-shadow: var(--shadow); border: 1px solid var(--border);\n    transition: all 0.3s;\n  }\n  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }\n  .card h3 { color: var(--primary); margin-bottom: 10px; font-size: 1.15rem; }\n  .card p { color: var(--muted); font-size: 0.92rem; }\n\n  /* ── STEP FLOW ── */\n  .steps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 20px; }\n  .step-card { position: relative; padding-top: 42px; }\n  .step-num {\n    position: absolute; top: -6px; left: 24px;\n    width: 42px; height: 42px; background: var(--gradient-2);\n    color: #fff; font-weight: bold; font-size: 1.1rem;\n    border-radius: 50%; display: grid; place-items: center;\n    box-shadow: 0 4px 14px rgba(255,111,0,0.35);\n  }\n\n  /* ── TIMELINE ── */\n  .timeline { position: relative; padding-left: 36px; }\n  .timeline::before {\n    content: ''; position: absolute; left: 14px; top: 0; bottom: 0;\n    width: 3px; background: linear-gradient(to bottom, var(--primary), var(--accent));\n    border-radius: 2px;\n  }\n  .tl-item { position: relative; margin-bottom: 28px; }\n  .tl-item::before {\n    content: ''; position: absolute; left: -28px; top: 6px;\n    width: 14px; height: 14px; border-radius: 50%;\n    background: var(--accent); border: 3px solid var(--card);\n    box-shadow: 0 0 0 3px var(--accent);\n  }\n  .tl-date { font-weight: 700; color: var(--primary); font-size: 0.9rem; }\n  .tl-content { color: var(--muted); font-size: 0.92rem; margin-top: 2px; }\n\n  /* ── TABLES ── */\n  .table-wrapper { overflow-x: auto; border-radius: 12px; box-shadow: var(--shadow); }\n  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }\n  th {\n    background: var(--primary); color: #fff; padding: 14px 16px;\n    text-align: left; font-weight: 600; white-space: nowrap;\n  }\n  td { padding: 12px 16px; border-bottom: 1px solid var(--border); }\n  tr:nth-child(even) { background: #f4f6ff; }\n  tr:hover { background: #eef1ff; }\n\n  /* ── COMPARISON ── */\n  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }\n  .compare-card { border-top: 4px solid var(--primary); }\n  .compare-card.design { border-top-color: var(--accent); }\n  .compare-card h3 { display: flex; align-items: center; gap: 10px; }\n  .compare-card ul { list-style: none; margin-top: 14px; }\n  .compare-card li {\n    padding: 8px 0; border-bottom: 1px solid var(--border);\n    font-size: 0.9rem; color: var(--muted);\n    display: flex; align-items: flex-start; gap: 8px;\n  }\n  .compare-card li::before { content: '✓'; color: var(--success); font-weight: bold; flex-shrink: 0; }\n\n  /* ── QUIZ ── */\n  .quiz-section { background: linear-gradient(135deg, #f5f0ff 0%, #fff8e1 100%); border-radius: 18px; padding: 40px; }\n  .quiz-q {\n    background: var(--card); border-radius: 12px; padding: 22px; margin-bottom: 16px;\n    border-left: 4px solid var(--primary);\n  }\n  .quiz-q p { font-weight: 600; color: var(--text); margin-bottom: 12px; }\n  .quiz-opts { display: flex; flex-direction: column; gap: 8px; }\n  .quiz-opt {\n    display: flex; align-items: center; gap: 10px; padding: 10px 16px;\n    border: 2px solid var(--border); border-radius: 8px; cursor: oration: none; font-size: 1rem; margin-top: 20px;\n    transition: all 0.3s; box-shadow: 0 4px 20px rgba(255,111,0,0.4);\n  }\n  .cta-btn:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(255,111,0,0.5); }\n\n  /* ── FOOTER ── */\n  footer {\n    background: #0d1233; color: rgba(255,255,255,0.7);\n    padding: 40px 24px 24px; text-align: center; font-size: 0.88rem;\n  }\n  footer a { color: var(--accent-light); text-decoration: none; }\n  footer .f-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }\n\n  /* ── STAT CARDS ── */\n  .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 18px; margin: 32px 0; }\n  .stat-card {\n    background: var(--card); border-radius: 14px; padding: 24px; text-align: center;\n    box-shadow: var(--shadow); border-bottom: 4px solid var(--accent);\n  }\n  .stat-card .num { font-size: 2rem; font-weight: bold; color: var(--primary); }\n  .stat-card .label { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }\n\n  /* ── RESPONSIVE ── */\n  @media (max-width: 768px) {\n    .hero h1 { font-size: 1.7rem; }\n    .compare-grid { grid-template-columns: 1fr; }\n    nav { display: none; }\n    .header-inner { justify-content: center; }\n  }\n\n  /* ── ANIMATE ── */\n  .fade-in {\n    opacity: 0; transform: translateY(24px);\n    transition: opacity 0.6s, transform 0.6s;\n  }\n  .fade-in.visible { opacity: 1; transform: translateY(0); }\n\n  /* ── ACCORDION ── */\n  .accordion { margin-top: 20px; }\n  .acc-item { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }\n  .acc-header {\n    padding: 16px 20px; background: var(--card); cursor: pointer;\n    font-weight: 600; color: var(--primary); display: flex; justify-content: space-between;\n    align-items: center; transition: background 0.2s;\n  }\n  .acc-header:hover { background: #f0f2ff; }\n  .acc-body { padding: 0 20px; max-height: 0; overflow: hidden; transition: max-height 0.4s, padding 0.4s; }\n  .acc-item.open .acc-body { max-height: 600px; padding: 16px 20px; }\n  .acc-arrow { transition: transform 0.3s; }\n  .acc-item.open .acc-arrow { transform: rotate(180deg); }\n\n  .icon-circle {\n    width: 44px; height: 44px; border-radius: 50%; display: inline-grid; place-items: center;\n    font-size: 1.3rem; color: #fff; flex-shrink: 0;\n  }\n&lt;/style&gt;\n\n\n\n&lt;!-- TOP BAR --&gt;\n&lt;div class=\&quot;top-bar\&quot;&gt;\n  Powered by &lt;a href=\&quot;https://www.eduaakashaa.in\&quot; target=\&quot;_blank\&quot;&gt;EduAakashaa&lt;/a&gt; — Your Gateway to Design Education Excellence\n&lt;/div&gt;\n\n&lt;!-- HEADER --&gt;\n&lt;header&gt;\n  &lt;div class=\&quot;header-inner\&quot;&gt;\n    &lt;div class=\&quot;logo-group\&quot;&gt;\n      &lt;div class=\&quot;logo-text\&quot;&gt;Edu&lt;span&gt;Aakashaa&lt;/span&gt;&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;nav&gt;\n      &lt;a href=\&quot;#process\&quot; class=\&quot;active\&quot;&gt;Process&lt;/a&gt;\n      &lt;a href=\&quot;#schedule\&quot;&gt;Schedule&lt;/a&gt;\n      &lt;a href=\&quot;#ranking\&quot;&gt;Ranking&lt;/a&gt;\n      &lt;a href=\&quot;#compare\&quot;&gt;Engineering vs NID&lt;/a&gt;\n      &lt;a href=\&quot;#quiz\&quot;&gt;Interest Test&lt;/a&gt;\n      &lt;a href=\&quot;#cutoff\&quot;&gt;Cutoff&lt;/a&gt;\n      &lt;a href=\&quot;#placements\&quot;&gt;Placements&lt;/a&gt;\n      &lt;a href=\&quot;#nri\&quot;&gt;NRI/Overseas&lt;/a&gt;\n    &lt;/nav&gt;\n  &lt;/div&gt;\n&lt;/header&gt;\n\n&lt;!-- HERO --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;h1&gt;NID Admission Guide 2026-27&lt;/h1&gt;\n  &lt;p&gt;Your complete roadmap to cracking the National Institute of Design entrance — from registration to placement. Expert insights by EduAakashaa.&lt;/p&gt;\n  &lt;div class=\&quot;hero-badges\&quot;&gt;\n    &lt;span class=\&quot;badge\&quot;&gt;7 NID Campuses&lt;/span&gt;\n    &lt;span class=\&quot;badge\&quot;&gt;B.Des &amp;#x26; M.Des&lt;/span&gt;\n    &lt;span class=\&quot;badge\&quot;&gt;DAT 2026&lt;/span&gt;\n    &lt;span class=\&quot;badge\&quot;&gt;Overseas Eligible&lt;/span&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- STATS ROW --&gt;\n&lt;section&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;stat-row fade-in\&quot;&gt;\n      &lt;div class=\&quot;stat-card\&quot;&gt;&lt;div class=\&quot;num\&quot;&gt;7&lt;/div&gt;&lt;div class=\&quot;label\&quot;&gt;NID Campuses&lt;/div&gt;&lt;/div&gt;\n      &lt;div class=\&quot;stat-card\&quot;&gt;&lt;div class=\&quot;num\&quot;&gt;425+&lt;/div&gt;&lt;div class=\&quot;label\&quot;&gt;B.Des Seats&lt;/div&gt;&lt;/div&gt;\n      &lt;div class=\&quot;stat-card\&quot;&gt;&lt;div class=\&quot;num\&quot;&gt;21 LPA&lt;/div&gt;&lt;div class=\&quot;label\&quot;&gt;Avg. Package&lt;/div&gt;&lt;/div&gt;\n      &lt;div class=\&quot;stat-card\&quot;&gt;&lt;div class=\&quot;num\&quot;&gt;90%+&lt;/div&gt;&lt;div class=\&quot;label\&quot;&gt;Placement Rate&lt;/div&gt;&lt;/div&gt;\n      &lt;div class=\&quot;stat-card\&quot;&gt;&lt;div class=\&quot;num\&quot;&gt;124+&lt;/div&gt;&lt;div class=\&quot;label\&quot;&gt;Recruiting Companies&lt;/div&gt;&lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ ADMISSION PROCESS ═══ --&gt;\n&lt;section id=\&quot;process\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;h2 class=\&quot;section-title\&quot;&gt;Step-by-Step NID Admission Process&lt;/h2&gt;\n    &lt;p class=\&quot;section-subtitle\&quot;&gt;Two-stage DAT process: Prelims → Mains → Counselling → Admission&lt;/p&gt;\n\n    &lt;div class=\&quot;steps-grid fade-in\&quot;&gt;\n      &lt;div class=\&quot;card step-card\&quot;&gt;\n        &lt;div class=\&quot;step-num\&quot;&gt;1&lt;/div&gt;\n        &lt;h3&gt;Online Registration&lt;/h3&gt;\n        &lt;p&gt;Visit &lt;strong&gt;admissions.nid.edu&lt;/strong&gt; and create an account. Fill in personal, educational, and contact details. Upload photograph, signature, and category certificates.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card step-card\&quot;&gt;\n        &lt;div class=\&quot;step-num\&quot;&gt;2&lt;/div&gt;\n        &lt;h3&gt;Pay Application Fee&lt;/h3&gt;\n        &lt;p&gt;General/OBC/EWS: ₹3,000 | SC/ST/PwD: ₹1,500 | Overseas: ₹5,000. Pay via UPI, net banking, or card.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card step-card\&quot;&gt;\n        &lt;div class=\&quot;step-num\&quot;&gt;3&lt;/div&gt;\n        &lt;h3&gt;DAT Prelims Exam&lt;/h3&gt;\n        &lt;p&gt;3-hour written test with MCQ + subjective questions. Tests design aptitude, creativity, visualization, observation skills, and general awareness.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card step-card\&quot;&gt;\n        &lt;div class=\&quot;step-num\&quot;&gt;4&lt;/div&gt;\n        &lt;h3&gt;Prelims Result&lt;/h3&gt;\n        &lt;p&gt;B.Des results: April 7, 2026. Only 1.5× candidates (of total seats) get shortlisted for Mains. Prelims score is NOT counted in final merit.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card step-card\&quot;&gt;\n        &lt;div class=\&quot;step-num\&quot;&gt;5&lt;/div&gt;\n        &lt;h3&gt;DAT Mains - Studio Test&lt;/h3&gt;\n        &lt;p&gt;For B.Des: Hands-on studio test — sketching, model-making, design exercises. For M.Des: Studio test + personal interview. Tests creativity under real constraints.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card step-card\&quot;&gt;\n        &lt;div class=\&quot;step-num\&quot;&gt;6&lt;/div&gt;\n        &lt;h3&gt;Final Result &amp;#x26; Merit&lt;/h3&gt;\n        &lt;p&gt;Final merit based entirely on Mains performance. Category-wise merit lists published. Campus and course preferences considered.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card step-card\&quot;&gt;\n        &lt;div class=\&quot;step-num\&quot;&gt;7&lt;/div&gt;\n        &lt;h3&gt;Counselling &amp;#x26; Seat Allotment&lt;/h3&gt;\n        &lt;p&gt;Expected June 2026. Submit campus preferences, verify documents, pay token fee. Round 2 for vacant seats follows.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card step-card\&quot;&gt;\n        &lt;div class=\&quot;step-num\&quot;&gt;8&lt;/div&gt;\n        &lt;h3&gt;Report to Campus&lt;/h3&gt;\n        &lt;p&gt;Report with original documents to allotted NID campus. Pay semester fees. Begin your design journey!&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ EXAM SCHEDULE ═══ --&gt;\n&lt;section id=\&quot;schedule\&quot; style=\&quot;background: #f0f2ff;\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;h2 class=\&quot;section-title\&quot;&gt;NID DAT 2026 Exam Schedule&lt;/h2&gt;\n    &lt;p class=\&quot;section-subtitle\&quot;&gt;Key dates for the 2026-27 admission cycle&lt;/p&gt;\n\n    &lt;div class=\&quot;timeline fade-in\&quot;&gt;\n      &lt;div class=\&quot;tl-item\&quot;&gt;\n        &lt;div class=\&quot;tl-date\&quot;&gt;Oct–Nov 2025&lt;/div&gt;\n        &lt;div class=\&quot;tl-content\&quot;&gt;Online application window opens at admissions.nid.edu&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;tl-item\&quot;&gt;\n        &lt;div class=\&quot;tl-date\&quot;&gt;1 December 2025&lt;/div&gt;\n        &lt;div class=\&quot;tl-content\&quot;&gt;Last date for submitting online application (11:59 PM)&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;tl-item\&quot;&gt;\n        &lt;div class=\&quot;tl-date\&quot;&gt;21 December 2025&lt;/div&gt;\n        &lt;div class=\&quot;tl-content\&quot;&gt;DAT Prelims conducted for both B.Des &amp;#x26; M.Des&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;tl-item\&quot;&gt;\n        &lt;div class=\&quot;tl-date\&quot;&gt;16 February 2026&lt;/div&gt;\n        &lt;div class=\&quot;tl-content\&quot;&gt;M.Des Prelims result declared&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;tl-item\&quot;&gt;\n        &lt;div class=\&quot;tl-date\&quot;&gt;8 March 2026&lt;/div&gt;\n        &lt;div class=\&quot;tl-content\&quot;&gt;M.Des DAT Mains exam conducted&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;tl-item\&quot;&gt;\n        &lt;div class=\&quot;tl-date\&quot;&gt;21 Mar – 1 Apr 2026&lt;/div&gt;\n        &lt;div class=\&quot;tl-content\&quot;&gt;M.Des Personal Interviews conducted&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;tl-item\&quot;&gt;\n        &lt;div class=\&quot;tl-date\&quot;&gt;7 April 2026&lt;/div&gt;\n        &lt;div class=\&quot;tl-content\&quot;&gt;B.Des Prelims result declared (4 PM)&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;tl-item\&quot;&gt;\n        &lt;div class=\&quot;tl-date\&quot;&gt;April 2026&lt;/div&gt;\n        &lt;div class=\&quot;tl-content\&quot;&gt;B.Des DAT Mains — Studio Test (offline, at NID campuses)&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;tl-item\&quot;&gt;\n        &lt;div class=\&quot;tl-date\&quot;&gt;May–June 2026&lt;/div&gt;\n        &lt;div class=\&quot;tl-content\&quot;&gt;Final Results announced for B.Des &amp;#x26; M.Des&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;tl-item\&quot;&gt;\n        &lt;div class=\&quot;tl-date\&quot;&gt;June 2026 (2nd/3rd week)&lt;/div&gt;\n        &lt;div class=\&quot;tl-content\&quot;&gt;Counselling, document verification, seat allotment&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;tl-item\&quot;&gt;\n        &lt;div class=\&quot;tl-date\&quot;&gt;July 2026&lt;/div&gt;\n        &lt;div class=\&quot;tl-content\&quot;&gt;Round 2 seat allotment for vacant seats | Academic session begins&lt;/div&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ RANKING ═══ --&gt;\n&lt;section id=\&quot;ranking\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;h2 class=\&quot;section-title\&quot;&gt;NID Campus Rankings &amp;#x26; Recognition&lt;/h2&gt;\n    &lt;p class=\&quot;section-subtitle\&quot;&gt;NID is an Institute of National Importance under the NID Act 2014&lt;/p&gt;\n\n    &lt;div class=\&quot;card fade-in\&quot; style=\&quot;margin-bottom:24px; background: linear-gradient(135deg,#e8eaf6,#fff8e1); border: none;\&quot;&gt;\n      &lt;h3 style=\&quot;color:var(--primary); margin-bottom:12px;\&quot;&gt;Important Note on NIRF Rankings&lt;/h3&gt;\n      &lt;p&gt;The NIRF rankings released by the Ministry of Education do not have a separate \&quot;Design\&quot; category. Therefore, NID campuses are not directly ranked under NIRF in a dedicated design list. However, NID Ahmedabad holds a NIRF University Ranking of #45 and is ranked #1 in Academic Reputation in India by QS World University Rankings. NID is recognized as an Institute of National Importance by the Government of India.&lt;/p&gt;\n    &lt;/div&gt;\n\n    &lt;div class=\&quot;table-wrapper fade-in\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th&gt;NID Campus&lt;/th&gt;\n            &lt;th&gt;Careers360 Rating&lt;/th&gt;\n            &lt;th&gt;Established&lt;/th&gt;\n            &lt;th&gt;Programs&lt;/th&gt;\n            &lt;th&gt;Key Strength&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;NID Ahmedabad&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;AAAAA (Rank 1)&lt;/td&gt;&lt;td&gt;1961&lt;/td&gt;&lt;td&gt;B.Des, M.Des, PhD&lt;/td&gt;&lt;td&gt;Flagship campus, best placements&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;NID Gandhinagar&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;AAAA+&lt;/td&gt;&lt;td&gt;2015&lt;/td&gt;&lt;td&gt;M.Des&lt;/td&gt;&lt;td&gt;PG specializations focus&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;NID Bengaluru (R&amp;#x26;D)&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;AAAA+&lt;/td&gt;&lt;td&gt;2006&lt;/td&gt;&lt;td&gt;M.Des, PhD&lt;/td&gt;&lt;td&gt;90%+ placement rate&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;NID Andhra Pradesh&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;AAA+&lt;/td&gt;&lt;td&gt;2015&lt;/td&gt;&lt;td&gt;B.Des&lt;/td&gt;&lt;td&gt;Newer campus, growing infra&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;NID Haryana (Kurukshetra)&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;AAA+&lt;/td&gt;&lt;td&gt;2015&lt;/td&gt;&lt;td&gt;B.Des&lt;/td&gt;&lt;td&gt;North India hub&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;NID Madhya Pradesh&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;AAA&lt;/td&gt;&lt;td&gt;2019&lt;/td&gt;&lt;td&gt;B.Des&lt;/td&gt;&lt;td&gt;Central India presence&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;NID Assam (Jorhat)&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;AAA&lt;/td&gt;&lt;td&gt;2019&lt;/td&gt;&lt;td&gt;B.Des&lt;/td&gt;&lt;td&gt;Northeast India focus&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n\n    &lt;div style=\&quot;margin-top:24px;\&quot; class=\&quot;card fade-in\&quot;&gt;\n      &lt;h3&gt;EduAakashaa Recommendation&lt;/h3&gt;\n      &lt;p&gt;&lt;strong&gt;Top Pick:&lt;/strong&gt; NID Ahmedabad — flagship campus with the strongest alumni network, best industry connections, and highest placement packages. For M.Des students, NID Bengaluru offers excellent specialization options with consistent 90%+ placement rates. Newer campuses (AP, Haryana, MP, Assam) offer equally valid NID degrees at potentially lower cutoffs — ideal for securing an NID seat strategically.&lt;/p&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ ENGINEERING vs NID ═══ --&gt;\n&lt;section id=\&quot;compare\&quot; style=\&quot;background: #f0f2ff;\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;h2 class=\&quot;section-title\&quot;&gt;Engineering vs NID — Which Path Is Right?&lt;/h2&gt;\n    &lt;p class=\&quot;section-subtitle\&quot;&gt;A detailed comparison to help students and parents make informed decisions&lt;/p&gt;\n\n    &lt;div class=\&quot;compare-grid fade-in\&quot;&gt;\n      &lt;div class=\&quot;card compare-card\&quot;&gt;\n        &lt;h3&gt;&lt;span class=\&quot;icon-circle\&quot; style=\&quot;background:var(--primary);\&quot;&gt;⚙&lt;/span&gt; Engineering (B.Tech/B.E.)&lt;/h3&gt;\n        &lt;ul&gt;\n          &lt;li&gt;4-year technical degree via JEE/state CETs&lt;/li&gt;\n          &lt;li&gt;Focus: Mathematics, Physics, Computer Science&lt;/li&gt;\n          &lt;li&gt;Structured curriculum with labs &amp;#x26; practicals&lt;/li&gt;\n          &lt;li&gt;Career: Software, Core Engineering, Research&lt;/li&gt;\n          &lt;li&gt;Average package (top IITs): ₹15-25 LPA&lt;/li&gt;\n          &lt;li&gt;Thinking style: Analytical &amp;#x26; logical&lt;/li&gt;\n          &lt;li&gt;Job market: Very competitive, large candidate pool&lt;/li&gt;\n          &lt;li&gt;Higher studies: M.Tech, MBA, MS abroad&lt;/li&gt;\n          &lt;li&gt;Work style: Code, calculate, optimize systems&lt;/li&gt;\n          &lt;li&gt;Entrance: JEE Main/Advanced — highly math-intensive&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card compare-card design\&quot;&gt;\n        &lt;h3&gt;&lt;span class=\&quot;icon-circle\&quot; style=\&quot;background:var(--accent);\&quot;&gt;🎨&lt;/span&gt; NID Design (B.Des)&lt;/h3&gt;\n        &lt;ul&gt;\n          &lt;li&gt;4-year design degree via NID DAT&lt;/li&gt;\n          &lt;li&gt;Focus: Creativity, visual thinking, design aptitude&lt;/li&gt;\n          &lt;li&gt;Project-based learning with studio practice&lt;/li&gt;\n          &lt;li&gt;Career: UX/UI, Product Design, Animation, Branding&lt;/li&gt;\n          &lt;li&gt;Average package (NID Ahmedabad): ₹17-30 LPA&lt;/li&gt;\n          &lt;li&gt;Thinking style: Creative &amp;#x26; visual&lt;/li&gt;\n          &lt;li&gt;Job market: Niche, high-demand, less competition&lt;/li&gt;\n          &lt;li&gt;Higher studies: M.Des, international design schools&lt;/li&gt;\n          &lt;li&gt;Work style: Sketch, prototype, solve human problems&lt;/li&gt;\n          &lt;li&gt;Entrance: NID DAT — creativity &amp;#x26; aptitude focused&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n\n    &lt;div class=\&quot;card fade-in\&quot; style=\&quot;margin-top:24px;\&quot;&gt;\n      &lt;h3&gt;Key Decision Factors&lt;/h3&gt;\n      &lt;div class=\&quot;table-wrapper\&quot; style=\&quot;box-shadow:none;\&quot;&gt;\n        &lt;table&gt;\n          &lt;thead&gt;\n            &lt;tr&gt;&lt;th&gt;Factor&lt;/th&gt;&lt;th&gt;Engineering&lt;/th&gt;&lt;th&gt;NID Design&lt;/th&gt;&lt;/tr&gt;\n          &lt;/thead&gt;\n          &lt;tbody&gt;\n            &lt;tr&gt;&lt;td&gt;Maths Dependency&lt;/td&gt;&lt;td&gt;Very high — core requirement&lt;/td&gt;&lt;td&gt;Not required — creativity matters more&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Creative Freedom&lt;/td&gt;&lt;td&gt;Limited — structured assignments&lt;/td&gt;&lt;td&gt;Very high — open-ended projects&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Total Seats (India)&lt;/td&gt;&lt;td&gt;15 Lakh+ across colleges&lt;/td&gt;&lt;td&gt;~425 B.Des (extremely competitive)&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Starting Salary Range&lt;/td&gt;&lt;td&gt;₹3-25 LPA (varies hugely)&lt;/td&gt;&lt;td&gt;₹8-30 LPA (more consistent)&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Freelance Potential&lt;/td&gt;&lt;td&gt;Moderate (mostly IT)&lt;/td&gt;&lt;td&gt;Very High (design is freelance-friendly)&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Global Demand&lt;/td&gt;&lt;td&gt;High but saturating&lt;/td&gt;&lt;td&gt;Rising rapidly (UX/UI boom)&lt;/td&gt;&lt;/tr&gt;\n          &lt;/tbody&gt;\n        &lt;/table&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ INTEREST QUIZ ═══ --&gt;\n&lt;section id=\&quot;quiz\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;h2 class=\&quot;section-title\&quot;&gt;Discover Your Path — Interest Assessment&lt;/h2&gt;\n    &lt;p class=\&quot;section-subtitle\&quot;&gt;Answer these 10 questions honestly to understand if Design or Engineering suits you better&lt;/p&gt;\n\n    &lt;div class=\&quot;quiz-section fade-in\&quot; id=\&quot;quizContainer\&quot;&gt;\n      &lt;div class=\&quot;quiz-q\&quot; data-q=\&quot;1\&quot;&gt;\n        &lt;p&gt;Q1: When you see a product (phone, chair, app), what do you notice first?&lt;/p&gt;\n        &lt;div class=\&quot;quiz-opts\&quot;&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q1\&quot; value=\&quot;E\&quot;&gt; How it works technically — the specs and performance&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q1\&quot; value=\&quot;D\&quot;&gt; How it looks and feels — the colors, shape, and user experience&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q1\&quot; value=\&quot;B\&quot;&gt; Both equally — I appreciate good tech AND good design&lt;/label&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;quiz-q\&quot; data-q=\&quot;2\&quot;&gt;\n        &lt;p&gt;Q2: In school, which subject excites you the most?&lt;/p&gt;\n        &lt;div class=\&quot;quiz-opts\&quot;&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q2\&quot; value=\&quot;E\&quot;&gt; Mathematics and Physics — solving complex equations&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q2\&quot; value=\&quot;D\&quot;&gt; Art, Drawing, or Craft — creating visual projects&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q2\&quot; value=\&quot;B\&quot;&gt; Computer Science — building and creating digital things&lt;/label&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;quiz-q\&quot; data-q=\&quot;3\&quot;&gt;\n        &lt;p&gt;Q3: How do you spend your free time?&lt;/p&gt;\n        &lt;div class=\&quot;quiz-opts\&quot;&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q3\&quot; value=\&quot;E\&quot;&gt; Tinkering with gadgets, coding, or building things&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q3\&quot; value=\&quot;D\&quot;&gt; Sketching, photography, watching design/art videos&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q3\&quot; value=\&quot;B\&quot;&gt; Gaming, social media, reading — mixed activities&lt;/label&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;quiz-q\&quot; data-q=\&quot;4\&quot;&gt;\n        &lt;p&gt;Q4: When given a group project, what role do you naturally take?&lt;/p&gt;\n        &lt;div class=\&quot;quiz-opts\&quot;&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q4\&quot; value=\&quot;E\&quot;&gt; The planner — organizing data, logic, and execution&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q4\&quot; value=\&quot;D\&quot;&gt; The visual creator — making the presentation, poster, or prototype&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q4\&quot; value=\&quot;B\&quot;&gt; The leader — managing people and coordinating&lt;/label&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;quiz-q\&quot; data-q=\&quot;5\&quot;&gt;\n        &lt;p&gt;Q5: Which problem excites you more?&lt;/p&gt;\n        &lt;div class=\&quot;quiz-opts\&quot;&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q5\&quot; value=\&quot;E\&quot;&gt; How to make a bridge that can hold 10 tons of weight&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q5\&quot; value=\&quot;D\&quot;&gt; How to redesign a hospital to reduce patient stress and confusion&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q5\&quot; value=\&quot;B\&quot;&gt; Both sound interesting to me&lt;/label&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;quiz-q\&quot; data-q=\&quot;6\&quot;&gt;\n        &lt;p&gt;Q6: How would you describe your sketchbook/notebook?&lt;/p&gt;\n        &lt;div class=\&quot;quiz-opts\&quot;&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q6\&quot; value=\&quot;E\&quot;&gt; Full of formulas, diagrams, and structured notes&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q6\&quot; value=\&quot;D\&quot;&gt; Full of doodles, patterns, colors, and creative ideas&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q6\&quot; value=\&quot;B\&quot;&gt; A mix of both — some notes, some sketches&lt;/label&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;quiz-q\&quot; data-q=\&quot;7\&quot;&gt;\n        &lt;p&gt;Q7: Which career sounds more appealing?&lt;/p&gt;\n        &lt;div class=\&quot;quiz-opts\&quot;&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q7\&quot; value=\&quot;E\&quot;&gt; Software Engineer at Google building search algorithms&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q7\&quot; value=\&quot;D\&quot;&gt; UX Designer at Apple creating the next iPhone experience&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q7\&quot; value=\&quot;B\&quot;&gt; Product Manager blending tech and design decisions&lt;/label&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;quiz-q\&quot; data-q=\&quot;8\&quot;&gt;\n        &lt;p&gt;Q8: Your approach to problem-solving is:&lt;/p&gt;\n        &lt;div class=\&quot;quiz-opts\&quot;&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q8\&quot; value=\&quot;E\&quot;&gt; Step-by-step logical breakdown with clear rules&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q8\&quot; value=\&quot;D\&quot;&gt; Intuitive — I visualize solutions and iterate creatively&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q8\&quot; value=\&quot;B\&quot;&gt; I use a combination depending on the situation&lt;/label&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;quiz-q\&quot; data-q=\&quot;9\&quot;&gt;\n        &lt;p&gt;Q9: Which workspace would you thrive in?&lt;/p&gt;\n        &lt;div class=\&quot;quiz-opts\&quot;&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q9\&quot; value=\&quot;E\&quot;&gt; A tech lab with computers, circuits, and whiteboards&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q9\&quot; value=\&quot;D\&quot;&gt; A design studio with sketch pads, materials, and creative walls&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q9\&quot; value=\&quot;B\&quot;&gt; A collaborative open office with diverse teams&lt;/label&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;quiz-q\&quot; data-q=\&quot;10\&quot;&gt;\n        &lt;p&gt;Q10: When you imagine your future portfolio, it contains:&lt;/p&gt;\n        &lt;div class=\&quot;quiz-opts\&quot;&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q10\&quot; value=\&quot;E\&quot;&gt; Code repositories, technical papers, and project documentation&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q10\&quot; value=\&quot;D\&quot;&gt; Visual projects, design case studies, sketches, and prototypes&lt;/label&gt;\n          &lt;label class=\&quot;quiz-opt\&quot;&gt;&lt;input type=\&quot;radio\&quot; name=\&quot;q10\&quot; value=\&quot;B\&quot;&gt; A mix of technical and creative work&lt;/label&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div style=\&quot;text-align:center; margin-top:24px;\&quot;&gt;\n        &lt;button onclick=\&quot;calculateResult()\&quot; style=\&quot;background:var(--gradient-2); color:#fff; border:none; padding:16px 48px; border-radius:50px; font-size:1.05rem; font-weight:bold; cursor:pointer; font-family:Arial; box-shadow: 0 4px 16px rgba(255,111,0,0.3);\&quot;&gt;\n          Discover My Path →\n        &lt;/button&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;result-box\&quot; id=\&quot;resultBox\&quot;&gt;\n        &lt;h3 id=\&quot;resultTitle\&quot; style=\&quot;color:var(--primary); margin-bottom:12px;\&quot;&gt;&lt;/h3&gt;\n        &lt;div style=\&quot;display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;\&quot;&gt;\n          &lt;div&gt;\n            &lt;div style=\&quot;font-size:0.85rem; color:var(--muted); margin-bottom:4px;\&quot;&gt;Design Inclination&lt;/div&gt;\n            &lt;div class=\&quot;meter-bar\&quot;&gt;&lt;div class=\&quot;meter-fill\&quot; id=\&quot;designMeter\&quot; style=\&quot;background:var(--accent); width:0%;\&quot;&gt;&lt;/div&gt;&lt;/div&gt;\n            &lt;div id=\&quot;designPct\&quot; style=\&quot;font-weight:bold; color:var(--accent);\&quot;&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div style=\&quot;font-size:0.85rem; color:var(--muted); margin-bottom:4px;\&quot;&gt;Engineering Inclination&lt;/div&gt;\n            &lt;div class=\&quot;meter-bar\&quot;&gt;&lt;div class=\&quot;meter-fill\&quot; id=\&quot;engMeter\&quot; style=\&quot;background:var(--primary); width:0%;\&quot;&gt;&lt;/div&gt;&lt;/div&gt;\n            &lt;div id=\&quot;engPct\&quot; style=\&quot;font-weight:bold; color:var(--primary);\&quot;&gt;&lt;/div&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;p id=\&quot;resultAdvice\&quot; style=\&quot;color:var(--muted); font-size:0.92rem;\&quot;&gt;&lt;/p&gt;\n        &lt;p style=\&quot;margin-top:16px; font-size:0.85rem; color:var(--muted);\&quot;&gt;&lt;em&gt;This is a preliminary indicator. Visit &lt;a href=\&quot;https://www.eduaakashaa.in\&quot; target=\&quot;_blank\&quot;&gt;www.eduaakashaa.in&lt;/a&gt; for personalized career counselling.&lt;/em&gt;&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ SAMPLE QUESTIONS ═══ --&gt;\n&lt;section style=\&quot;background:#f0f2ff;\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;h2 class=\&quot;section-title\&quot;&gt;NID DAT Sample Questions&lt;/h2&gt;\n    &lt;p class=\&quot;section-subtitle\&quot;&gt;Understand the type of questions asked in the NID Design Aptitude Test&lt;/p&gt;\n\n    &lt;div class=\&quot;accordion fade-in\&quot;&gt;\n      &lt;div class=\&quot;acc-item\&quot;&gt;\n        &lt;div class=\&quot;acc-header\&quot; onclick=\&quot;toggleAcc(this)\&quot;&gt;\n          &lt;span&gt;DAT Prelims — Design Aptitude &amp;#x26; Reasoning&lt;/span&gt;\n          &lt;span class=\&quot;acc-arrow\&quot;&gt;▼&lt;/span&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;acc-body\&quot;&gt;\n          &lt;p&gt;&lt;strong&gt;Q:&lt;/strong&gt; Look at the sequence of shapes below. Which shape comes next in the pattern?&lt;br&gt;&lt;em&gt;(Visual reasoning — pattern recognition with geometric shapes)&lt;/em&gt;&lt;/p&gt;\n          &lt;p style=\&quot;margin-top:12px;\&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; Identify the odd one out from the following set of design objects and explain your reasoning.&lt;br&gt;&lt;em&gt;(Tests visual classification and design awareness)&lt;/em&gt;&lt;/p&gt;\n          &lt;p style=\&quot;margin-top:12px;\&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; What design principle is violated in the following product image? Suggest two improvements.&lt;br&gt;&lt;em&gt;(Tests critical observation and design thinking)&lt;/em&gt;&lt;/p&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;acc-item\&quot;&gt;\n        &lt;div class=\&quot;acc-header\&quot; onclick=\&quot;toggleAcc(this)\&quot;&gt;\n          &lt;span&gt;DAT Prelims — General Awareness &amp;#x26; Visualization&lt;/span&gt;\n          &lt;span class=\&quot;acc-arrow\&quot;&gt;▼&lt;/span&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;acc-body\&quot;&gt;\n          &lt;p&gt;&lt;strong&gt;Q:&lt;/strong&gt; Who designed the logo of the Indian Railways? What design principle does it follow?&lt;br&gt;&lt;em&gt;(Design history and general knowledge)&lt;/em&gt;&lt;/p&gt;\n          &lt;p style=\&quot;margin-top:12px;\&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; A flat 2D shape is shown. Draw how it would appear as a 3D object when folded.&lt;br&gt;&lt;em&gt;(Spatial visualization — very common in NID DAT)&lt;/em&gt;&lt;/p&gt;\n          &lt;p style=\&quot;margin-top:12px;\&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; Describe the concept of \&quot;sustainable design\&quot; with two real-world examples.&lt;br&gt;&lt;em&gt;(Current affairs + design awareness)&lt;/em&gt;&lt;/p&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;acc-item\&quot;&gt;\n        &lt;div class=\&quot;acc-header\&quot; onclick=\&quot;toggleAcc(this)\&quot;&gt;\n          &lt;span&gt;DAT Mains — Studio Test (B.Des)&lt;/span&gt;\n          &lt;span class=\&quot;acc-arrow\&quot;&gt;▼&lt;/span&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;acc-body\&quot;&gt;\n          &lt;p&gt;&lt;strong&gt;Q:&lt;/strong&gt; Using the materials provided (paper, scissors, tape, colors), create a 3D model of a \&quot;public seating solution for elderly people in a park.\&quot;&lt;br&gt;&lt;em&gt;(Tests creative problem-solving with constraints)&lt;/em&gt;&lt;/p&gt;\n          &lt;p style=\&quot;margin-top:12px;\&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; Draw a series of 6 frames illustrating \&quot;slow fashion and conscious buying\&quot; — tell a visual story without using any text.&lt;br&gt;&lt;em&gt;(Visual storytelling and concept development)&lt;/em&gt;&lt;/p&gt;\n          &lt;p style=\&quot;margin-top:12px;\&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; Redesign the packaging of a common Indian snack brand to appeal to health-conscious millennials.&lt;br&gt;&lt;em&gt;(Applied design thinking with market awareness)&lt;/em&gt;&lt;/p&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;div class=\&quot;acc-item\&quot;&gt;\n        &lt;div class=\&quot;acc-header\&quot; onclick=\&quot;toggleAcc(this)\&quot;&gt;\n          &lt;span&gt;M.Des Interview — Typical Questions&lt;/span&gt;\n          &lt;span class=\&quot;acc-arrow\&quot;&gt;▼&lt;/span&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;acc-body\&quot;&gt;\n          &lt;p&gt;&lt;strong&gt;Q:&lt;/strong&gt; Walk us through your design portfolio. What was your most challenging project and why?&lt;/p&gt;\n          &lt;p style=\&quot;margin-top:12px;\&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; How would you approach redesigning the voting experience in rural India?&lt;/p&gt;\n          &lt;p style=\&quot;margin-top:12px;\&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; What is the difference between \&quot;design thinking\&quot; and \&quot;art\&quot;? Give examples.&lt;/p&gt;\n          &lt;p style=\&quot;margin-top:12px;\&quot;&gt;&lt;em&gt;Tip: Interviewers prioritize clarity of thought, honesty, and the ability to articulate your design process over polished answers.&lt;/em&gt;&lt;/p&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ CUTOFF DATA ═══ --&gt;\n&lt;section id=\&quot;cutoff\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;h2 class=\&quot;section-title\&quot;&gt;NID DAT Cutoff Matrix — Last 3 Years&lt;/h2&gt;\n    &lt;p class=\&quot;section-subtitle\&quot;&gt;Category-wise cutoff trends for B.Des and M.Des programs&lt;/p&gt;\n\n    &lt;div class=\&quot;tab-nav\&quot;&gt;\n      &lt;button class=\&quot;tab-btn active\&quot; onclick=\&quot;showTab(&amp;#x27;bdes&amp;#x27;)\&quot;&gt;B.Des Cutoff&lt;/button&gt;\n      &lt;button class=\&quot;tab-btn\&quot; onclick=\&quot;showTab(&amp;#x27;mdes&amp;#x27;)\&quot;&gt;M.Des Cutoff&lt;/button&gt;\n      &lt;button class=\&quot;tab-btn\&quot; onclick=\&quot;showTab(&amp;#x27;prelims&amp;#x27;)\&quot;&gt;Prelims Qualifying&lt;/button&gt;\n    &lt;/div&gt;\n\n    &lt;div class=\&quot;tab-panel active\&quot; id=\&quot;bdes\&quot;&gt;\n      &lt;div class=\&quot;table-wrapper fade-in\&quot;&gt;\n        &lt;table&gt;\n          &lt;thead&gt;\n            &lt;tr&gt;&lt;th&gt;NID Campus&lt;/th&gt;&lt;th&gt;Category&lt;/th&gt;&lt;th&gt;2023 (Last Rank)&lt;/th&gt;&lt;th&gt;2024 (Last Rank)&lt;/th&gt;&lt;th&gt;2025 (Last Rank)&lt;/th&gt;&lt;/tr&gt;\n          &lt;/thead&gt;\n          &lt;tbody&gt;\n            &lt;tr&gt;&lt;td rowspan=\&quot;3\&quot;&gt;&lt;strong&gt;NID Ahmedabad&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Open (General)&lt;/td&gt;&lt;td&gt;47&lt;/td&gt;&lt;td&gt;43&lt;/td&gt;&lt;td&gt;48&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;OBC-NCL&lt;/td&gt;&lt;td&gt;52&lt;/td&gt;&lt;td&gt;48&lt;/td&gt;&lt;td&gt;41&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;SC/ST&lt;/td&gt;&lt;td&gt;85&lt;/td&gt;&lt;td&gt;
