\n        &lt;table&gt;\n          &lt;thead&gt;\n            &lt;tr&gt;&lt;th&gt;Discipline&lt;/th&gt;&lt;th&gt;Category&lt;/th&gt;&lt;th&gt;2023 Score&lt;/th&gt;&lt;th&gt;2024 Score&lt;/th&gt;&lt;th&gt;2025 Score&lt;/th&gt;&lt;/tr&gt;\n          &lt;/thead&gt;\n          &lt;tbody&gt;\n            &lt;tr&gt;&lt;td rowspan=\&quot;2\&quot;&gt;&lt;strong&gt;Industrial Design&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Open&lt;/td&gt;&lt;td&gt;52.10&lt;/td&gt;&lt;td&gt;50.10&lt;/td&gt;&lt;td&gt;50.15&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;OBC-NCL&lt;/td&gt;&lt;td&gt;48.50&lt;/td&gt;&lt;td&gt;46.80&lt;/td&gt;&lt;td&gt;47.20&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td rowspan=\&quot;2\&quot;&gt;&lt;strong&gt;Communication Design&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Open&lt;/td&gt;&lt;td&gt;55.30&lt;/td&gt;&lt;td&gt;53.45&lt;/td&gt;&lt;td&gt;54.00&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;OBC-NCL&lt;/td&gt;&lt;td&gt;50.20&lt;/td&gt;&lt;td&gt;48.90&lt;/td&gt;&lt;td&gt;49.50&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td rowspan=\&quot;2\&quot;&gt;&lt;strong&gt;Film &amp;#x26; Video&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Open&lt;/td&gt;&lt;td&gt;64.80&lt;/td&gt;&lt;td&gt;62.65&lt;/td&gt;&lt;td&gt;63.10&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;SC/ST&lt;/td&gt;&lt;td&gt;45.00&lt;/td&gt;&lt;td&gt;43.50&lt;/td&gt;&lt;td&gt;44.20&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td rowspan=\&quot;2\&quot;&gt;&lt;strong&gt;Animation Film Design&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Open&lt;/td&gt;&lt;td&gt;68.50&lt;/td&gt;&lt;td&gt;66.20&lt;/td&gt;&lt;td&gt;67.00&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;OBC-NCL&lt;/td&gt;&lt;td&gt;55.40&lt;/td&gt;&lt;td&gt;53.80&lt;/td&gt;&lt;td&gt;54.10&lt;/td&gt;&lt;/tr&gt;\n          &lt;/tbody&gt;\n        &lt;/table&gt;\n      &lt;/div&gt;\n      &lt;p style=\&quot;margin-top:12px; font-size:0.82rem; color:var(--muted);\&quot;&gt;&lt;em&gt;M.Des cutoff scores (out of 100) represent the score of the last admitted candidate. NID Ahmedabad data.&lt;/em&gt;&lt;/p&gt;\n    &lt;/div&gt;\n\n    &lt;div class=\&quot;tab-panel\&quot; id=\&quot;prelims\&quot;&gt;\n      &lt;div class=\&quot;table-wrapper fade-in\&quot;&gt;\n        &lt;table&gt;\n          &lt;thead&gt;\n            &lt;tr&gt;&lt;th&gt;Category&lt;/th&gt;&lt;th&gt;2023 (Approx.)&lt;/th&gt;&lt;th&gt;2024&lt;/th&gt;&lt;th&gt;2025 (Expected)&lt;/th&gt;&lt;th&gt;2026 (Projected)&lt;/th&gt;&lt;/tr&gt;\n          &lt;/thead&gt;\n          &lt;tbody&gt;\n            &lt;tr&gt;&lt;td&gt;Open (General)&lt;/td&gt;&lt;td&gt;52-56&lt;/td&gt;&lt;td&gt;58.50&lt;/td&gt;&lt;td&gt;55-60&lt;/td&gt;&lt;td&gt;56-62&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;GEN-EWS&lt;/td&gt;&lt;td&gt;48-52&lt;/td&gt;&lt;td&gt;52-55&lt;/td&gt;&lt;td&gt;48-52&lt;/td&gt;&lt;td&gt;50-54&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;OBC-NCL&lt;/td&gt;&lt;td&gt;45-50&lt;/td&gt;&lt;td&gt;48-52&lt;/td&gt;&lt;td&gt;45-50&lt;/td&gt;&lt;td&gt;46-52&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;SC&lt;/td&gt;&lt;td&gt;40-45&lt;/td&gt;&lt;td&gt;42-46&lt;/td&gt;&lt;td&gt;40-45&lt;/td&gt;&lt;td&gt;42-46&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;ST&lt;/td&gt;&lt;td&gt;38-42&lt;/td&gt;&lt;td&gt;40-44&lt;/td&gt;&lt;td&gt;38-42&lt;/td&gt;&lt;td&gt;40-44&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;PwD&lt;/td&gt;&lt;td&gt;35-40&lt;/td&gt;&lt;td&gt;38-42&lt;/td&gt;&lt;td&gt;35-40&lt;/td&gt;&lt;td&gt;36-42&lt;/td&gt;&lt;/tr&gt;\n          &lt;/tbody&gt;\n        &lt;/table&gt;\n      &lt;/div&gt;\n      &lt;p style=\&quot;margin-top:12px; font-size:0.82rem; color:var(--muted);\&quot;&gt;&lt;em&gt;Prelims cutoff is for shortlisting to Mains only. Final admission cutoff is based entirely on Mains performance. Marks out of 100.&lt;/em&gt;&lt;/p&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ PLACEMENTS ═══ --&gt;\n&lt;section id=\&quot;placements\&quot; style=\&quot;background:#f0f2ff;\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;h2 class=\&quot;section-title\&quot;&gt;NID Placement Records — Last 3 Years&lt;/h2&gt;\n    &lt;p class=\&quot;section-subtitle\&quot;&gt;Campus-wise placement statistics and salary trends&lt;/p&gt;\n\n    &lt;div class=\&quot;table-wrapper fade-in\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;&lt;th&gt;Parameter&lt;/th&gt;&lt;th&gt;2022-23&lt;/th&gt;&lt;th&gt;2023-24&lt;/th&gt;&lt;th&gt;2024-25&lt;/th&gt;&lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Highest Package (LPA)&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;₹50 LPA&lt;/td&gt;&lt;td&gt;₹36 LPA&lt;/td&gt;&lt;td&gt;₹30 LPA&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Average Package (LPA)&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;₹30.5 LPA&lt;/td&gt;&lt;td&gt;₹21 LPA&lt;/td&gt;&lt;td&gt;₹21.3 LPA&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Lowest Package (LPA)&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;₹12 LPA&lt;/td&gt;&lt;td&gt;₹8 LPA&lt;/td&gt;&lt;td&gt;₹8 LPA&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Placement Rate&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;88%&lt;/td&gt;&lt;td&gt;85%&lt;/td&gt;&lt;td&gt;90%+&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;No. of Recruiters&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;110+&lt;/td&gt;&lt;td&gt;120+&lt;/td&gt;&lt;td&gt;124+&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Total Offers&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;550+&lt;/td&gt;&lt;td&gt;580+&lt;/td&gt;&lt;td&gt;620+&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n\n    &lt;div style=\&quot;display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:24px;\&quot; class=\&quot;fade-in\&quot;&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;h3&gt;Top Recruiters&lt;/h3&gt;\n        &lt;p style=\&quot;margin-top:8px;\&quot;&gt;Apple, Google, Amazon, Microsoft, Adobe, Deloitte, Wipro, TCS, HCL, Infosys, Philips, Mahindra &amp;#x26; Mahindra, Flipkart, Logitech, IDEO, VIP Industries, LG Electronics, Honda R&amp;#x26;D, Havells, Whirlpool, Hindustan Unilever&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;h3&gt;Popular Job Roles&lt;/h3&gt;\n        &lt;p style=\&quot;margin-top:8px;\&quot;&gt;UX/UI Designer, Product Designer, Graphic Designer, Industrial Designer, Interaction Designer, Animation Director, Design Researcher, Brand Strategist, Design Consultant, Film &amp;#x26; Video Designer, Textile Designer&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n\n    &lt;div class=\&quot;card fade-in\&quot; style=\&quot;margin-top:24px;\&quot;&gt;\n      &lt;h3&gt;Salary by Specialization (Approximate Entry-Level)&lt;/h3&gt;\n      &lt;div class=\&quot;table-wrapper\&quot; style=\&quot;box-shadow:none;\&quot;&gt;\n        &lt;table&gt;\n          &lt;thead&gt;\n            &lt;tr&gt;&lt;th&gt;Specialization&lt;/th&gt;&lt;th&gt;Entry Level (LPA)&lt;/th&gt;&lt;th&gt;Mid-Career (LPA)&lt;/th&gt;&lt;th&gt;Senior Level (LPA)&lt;/th&gt;&lt;/tr&gt;\n          &lt;/thead&gt;\n          &lt;tbody&gt;\n            &lt;tr&gt;&lt;td&gt;UX/UI Design&lt;/td&gt;&lt;td&gt;₹8-15&lt;/td&gt;&lt;td&gt;₹18-30&lt;/td&gt;&lt;td&gt;₹35-50+&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Product / Industrial Design&lt;/td&gt;&lt;td&gt;₹6-12&lt;/td&gt;&lt;td&gt;₹15-25&lt;/td&gt;&lt;td&gt;₹30-45&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Communication / Graphic Design&lt;/td&gt;&lt;td&gt;₹6-10&lt;/td&gt;&lt;td&gt;₹12-22&lt;/td&gt;&lt;td&gt;₹25-40&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Animation Film Design&lt;/td&gt;&lt;td&gt;₹5-10&lt;/td&gt;&lt;td&gt;₹12-20&lt;/td&gt;&lt;td&gt;₹25-35&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Textile Design&lt;/td&gt;&lt;td&gt;₹5-8&lt;/td&gt;&lt;td&gt;₹10-18&lt;/td&gt;&lt;td&gt;₹20-30&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Furniture &amp;#x26; Interior Design&lt;/td&gt;&lt;td&gt;₹5-9&lt;/td&gt;&lt;td&gt;₹12-20&lt;/td&gt;&lt;td&gt;₹22-35&lt;/td&gt;&lt;/tr&gt;\n          &lt;/tbody&gt;\n        &lt;/table&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ NRI / OVERSEAS ═══ --&gt;\n&lt;section id=\&quot;nri\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;h2 class=\&quot;section-title\&quot;&gt;Overseas &amp;#x26; NRI Students — Admission Guide&lt;/h2&gt;\n    &lt;p class=\&quot;section-subtitle\&quot;&gt;Complete procedure for international, NRI, OCI, and PIO candidates&lt;/p&gt;\n\n    &lt;div class=\&quot;nri-highlight fade-in\&quot;&gt;\n      &lt;h3 style=\&quot;color:var(--primary); margin-bottom:8px;\&quot;&gt;Key Eligibility Rules&lt;/h3&gt;\n      &lt;div class=\&quot;nri-grid\&quot;&gt;\n        &lt;div class=\&quot;nri-card\&quot;&gt;\n          &lt;h4&gt;Overseas Category&lt;/h4&gt;\n          &lt;p style=\&quot;font-size:0.9rem; color:var(--muted);\&quot;&gt;15% supernumerary seats reserved in B.Des and M.Des programs. Foreign passport holders with valid PIO or OCI cards can apply under this category. Separate fee structure applies.&lt;/p&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;nri-card\&quot;&gt;\n          &lt;h4&gt;NRI with Indian Passport&lt;/h4&gt;\n          &lt;p style=\&quot;font-size:0.9rem; color:var(--muted);\&quot;&gt;NRIs holding an Indian passport are NOT eligible for the Overseas category. They must apply as Indian nationals and compete in the general merit list with Indian fee structure.&lt;/p&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;nri-card\&quot;&gt;\n          &lt;h4&gt;OCI / PIO Card Holders&lt;/h4&gt;\n          &lt;p style=\&quot;font-size:0.9rem; color:var(--muted);\&quot;&gt;OCI and PIO cardholders must apply under the Overseas (supernumerary) category only. They pay fees equivalent to foreign citizens. No age relaxation or scribe facility available.&lt;/p&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;nri-card\&quot;&gt;\n          &lt;h4&gt;Student Visa Requirement&lt;/h4&gt;\n          &lt;p style=\&quot;font-size:0.9rem; color:var(--muted);\&quot;&gt;Overseas candidates must obtain a valid student visa for the entire program duration before joining NID. This is mandatory before experiencing campus life.&lt;/p&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n\n    &lt;div class=\&quot;card fade-in\&quot; style=\&quot;margin-top:24px;\&quot;&gt;\n      &lt;h3&gt;Documents Required for Overseas Applicants&lt;/h3&gt;\n      &lt;div class=\&quot;table-wrapper\&quot; style=\&quot;box-shadow:none;\&quot;&gt;\n        &lt;table&gt;\n          &lt;thead&gt;\n            &lt;tr&gt;&lt;th&gt;Document&lt;/th&gt;&lt;th&gt;Format&lt;/th&gt;&lt;th&gt;Details&lt;/th&gt;&lt;/tr&gt;\n          &lt;/thead&gt;\n          &lt;tbody&gt;\n            &lt;tr&gt;&lt;td&gt;Valid Passport&lt;/td&gt;&lt;td&gt;PDF, max 1MB&lt;/td&gt;&lt;td&gt;First and last page (must not be expired)&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Photo &amp;#x26; Signature&lt;/td&gt;&lt;td&gt;JPG/JPEG, 50-200KB&lt;/td&gt;&lt;td&gt;Recent passport-size photo&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Grade X Marksheet&lt;/td&gt;&lt;td&gt;PDF&lt;/td&gt;&lt;td&gt;SSC or equivalent&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Grade XII Marksheet&lt;/td&gt;&lt;td&gt;PDF&lt;/td&gt;&lt;td&gt;HSC or equivalent&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;AIU Equivalence Certificate&lt;/td&gt;&lt;td&gt;PDF&lt;/td&gt;&lt;td&gt;From Association of Indian Universities&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Bachelor's Degree (M.Des)&lt;/td&gt;&lt;td&gt;PDF&lt;/td&gt;&lt;td&gt;Relevant UG degree marksheets&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;OCI/PIO Card&lt;/td&gt;&lt;td&gt;PDF&lt;/td&gt;&lt;td&gt;If applicable&lt;/td&gt;&lt;/tr&gt;\n          &lt;/tbody&gt;\n        &lt;/table&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n\n    &lt;div class=\&quot;card fade-in\&quot; style=\&quot;margin-top:24px;\&quot;&gt;\n      &lt;h3&gt;Application Fee &amp;#x26; Admission Fee Comparison&lt;/h3&gt;\n      &lt;div class=\&quot;table-wrapper\&quot; style=\&quot;box-shadow:none;\&quot;&gt;\n        &lt;table&gt;\n          &lt;thead&gt;\n            &lt;tr&gt;&lt;th&gt;Fee Component&lt;/th&gt;&lt;th&gt;Indian (General)&lt;/th&gt;&lt;th&gt;Indian (SC/ST)&lt;/th&gt;&lt;th&gt;Overseas&lt;/th&gt;&lt;/tr&gt;\n          &lt;/thead&gt;\n          &lt;tbody&gt;\n            &lt;tr&gt;&lt;td&gt;Application Fee (B.Des)&lt;/td&gt;&lt;td&gt;₹3,000&lt;/td&gt;&lt;td&gt;₹1,500&lt;/td&gt;&lt;td&gt;₹5,000&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Application Fee (M.Des, 1 discipline)&lt;/td&gt;&lt;td&gt;₹3,000&lt;/td&gt;&lt;td&gt;₹1,500&lt;/td&gt;&lt;td&gt;₹5,000&lt;/td&gt;&lt;/tr&gt;\n            &lt;tr&gt;&lt;td&gt;Tuition Fee (per year, approx.)&lt;/td&gt;&lt;td&gt;₹3-4 Lakh&lt;/td&gt;&lt;td&gt;Fee waiver available&lt;/td&gt;&lt;td&gt;₹8-12 Lakh (varies)&lt;/td&gt;&lt;/tr&gt;\n          &lt;/tbody&gt;\n        &lt;/table&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- ═══ CTA ═══ --&gt;\n&lt;div class=\&quot;cta-section\&quot;&gt;\n  &lt;h2&gt;Ready to Start Your Design Journey?&lt;/h2&gt;\n  &lt;p style=\&quot;opacity:0.9; max-width:600px; margin:0 auto;\&quot;&gt;Get personalized guidance, mock tests, and expert mentoring from EduAakashaa's design career counsellors.&lt;/p&gt;\n  &lt;a href=\&quot;https://www.eduaakashaa.in\&quot; target=\&quot;_blank\&quot; class=\&quot;cta-btn\&quot;&gt;Visit EduAakashaa →&lt;/a&gt;\n&lt;/div&gt;\n\n&lt;!-- FOOTER --&gt;\n&lt;footer&gt;\n  &lt;div class=\&quot;f-links\&quot;&gt;\n    &lt;a href=\&quot;https://www.eduaakashaa.in\&quot; target=\&quot;_blank\&quot;&gt;EduAakashaa Home&lt;/a&gt;\n    &lt;a href=\&quot;https://admissions.nid.edu/\&quot; target=\&quot;_blank\&quot;&gt;Official NID Admissions&lt;/a&gt;\n    &lt;a href=\&quot;https://www.nid.edu/\&quot; target=\&quot;_blank\&quot;&gt;NID Website&lt;/a&gt;\n    &lt;a href=\&quot;https://www.nirfindia.org/\&quot; target=\&quot;_blank\&quot;&gt;NIRF Rankings&lt;/a&gt;\n  &lt;/div&gt;\n  &lt;p&gt;© 2026 EduAakashaa | &lt;a href=\&quot;https://www.eduaakashaa.in\&quot;&gt;www.eduaakashaa.in&lt;/a&gt;&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:8px; font-size:0.78rem; opacity:0.6;\&quot;&gt;Disclaimer: Information compiled from official NID sources and public data. Always verify from admissions.nid.edu for the latest updates. EduAakashaa is an independent educational guidance platform.&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\n// Smooth scroll\ndocument.querySelectorAll('nav a').forEach(a =&gt; {\n  a.addEventListener('click', e =&gt; {\n    e.preventDefault();\n    const id = a.getAttribute('href');\n    document.querySelector(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    document.querySelectorAll('nav a').forEach(n =&gt; n.classList.remove('active'));\n    a.classList.add('active');\n  });\n});\n\n// Fade-in on scroll\nconst obs = new IntersectionObserver(entries =&gt; {\n  entries.forEach(e =&gt; { if(e.isIntersecting) e.target.classList.add('visible'); });\n}, { threshold: 0.1 });\ndocument.querySelectorAll('.fade-in').forEach(el =&gt; obs.observe(el));\n\n// Tab switching\nfunction showTab(id) {\n  document.querySelectorAll('.tab-panel').forEach(p =&gt; p.classList.remove('active'));\n  document.querySelectorAll('.tab-btn').forEach(b =&gt; b.classList.remove('active'));\n  document.getElementById(id).classList.add('active');\n  event.target.classList.add('active');\n}\n\n// Accordion\nfunction toggleAcc(el) {\n  el.parentElement.classList.toggle('open');\n}\n\n// Quiz calculation\nfunction calculateResult() {\n  let d = 0, e = 0, b = 0;\n  for (let i = 1; i &lt;= 10; i++) {\n    const sel = document.querySelector(`input[name=\&quot;q${i}\&quot;]:checked`);\n    if (!sel) { alert('Please answer all 10 questions.'); return; }\n    if (sel.value === 'D') d++;\n    else if (sel.value === 'E') e++;\n    else b++;\n  }\n  // Distribute balanced scores\n  d += b * 0.4;\n  e += b * 0.6;\n  const total = d + e;\n  const dPct = Math.round((d/total)*100);\n  const ePct = 100 - dPct;\n\n  document.getElementById('designMeter').style.width = dPct + '%';\n  document.getElementById('engMeter').style.width = ePct + '%';\n  document.getElementById('designPct').textContent = dPct + '%';\n  document.getElementById('engPct').textContent = ePct + '%';\n\n  let title, advice;\n  if (dPct &gt;= 70) {\n    title = '🎨 Strong Design Inclination — NID Could Be Your Ideal Path!';\n    advice = 'Your responses indicate a strong creative and visual thinking orientation. You naturally gravitate toward design problems, aesthetics, and user experiences. NID\\'s B.Des program would be an excellent fit. Start preparing for NID DAT with focus on sketching, visual reasoning, and design awareness. Consider specializations like Communication Design, Industrial Design, or UX/UI Design.';\n  } else if (dPct &gt;= 50) {\n    title = '🔀 Balanced Profile — Consider Design-Tech Intersection!';\n    advice = 'You show appreciation for both technical and creative thinking. This makes you ideal for emerging fields at the intersection of design and technology — UX/UI Design, Interaction Design, or Design Engineering. Consider NID for a design foundation, or explore programs like B.Des at IIT (IDC), MIT Institute of Design, or Srishti that blend both worlds.';\n  } else {\n    title = '⚙️ Strong Engineering Inclination — Technical Path Recommended!';\n    advice = 'Your responses suggest a strong analytical and logical thinking pattern. Engineering (B.Tech/B.E.) through JEE or state exams would align well with your strengths. However, if you have even a small creative spark, consider Computer Science with a focus on UX Engineering, Game Development, or Human-Computer Interaction — fields that value both technical skills and some design sensibility.';\n  }\n\n  document.getElementById('resultTitle').textContent = title;\n  document.getElementById('resultAdvice').textContent = advice;\n  document.getElementById('resultBox').classList.add('show');\n  document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });\n}\n&lt;/script&gt;\n\n&quot;],&quot;desktop&quot;:[0,{&quot;top&quot;:[0,0],&quot;left&quot;:[0,0],&quot;width&quot;:[0,1224],&quot;height&quot;:[0,12691]}],&quot;settings&quot;:[0,{&quot;styles&quot;:[0,{}]}]}]}],&quot;nav&quot;:[1,[[0,{&quot;isHidden&quot;:[0,true],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&quot;navItemId&quot;:[0,&quot;zh7Jl1&quot;],&quot;linkedPageId&quot;:[0,&quot;zrZeq3&quot;]}],[0,{&quot;isHidden&quot;:[0,true],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&quot;navItemId&quot;:[0,&quot;z_xq_m&quot;],&quot;linkedPageId&quot;:[0,&quot;z2zzzk&quot;]}],[0,{&quot;isHidden&quot;:[0,true],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&quot;navItemId&quot;:[0,&quot;zvja5C&quot;],&quot;linkedPageId&quot;:[0,&quot;z-btxJ&quot;]}],[0,{&quot;isHidden&quot;:[0,true],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&quot;navItemId&quot;:[0,&quot;zf4msj&quot;],&quot;linkedPageId&quot;:[0,&quot;zbpWB9&quot;]}],[0,{&quot;isHidden&quot;:[0,true],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&quot;navItemId&quot;:[0,&quot;HRYnwl&quot;],&quot;linkedPageId&quot;:[0,&quot;ai-429k4&quot;]}],[0,{&quot;isHidden&quot;:[0,false],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[]],&quot;navItemId&quot;:[0,&quot;zVtOtn&quot;],&quot;linkedPageId&quot;:[0,&quot;zU9ZRg&quot;]}],[0,{&quot;isHidden&quot;:[0,false],&quot;linkType&quot;:[0,&quot;Page&quot;],&quot;subItems&quot;:[1,[[0,{&quot;isHidden&quot;:[0,false],&quot;linkType&quot;:[0,&quot;Page&quot;],&  background: transparent;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  color: #fff;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 13px 30px;\n  border-radius: 100px;\n  cursor: pointer;\n  display: none;\n}\n.qresult { display: none; text-align: center; }\n.rbadge { display: inline-block; font-size: 2.6rem; font-weight: 900; padding: 16px 32px; border-radius: 14px; margin-bottom: 15px; }\n.rb-a  { background: #D8F3DC; color: #2D6A4F; }\n.rb-c  { background: #DBE9FF; color: #1B4F9B; }\n.rb-ca { background: #FFE0E4; color: #8B2635; }\n.rtitle { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 11px; }\n.rtext { font-family: Arial, sans-serif; font-size: 0.94rem; color: rgba(255,255,255,0.56); max-width: 420px; margin: 0 auto 22px; line-height: 1.72; }\n.btn-retry { background: #C9A84C; color: #1A1A2E; font-family: Arial, sans-serif; font-size: 0.93rem; font-weight: 700; padding: 13px 30px; border-radius: 100px; border: none; cursor: pointer; }\n\n/* FAQ */\n.faq-outer { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); background: #F9F5EE; }\n.faq-inner { max-width: 1160px; margin: 0 auto; }\n.faq-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .faq-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .faq-grid { grid-template-columns: 1fr 1fr; } }\n.fi { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid #E5DDD0; }\n.fq { font-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }\n.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }\n\n/* FOOTER */\nfooter { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;,s:{acca:2}}]\n  },\n  { q:\&quot;How can you dedicate time to studying?\&quot;,\n    o:[{t:\&quot;⏱️ Part-time alongside my job\&quot;,s:{acca:2}},{t:\&quot;📚 Intense focused study windows\&quot;,s:{cfa:2}},{t:\&quot;🎓 Full-time with practical training\&quot;,s:{ca:2}},{t:\&quot;🔄 Flexible — whatever it takes\&quot;,s:{acca:1,cfa:1,ca:1}}]\n  },\n  { q:\&quot;What matters most in a qualification?\&quot;,\n    o:[{t:\&quot;🌐 Global recognition / worki &lt;style&gt;
  :root {
    --primary: #1a237e;
    --primary-light: #3949ab;
    --accent: #ff6f00;
    --accent-light: #ffa726;
    --bg: #fafbff;
    --card: #ffffff;
    --text: #1e1e2f;
    --muted: #5a5a7a;
    --border: #e0e4f0;
    --success: #2e7d32;
    --warning: #f57f17;
    --gradient-1: linear-gradient(135deg, #1a237e 0%, #3949ab 50%, #5c6bc0 100%);
    --gradient-2: linear-gradient(135deg, #ff6f00 0%, #ffa726 100%);
    --shadow: 0 4px 24px rgba(26,35,126,0.10);
    --shadow-hover: 0 8px 40px rgba(26,35,126,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .top-bar {
    background: var(--primary);
    color: #fff;
    font-size: 0.82rem;
    padding: 6px 0;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .top-bar a { color: var(--accent-light); text-decoration: none; }

  header {
    background: var(--card);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1260px; margin: auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px;
  }
  .logo-group { display: flex; align-items: center; gap: 14px; }
  .logo-group img { height: 48px; }
  .logo-text { font-size: 1.45rem; font-weight: bold; color: var(--primary); }
  .logo-text span { color: var(--accent); }

  nav { display: flex; gap: 6px; flex-wrap: wrap; }
  nav a {
    font-size: 0.82rem; font-weight: 600; color: var(--primary);
    padding: 6px 14px; border-radius: 6px; text-decoration: none;
    transition: all 0.2s;
  }
  nav a:hover, nav a.active { background: var(--primary); color: #fff; }

  /* ── HERO ── */
  .hero {
    background: var(--gradient-1);
    color: #fff; padding: 72px 24px 64px; text-align: center;
    position: relative; overflow: hidden;
  }
  .hero::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 60px;
    background: var(--bg);
    clip-path: ellipse(55% 100% at 50% 100%);
  }
  .hero h1 { font-size: 2.6rem; margin-bottom: 14px; letter-spacing: -0.5px; }
  .hero p { font-size: 1.15rem; opacity: 0.92; max-width: 720px; margin: 0 auto 28px; }
  .hero-badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .badge {
    background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3);
    padding: 8px 20px; border-radius: 50px; font-size: 0.88rem; font-weight: 600;
    backdrop-filter: blur(4px);
  }

  /* ── SECTIONS ── */
  .container { max-width: 1220px; margin: auto; padding: 0 24px; }
  section { padding: 56px 0; }
  .section-title {
    font-size: 1.7rem; color: var(--primary); margin-bottom: 8px; position: relative;
    display: inline-block;
  }
  .section-title::after {
    content: ''; display: block; width: 50px; height: 4px;
    background: var(--accent); border-radius: 2px; margin-top: 8px;
  }
  .section-subtitle { color: var(--muted); font-size: 1rem; margin-bottom: 36px; }

  /* ── CARDS ── */
  .card {
    background: var(--card); border-radius: 14px; padding: 28px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }
  .card h3 { color: var(--primary); margin-bottom: 10px; font-size: 1.15rem; }
  .card p { color: var(--muted); font-size: 0.92rem; }

  /* ── STEP FLOW ── */
  .steps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 20px; }
  .step-card { position: relative; padding-top: 42px; }
  .step-num {
    position: absolute; top: -6px; left: 24px;
    width: 42px; height: 42px; background: var(--gradient-2);
    color: #fff; font-weight: bold; font-size: 1.1rem;
    border-radius: 50%; display: grid; place-items: center;
    box-shadow: 0 4px 14px rgba(255,111,0,0.35);
  }

  /* ── TIMELINE ── */
  .timeline { position: relative; padding-left: 36px; }
  .timeline::before {
    content: ''; position: absolute; left: 14px; top: 0; bottom: 0;
    width: 3px; background: linear-gradient(to bottom, var(--primary), var(--accent));
    border-radius: 2px;
  }
  .tl-item { position: relative; margin-bottom: 28px; }
  .tl-item::before {
    content: ''; position: absolute; left: -28px; top: 6px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: 3px solid var(--card);
    box-shadow: 0 0 0 3px var(--accent);
  }
  .tl-date { font-weight: 700; color: var(--primary); font-size: 0.9rem; }
  .tl-content { color: var(--muted); font-size: 0.92rem; margin-top: 2px; }

  /* ── TABLES ── */
  .table-wrapper { overflow-x: auto; border-radius: 12px; box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th {
    background: var(--primary); color: #fff; padding: 14px 16px;
    text-align: left; font-weight: 600; white-space: nowrap;
  }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  tr:nth-child(even) { background: #f4f6ff; }
  tr:hover { background: #eef1ff; }

  /* ── COMPARISON ── */
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .compare-card { border-top: 4px solid var(--primary); }
  .compare-card.design { border-top-color: var(--accent); }
  .compare-card h3 { display: flex; align-items: center; gap: 10px; }
  .compare-card ul { list-style: none; margin-top: 14px; }
  .compare-card li {
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 0.9rem; color: var(--muted);
    display: flex; align-items: flex-start; gap: 8px;
  }
  .compare-card li::before { content: '✓'; color: var(--success); font-weight: bold; flex-shrink: 0; }

  /* ── QUIZ ── */
  .quiz-section { background: linear-gradient(135deg, #f5f0ff 0%, #fff8e1 100%); border-radius: 18px; padding: 40px; }
  .quiz-q {
    background: var(--card); border-radius: 12px; padding: 22px; margin-bottom: 16px;
    border-left: 4px solid var(--primary);
  }
  .quiz-q p { font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .quiz-opts { display: flex; flex-direction: column; gap: 8px; }
  .quiz-opt {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    border: 2px solid var(--border); border-radius: 8px; cursor: pointer;
    transition: all 0.2s; font-size: 0.9rem;
  }
  .quiz-opt:hover { border-color: var(--primary); background: #eef1ff; }
  .quiz-opt input { accent-color: var(--primary); }

  .result-box {
    background: var(--card); border-radius: 14px; padding: 28px; margin-top: 24px;
    border: 2px solid var(--accent); display: none;
  }
  .result-box.show { display: block; }
  .meter-bar { height: 18px; background: #eee; border-radius: 9px; overflow: hidden; margin: 10px 0; }
  .meter-fill { height: 100%; border-radius: 9px; transition: width 0.8s ease; }

  /* ── TABS ── */
  .tab-nav { display: flex; gap: 4px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab-btn {
    padding: 10px 22px; border: 2px solid var(--border); border-radius: 8px;
    background: var(--card); cursor: pointer; font-weight: 600; font-size: 0.88rem;
    color: var(--muted); transition: all 0.2s; font-family: Arial, sans-serif;
  }
  .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── NRI SECTION ── */
  .nri-highlight {
    background: linear-gradient(135deg, #e8eaf6, #fff3e0);
    border-radius: 18px; padding: 36px; margin-top: 24px;
  }
  .nri-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 20px; }
  .nri-card { background: var(--card); border-radius: 12px; padding: 24px; border-left: 4px solid var(--accent); }
  .nri-card h4 { color: var(--primary); margin-bottom: 8px; }

  /* ── CTA ── */
  .cta-section {
    background: var(--gradient-1); color: #fff; text-align: center;
    padding: 56px 24px; border-radius: 24px; margin: 40px auto; max-width: 1220px;
  }
  .cta-section h2 { font-size: 1.8rem; margin-bottom: 12px; }
  .cta-btn {
    display: inline-block; background: var(--accent); color: #fff;
    padding: 14px 36px; border-radius: 50px; font-weight: bold;
    text-decoration: none; font-size: 1rem; margin-top: 20px;
    transition: all 0.3s; box-shadow: 0 4px 20px rgba(255,111,0,0.4);
  }
  .cta-btn:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(255,111,0,0.5); }

  /* ── FOOTER ── */
  footer {
    background: #0d1233; color: rgba(255,255,255,0.7);
    padding: 40px 24px 24px; text-align: center; font-size: 0.88rem;
  }
  footer a { color: var(--accent-light); text-decoration: none; }
  footer .f-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }

  /* ── STAT CARDS ── */
  .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 18px; margin: 32px 0; }
  .stat-card {
    background: var(--card); border-radius: 14px; padding: 24px; text-align: center;
    box-shadow: var(--shadow); border-bottom: 4px solid var(--accent);
  }
  .stat-card .num { font-size: 2rem; font-weight: bold; color: var(--primary); }
  .stat-card .label { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .hero h1 { font-size: 1.7rem; }
    .compare-grid { grid-template-columns: 1fr; }
    nav { display: none; }
    .header-inner { justify-content: center; }
  }

  /* ── ANIMATE ── */
  .fade-in {
    opacity: 0; transform: translateY(24px);
    transition: opacity 0.6s, transform 0.6s;
  }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  /* ── ACCORDION ── */
  .accordion { margin-top: 20px; }
  .acc-item { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
  .acc-header {
    padding: 16px 20px; background: var(--card); cursor: pointer;
    font-weight: 600; color: var(--primary); display: flex; justify-content: space-between;
    align-items: center; transition: background 0.2s;
  }
  .acc-header:hover { background: #f0f2ff; }
  .acc-body { padding: 0 20px; max-height: 0; overflow: hidden; transition: max-height 0.4s, padding 0.4s; }
  .acc-item.open .acc-body { max-height: 600px; padding: 16px 20px; }
  .acc-arrow { transition: transform 0.3s; }
  .acc-item.open .acc-arrow { transform: rotate(180deg); }

  .icon-circle {
    width: 44px; height: 44px; border-radius: 50%; display: inline-grid; place-items: center;
    font-size: 1.3rem; color: #fff; flex-shrink: 0;
  }
&lt;/style&gt;&lt;/head&gt;

&lt;!-- ═══ ADMISSION PROCESS ═══ --&gt;
&lt;section id=&quot;process&quot;&gt;
  &lt;div class=&quot;container&quot;&gt;
    &lt;h2 class=&quot;section-title&quot;&gt;Step-by-Step NID Admission Process&lt;/h2&gt;
    &lt;p class=&quot;section-subtitle&quot;&gt;Two-stage DAT process: Prelims → Mains → Counselling → Admission&lt;/p&gt;

    &lt;div class=&quot;steps-grid fade-in&quot;&gt;
      &lt;div class=&quot;card step-card&quot;&gt;
        &lt;div class=&quot;step-num&quot;&gt;1&lt;/div&gt;
        &lt;h3&gt;Online Registration&lt;/h3&gt;
        &lt;p&gt;Visit &lt;strong&gt;admissions.nid.edu&lt;/strong&gt; and create an account. Fill in personal, educational, and contact details. Upload photograph, signature, and category certificates.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card step-card&quot;&gt;
        &lt;div class=&quot;step-num&quot;&gt;2&lt;/div&gt;
        &lt;h3&gt;Pay Application Fee&lt;/h3&gt;
        &lt;p&gt;General/OBC/EWS: ₹3,000 | SC/ST/PwD: ₹1,500 | Overseas: ₹5,000. Pay via UPI, net banking, or card.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card step-card&quot;&gt;
        &lt;div class=&quot;step-num&quot;&gt;3&lt;/div&gt;
        &lt;h3&gt;DAT Prelims Exam&lt;/h3&gt;
        &lt;p&gt;3-hour written test with MCQ + subjective questions. Tests design aptitude, creativity, visualization, observation skills, and general awareness.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card step-card&quot;&gt;
        &lt;div class=&quot;step-num&quot;&gt;4&lt;/div&gt;
        &lt;h3&gt;Prelims Result&lt;/h3&gt;
        &lt;p&gt;B.Des results: April 7, 2026. Only 1.5× candidates (of total seats) get shortlisted for Mains. Prelims score is NOT counted in final merit.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card step-card&quot;&gt;
        &lt;div class=&quot;step-num&quot;&gt;5&lt;/div&gt;
        &lt;h3&gt;DAT Mains - Studio Test&lt;/h3&gt;
        &lt;p&gt;For B.Des: Hands-on studio test — sketching, model-making, design exercises. For M.Des: Studio test + personal interview. Tests creativity under real constraints.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card step-card&quot;&gt;
        &lt;div class=&quot;step-num&quot;&gt;6&lt;/div&gt;
        &lt;h3&gt;Final Result &amp;#x26; Merit&lt;/h3&gt;
        &lt;p&gt;Final merit based entirely on Mains performance. Category-wise merit lists published. Campus and course preferences considered.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card step-card&quot;&gt;
        &lt;div class=&quot;step-num&quot;&gt;7&lt;/div&gt;
        &lt;h3&gt;Counselling &amp;#x26; Seat Allotment&lt;/h3&gt;
        &lt;p&gt;Expected June 2026. Submit campus preferences, verify documents, pay token fee. Round 2 for vacant seats follows.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card step-card&quot;&gt;
        &lt;div class=&quot;step-num&quot;&gt;8&lt;/div&gt;
        &lt;h3&gt;Report to Campus&lt;/h3&gt;
        &lt;p&gt;Report with original documents to allotted NID campus. Pay semester fees. Begin your design journey!&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/section&gt;

&lt;!-- ═══ RANKING ═══ --&gt;
&lt;section id=&quot;ranking&quot;&gt;
  &lt;div class=&quot;container&quot;&gt;
    &lt;h2 class=&quot;section-title&quot;&gt;NID Campus Rankings &amp;#x26; Recognition&lt;/h2&gt;
    &lt;p class=&quot;section-subtitle&quot;&gt;NID is an Institute of National Importance under the NID Act 2014&lt;/p&gt;

    &lt;div class=&quot;card fade-in&quot; style=&quot;margin-bottom:24px; background: linear-gradient(135deg,#e8eaf6,#fff8e1); border: none;&quot;&gt;
      &lt;h3 style=&quot;color:var(--primary); margin-bottom:12px;&quot;&gt;Important Note on NIRF Rankings&lt;/h3&gt;
      &lt;p&gt;The NIRF rankings released by the Ministry of Education do not have a separate &quot;Design&quot; category. Therefore, NID campuses are not directly ranked under NIRF in a dedicated design list. However, NID Ahmedabad holds a NIRF University Ranking of #45 and is ranked #1 in Academic Reputation in India by QS World University Rankings. NID is recognized as an Institute of National Importance by the Government of India.&lt;/p&gt;
    &lt;/div&gt;

    &lt;div class=&quot;table-wrapper fade-in&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;
          &lt;tr&gt;
            &lt;th&gt;NID Campus&lt;/th&gt;
            &lt;th&gt;Careers360 Rating&lt;/th&gt;
            &lt;th&gt;Established&lt;/th&gt;
            &lt;th&gt;Programs&lt;/th&gt;
            &lt;th&gt;Key Strength&lt;/th&gt;
          &lt;/tr&gt;
        &lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;NID Ahmedabad&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;AAAAA (Rank 1)&lt;/td&gt;&lt;td&gt;1961&lt;/td&gt;&lt;td&gt;B.Des, M.Des, PhD&lt;/td&gt;&lt;td&gt;Flagship campus, best placements&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;NID Gandhinagar&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;AAAA+&lt;/td&gt;&lt;td&gt;2015&lt;/td&gt;&lt;td&gt;M.Des&lt;/td&gt;&lt;td&gt;PG specializations focus&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;NID Bengaluru (R&amp;#x26;D)&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;AAAA+&lt;/td&gt;&lt;td&gt;2006&lt;/td&gt;&lt;td&gt;M.Des, PhD&lt;/td&gt;&lt;td&gt;90%+ placement rate&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;NID Andhra Pradesh&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;AAA+&lt;/td&gt;&lt;td&gt;2015&lt;/td&gt;&lt;td&gt;B.Des&lt;/td&gt;&lt;td&gt;Newer campus, growing infra&lt;/td&gt;&lt;/tr&gt;

&lt;!-- ═══ SAMPLE QUESTIONS ═══ --&gt;
&lt;section style=&quot;background:#f0f2ff;&quot;&gt;
  &lt;div class=&quot;container&quot;&gt;
    &lt;h2 class=&quot;section-title&quot;&gt;NID DAT Sample Questions&lt;/h2&gt;
    &lt;p class=&quot;section-subtitle&quot;&gt;Understand the type of questions asked in the NID Design Aptitude Test&lt;/p&gt;

    &lt;div class=&quot;accordion fade-in&quot;&gt;
      &lt;div class=&quot;acc-item&quot;&gt;
        &lt;div class=&quot;acc-header&quot; onclick=&quot;toggleAcc(this)&quot;&gt;
          &lt;span&gt;DAT Prelims — Design Aptitude &amp;#x26; Reasoning&lt;/span&gt;
          &lt;span class=&quot;acc-arrow&quot;&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;acc-body&quot;&gt;
          &lt;p&gt;&lt;strong&gt;Q:&lt;/strong&gt; Look at the sequence of shapes below. Which shape comes next in the pattern?&lt;br&gt;&lt;em&gt;(Visual reasoning — pattern recognition with geometric shapes)&lt;/em&gt;&lt;/p&gt;
          &lt;p style=&quot;margin-top:12px;&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; Identify the odd one out from the following set of design objects and explain your reasoning.&lt;br&gt;&lt;em&gt;(Tests visual classification and design awareness)&lt;/em&gt;&lt;/p&gt;
          &lt;p style=&quot;margin-top:12px;&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; What design principle is violated in the following product image? Suggest two improvements.&lt;br&gt;&lt;em&gt;(Tests critical observation and design thinking)&lt;/em&gt;&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;acc-item&quot;&gt;
        &lt;div class=&quot;acc-header&quot; onclick=&quot;toggleAcc(this)&quot;&gt;
          &lt;span&gt;DAT Prelims — General Awareness &amp;#x26; Visualization&lt;/span&gt;
          &lt;span class=&quot;acc-arrow&quot;&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;acc-body&quot;&gt;
          &lt;p&gt;&lt;strong&gt;Q:&lt;/strong&gt; Who designed the logo of the Indian Railways? What design principle does it follow?&lt;br&gt;&lt;em&gt;(Design history and general knowledge)&lt;/em&gt;&lt;/p&gt;
          &lt;p style=&quot;margin-top:12px;&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; A flat 2D shape is shown. Draw how it would appear as a 3D object when folded.&lt;br&gt;&lt;em&gt;(Spatial visualization — very common in NID DAT)&lt;/em&gt;&lt;/p&gt;
          &lt;p style=&quot;margin-top:12px;&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; Describe the concept of &quot;sustainable design&quot; with two real-world examples.&lt;br&gt;&lt;em&gt;(Current affairs + design awareness)&lt;/em&gt;&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;acc-item&quot;&gt;
        &lt;div class=&quot;acc-header&quot; onclick=&quot;toggleAcc(this)&quot;&gt;
          &lt;span&gt;DAT Mains — Studio Test (B.Des)&lt;/span&gt;
          &lt;span class=&quot;acc-arrow&quot;&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;acc-body&quot;&gt;
          &lt;p&gt;&lt;strong&gt;Q:&lt;/strong&gt; Using the materials provided (paper, scissors, tape, colors), create a 3D model of a &quot;public seating solution for elderly people in a park.&quot;&lt;br&gt;&lt;em&gt;(Tests creative problem-solving with constraints)&lt;/em&gt;&lt;/p&gt;
          &lt;p style=&quot;margin-top:12px;&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; Draw a series of 6 frames illustrating &quot;slow fashion and conscious buying&quot; — tell a visual story without using any text.&lt;br&gt;&lt;em&gt;(Visual storytelling and concept development)&lt;/em&gt;&lt;/p&gt;
          &lt;p style=&quot;margin-top:12px;&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; Redesign the packaging of a common Indian snack brand to appeal to health-conscious millennials.&lt;br&gt;&lt;em&gt;(Applied design thinking with market awareness)&lt;/em&gt;&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;acc-item&quot;&gt;
        &lt;div class=&quot;acc-header&quot; onclick=&quot;toggleAcc(this)&quot;&gt;
          &lt;span&gt;M.Des Interview — Typical Questions&lt;/span&gt;
          &lt;span class=&quot;acc-arrow&quot;&gt;▼&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;acc-body&quot;&gt;
          &lt;p&gt;&lt;strong&gt;Q:&lt;/strong&gt; Walk us through your design portfolio. What was your most challenging project and why?&lt;/p&gt;
          &lt;p style=&quot;margin-top:12px;&quot;&gt;&lt;strong&gt;Q:&lt;/strong&gt; How would you approach redesigning the voting experience in rural India?&lt;/p&gt;

&lt;!-- ═══ NRI / OVERSEAS ═══ --&gt;
&lt;section id=&quot;nri&quot;&gt;
  &lt;div class=&quot;container&quot;&gt;
    &lt;h2 class=&quot;section-title&quot;&gt;Overseas &amp;#x26; NRI Students — Admission Guide&lt;/h2&gt;
    &lt;p class=&quot;section-subtitle&quot;&gt;Complete procedure for international, NRI, OCI, and PIO candidates&lt;/p&gt;

    &lt;div class=&quot;nri-highlight fade-in&quot;&gt;
      &lt;h3 style=&quot;color:var(--primary); margin-bottom:8px;&quot;&gt;Key Eligibility Rules&lt;/h3&gt;
      &lt;div class=&quot;nri-grid&quot;&gt;
        &lt;div class=&quot;nri-card&quot;&gt;
          &lt;h4&gt;Overseas Category&lt;/h4&gt;
          &lt;p style=&quot;font-size:0.9rem; color:var(--muted);&quot;&gt;15% supernumerary seats reserved in B.Des and M.Des programs. Foreign passport holders with valid PIO or OCI cards can apply under this category. Separate fee structure applies.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;nri-card&quot;&gt;
          &lt;h4&gt;NRI with Indian Passport&lt;/h4&gt;
          &lt;p style=&quot;font-size:0.9rem; color:var(--muted);&quot;&gt;NRIs holding an Indian passport are NOT eligible for the Overseas category. They must apply as Indian nationals and compete in the general merit list with Indian fee structure.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;nri-card&quot;&gt;
          &lt;h4&gt;OCI / PIO Card Holders&lt;/h4&gt;
          &lt;p style=&quot;font-size:0.9rem; color:var(--muted);&quot;&gt;OCI and PIO cardholders must apply under the Overseas (supernumerary) category only. They pay fees equivalent to foreign citizens. No age relaxation or scribe facility available.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;nri-card&quot;&gt;
          &lt;h4&gt;Student Visa Requirement&lt;/h4&gt;
          &lt;p style=&quot;font-size:0.9rem; color:var(--muted);&quot;&gt;Overseas candidates must obtain a valid student visa for the entire program duration before joining NID. This is mandatory before experiencing campus life.&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card fade-in&quot; style=&quot;margin-top:24px;&quot;&gt;
      &lt;h3&gt;Documents Required for Overseas Applicants&lt;/h3&gt;
      &lt;div class=&quot;table-wrapper&quot; style=&quot;box-shadow:none;&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;

&lt;script&gt;
// Smooth scroll
document.querySelectorAll('nav a').forEach(a =&gt; {
  a.addEventListener('click', e =&gt; {
    e.preventDefault();
    const id = a.getAttribute('href');
    document.querySelector(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.querySelectorAll('nav a').forEach(n =&gt; n.classList.remove('active'));
    a.classList.add('active');
  });
});

// Fade-in on scroll
const obs = new IntersectionObserver(entries =&gt; {
  entries.forEach(e =&gt; { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.fade-in').forEach(el =&gt; obs.observe(el));

// Tab switching
function showTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p =&gt; p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b =&gt; b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

// Accordion
function toggleAcc(el) {
  el.parentElement.classList.toggle('open');
}

// Quiz calculation
function calculateResult() {
  let d = 0, e = 0, b = 0;
  for (let i = 1; i &lt;= 10; i++) {
    const sel = document.querySelector(`input[name=&quot;q${i}&quot;]:checked`);
    if (!sel) { alert('Please answer all 10 questions.'); return; }
    if (sel.value === 'D') d++;
    else if (sel.value === 'E') e++;
    else b++;
  }
  // Distribute balanced scores
  d += b * 0.4;
  e += b * 0.6;
  const total = d + e;
  const dPct = Math.round((d/total)*100);
  const ePct = 100 - dPct;

  document.getElementById('designMeter').style.width = dPct + '%';
  document.getElementById('engMeter').style.width = ePct + '%';
  document.getElementById('designPct').textContent = dPct + '%';
  document.getElementById('engPct').textContent = ePct + '%';

  let title, advice;
  if (dPct &gt;= 70) {
    title = '🎨 Strong Design Inclination — NID Could Be Your Ideal Path!';
    advice = 'Your responses indicate a strong creative and visual thinking orientation. You naturally gravitate toward design problems, aesthetics, and user experiences. NID\'s B.Des program would be an excellent fit. Start preparing for NID DAT with focus on sketching, visual reasoning, and design awareness. Consider specializations like Communication Design, Industrial Design, or UX/UI Design.';
  } else if (dPct &gt;= 50) {
    title = '🔀 Balanced Profile — Consider Design-Tech Intersection!';
    advice = 'You show appreciation for both technical and creative thinking. This makes you ideal for emerging fields at the intersection of design and technology — UX/UI Design, Interaction Design, or Design Engineering. Consider NID for a design foundation, or explore programs like B.Des at IIT (IDC), MIT Institute of Design, or Srishti that blend both worlds.';
  } else {
    title = '⚙️ Strong Engineering Inclination — Technical Path Recommended!';
    advice = 'Your responses suggest a strong analytical and logical thinking pattern. Engineering (B.Tech/B.E.) through JEE or state exams would align well with your strengths. However, if you have even a small creative spark, consider Computer Science with a focus on UX Engineering, Game Development, or Human-Computer Interaction — fields that value both technical skills and some design sensibility.';
  }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultAdvice').textContent = advice;
  document.getElementById('resultBox').classList.add('show');
  document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
}
&lt;/script&gt;
