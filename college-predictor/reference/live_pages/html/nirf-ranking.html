  --border:rgba(255,107,0,0.2);--text:#E8EDF8;--muted:#8892A8;
  --green:#22D3A0;--red:#F43F5E;--yellow:#FBBF24;--purple:#A78BFA;
}
body{background:var(--dark);color:var(--text);font-family:Arial,sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(255,107,0,0.04),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(26,79,170,0.05),transparent 60%);pointer-events:none;z-index:0;}
.header{position:sticky;top:0;z-index:200;background:rgba(13,15,24,0.97);backdrop-filter:blur(16px);border-bottom:2px solid var(--orange);display:flex;align-items:center;justify-content:space-between;padding:10px 24px;box-shadow:0 4px 30px rgba(255,107,0,0.15);}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-img{width:44px;height:44px;border-radius:8px;}
.brand h1{font-size:1.4rem;font-weight:700;background:linear-gradient(90deg,var(--orange),var(--blue2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1.5px;}
.brand p{font-size:0.65rem;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:10px;}
.badge{background:var(--orange);color:#fff;font-size:0.65rem;font-weight:700;padding:4px 11px;border-radius:20px;letter-spacing:1px;animation:pulseBadge 2.5s infinite;}
@keyframes pulseBadge{0%,100%{box-shadow:0 0 0 0 rgba(255,107,0,0.5);}50%{box-shadow:0 0 0 8px rgba(255,107,0,0);}}
.nirf-ref{font-size:0.62rem;color:var(--muted);text-align:right;line-height:1.4;}
.nav-wrap{position:sticky;top:66px;z-index:190;background:var(--dark2);border-bottom:1px solid rgba(255,107,0,0.1);overflow-x:auto;}
.nav{display:flex;gap:2px;padding:10px 16px;white-space:nowrap;}
.nav-btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-family:Arial,sans-serif;font-size:0.85rem;font-weight:700;background:transparent;color:var(--muted);transition:all 0.2s;}
.nav-btn:hover{color:var(--orange);background:rgba(255,107,0,0.08);}
.nav-btn.active{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;box-shadow:0 3px 14px rgba(255,107,0,0.4);}
main{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:24px 20px;}
.section{display:none;animation:fadeUp 0.35s ease;}
.section.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 16px;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(255,107,0,0.18);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange),var(--blue2));}
.stat-num{font-size:2rem;font-weight:700;color:var(--orange);line-height:1;}
.stat-lbl{font-size:0.72rem;color:var(--muted);margin-top:5px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;}
.stat-sub{font-size:0.7rem;color:var(--green);margin-top:4px;}
.sec-title{font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:18px;display:flex;align-items:center;gap:12px;}
.sec-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--orange),transparent);}
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:24px;}
.tbl-controls{padding:14px 18px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;border-bottom:1px solid rgba(255,255,255,0.05);background:rgba(255,107,0,0.03);}
.ctrl-group{display:flex;flex-direction:column;gap:4px;}
.ctrl-search{flex:1;min-width:180px;background:var(--dark3);border:1px solid rgba(255,107,0,0.2);border-radius:8px;padding:8px 13px;color:var(--text);font-family:Arial,sans-serif;font-size:0.875rem;outline:none;transition:border-color 0.2s;}
.ctrl-search:focus{border-color:var(--orange);}
.ctrl-search::placeholder{color:var(--muted);}
.ctrl-select{background:var(--dark3);border:1px solid rgba(255,107,0,0.2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:Arial,sans-serif;font-size:0.82rem;outline:none;cursor:pointer;}
.ctrl-label{font-size:0.68rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.8px;}
.tbl-info{font-size:0.75rem;color:var(--muted);}
.tbl-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:700px;}
thead{background:rgba(255,107,0,0.06);}
th{padding:11px 14px;text-align:left;font-size:0.78rem;font-weight:700;color:var(--orange);letter-spacing:0.5px;text-transform:uppercase;border-bottom:1px solid rgba(255,107,0,0.12);cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{color:var(--orange2);}
td{padding:10px 14px;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
tr:hover td{background:rgba(255,107,0,0.04);}
tr:last-child td{border-bottom:none;}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:34px;padding:0 6px;border-radius:8px;font-weight:700;font-size:0.88rem;}
.r1{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;}
.r2{background:linear-gradient(135deg,#C0C0C0,#909090);color:#000;}
.r3{background:linear-gradient(135deg,#CD7F32,#8B4513);color:#fff;}
.r-top{background:rgba(255,107,0,0.15);color:var(--orange);border:1px solid rgba(255,107,0,0.3);}
.r-band{background:rgba(255,255,255,0.06);color:var(--muted);border:1px solid rgba(255,255,255,0.1);font-size:0.7rem;}
.score-cell{display:flex;align-items:center;gap:8px;}
.score-track{width:80px;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;flex-shrink:0;}
.score-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--orange),var(--blue2));}
.score-val{font-size:0.8rem;color:var(--orange);font-weight:700;min-width:34px;}
.type-tag{padding:2px 7px;border-radius:4px;font-size:0.7rem;font-weight:700;text-transform:uppercase;}
.type-IIT{background:rgba(255,107,0,0.15);color:var(--orange);}
.type-IISc{background:rgba(34,211,160,0.15);color:var(--green);}
.type-NIT{background:rgba(251,191,36,0.15);color:var(--yellow);}
.type-IIIT{background:rgba(167,139,250,0.15);color:var(--purple);}
.type-BITS{background:rgba(244,63,94,0.15);color:var(--red);}
.type-University{background:rgba(37,99,235,0.15);color:var(--blue2);}
.type-Private{background:rgba(255,255,255,0.08);color:var(--muted);}
.type-Govt{background:rgba(34,211,160,0.1);color:var(--green);}
.state-tag{background:rgba(26,79,170,0.15);color:var(--blue2);padding:2px 7px;border-radius:4px;font-size:0.72rem;font-weight:700;}
.web-link{display:inline-flex;align-items:center;gap:4px;color:var(--blue2);text-decoration:none;font-size:0.78rem;font-weight:700;padding:3px 8px;border-radius:5px;border:1px solid rgba(37,99,235,0.3);transition:all 0.2s;white-space:nowrap;}
.web-link:hover{background:rgba(37,99,235,0.12);color:#60A5FA;}
.band-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.68rem;font-weight:700;}
.band-1{background:rgba(34,211,160,0.12);color:var(--green);border:1px solid rgba(34,211,160,0.25);}
.band-2{background:rgba(251,191,36,0.12);color:var(--yellow);border:1px solid rgba(251,191,36,0.25);}
.band-3{background:rgba(244,63,94,0.12);color:var(--red);border:1px solid rgba(244,63,94,0.25);}
.band-4{background:rgba(255,255,255,0.06);color:var(--muted);border:1px solid rgba(255,255,255,0.12);}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px;}
@media(max-width:900px){.charts-row{grid-template-columns:1fr;}}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 20px 14px;height:380px;display:flex;flex-direction:column;}
.chart-title{font-size:0.88rem;font-weight:700;color:var(--orange);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0;}
.chart-box canvas{flex:1;min-height:0;max-height:320px;}
.ov-charts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:24px;}
@media(max-width:1100px){.ov-charts{grid-template-columns:1fr 1fr;}}
@media(max-width:700px){.ov-charts{grid-template-columns:1fr;}}
.ov-chart-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 18px 12px;height:300px;display:flex;flex-direction:column;}
.ov-chart-box .chart-title{flex-shrink:0;}
.ov-chart-box canvas{flex:1;min-height:0;max-height:240px;}
/* QUADRANT */
.q-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:24px;}
.q-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:18px;}
.q-meta{font-size:0.8rem;color:var(--muted);line-height:1.8;max-width:520px;}
.q-meta strong{color:var(--orange);}
.q-legend{display:flex;flex-direction:column;gap:8px;align-self:flex-start;}
.ql{display:flex;align-items:center;gap:8px;font-size:0.75rem;color:var(--muted);}
.ql-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;}
.q-controls{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;align-items:flex-end;}
.q-canvas-wrap{width:100%;height:520px;position:relative;}
.state-detail{background:var(--dark3);border:1px solid rgba(255,107,0,0.3);border-radius:12px;padding:18px 20px;margin-top:18px;display:none;}
.sd-title{font-size:1rem;font-weight:700;color:var(--orange);margin-bottom:14px;}
.sd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.sd-stat{text-align:center;background:var(--card);border-radius:10px;padding:14px 8px;}
.sd-num{font-size:1.6rem;font-weight:700;color:var(--text);}
.sd-lbl{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px;}
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:24px;}
.cmp-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;transition:transform 0.2s;}
.cmp-card:hover{transform:translateY(-2px);}
.cmp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;background:linear-gradient(90deg,var(--orange),var(--blue2));}
.cmp-card h3{font-size:0.88rem;font-weight:700;color:var(--orange);margin-bottom:12px;}
.cmp-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.82rem;}
.cmp-row:last-child{border-bottom:none;}
.cmp-k{color:var(--muted);}
.cmp-v{font-weight:700;}
.top-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:24px;}
.top-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;gap:14px;align-items:flex-start;transition:all 0.2s;}
.top-card:hover{border-color:var(--orange);box-shadow:0 6px 24px rgba(255,107,0,0.14);}
.tc-rank{font-size:1.8rem;font-weight:700;color:var(--orange);min-width:40px;line-height:1;}
.tc-rank.gold{color:#FFD700;}.tc-rank.silver{color:#C0C0C0;}.tc-rank.bronze{color:#CD7F32;}
.tc-body{flex:1;}
.tc-name{font-weight:700;font-size:0.9rem;margin-bottom:4px;color:#fff;}
.tc-city{font-size:0.74rem;color:var(--muted);margin-bottom:6px;}
.tc-score{font-size:1.2rem;font-weight:700;color:var(--orange);}
.tc-web{display:inline-flex;align-items:center;gap:4px;color:var(--blue2);font-size:0.73rem;text-decoration:none;margin-top:6px;font-weight:700;border:1px solid rgba(37,99,235,0.3);padding:2px 7px;border-radius:4px;transition:all 0.2s;}
.tc-web:hover{background:rgba(37,99,235,0.12);}
.pagination{display:flex;align-items:center;gap:6px;padding:12px 18px;border-top:1px solid rgba(255,255,255,0.04);flex-wrap:wrap;}
.pg-btn{padding:6px 12px;border-radius:6px;border:1px solid rgba(255,107,0,0.25);background:transparent;color:var(--muted);cursor:pointer;font-family:Arial,sans-serif;font-size:0.82rem;transition:all 0.18s;}
.pg-btn:hover{border-color:var(--orange);color:var(--orange);}
.pg-btn.active{background:var(--orange);border-color:var(--orange);color:#fff;}
.pg-info{font-size:0.75rem;color:var(--muted);margin-left:auto;}
.note-bar{background:rgba(255,107,0,0.04);border:1px solid rgba(255,107,0,0.15);border-radius:10px;padding:14px 18px;display:flex;gap:10px;align-items:flex-start;margin-top:30px;margin-bottom:10px;}
.note-bar p{font-size:0.74rem;color:var(--muted);line-height:1.7;}
.note-bar strong{color:var(--orange);}
.note-bar a{color:var(--blue2);text-decoration:none;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--dark2);}
::-webkit-scrollbar-thumb{background:rgba(255,107,0,0.35);border-radius:3px;}
.state-pills{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px;margin-bottom:18px;}
.sp{background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:11px;cursor:pointer;text-align:center;transition:all 0.18s;}
.sp:hover,.sp.sel{border-color:var(--orange);background:rgba(255,107,0,0.08);}
.sp-num{font-size:1.4rem;font-weight:700;color:var(--orange);}
.sp-name{font-size:0.65rem;color:var(--muted);margin-top:2px;}
@media(max-width:768px){
  .header{padding:8px 14px;}main{padding:14px 12px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .tbl-controls{flex-direction:column;}
  .ctrl-search,.ctrl-select{width:100%;}
  th,td{padding:8px 10px;}
  .score-track{display:none;}
  .nirf-ref{display:none;}
  .stat-num{font-size:1.5rem;}
  .sd-grid{grid-template-columns:repeat(2,1fr);}
}

// ── helpers ──
function getRankBadge(r){
  if(r===1) return '&lt;span class=&quot;rank-badge r1&quot;&gt;1&lt;/span&gt;';
  if(r===2) return '&lt;span class=&quot;rank-badge r2&quot;&gt;2&lt;/span&gt;';
  if(r===3) return '&lt;span class=&quot;rank-badge r3&quot;&gt;3&lt;/span&gt;';
  if(r&amp;&amp;r&lt;=10) return `&lt;span class=&quot;rank-badge r-top&quot;&gt;${r}&lt;/span&gt;`;
  if(r) return `&lt;span class=&quot;rank-badge r-top&quot; style=&quot;font-size:0.8rem&quot;&gt;${r}&lt;/span&gt;`;
  return '&lt;span class=&quot;rank-badge r-band&quot;&gt;&amp;mdash;&lt;/span&gt;';
}
function getScore(s){
  if(!s) return '&lt;span style=&quot;color:var(--muted);font-size:0.78rem&quot;&gt;Band ranked&lt;/span&gt;';
  return `&lt;div class=&quot;score-cell&quot;&gt;&lt;div class=&quot;score-track&quot;&gt;&lt;div class=&quot;score-fill&quot; style=&quot;width:${((s/90)*100).toFixed(0)}%&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span class=&quot;score-val&quot;&gt;${s.toFixed(2)}&lt;/span&gt;&lt;/div&gt;`;
}
function getType(t){return `&lt;span class=&quot;type-tag type-${t}&quot;&gt;${t}&lt;/span&gt;`;}
function getSt(s){return `&lt;span class=&quot;state-tag&quot;&gt;${s}&lt;/span&gt;`;}
function getBand(b){
  const m={&quot;Rank 1 -100&quot;:&quot;band-1&quot;,&quot;Rank 101-150&quot;:&quot;band-2&quot;,&quot;Rank 151 to 200&quot;:&quot;band-3&quot;,&quot;Rank 201 to 300&quot;:&quot;band-4&quot;};
  const l={&quot;Rank 1 -100&quot;:&quot;1&amp;ndash;100&quot;,&quot;Rank 101-150&quot;:&quot;101&amp;ndash;150&quot;,&quot;Rank 151 to 200&quot;:&quot;151&amp;ndash;200&quot;,&quot;Rank 201 to 300&quot;:&quot;201&amp;ndash;300&quot;};
  return `&lt;span class=&quot;band-badge ${m[b]||'band-4'}&quot;&gt;${l[b]||b}&lt;/span&gt;`;
}
function getLink(url){
  const d=url.replace(/https?:\/\//,'').split('/')[0];
  return `&lt;a class=&quot;web-link&quot; href=&quot;${url}&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;&gt;&amp;#127760; ${d.substring(0,18)}&lt;/a&gt;`;
}
function makeTopCard(r,i){
  const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
  return `&lt;div class=&quot;top-card&quot;&gt;

// ── Build state data ──
function buildStateData(){
  const map={};
  DATA.forEach(r=&gt;{
    if(!map[r.state]) map[r.state]={state:r.state,total:0,in100:0,in150:0,bestRank:null,bestScore:null,scores:[],colleges:[]};
    const s=map[r.state];
    s.total++;
    s.colleges.push(r);
    if(r.rank&amp;&amp;r.rank&lt;=100) s.in100++;
    if(r.rank&amp;&amp;r.rank&lt;=150) s.in150++;
    if(r.rank&amp;&amp;(s.bestRank===null||r.rank&lt;s.bestRank)) s.bestRank=r.rank;
    if(r.score){s.scores.push(r.score);if(s.bestScore===null||r.score&gt;s.bestScore)s.bestScore=r.score;}
  });
  Object.values(map).forEach(s=&gt;{
    s.avgScore=s.scores.length?+(s.scores.reduce((a,b)=&gt;a+b,0)/s.scores.length).toFixed(2):0;
    s.colleges.sort((a,b)=&gt;{if(a.rank&amp;&amp;b.rank)return a.rank-b.rank;if(a.rank)return -1;if(b.rank)return 1;return a.name.localeCompare(b.name);});
  });
  return Object.values(map).sort((a,b)=&gt;b.total-a.total);
}
const STATE_DATA=buildStateData();

let qChart=null;

function getAxisVal(s,key){
  if(key==='in100') return s.in100;
  if(key==='in150') return s.in150;
  if(key==='bestScore') return s.bestScore||0;
  if(key==='avgScore') return s.avgScore||0;
  if(key==='total') return s.total;
  return s.total;
}
function getAxisLabel(key){
  const labels={
    in100:'Colleges in Rank 1\u201C100',in150:'Colleges in Rank 1\u2013150',
    bestScore:'Best NIRF Score',avgScore:'Avg NIRF Score (ranked)',total:'Total Colleges'
  };
  return labels[key]||key;
}

function redrawQuadrant(){
  if(!document.getElementById('quadrantChart')) return;
  const yKey=document.getElementById('yAxisSel').value;
  const xKey=document.getElementById('xAxisSel').value;
  const labelMode=document.getElementById('labelSel').value;

  const pts=STATE_DATA.map(s=&gt;{
    const x=getAxisVal(s,xKey);
    const y=getAxisVal(s,yKey);
    const br=s.bestRank?Math.max(7,Math.min(30,32-(s.bestRank/100)*22)):5;
    return {x,y,r:br,_s:s,_st:s.state};
  });

  const allX=pts.map(p=&gt;p.x).sort((a,b)=&gt;a-b);
  const allY=pts.map(p=&gt;p.y).sort((a,b)=&gt;a-b);
  const xMed=allX[Math.floor(allX.length/2)];
  const yMed=allY[Math.floor(allY.length/2)];

  const byQ=[[],[],[],[]]; // Elite, Efficient, Developing, Emerging
  pts.forEach(p=&gt;{
    const hi_x=p.x&gt;=xMed, hi_y=p.y&gt;=yMed;
    if(hi_x&amp;&amp;hi_y) byQ[0].push(p);
    else if(!hi_x&amp;&amp;hi_y) byQ[1].push(p);
    else if(hi_x&amp;&amp;!hi_y) byQ[2].push(p);
    else byQ[3].push(p);
  });

  const datasets=[
    {label:'Elite (High vol \xb7 High rank)',data:byQ[0],backgroundColor:'rgba(255,107,0,0.78)',borderColor:'rgba(255,107,0,1)',borderWidth:2,hoverBorderWidth:3},
    {label:'Efficient (Low vol \xb7 High rank)',data:byQ[1],backgroundColor:'rgba(34,211,160,0.78)',borderColor:'rgba(34,211,160,1)',borderWidth:2,hoverBorderWidth:3},
    {label:'Developing (High vol \xb7 Low rank)',data:byQ[2],backgroundColor:'rgba(251,191,36,0.78)',borderColor:'rgba(251,191,36,1)',borderWidth:2,hoverBorderWidth:3},
    {label:'Emerging (Low vol \xb7 Low rank)',data:byQ[3],backgroundColor:'rgba(107,120,152,0.78)',borderColor:'rgba(107,120,152,1)',borderWidth:2,hoverBorderWidth:3},
  ];

  const top10states=STATE_DATA.slice(0,10).map(s=&gt;s.state);

  const pluginQuadLines={
    id:'quadLines',
    afterDraw(chart){
      const {ctx,scales}=chart;
      const xS=scales.x,yS=scales.y;
      const xPx=xS.getPixelForValue(xMed);
      const yPx=yS.getPixelForValue(yMed);
      ctx.save();
      ctx.setLineDash([7,5]);
      ctx.strokeStyle='rgba(255,255,255,0.14)';
      ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(xPx,yS.top);ctx.lineTo(xPx,yS.bottom);ctx.stroke();
      ctx.beginPath();ctx.moveTo(xS.left,yPx);ctx.lineTo(xS.right,yPx);ctx.stroke();
      ctx.setLineDash([]);
      // Quadrant watermark labels
      const lw=(xS.right-xS.left)/2, lh=(yS.bottom-yS.top)/2;
      ctx.font='bold 13px Arial';
      ctx.fillStyle='rgba(255,255,255,0.07)';
      ctx.textAlign='center';
      ctx.fillText('ELITE'        , xPx+lw*0.55, yS.top+26);
      ctx.fillText('EFFICIENT'    , xPx-lw*0.55, yS.top+26);
      ctx.fillText('DEVELOPING'   , xPx+lw*0.55, yS.bottom-14);
      ctx.fillText('EMERGING'     , xPx-lw*0.55, yS.bottom-14);
      ctx.restore();
    }
  };

  const pluginLabels={
    id:'stateLabels',
    afterDatasetsDraw(chart){
      const {ctx}=chart;
      chart.data.datasets.forEach((ds,di)=&gt;{
        const meta=chart.getDatasetMeta(di);
        if(!meta.visible) return;
        ds.data.forEach((pt,pi)=&gt;{
          const el=meta.data[pi];
          if(!el) return;
          const show=labelMode==='always'||(labelMode==='top10'&amp;&amp;top10states.includes(pt._st));
          if(!show) return;
          const s=pt._st;
          const short=s.length&gt;13?s.substring(0,12)+'\u2026':s;
          const rad=el.options.radius||8;
          ctx.save();
          ctx.font='bold 9.5px Arial';
          ctx.fillStyle='rgba(255,255,255,0.88)';
          ctx.textAlign='center';
          ctx.textBaseline='top';
          ctx.shadowColor='rgba(0,0,0,0.9)';
          ctx.shadowBlur=5;
          ctx.fillText(short,el.x,el.y+rad+4);
          ctx.restore();
        });
      });
    }
  };

  if(qChart){qChart.destroy();qChart=null;}

  qChart=new Chart(document.getElementById('quadrantChart'),{
    type:'bubble',
    data:{datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      aspectRatio:1.8,
      interaction:{mode:'nearest',intersect:true},
      plugins:{
        legend:{
          position:'bottom',
          labels:{color:'rgba(232,237,248,0.65)',font:{size:11,family:'Arial'},boxWidth:12,padding:18}
        },
        tooltip:{
          backgroundColor:'rgba(10,13,22,0.97)',
          titleColor:'#FF6B00',bodyColor:'rgba(232,237,248,0.85)',
          borderColor:'rgba(255,107,0,0.45)',borderWidth:1,padding:14,
          callbacks:{
            title:items=&gt;items[0]?.raw?._st||'',
            label:item=&gt;{
              const s=item.raw?._s;
              if(!s) return '';
              return [
                ` Total colleges: ${s.total}`,
                ` In Rank 1\u2013100: ${s.in100}`,
                ` Best rank: ${s.bestRank?'#'+s.bestRank:'\u2014'}`,
                ` Best score: ${s.bestScore?s.bestScore.toFixed(2):'\u2014'}`,
                ` Avg score: ${s.avgScore?s.avgScore.toFixed(2):'\u2014'}`,
              ];
            }
          }
        }
      },
      scales:{
        x:{
          title:{display:true,text:getAxisLabel(xKey),color:'rgba(255,107,0,0.75)',font:{size:12,weight:'bold',family:'Arial'},padding:{top:8}},
          ticks:{color:'rgba(232,237,248,0.5)',font:{size:10,family:'Arial'}},
          grid:{color:'rgba(255,255,255,0.04)'},
          border:{color:'rgba(255,107,0,0.2)'}
        },
        y:{
          title:{display:true,text:getAxisLabel(yKey),color:'rgba(255,107,0,0.75)',font:{size:12,weight:'bold',family:'Arial'},padding:{bottom:8}},
          ticks:{color:'rgba(232,237,248,0.5)',font:{size:10,family:'Arial'}},
          grid:{color:'rgba(255,255,255,0.04)'},
          border:{color:'rgba(255,107,0,0.2)'}
        }
      },
      onClick(e,elements){
        if(!elements.length) return;
        const el=elements[0];
        const pt=qChart.data.datasets[el.datasetIndex].data[el.index];
        if(pt?._s) showStateDetail(pt._s);
      },
      animation:{duration:400}
    },
    plugins:[pluginQuadLines,pluginLabels]
  });
}

let stSortKey='total',stSortDir=-1;
function sortST(key){
  if(stSortKey===key) stSortDir*=-1; else{stSortKey=key;stSortDir=-1;}
  renderStateTable([...STATE_DATA].sort((a,b)=&gt;{
    if(key==='state') return stSortDir*a.state.localeCompare(b.state);
    if(key==='idx') return stSortDir*(STATE_DATA.indexOf(a)-STATE_DATA.indexOf(b));
    const av=a[key]??-1,bv=b[key]??-1;
    if(key==='bestRank') return stSortDir&gt;0?(av===null?1:bv===null?-1:av-bv):(av===null?1:bv===null?-1:av-bv)*-1;
    return stSortDir*(bv-av);
  }));
}

let filt=[...DATA],pg=1,ps=25;
function applyF(){
  const s=document.getElementById('mainSearch').value.toLowerCase();
  const st=document.getElementById('stateFilter').value;
  const ty=document.getElementById('typeFilter').value;
  const bd=document.getElementById('bandFilter').value;
  const so=document.getElementById('sortFilter').value;
  filt=DATA.filter(r=&gt;{
    if(s&amp;&amp;!r.name.toLowerCase().includes(s)&amp;&amp;!r.city.toLowerCase().includes(s)&amp;&amp;!r.state.toLowerCase().includes(s)) return false;
    if(st&amp;&amp;r.state!==st) return false;
    if(ty&amp;&amp;r.type!==ty) return false;
    if(bd&amp;&amp;r.band!==bd) return false;
    return true;
  });
  if(so==='rank') filt.sort((a,b)=&gt;(a.rank||9999)-(b.rank||9999));
  else if(so==='score') filt.sort((a,b)=&gt;(b.score||0)-(a.score||0));
  else if(so==='name') filt.sort((a,b)=&gt;a.name.localeCompare(b.name));
  else if(so==='state') filt.sort((a,b)=&gt;a.state.localeCompare(b.state));
  pg=1;renderTbl();renderPag();
  document.getElementById('tblCount').textContent=filt.length+' institutions';
}
function renderTbl(){
  const sl=filt.slice((pg-1)*ps,pg*ps);
  document.getElementById('mainBody').innerHTML=sl.map(r=&gt;`&lt;tr&gt;
    &lt;td&gt;${getRankBadge(r.rank)}&lt;/td&gt;
    &lt;td&gt;&lt;span style=&quot;font-weight:700&quot;&gt;${r.name}&lt;/span&gt;&lt;/td&gt;
    &lt;td&gt;${getScore(r.score)}&lt;/td&gt;
    &lt;td&gt;${getBand(r.band)}&lt;/td&gt;
    &lt;td style=&quot;font-size:0.82rem&quot;&gt;${r.city}&lt;/td&gt;
    &lt;td&gt;${getSt(r.state)}&lt;/td&gt;
    &lt;td&gt;${getType(r.type)}&lt;/td&gt;
    &lt;td&gt;${getLink(r.url)}&lt;/td&gt;
  &lt;/tr&gt;`).join('');
}
function renderPag(){
  const tot=Math.ceil(filt.length/ps);
  const pages=[1,pg-1,pg,pg+1,tot].filter(p=&gt;p&gt;=1&amp;&amp;p&lt;=tot);
  const uniq=[...new Set(pages)].sort((a,b)=&gt;a-b);
  let html='',prev=-1;
  uniq.forEach(p=&gt;{
    if(prev!==-1&amp;&amp;p-prev&gt;1) html+='&lt;span style=&quot;color:var(--muted);padding:0 4px&quot;&gt;&amp;hellip;&lt;/span&gt;';
    html+=`&lt;button class=&quot;pg-btn ${p===pg?'active':''}&quot; data-pg=&quot;${p}&quot;&gt;${p}&lt;/button&gt;`;
    prev=p;
  });
  html+=`&lt;span class=&quot;pg-info&quot;&gt;Page ${pg}/${tot} &amp;middot; ${filt.length} results&lt;/span&gt;`;
  document.getElementById('pagination').innerHTML=html;
  document.querySelectorAll('.pg-btn[data-pg]').forEach(b=&gt;
    b.addEventListener('click',()=&gt;{pg=+b.dataset.pg;renderTbl();renderPag();}));
}

 */\n.who-outer { background: #fff; padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); }\n.who-inner { max-width: 1160px; margin: 0 auto; }\n.who-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .who-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .who-grid { grid-template-columns: 1fr 1fr; } }\n\n.wc { border-radius: 16px; padding: 25px 22px; border: 1.5px solid #E5DDD0; background: #fff; }\n.wi { font-size: 1.9rem; margin-bottom: 10px; display: block; }\n.wt { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; color: #1A1A2E; }\n.wp { font-family: Arial, sans-serif; font-size: 0.86rem; line-height: 1.72; color: #6B7280; }\n.wb { display: inline-block; margin-top: 13px; font-family: Arial, sans-serif; font-size: 0.73rem; font-weight: 700; padding: 4px 13px; border-radius: 100px; }\n.wb-a  { background: #D8F3DC; color: #2D6A4F; }\n.wb-c  { background: #DBE9FF; color: #1B4F9B; }\n.wb-ca { background: #FFE0E4; color: #8B2635; }\n\n/* QUIZ */\n.quiz-outer {\n  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 55%, #0F3460 100%);\n  padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px);\n  text-align: center;\n}\n.quiz-inner { max-width: 1160px; margin: 0 auto; }\n.qbox {\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.12);\n  border-radius: 20px;\n  padding: clamp(24px,5vw,48px);\n  max-width: 660px;\n  margin: 44px auto 0;\n}\n.qprog { font-family: Arial, sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.32); margin-bottom: 7px; letter-spacing: 1.2px; text-transform: uppercase; }\n.qtext { font-family: Arial, sans-serif; font-size: clamp(1rem,2.5vw,1.25rem); font-weight: 700; color: #fff; margin-bottom: 22px; line-height: 1.5; }\n.qopts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }\n@media (max-width: 480px) { .qopts { grid-template-columns: 1fr; } }\n.qopt {\n  background: rgba(255,255,255,0.07);\n  border: 1.5px solid rgba(255,255,255,0.14);\n  border-radius: 12px;\n  padding: 14px 15px;\n  text-align: left;\n  color: rgba(255,255,255,0.78);\n  font-family: Arial, sans-serif;\n  font-size: 0.87rem;\n  font-weight: 600;\n  cursor: pointer;\n  transition: all 0.18s;\n  line-height: 1.4;\n}\n.qopt:hover, .qopt.sel {\n  background: rgba(201,168,76,0.18);\n  border-color: #C9A84C;\n  color: #fff;\n}\n.qnav { margin-top: 22px; }\n.qnext {\n  background: transparent;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  color: #fff;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 13px 30px;\n  border-radius: 100px;\n  cursor: pointer;\n  display: none;\n}\n.qresult { display: none; text-align: center; }\n.rbadge { display: inline-block; font-size: 2.6rem; font-weight: 900; padding: 16px 32px; border-radius: 14px; margin-bottom: 15px; }\n.rb-a  { background: #D8F3DC; color: #2D6A4F; }\n.rb-c  { background: #DBE9FF; color: #1B4F9B; }\n.rb-ca { background: #FFE0E4; color: #8B2635; }\n.rtitle { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 11px; }\n.rtext { font-family: Arial, sans-serif; font-size: 0.94rem; color: rgba(255,255,255,0.56); max-width: 420px; margin: 0 auto 22px; line-height: 1.72; }\n.btn-retry { background: #C9A84C; color: #1A1A2E; font-family: Arial, sans-serif; font-size: 0.93rem; font-weight: 700; padding: 13px 30px; border-radius: 100px; border: none; cursor: pointer; }\n\n/* FAQ */\n.faq-outer { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); background: #F9F5EE; }\n.faq-inner { max-width: 1160px; margin: 0 auto; }\n.faq-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .faq-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .faq-grid { grid-template-columns: 1fr 1fr; } }\n.fi { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid #E5DDD0; }\n.fq { font-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }\n.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }\n\n/* FOOTER */\nfooter { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;     o:[{t:"🌐 Global recognition / working abroad",s:{acca:3}},{t:"💰 Highest salary in investment finance",s:{cfa:3}},{t:"🏆 Prestigious local qualification",s:{ca:3}},{t:"⚡ Fastest route to a finance career",s:{acca:2}}]
  }
];

var cur=0, sc={acca:0,cfa:0,ca:0}, pend=null;

function pick(btn,idx){
  var all=document.querySelectorAll('.qopt');
  for(var i=0;i<all.length;i++) all[i].classList.remove('sel');
  btn.classList.add('sel');
  pend=Qs[cur].o[idx].s;
  document.getElementById('qNext').style.display='inline-block';
}

function nextQ(){
  if(!pend) return;
  for(var k in pend) sc[k]=(sc[k]||0)+pend[k];
  pend=null; cur++;
  if(cur>=Qs.length){ showRes(); return; }
  document.getElementById('qProg').textContent='Question '+(cur+1)+' of '+Qs.length;
  document.getElementById('qText').textContent=Qs[cur].q;
  var html='';
  for(var i=0;i<Qs[cur].o.length;i++) html+='<button class="qopt" onclick="pick(this,'+i+')">'+Qs[cur].o[i].t+'</button>';
  document.getElementById('qOpts').innerHTML=html;
  document.getElementById('qNext').style.display='none';
}

function showRes(){
  var keys=Object.keys(sc).sort(function(a,b){return sc[b]-sc[a];});
  var w=keys[0];
  var info={
    acca:{n:'ACCA',cls:'rb-a', ti:'ACCA is your ideal match!', tx:'Your goals align with ACCA — global flexibility, modular study structure, and recognition in 180+ countries.'},
    cfa:{n:'CFA',cls:'rb-c', ti:'CFA is your ideal match!', tx:'Your passion for investment and markets points to the CFA Charter — the gold standard for finance professionals worldwide.'},
    ca:{n:'CA',cls:'rb-ca', ti:'CA is your ideal match!', tx:'Your preference for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}
  }[w];
  document.getElementById('qMain').style.display='none';
  document.getElementById('qResult').style.display='block';
  var b=document.getElementById('rBadge');
  b.textContent=info.n; b.className='rbadge '+info.cls;
  document.getElementById('rTitle').textContent=info.ti;
  document.getElementById('rText').textContent=info.tx;
}

function resetQ(){
  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;
  document.getElementById('qResult').style.display='none';
  document.getElementById('qMain').style.display='block';
  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;
  document.getElementById('qText').textContent=Qs[0].q;
  var html='';
  for(var i=0;i<Qs[0].o.length;i++) html+='<button class="qopt" onclick="pick(this,'+i+')">'+Qs[0].o[i].t+'</button>';
  document.getElementById('qOpts').innerHTML=html;
  document.getElementById('qNext').style.display='none';
}
</script>  </body></html>
