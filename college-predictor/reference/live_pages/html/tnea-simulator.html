VIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;,s:{acca:2}}]\n  },\n  { q:\&quot;How can you dedicate time to studying?\&quot;,\n    o:[{t:\&quot;⏱️ Part-time alongside my job\&quot;,s:{acca:2}},{t:\&quot;📚 Intense focused study windows\&quot;,s:{cfa:2}},{t:\&quot;🎓 Full-time with practical training\&quot;,s:{ca:2}},{t:\&quot;🔄 Flexible — whatever it takes\&quot;,s:{acca:1,cfa:1,ca:1}}]\n  },\n  { q:\&quot;What matters most in a qualification?\&quot;,\n    o:[{t:\ ElementById('rBadge');\n  b.textContent=info.n; b.className='rbadge '+info.cls;\n  document.getElementById('rTitle').textContent=info.ti;\n  document.getElementById('rText').textContent=info.tx;\n}\n\nfunction resetQ(){\n  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;\n  document.getElementById('qResult').style.display='none';\n  document.getElementById('qMain').style.display='block';\n  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[0].q;\n  var html='';\n  for(var i=0;i&lt;Qs[0].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[0].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n&lt;/script&gt;\n\n&lt;/body&gt;\n&lt;/html&gt;&quot;],&quot;aiWebsiteType&quot;:[0,&quot;Business&quot;],&quot;defaultLocale&quot;:[0,&quot;system&quot;],&quot;ecommerceType&quot;:[0,&quot;zyro&quot;],&quot;ecommerceStoreId&quot;:[0,&quot;store_01JHQFP88TYM5V4HHK85069RHQ&quot;],&quot;customBodyElements&quot;:[0,&quot;&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;,s:{acca:2}}]\n  },\n  { q:\&quot;How can you dedicate time to studying?\&quot;,\n    o:[{t:\&quot;⏱️ Part-time alongside my job\&quot;,s:{acca:2}},{t:\&quot;📚 Intense focused study windows\&quot;,s:{cfa:2}},{t:\&quot;🎓 Full-time with practical training\&quot;,s:{ca:2}},{t:\&quot;🔄 Flexible — whatever it takes\&quot;,s:{acca:1,cfa:1,ca:1}}]\n  },\n  { q:\&quot;What matters most in a qualification?\&quot;,\n    o:[{t:\&quot;🌐 Global recognition / working abroad\&quot;,s:{acca:3}},{t:\&quot;💰 Highest salary in investment finance\&quot;,s:{cfa:3}},{t:\&quot;🏆 Prestigious local qualification\&quot;,s:{ca:3}},{t:\&quot;⚡ Fastest route to a finance career\&quot;,s:{acca:2}}]\n  }\n];\n\nvar cur=0, sc={acca:0,cfa:0,ca:0}, pend=null;\n\nfunction pick(btn,idx){\n  var all=document.querySelectorAll('.qopt');\n  for(var i=0;i&lt;all.length;i++) all[i].classList.remove('sel');\n  btn.classList.add('sel');\n  pend=Qs[cur].o[idx].s;\n  document.getElementById('qNext').style.display='inline-block';\n}\n\nfunction nextQ(){\n  if(!pend) return;\n  for(var k in pend) sc[k]=(sc[k]||0)+pend[k];\n  pend=null; cur++;\n  if(cur&gt;=Qs.length){ showRes(); return; }\n  document.getElementById('qProg').textContent='Question '+(cur+1)+' of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[cur].q;\n  var html='';\n  for(var i=0;i&lt;Qs[cur].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[cur].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n\nfunction showRes(){\n  var keys=Object.keys(sc).sort(function(a,b){return sc[b]-sc[a];});\n  var w=keys[0];\n  var info={\n    acca:{n:'ACCA',cls:'rb-a', ti:'ACCA is your ideal match!', tx:'Your goals align with ACCA — global flexibility, modular study structure, and recognition in 180+ countries.'},\n    cfa:{n:'CFA',cls:'rb-c', ti:'CFA is your ideal match!', tx:'Your passion for investment and markets points to the CFA Charter — the gold standard for finance professionals worldwide.'},\n    ca:{n:'CA',cls:'rb-ca', ti:'CA is your ideal match!', tx:'Your preference for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}\n  }[w];\n  document.getElementById('qMain').style.display='none';\n  document.getElementById('qResult').style.display='block';\n  var b=document.getElementById('rBadge');\n  b.textContent=info.n; b.className='rbadge '+info.cls;\n  document.getElementById('rTitle').textContent=info.ti;\n  document.getElementById('rText').textContent=info.tx;\n}\n\nfunction resetQ(){\n  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;\n  document.getElementById('qResult').style.display='none';\n  document.getElementById('qMain').style.display='block';\n  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[0].q;\n  var html='';\n  for(var i=0;i&lt;Qs[0].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[0].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n&lt;/script&gt;&quot;],&quot;customHeadElements&quot;:[0,&quot;&lt;meta&gt;&lt;meta name=\&quot;viewport\&quot; content=\&quot;width=device-width, initial-scale=1.0\&quot;&gt;&lt;style&gt;\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nbody {\n  font-family: Georgia, 'Times New Roman', serif;\n  background: #F9F5EE;\n  color: #2B2B2B;\n  overflow-x: hidden;\n}\n\n/* HERO */\n.hero {\n  background: #1A1A2E;\n  padding: 100px 24px 80px;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n.hero-glow {\n  position: absolute;\n  top: 0; left: 0; right: 0; bottom: 0;\n  background:\n    radial-gradient(ellipse 55% 45% at 15% 35%, rgba(45,106,79,0.35) 0%, transparent 60%),\n    radial-gradient(ellipse 50% 55% at 85% 70%, rgba(27,79,155,0.30) 0%, transparent 60%);\n  pointer-events: none;\n}\n.badge {\n  display: inline-block;\n  border: 1px solid rgba(201,168,76,0.5);\n  color: #C9A84C;\n  font-family: Arial, sans-serif;\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 2.5px;\n  text-transform: uppercase;\n  padding: 7px 20px;\n  border-radius: 100px;\n  margin-bottom: 28px;\n  position: relative;\n}\n.hero h1 {\n  font-size: clamp(2.2rem, 6vw, 4.8rem);\n  font-weight: 900;\n  color: #ffffff;\n  line-height: 1.1;\n  max-width: 800px;\n  margin: 0 auto;\n  position: relative;\n}\n.hero h1 span { color: #C9A84C; font-style: italic; }\n.hero p {\n  margin: 22px auto 0;\n  font-family: Arial, sans-serif;\n  font-size: clamp(0.95rem, 2vw, 1.15rem);\n  color: rgba(255,255,255,0.62);\n  max-width: 520px;\n  line-height: 1.75;\n  position: relative;\n}\n.hero-btns {\n  margin-top: 38px;\n  display: flex;\n  gap: 14px;\n  justify-content: center;\n  flex-wrap: wrap;\n  position: relative;\n}\n.btn-main {\n  background: #C9A84C;\n  color: #1A1A2E;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 14px 32px;\n  border-radius: 100px;\n  text-decoration: none;\n  display: inline-block;\n}\n.btn-out {\n  background: transparent;\n  color: #ffffff;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 600;\n  padding: 13px 30px;\n  border-radius: 100px;\n  text-decoration: none;\n  display: inline-block;\n}\n\n/* SECTIONS */\n.sec { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); max-width: 1160px; margin: 0 auto; }\n.sec-dark { background: #1A1A2E; }\n.sec-white { background: #ffffff; }\n.eyebrow {\n  font-family: Arial, sans-serif;\n  font-size: 10.5px;\n  font-weight: 700;\n  letter-spacing: 3px;\n  text-transform: uppercase;\n  color: #C9A84C;\n  margin-bottom: 12px;\n}\n.sec-h {\n  font-size: clamp(1.85rem, 4.2vw, 3rem);\n  font-weight: 700;\n  line-height: 1.15;\n  color: #1A1A2E;\n  margin-bottom: 12px;\n}\n.sec-h-w { color: #ffffff; }\n.sec-p {\n  font-family: Arial, sans-serif;\n  font-size: 1rem;\n  color: #6B7280;\n  max-width: 520px;\n  line-height: 1.72;\n  margin-bottom: 0;\n}\n.sec-p-dim { color: rgba(255,25 yle=\&quot;text-align:center;font-size:13px\&quot;&gt;\n      ${S.lang==='ta'?'அனைத்து கேள்விகளுக்கும் பதிலளிக்கவும்':'Answer all questions to see your results'}\n      (${Object.keys(S.quizAnswers).length}/${Q.length})\n    &lt;/div&gt;`}\n  &lt;/div&gt;`;\n}\n\nfunction renderSim(){\n  const ck=getCK(),sr=getRank();\n  const PER_PAGE=15;\n\n  // Filter colleges\n  let filtered=GD.filter(col=&gt;{\n    if(S.search){const s=S.search.toLowerCase();if(!col[1].toLowerCase().includes(s))return false}\n    if(S.branchFilter!=='all'){return col[3].some(b=&gt;getBCat(b[0])===S.branchFilter)}\n    return true;\n  });\n\n  const totalPages=Math.ceil(filtered.length/PER_PAGE);\n  if(S.page&gt;=totalPages)S.page=Math.max(0,totalPages-1);\n  const pageData=filtered.slice(S.page*PER_PAGE,(S.page+1)*PER_PAGE);\n\n  const score=getScore(),dist=getDist();\n\n  return `&lt;div class=\&quot;conw\&quot;&gt;\n    &lt;div style=\&quot;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px\&quot;&gt;\n      &lt;div&gt;&lt;h2 style=\&quot;margin-bottom:1px\&quot;&gt;🎯 ${t('simTitle')}&lt;/h2&gt;\n        &lt;p style=\&quot;color:var(--g500);font-size:11px\&quot;&gt;${S.profile.name} | ${t('cutoff')}: ${S.profile.cutoff} | ${S.profile.rank?'Rank: '+S.profile.rank:''} | ${S.profile.community}&lt;/p&gt;&lt;/div&gt;\n      &lt;div style=\&quot;display:flex;gap:6px\&quot;&gt;\n        &lt;div style=\&quot;background:${score&gt;=70?'#F0FDF4':score&gt;=40?'#FFFBEB':'#FEF2F2'};padding:6px 14px;border-radius:8px;text-align:center\&quot;&gt;\n          &lt;div style=\&quot;font-size:9px;color:var(--g500)\&quot;&gt;${t('stratScore')}&lt;/div&gt;\n          &lt;div style=\&quot;font-size:20px;font-weight:800;color:${score&gt;=70?'var(--green)':score&gt;=40?'var(--amber)':'var(--red)'}\&quot;&gt;${score}%&lt;/div&gt;&lt;/div&gt;\n        &lt;div style=\&quot;background:var(--ea-light);padding:6px 14px;border-radius:8px;text-align:center\&quot;&gt;\n r:#DC2626\&quot;&gt;❌${dist.r}&lt;/span&gt;\n        &lt;/div&gt;`}\n        ${S.selectedChoices.length&gt;0&amp;&amp;S.selectedChoices.length&lt;10?`&lt;div style=\&quot;padding:4px;text-align:center;font-size:10px;color:var(--red);font-weight:600\&quot;&gt;⚠️ ${t('addMore')}&lt;/div&gt;`:''}\n      &lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div style=\&quot;display:flex;gap:8px;margin-top:10px\&quot;&gt;\n      &lt;button class=\&quot;btn btn-gr\&quot; onclick=\&quot;setStep(2)\&quot;&gt;${t('back')}&lt;/button&gt;\n      &lt;button class=\&quot;next-btn\&quot; style=\&quot;margin-top:0\&quot; ${S.selectedChoices.length?'':'disabled'} onclick=\&quot;setStep(4)\&quot;&gt;${t('genReport')}&lt;/button&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;`;\n}\n\nfunction addC(code,branch){\n  if(S.selectedChoices.find(c=&gt;c.code===code&amp;&amp;c.branch===branch))return;\n  const col=GD.find(c=&gt;c[0]===code);if(!col)return;\n  const br=col[3].find(b=&gt;b[0]===branch);if(!br)return;\n  S.selectedChoices.push({code,name:col[1],branch,ranks:{o:br[1],b:br[2],m:br[3],s:br[4],t:br[5]}});\n  _render();\n}\nfunction addAllB(code){\n  const col=GD.find(c=&gt;c[0]===code);if(!col)return;\n  col[3].forEach(br=&gt;{\n    if(!S.selectedChoices.find(c=&gt;c.code===code&amp;&amp;c.branch===br[0])){\n      S.selectedChoices.push({code,name:col[1],branch:br[0],ranks:{o:br[1],b:br[2],m:br[3],s:br[4],t:br[5]}});\n    }\n  });\n  _render();\n}\nfunction remC(i){S.selectedChoices.splice(i,1);_render()}\nfunction moveC(i,d){const n=i+d;if(n&lt;0||n&gt;=S.selectedChoices.length)return;[S.selectedChoices[i],S.selectedChoices[n]]=[S.selectedChoices[n],S.selectedChoices[i]];_render()}\n\nfunction renderReport(){\n  const score=getScore(),dist=getDist(),qs=S.knowledgeScore;\n  const topR=Object.entries(S.riasecScores).sort((a,b)=&gt;b[1]-a[1])[0];\n  const tabs=[['overview',t('overview')],['student',t('studentR')],['expert',t('expertR')],['contact',t('contact')]];\n  let content='';\n\n  if(S.activeTab==='o n.rb-a  { background: #D8F3DC; color: #2D6A4F; }\n.rb-c  { background: #DBE9FF; color: #1B4F9B; }\n.rb-ca { background: #FFE0E4; color: #8B2635; }\n.rtitle { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 11px; }\n.rtext { font-family: Arial, sans-serif; font-size: 0.94rem; color: rgba(255,255,255,0.56); max-width: 420px; margin: 0 auto 22px; line-height: 1.72; }\n.btn-retry { background: #C9A84C; color: #1A1A2E; font-family: Arial, sans-serif; font-size: 0.93rem; font-weight: 700; padding: 13px 30px; border-radius: 100px; border: none; cursor: pointer; }\n\n/* FAQ */\n.faq-outer { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); background: #F9F5EE; }\n.faq-inner { max-width: 1160px; margin: 0 auto; }\n.faq-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .faq-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .faq-grid { grid-template-columns: 1fr 1fr; } }\n.fi { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid #E5DDD0; }\n.fq { font-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }\n.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }\n\n/* FOOTER */\nfooter { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;,s:{acca:2}}]\n  },\n  { q:\&quot;How can you dedicate time to studying?\&quot;,\n    o:[{t:\&quot;⏱️ Part-time alongside my job\&quot;,s:{acca:2}},{t:\&quot;📚 Intense focused study windows\&quot;,s:{cfa:2}},{t:\&quot;🎓 Full-time with practical training\&quot;,s:{ca:2}},{t:\&quot;🔄 Flexible — whatever it takes\&quot;,s:{acca:1,cfa:1,ca:1}}]\n  },\n  { q:\&quot;What matters most in a qualification?\&quot;,\n    o:[{t:\&quot;🌐 Global recognition / working abroad\&quot;,s:{acca:3}},{t:\&quot;💰 Highest salary in investment finance\&quot;,s:{cfa:3}},{t:\&quot;🏆 Prestigious local qualification\&quot;,s:{ca:3}},{t:\&quot;⚡ Fastest route to a finance career\&quot;,s:{acca:2}}]\n  }\n];\n\nvar cur=0, sc={acca:0,cfa:0,ca:0}, pend=null;\n\nfunction pick(btn,idx){\n  var all=document.querySelectorAll('.qopt');\n  for(var i=0;i&lt;all.length;i++) all[i].classList.remove('sel');\n  btn.classList.a ntById('qResult').style.display='none';\n  document.getElementById('qMain').style.display='block';\n  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[0].q;\n  var html='';\n  for(var i=0;i&lt;Qs[0].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[0].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n&lt;/script&gt;&quot;],&quot;customHeadElements&quot;:[0,&quot;&lt;meta&gt;&lt;meta name=\&quot;viewport\&quot; content=\&quot;width=device-width, initial-scale=1.0\&quot;&gt;&lt;style&gt;\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nbody {\n  font-family: Georgia, 'Times New Roman', serif;\n  background: #F9F5EE;\n  color: #2B2B2B;\n  overflow-x: hidden;\n}\n\n/* HERO */\n.hero {\n  background: #1A1A2E;\n  padding: 100px 24px 80px;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n.hero-glow {\n  position: absolute;\n  top: 0; left: 0; right: 0; bottom: 0;\n  background:\n    radial-gradient(ellipse 55% 45% at 15% 35%, rgba(45,106,79,0.35) 0%, transparent 60%),\n    radial-gradient(ellipse 50% 55% at 85% 70%, rgba(27,79,155,0.30) 0%, transparent 60%);\n  pointer-events: none;\n}\n.badge {\n  display: inline-block;\n  border: 1px solid rgba(201,168,76,0.5);\n  color: #C9A84C;\n  font-family: Arial, sans-serif;\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 2.5px;\n  text-transform: uppercase;\n  padding: 7px 20px;\n  border-radius: 100px;\n  margin-bottom: 28px;\n  position: relative;\n}\n.hero h1 {\n  font-size: clamp(2.2rem, 6vw, 4.8rem);\n  font-weight: 900;\n  color: #ffffff;\n  line-height: 1.1;\n  max-width: 800px;\n  margin: 0 auto;\n  position: relative;\n}\n.hero h1 span { color: #C9A84C; font-style: italic; }\n.hero p {\n  margin: 22px auto 0;\n  font-family: Arial, sans-serif;\n  font-size: clamp(0.95rem, 2vw, 1.15rem);\n  color: rgba(255,255,255,0.62);\n  max-width: 520px;\n  line-height: 1.75;\n  position: relative;\n}\n.hero-btns {\n  margin-top: 38px;\n  display: flex;\n  gap: 14px;\n  justify-content: center;\n  flex-wrap: wrap;\n  position: relative;\n}\n.btn-main {\n  background: #C9A84C;\n  color: #1A1A2E;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 14px 32px;\n  border-radius: 100px;\n  text-decoration: none;\n  display: inline-block;\n}\n.btn-out {\n  background: transparent;\n  color: #ffffff;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 600;\n  padding: 13px 30px;\n  border-radius: 100px;\n  text-decoration: none;\n  display: inline-block;\n}\n\n/* SECTIONS */\n.sec { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); max-width: 1160px; margin: 0 auto; }\n.sec-dark { background: #1A1A2E; }\n.sec-white { background: #ffffff; }\n.eyebrow {\n  font-family: Arial, sans-serif;\n  font-size: 10.5px;\n  font-weight: 700;\n  letter-spacing: 3px;\n  text-transform: uppercase;\n  color: #C9A84C;\n  margin-bottom: 12px;\n}\n.sec-h {\n  font-size: clamp(1.85rem, 4.2vw, 3rem);\n  font-weight: 700;\n  line-height: 1.15;\n  color: #1A1A2E;\n  margin-bottom: 12px;\n}\n.sec-h-w { color: #ffffff; }\n.sec-p {\n  font-family: Arial, sans-serif;\n  font-size: 1rem;\n  color: #6B7280;\n  max-width: 520px;\n  line-height: 1.72;\n  margin-bottom: 0;\n}\n.sec-p-dim { color: rgba(255,255,255,0.48); }\n\n/* CARDS GRID */\n.cards-wrap {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 22px;\n  margin-top: 46px;\n}\n@media (max-width: 900px) { .cards-wrap { grid-template-columns: 1fr; } }\n\n.card {\n  background: #ffffff;\n  border-radius: 16px;\n  border: 1.5px solid #E5DDD0;\n  overflow: hidden;\n  display: flex;\n  flex-direction: column;\n}\n\n/* Card headers */\n.ch-acca { background: #D8F3DC; border-bottom: 3px solid #2D6A4F; pad &lt;style&gt;
:root{--ea-blue:#1E3A5F;--ea-orange:#E87722;--ea-dark:#0D1B2A;--ea-light:#F0F9FF;--green:#059669;--red:#DC2626;--amber:#D97706;--blue:#2563EB;--g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;--g400:#94A3B8;--g500:#64748B;--g600:#475569;--g700:#334155;--g800:#1E293B;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans','Noto Sans Tamil',sans-serif;background:var(--g100);color:var(--g800);min-height:100vh}
button{font-family:inherit;cursor:pointer;transition:all .15s}
button:hover:not(:disabled){filter:brightness(1.05)}
button:disabled{opacity:.5;cursor:not-allowed}
input,select,textarea{font-family:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--ea-orange)!important;box-shadow:0 0 0 3px rgba(232,119,34,.12)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}
.hdr{background:linear-gradient(135deg,var(--ea-blue),var(--ea-dark));padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--ea-orange);flex-wrap:wrap;gap:8px}
.hdr img{height:40px;border-radius:6px}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-t{color:#fff;font-size:15px;font-weight:700}.hdr-s{color:var(--ea-orange);font-size:10px}
.hdr-r{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;border:none;color:#fff;display:inline-flex;align-items:center;gap:4px}
.btn-o{background:var(--ea-orange)}.btn-b{background:var(--ea-blue)}.btn-g{background:var(--green)}.btn-gr{background:var(--g600)}.btn-r{background:var(--red)}
.btn-ol{background:transparent;border:2px solid var(--ea-orange);color:var(--ea-orange)}
.prog{display:flex;justify-content:center;padding:8px 12px;background:var(--g50);border-bottom:1px solid var(--g200);gap:4px;flex-wrap:wrap}
.prog button{padding:4px 12px;border-radius:20px;font-size:11px;border:none}
.s-a{background:var(--ea-blue);color:#fff;font-weight:700}.s-d{background:var(--green);color:#fff}.s-p{background:var(--g200);color:var(--g500)}
.con{max-width:860px;margin:0 auto;padding:16px}.conw{max-width:1200px;margin:0 auto;padding:12px 16px}
.card{background:#fff;border-radius:var(--radius);padding:16px;border:1px solid var(--g200);margin-bottom:12px}
.cb{background:linear-gradient(135deg,var(--ea-blue),#2D4A6F);color:#fff;border:none}
.cg{background:#F0FDF4;border-color:#86EFAC}.cr{background:#FEF2F2;border-color:#FCA5A5}.ca{background:#FFFBEB;border-color:#FCD34D}
h2{font-size:18px;color:var(--ea-blue);margin-bottom:4px}
h3{font-size:14px;color:var(--ea-blue);margin-bottom:6px}
.sub{color:var(--g500);font-size:12px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fi{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--g300);font-size:13px}
.fl{display:block;font-size:11px;font-weight:600;color:var(--g700);margin-bottom:3px}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;margin:1px}
.tg{background:#DCFCE7;color:#166534}.tr{background:#FEE2E2;color:#991B1B}.tb{background:#DBEAFE;color:#1E40AF}
.ta{background:#FEF3C7;color:#92400E}.to{background:#FFF7ED;color:#9A3412}
.lang{display:flex;border-radius:6px;overflow:hidden;border:2px solid var(--ea-orange)}
.lang button{padding:4px 12px;font-size:11px;font-weight:600;border:none}
.la{background:var(--ea-orange);color:#fff}.li{background:transparent;color:var(--ea-orange)}
.ci{padding:10px;border-radius:8px;border:1px solid var(--g200);margin-bottom:6px;background:#fff;transition:all .15s}
.ci:hover{border-color:var(--ea-orange);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.ci-name{font-weight:600;color:var(--ea-blue);font-size:13px}
.ci-branches{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.br-tag{padding:2px 7px;border-radius:10px;font-size:10px;cursor:pointer;border:1px solid var(--g200);background:var(--g50);color:var(--g700);transition:all .15s;font-weight:500}
.br-tag:hover{border-color:var(--ea-orange);background:#FFF7ED}
.br-added{background:var(--ea-blue);color:#fff;border-color:var(--ea-blue)}
.br-tag.sel{background:var(--green);color:#fff;border-color:var(--green)}
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.panel{border:1px solid var(--g200);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;max-height:65vh}
.ph{padding:8px 12px;font-size:13px;font-weight:600;border-bottom:1px solid var(--g200)}
.pb{flex:1;overflow:auto;padding:6px}
.footer{background:var(--ea-dark);padding:16px;text-align:center;border-top:3px solid var(--ea-orange)}
.footer img{height:28px;margin-bottom:4px}.footer p{color:var(--g400);font-size:10px}.footer a{color:var(--ea-orange)}
.qo{padding:10px 12px;border-radius:8px;border:2px solid var(--g200);cursor:pointer;font-size:12px;text-align:left;background:#fff;transition:all .15s;width:100%;margin-bottom:6px}
.qo:hover{border-color:var(--ea-blue);background:var(--ea-light)}
.qs{border-color:var(--ea-blue)!important;background:var(--ea-light)!important;font-weight:600}
.qc{border-color:var(--green)!important;background:#F0FDF4!important}
.qw{border-color:var(--red)!important;background:#FEF2F2!important}
.riasec-bar{height:20px;border-radius:10px;background:var(--g200);overflow:hidden;margin:4px 0}
.riasec-fill{height:100%;border-radius:10px;transition:width .5s}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--ea-blue);color:#fff;padding:6px 8px;text-align:left}
td{padding:6px 8px;border-bottom:1px solid var(--g200)}
tr:nth-child(even){background:var(--g50)}
.wa-card{background:linear-gradient(135deg,#25D366,#128C7E);border-radius:var(--radius);padding:16px;color:#fff}
.wa-link{display:block;background:rgba(255,255,255,.15);padding:8px 12px;border-radius:8px;margin-bottom:5px;color:#fff;text-decoration:none;font-size:12px}
.wa-link:hover{background:rgba(255,255,255,.25)}
.next-btn{width:100%;padding:12px;font-size:15px;font-weight:700;border-radius:10px;border:none;color:#fff;background:var(--ea-orange);cursor:pointer;margin-top:12px}
.next-btn:disabled{background:var(--g400)}
.sticky-bottom{position:sticky;bottom:0;background:var(--g100);padding:8px 0;z-index:10}
.page-nav{display:flex;gap:6px;align-items:center;justify-content:center;margin:8px 0}
.page-nav button{padding:4px 10px;border-radius:6px;font-size:11px;border:1px solid var(--g300);background:#fff;cursor:pointer}
.page-nav button.active{background:var(--ea-blue);color:#fff;border-color:var(--ea-blue)}
@media(max-width:768px){.g2,.sim-grid{grid-template-columns:1fr}.con,.conw{padding:10px}.panel{max-height:50vh}h2{font-size:16px}}
&lt;/style&gt;&lt;/head&gt;

function getRank(){return parseInt(S.profile.rank)||Math.round((200-parseFloat(S.profile.cutoff||'0'))*2+1)}
function getCK(){return{OC:'o',BC:'b',MBC:'m',SC:'s',ST:'t'}[S.profile.community]||'o'}

function getFB(eaRank){
  const sr=getRank(),ratio=eaRank/sr;
  if(ratio&lt;=0.5)return{t:'e',l:t('fbE'),c:'#059669',i:'⭐'};
  if(ratio&lt;=0.8)return{t:'g',l:t('fbG'),c:'#2563EB',i:'✅'};
  if(ratio&lt;=1.0)return{t:'m',l:t('fbM'),c:'#D97706',i:'👍'};
  if(ratio&lt;=1.3)return{t:'a',l:t('fbA'),c:'#EA580C',i:'⚠️'};
  return{t:'r',l:t('fbR'),c:'#DC2626',i:'❌'};
}

function getScore(){
  const n=S.selectedChoices.length;if(!n)return 0;
  const w={e:100,g:80,m:60,a:40,r:20};
  return Math.round(S.selectedChoices.reduce((s,c)=&gt;s+w[getFB(c.ranks[getCK()]).t],0)/n);
}

function getDist(){
  const d={e:0,g:0,m:0,a:0,r:0};
  S.selectedChoices.forEach(c=&gt;{d[getFB(c.ranks[getCK()]).t]++});return d;
}

function renderAssess(){

  // Calculate RIASEC if done
  let riasec={R:0,I:0,A:0,S:0,E:0,C:0}, prefC=0, prefB=0, kScore=0;

    Q.forEach((q,i)=&gt;{
      const a=S.quizAnswers[i];
      if(q.type==='riasec')riasec[q.dim]+=(a||0);
      else if(q.type==='pref'){
        if(a===0)prefC++;else prefB++;
      } else if(q.type==='knowledge'&amp;&amp;a===q.ans)kScore++;
    });
    S.riasecScores=riasec;S.prefScores={college:prefC,branch:prefB};S.knowledgeScore=kScore;
  }

  const maxR=Math.max(...Object.values(riasec),1);
  const topDims=Object.entries(riasec).sort((a,b)=&gt;b[1]-a[1]).slice(0,3);

  return `&lt;div class=&quot;con&quot;&gt;

        return `&lt;div class=&quot;card&quot; style=&quot;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px&quot;&gt;

          &lt;div style=&quot;display:flex;gap:3px&quot;&gt;${[1,2,3,4,5].map(v=&gt;
            `&lt;button style=&quot;width:28px;height:28px;border-radius:50%;border:2px solid ${S.quizAnswers[i]===v?'var(--ea-orange)':'var(--g300)'};background:${S.quizAnswers[i]===v?'var(--ea-orange)':'#fff'};color:${S.quizAnswers[i]===v?'#fff':'var(--g600)'};font-size:11px;font-weight:700;cursor:pointer&quot; onclick=&quot;S.quizAnswers[${i}]=${v};_render()&quot;&gt;${v}&lt;/button&gt;`
          ).join('')}&lt;/div&gt;
        &lt;/div&gt;`;
      } else {
        return `&lt;div class=&quot;card&quot;&gt;&lt;p style=&quot;font-size:12px;font-weight:600;color:var(--ea-blue);margin-bottom:8px&quot;&gt;${i+1}. ${q.q}&lt;/p&gt;
          ${(q.opts||[]).map((opt,j)=&gt;
            `&lt;button class=&quot;qo ${S.quizAnswers[i]===j?'qs':''}&quot; onclick=&quot;S.quizAnswers[${i}]=${j};_render()&quot;&gt;${opt}&lt;/button&gt;`

    }).join('')}

    ${allDone?`
      &lt;div class=&quot;card&quot; style=&quot;border-color:var(--ea-orange)&quot;&gt;
        &lt;h3&gt;🔬 ${t('riasecTitle')}&lt;/h3&gt;
        ${Object.entries(RIASEC_LABELS).map(([k,v])=&gt;

            &lt;span style=&quot;font-size:11px;font-weight:600;width:100px;color:${RIASEC_COLORS[k]}&quot;&gt;${v} (${k})&lt;/span&gt;

          &lt;/div&gt;`
        ).join('')}
        &lt;div style=&quot;margin-top:10px&quot;&gt;&lt;h3&gt;🎯 ${t('matchBranches')}&lt;/h3&gt;
          &lt;div style=&quot;display:flex;flex-wrap:wrap;gap:4px&quot;&gt;${topDims.flatMap(([k])=&gt;RIASEC_CAREERS[k]||[]).map(c=&gt;`&lt;span class=&quot;tag tb&quot;&gt;${c}&lt;/span&gt;`).join('')}&lt;/div&gt;

      &lt;div class=&quot;card&quot;&gt;

function addC(code,branch){
  if(S.selectedChoices.find(c=&gt;c.code===code&amp;&amp;c.branch===branch))return;
  const col=GD.find(c=&gt;c[0]===code);if(!col)return;
  const br=col[3].find(b=&gt;b[0]===branch);if(!br)return;
  S.selectedChoices.push({code,name:col[1],branch,ranks:{o:br[1],b:br[2],m:br[3],s:br[4],t:br[5]}});
  _render();
}
function addAllB(code){
  const col=GD.find(c=&gt;c[0]===code);if(!col)return;
  col[3].forEach(br=&gt;{
    if(!S.selectedChoices.find(c=&gt;c.code===code&amp;&amp;c.branch===br[0])){
      S.selectedChoices.push({code,name:col[1],branch:br[0],ranks:{o:br[1],b:br[2],m:br[3],s:br[4],t:br[5]}});
    }
  });
  _render();
}
function remC(i){S.selectedChoices.splice(i,1);_render()}
function moveC(i,d){const n=i+d;if(n&lt;0||n&gt;=S.selectedChoices.length)return;[S.selectedChoices[i],S.selectedChoices[n]]=[S.selectedChoices[n],S.selectedChoices[i]];_render()}

async function saveToSheets(){
  if(!APPS_SCRIPT_URL)return;
  const el=document.getElementById('save-status');
  if(el)el.innerHTML=`&lt;span style=&quot;color:var(--ea-orange)&quot;&gt;⏳ ${t('saving')}&lt;/span&gt;`;
  try{
    await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'saveStudent',profile:S.profile,quizScore:S.knowledgeScore,
        riasec:S.riasecScores,strategyScore:getScore(),totalChoices:S.selectedChoices.length,
        prefScores:S.prefScores,topChoices:S.selectedChoices.slice(0,5).map(c=&gt;c.name+'-'+c.branch),
        language:S.lang})});
    if(el)el.innerHTML=`&lt;span style=&quot;color:var(--green)&quot;&gt;✅ ${t('saved')}&lt;/span&gt;`;
  }catch(e){if(el)el.innerHTML=`&lt;span style=&quot;color:var(--red)&quot;&gt;❌ Error&lt;/span&gt;`}
}
