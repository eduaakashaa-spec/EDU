* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: #F9F5EE;
  color: #2B2B2B;
  overflow-x: hidden;
}

/* HERO */
.hero {
  background: #1A1A2E;
  padding: 100px 24px 80px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero-glow {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse 55% 45% at 15% 35%, rgba(45,106,79,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 50% 55% at 85% 70%, rgba(27,79,155,0.30) 0%, transparent 60%);
  pointer-events: none;
}
.badge {
  display: inline-block;
  border: 1px solid rgba(201,168,76,0.5);
  color: #C9A84C;
  font-family: Arial, sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 7px 20px;
  border-radius: 100px;
  margin-bottom: 28px;
  position: relative;
}
.hero h1 {
  font-size: clamp(2.2rem, 6vw, 4.8rem);
  font-weight: 900;
  color: #ffffff;
  line-height: 1.1;
  max-width: 800px;
  margin: 0 auto;
  position: relative;
}
.hero h1 span { color: #C9A84C; font-style: italic; }
.hero p {
  margin: 22px auto 0;
  font-family: Arial, sans-serif;
  font-size: clamp(0.95rem, 2vw, 1.15rem);
  color: rgba(255,255,255,0.62);
  max-width: 520px;
  line-height: 1.75;
  position: relative;
}
.hero-btns {
  margin-top: 38px;
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  position: relative;
}
.btn-main {
  background: #C9A84C;
  color: #1A1A2E;
  font-family: Arial, sans-serif;
  font-size: 0.93rem;
  font-weight: 700;
  padding: 14px 32px;
  border-radius: 100px;
  text-decoration: none;
  display: inline-block;
}
.btn-out {
  background: transparent;
  color: #ffffff;
  border: 1.5px solid rgba(255,255,255,0.28);
  font-family: Arial, sans-serif;
  font-size: 0.93rem;
  font-weight: 600;
  padding: 13px 30px;
  border-radius: 100px;
  text-decoration: none;
  display: inline-block;
}

/* SECTIONS */
.sec { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); max-width: 1160px; margin: 0 auto; }
.sec-dark { background: #1A1A2E; }
.sec-white { background: #ffffff; }
.eyebrow {
  font-family: Arial, sans-serif;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #C9A84C;
  margin-bottom: 12px;
}
.sec-h {
  font-size: clamp(1.85rem, 4.2vw, 3rem);
  font-weight: 700;
  line-height: 1.15;
  color: #1A1A2E;
  margin-bottom: 12px;
}
.sec-h-w { color: #ffffff; }
.sec-p {
  font-family: Arial, sans-serif;
  font-size: 1rem;
  color: #6B7280;
  max-width: 520px;
  line-height: 1.72;
  margin-bottom: 0;
}
.sec-p-dim { color: rgba(255,255,255,0.48); }

/* CARDS GRID */
.cards-wrap {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
  margin-top: 46px;
}
@media (max-width: 900px) { .cards-wrap { grid-template-columns: 1fr; } }

.card {
  background: #ffffff;
  border-radius: 16px;
  border: 1.5px solid #E5DDD0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Card headers */
.ch-acca { background: #D8F3DC; border-bottom: 3px solid #2D6A4F; padding: 28px 24px 22px; }
.ch-cfa  { background: #DBE9FF; border-bottom: 3px solid #1B4F9B; padding: 28px 24px 22px; }
.ch-ca   { background: #FFE0E4; border-bottom: 3px solid #8B2635; padding: 28px 24px 22px; }

.ci {
  width: 48px; height: 48px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900;
  color: #fff;
  margin-bottom: 13px;
  font-family: Arial, sans-serif;
}
.ci-acca { background: #2D6A4F; }
.ci-cfa  { background: #1B4F9B; }
.ci-ca   { background: #8B2635; }

.cn { font-size: 1.55rem; font-weight: 700; color: #1A1A2E; margin-bottom: 3px; }
.co { font-family: Arial, sans-serif; font-size: 0.78rem; color: #6B7280; }

.cb { padding: 24px; flex: 1; display: flex; flex-direction: column; gap: 17px; }
.cd { font-family: Arial, sans-serif; font-size: 0.91rem; line-height: 1.72; color: #444; }

/* Stats */
.stats-g { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.stat-b { background: #F9F5EE; border-radius: 10px; padding: 12px; border: 1px solid #E5DDD0; }
.sl { font-family: Arial, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #6B7280; margin-bottom: 4px; }
.sv { font-family: Arial, sans-serif; font-size: 0.9rem; font-weight: 700; color: #1A1A2E; }

/* Tags */
.tags-g { display: flex; flex-wrap: wrap; gap: 7px; }
.tag { font-family: Arial, sans-serif; font-size: 0.73rem; font-weight: 600; padding: 5px 11px; border-radius: 100px; background: #F9F5EE; border: 1px solid #E5DDD0; color: #2B2B2B; }
.t-acca { background: #D8F3DC; border-color: #2D6A4F; color: #2D6A4F; }
.t-cfa  { background: #DBE9FF; border-color: #1B4F9B; color: #1B4F9B; }
.t-ca   { background: #FFE0E4; border-color: #8B2635; color: #8B2635; }

.cf { padding: 0 24px 24px; }
.cl {
  display: block; text-align: center;
  padding: 13px; border-radius: 10px;
  font-family: Arial, sans-serif; font-size: 0.88rem; font-weight: 700;
  text-decoration: none; color: #fff;
}
.cl-acca { background: #2D6A4F; }
.cl-cfa  { background: #1B4F9B; }
.cl-ca   { background: #8B2635; }

/* TABLE */
.tbl-outer {
  background: #1A1A2E;
  padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px);
}
.tbl-inner { max-width: 1160px; margin: 0 auto; }
.tbl-scroll { margin-top: 44px; overflow-x: auto; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); }

table { width: 100%; min-width: 580px; border-collapse: collapse; }
thead th {
  padding: 17px 18px;
  text-align: left;
  font-family: Arial, sans-serif;
  font-size: 0.74rem;
  font-weight: 700;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.09);
  background: rgba(255,255,255,0.03);
}
th.th0 { color: rgba(255,255,255,0.3); }
th.th1 { color: #74c69d; }
th.th2 { color: #90b4e8; }
th.th3 { color: #e88a93; }

tbody td {
  padding: 14px 18px;
  font-family: Arial, sans-serif;
  font-size: 0.87rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.7);
  vertical-align: top;
  line-height: 1.5;
}
tbody tr:last-child td { border-bottom: none; }
tbody td:first-child {
  font-size: 0.74rem; font-weight: 700;
  letter-spacing: 0.6px; text-transform: uppercase;
  color: rgba(255,255,255,0.3); white-space: nowrap;
}

.pill { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 0.73rem; font-weight: 700; font-family: Arial, sans-serif; }
.pg { background: rgba(116,198,157,0.15); color: #74c69d; }
.pb { background: rgba(144,180,232,0.15); color: #90b4e8; }
.pr { background: rgba(232,138,147,0.15); color: #e88a93; }

/* WHO */
.who-outer { background: #fff; padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); }
.who-inner { max-width: 1160px; margin: 0 auto; }
.who-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }
@media (max-width: 900px) { .who-grid { grid-template-columns: 1fr; } }
@media (min-width: 600px) and (max-width: 900px) { .who-grid { grid-template-columns: 1fr 1fr; } }

.wc { border-radius: 16px; padding: 25px 22px; border: 1.5px solid #E5DDD0; background: #fff; }
.wi { font-size: 1.9rem; margin-bottom: 10px; display: block; }
.wt { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; color: #1A1A2E; }
.wp { font-family: Arial, sans-serif; font-size: 0.86rem; line-height: 1.72; color: #6B7280; }
.wb { display: inline-block; margin-top: 13px; font-family: Arial, sans-serif; font-size: 0.73rem; font-weight: 700; padding: 4px 13px; border-radius: 100px; }
.wb-a  { background: #D8F3DC; color: #2D6A4F; }
.wb-c  { background: #DBE9FF; color: #1B4F9B; }
.wb-ca { background: #FFE0E4; color: #8B2635; }

/* QUIZ */
.quiz-outer {
  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 55%, #0F3460 100%);
  padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px);
  text-align: center;
}
.quiz-inner { max-width: 1160px; margin: 0 auto; }
.qbox {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: clamp(24px,5vw,48px);
  max-width: 660px;
  margin: 44px auto 0;
}
.qprog { font-family: Arial, sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.32); margin-bottom: 7px; letter-spacing: 1.2px; text-transform: uppercase; }
.qtext { font-family: Arial, sans-serif; font-size: clamp(1rem,2.5vw,1.25rem); font-weight: 700; color: #fff; margin-bottom: 22px; line-height: 1.5; }
.qopts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 480px) { .qopts { grid-template-columns: 1fr; } }
.qopt {
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.14);
  border-radius: 12px;
  padding: 14px 15px;
  text-align: left;
  color: rgba(255,255,255,0.78);
  font-family: Arial, sans-serif;
  font-size: 0.87rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  line-height: 1.4;
}
.qopt:hover, .qopt.sel {
  background: rgba(201,168,76,0.18);
  border-color: #C9A84C;
  color: #fff;
}
.qnav { margin-top: 22px; }
.qnext {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,0.28);
  color: #fff;
  font-family: Arial, sans-serif;
  font-size: 0.93rem;
  font-weight: 700;
  padding: 13px 30px;
  border-radius: 100px;
  cursor: pointer;
  display: none;
}
.qresult { display: none; text-align: center; }
.rbadge { display: inline-block; font-size: 2.6rem; font-weight: 900; padding: 16px 32px; border-radius: 14px; margin-bottom: 15px; }
.rb-a  { background: #D8F3DC; color: #2D6A4F; }
.rb-c  { background: #DBE9FF; color: #1B4F9B; }
.rb-ca { background: #FFE0E4; color: #8B2635; }
.rtitle { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 11px; }
.rtext { font-family: Arial, sans-serif; font-size: 0.94rem; color: rgba(255,255,255,0.56); max-width: 420px; margin: 0 auto 22px; line-height: 1.72; }
.btn-retry { background: #C9A84C; color: #1A1A2E; font-family: Arial, sans-serif; font-size: 0.93rem; font-weight: 700; padding: 13px 30px; border-radius: 100px; border: none; cursor: pointer; }

/* FAQ */
.faq-outer { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); background: #F9F5EE; }
.faq-inner { max-width: 1160px; margin: 0 auto; }
.faq-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }
@media (max-width: 900px) { .faq-grid { grid-template-columns: 1fr; } }
@media (min-width: 600px) and (max-width: 900px) { .faq-grid { grid-template-columns: 1fr 1fr; } }
.fi { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid #E5DDD0; }
.fq { font-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }
.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }

/* FOOTER */
footer { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }
footer strong { color: #C9A84C; }

/* DIVIDER */
.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }

ht: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;,s:{acca:2}}]\n  },\n  { q:\&quot;How can you dedicate time to studying?\&quot;,\n    o:[{t:\&quot;⏱️ Part-time alongside my job\&quot;,s:{acca:2}},{t:\&quot;📚 Intense focused study windows\&quot;,s:{cfa:2}},{t:\&quot;🎓 Full-time with practical training\&quot;,s:{ca:2}},{t:\&quot;🔄 Flexible — whatever it takes\&quot;,s:{acca:1,cfa:1,ca:1}}]\n  },\n  { q:\&quot;What omestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}\n  }[w];\n  document.getElementById('qMain').style.display='none';\n  document.getElementById('qResult').style.display='block';\n  var b=document.getElementById('rBadge');\n  b.textContent=info.n; b.className='rbadge '+info.cls;\n  document.getElementById('rTitle').textContent=info.ti;\n  document.getElementById('rText').textContent=info.tx;\n}\n\nfunction resetQ(){\n  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;\n  document.getElementById('qResult').style.display='none';\n  document.getElementById('qMain').style.display='block';\n  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[0].q;\n  var html='';\n  for(var i=0;i&lt;Qs[0].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[0].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n&lt;/script&gt;&quot;],&quot;customHeadElements&quot;:[0,&quot;&lt;meta&gt;&lt;meta name=\&quot;viewport\&quot; content=\&quot;width=device-width, initial-scale=1.0\&quot;&gt;&lt;style&gt;\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nbody {\n  font-family: Georgia, 'Times New Roman', serif;\n  background: #F9F5EE;\n  color: #2B2B2B;\n  overflow-x: hidden;\n}\n\n/* HERO */\n.hero {\n  background: #1A1A2E;\n  padding: 100px 24px 80px;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n.hero-glow {\n  position: absolute;\n  top: 0; left: 0; right: 0; bottom: 0;\n  background:\n    radial-gradient(ellipse 55% 45% at 15% 35%, rgba(45,106,79,0.35) 0%, transparent 60%),\n    radial-gradient(ellipse 50% 55% at 85% 70%, rgba(27,79,155,0.30) 0%, transparent 60%);\n  pointer-events: none;\n}\n.badge {\n  display: inline-block;\n  border: 1px solid rgba(201,168,76,0.5);\n  color: #C9A84C;\n  font-family: Arial, sans- font-size:12px;color:#92400e;font-weight:600;}\n  #ea-wrap .ea-deadline-strip strong{color:#c2410c;}\n\n  /* ── TABLE ── */\n  #ea-wrap .ea-tbl-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:28px;}\n  #ea-wrap table{width:100%;border-collapse:collapse;font-size:13px;}\n  #ea-wrap thead th{padding:12px 14px;text-align:left;font-weight:700;font-size:12px;background:#0D3B8C;color:#fff;}\n  #ea-wrap tbody tr:nth-child(even){background:#f0f5ff;}\n  #ea-wrap tbody tr:hover{background:#dbeafe;}\n  #ea-wrap tbody td{padding:11px 14px;border-bottom:1px solid #e8eef8;vertical-align:top;}\n  #ea-wrap .bdg{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;}\n  #ea-wrap .bdg-blue{background:#dbeafe;color:#1e40af;}\n  #ea-wrap .bdg-green{background:#d1fae5;color:#065f46;}\n  #ea-wrap .bdg-red{background:#fee2e2;color:#991b1b;}\n  #ea-wrap .bdg-orange{background:#fed7aa;color:#92400e;}\n\n  /* ── DEADLINE GRID ── */\n  #ea-wrap .ea-dl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:28px;}\n  #ea-wrap .ea-dl{background:#fff;border-radius:10px;padding:14px 16px;border-left:4px solid;box-shadow:0 2px 8px rgba(0,0,0,.07);}\n  #ea-wrap .ea-dl.blue{border-color:#1A5DC8;}\n  #ea-wrap .ea-dl.green{border-color:#059669;}\n  #ea-wrap .ea-dl.orange{border-color:#F47920;}\n  #ea-wrap .ea-dl.red{border-color:#dc2626;}\n  #ea-wrap .ea-dl.purple{border-color:#7c3aed;}\n  #ea-wrap .ea-dl-icon{font-size:20px;margin-bottom:4px;}\n  #ea-wrap .ea-dl-phase{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#9ca3af;}\n  #ea-wrap .ea-dl-date{font-size:15px;font-weight:800;color:#1e293b;margin:3px 0;}\n  #ea-wrap .ea-dl-note{font-size:12px;color:#6b7280;line-height:1.5;}\n\n  /* ── CTA ── */\n  #ea-wrap .ea-cta{background:linear-gradient(135deg,#F47920,#ff6b00);border-radius:16px;padding:32px 24px;text-align:center;color:#fff;margin-top:32px;}\n  #ea-wrap .ea-cta h3{font-size:22px;font-weight:800;margin-bottom:8px;}\n  #ea-wrap .ea-cta p{font-size:14px;opacity:.93;margin-bottom:20px;}\n  #ea-wrap .ea-cta-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}\n  #ea-wrap .ea-btn{display:inline-block;padding:12px 28px;border-radius:28px;font-weight:800;font-size:14px;cursor:pointer;text-decoration:none;transition:transform .2s,box-shadow .2s;}\n  #ea-wrap .ea-btn:hover{transform:scale(1.04);box-shadow:0 6px 18px rgba(0,0,0,.2);}\n  #ea-wrap .ea-btn-white{background:#fff;color:#F47920;}\n  #ea-wrap .ea-btn-outline{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.7);}\n\n  /* ── DISCLAIMER ── */\n  #ea-wrap .ea-disc{background:#f8fafc;border-radius:10px;padding:14px 18px;margin-top:20px;font-size:12px;color:#9ca3af;border:1px solid #e2e8f0;}\n  #ea-wrap .ea-disc strong{color:#475569;}\n\n  @media(max-width:600px){\n    #ea-wrap .ea-hero{padding:28px 20px;}\n    #ea-wrap .ea-tab-btn{min-width:130px;font-size:12px;}\n    #ea-wrap .ea-steps{padding-left:44px;}\n    #ea-wrap .ea-step-num{left:-44px;width:30px;height:30px;font-size:11px;}\n  }\n&lt;/style&gt;\n\n&lt;div id=\&quot;ea-wrap\&quot;&gt;\n\n  &lt;!-- ALERT --&gt;\n  &lt;div class=\&quot;ea-alert\&quot;&gt;\n    &lt;span&gt;🚨&lt;/span&gt;\n    &lt;div&gt;&lt;strong&gt;DASA 2026 — Important Update:&lt;/strong&gt; SAT scores are accepted &lt;strong&gt;ONLY by IIIT Hyderabad&lt;/strong&gt; for its own independent process. IIIT Bangalore uses JEE Main via its own portal. All other IIITs (IIIT-D, IIIT-A, Pune, etc.) require &lt;strong&gt;JEE Main 2026&lt;/strong&gt; via dasanit.org. SAT is no longer valid for DASA at NITs or other IIITs.&lt;/div&gt;\n  &lt;/div&gt;\n\n  &lt;!-- HERO --&gt;\n  &lt;div class=\&quot;ea-hero\&quot;&gt;\n    &lt;h1&gt;NRI Admissions to &lt;span&gt;IIITs in India&lt;/span&gt; — 2026&lt;/h1&gt;\n    &lt;p&gt;Complete DASA 2026 guide — step-by-step process for each IIIT, correct exam requirements, deadlines, and expert strategy.&lt;/p&gt;\n    &lt;div class=\&quot;ea-tags\&quot;&gt;\n      &lt;span class=\&quot;ea-tag red\&quot;&gt;🔴 SAT: Only IIIT-Hyderabad&lt;/span&gt;\n      &lt;span class=\&quot;ea-tag orange\&quot;&gt;🎯 JEE Main: All other IIITs&lt;/span&gt;\n      &lt;span class=\&quot;ea-tag\&quot;&gt;📅 2026 Deadlines&lt;/span&gt;\n      &lt;span class=\&quot;ea-tag\&quot;&gt;🤖 AI Career Insights&lt;/span&gt;\n      &lt;span class=\&quot;ea-tag orange\&quot;&gt;🆓 Free Counselling&lt;/span&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n\n  &lt;!-- ═══════════════════════════════════════════════════ --&gt;\n  &lt;!-- SECTION 1: THREE ROUTES --&gt;\n  &lt;!-- ═══════════════════════════════════════════════════ --&gt;\n  &lt;div class=\&quot;ea-sec-title\&quot;&gt;Choose Your &lt;span&gt;Admission Route&lt;/span&gt;&lt;/div&gt;\n  &lt;div class=\&quot;ea-sec-sub\&quot;&gt;Each top IIIT has a different process — select the tab that applies to you&lt;/div&gt;\n\n  &lt;div class=\&quot;ea-tabs\&quot;&gt;\n    &lt;button class=\&quot;ea-tab-btn active\&quot; onclick=\&quot;eaTab(0,this)\&quot;&gt;\n      📝 Route A — IIIT Hyderabad\n      &lt;span class=\&quot;ea-tab-label\&quot;&gt;SAT Score · Own Process&lt;/span&gt;\n    &lt;/button&gt;\n    &lt;button class=\&quot;ea-tab-btn\&quot; onclick=\&quot;eaTab(1,this)\&quot;&gt;\n      🎯 Route B — IIIT Bangalore\n      &lt;span class=\&quot;ea-tab-label\&quot;&gt;JEE Main · Own Counselling&lt;/span&gt;\n    &lt;/button&gt;\n    &lt;button class=\&quot;ea-tab-btn\&quot; onclick=\&quot;eaTab(2,this)\&quot;&gt;\n      🌍 Route C — All Others\n      &lt;span class=\&quot;ea-tab-label\&quot;&gt;JEE Main · via dasanit.org&lt;/span&gt;\n    &lt;/button&gt;\n  &lt;/div&gt;\n\n  &lt;!-- TAB A: IIIT-H --&gt;\n  &lt;div class=\&quot;ea-tab-pane active\&quot; id=\&quot;ea-pane-0\&quot;&gt;\n    &lt;div class=\&quot;ea-notice blue\&quot;&gt;\n      &lt;h3&gt;📌 IIIT Hyderabad — DASA 2026 Official Dates (Confirmed)&lt;/h3&gt;\n      &lt;ul&gt;\n        &lt;li&gt;&lt;strong&gt;Exam Required:&lt;/strong&gt; SAT (Math + EBRW) — minimum score &lt;strong&gt;1070/1600&lt;/strong&gt;. JEE NOT needed.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Super-scores accepted&lt;/strong&gt; — IIIT-H takes best section scores across multiple SAT attempts.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;SAT must be written on or after May 2024&lt;/strong&gt; (no older scores accepted).&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;SAT Institute Code:&lt;/strong&gt; 6997 — report directly via College Board to IIIT-H.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Application Portal Opens:&lt;/strong&gt; 23 March 2026 → &lt;a href=\&quot;https://admportal.iiit.ac.in\&quot; target=\&quot;_blank\&quot;&gt;admportal.iiit.ac.in&lt;/a&gt;&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Application Portal Closes:&lt;/strong&gt; 22 May 2026&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;SAT scores must reach IIIT-H by:&lt;/strong&gt; 31 May 2026&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Last recommended SAT date:&lt;/strong&gt; 2 May 2026&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Application Fee:&lt;/strong&gt; INR 8,000 (non-refundable, paid online)&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;CIWG:&lt;/strong&gt; ❌ Not available — IIIT-H does not participate in CIWG scheme&lt;/li&gt;\n      &lt;/ul&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;ea-steps\&quot;&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#1A5DC8\&quot;&gt;01&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #1A5DC8\&quot;&gt;\n          &lt;h4&gt;📝 Write the SAT Exam&lt;/h4&gt;\n          &lt;p&gt;Appear for SAT (Math + EBRW). Essay not required. Minimum 1070 to apply; competitive range for CSE is 1350+. Recommend 2 attempts — March and May 2026 SAT dates work well.&lt;/p&gt;\n          &lt;span class=\&quot;ea-chip blue\&quot;&gt;Last viable date: 2 May 2026&lt;/span&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#F47920\&quot;&gt;02&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #F47920\&quot;&gt;\n          &lt;h4&gt;📤 Send SAT Score to IIIT-H via College Board&lt;/h4&gt;\n          &lt;p&gt;Login → College Board account → \&quot;Send Scores\&quot; → Enter Institute Code &lt;strong&gt;6997&lt;/strong&gt;. Request score delivery in advance so it arrives by 31 May 2026. Rush reports accepted.&lt;/p&gt;\n          &lt;span class=\&quot;ea-chip red\&quot;&gt;Scores must reach IIIT-H: 31 May 2026&lt;/span&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#1A5DC8\&quot;&gt;03&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #1A5DC8\&quot;&gt;\n          &lt;h4&gt;🌐 Apply on IIIT-H Portal (23 Mar – 22 May 2026)&lt;/h4&gt;\n          &lt;p&gt;Visit admportal.iiit.ac.in → Fill details → Upload Class 11 &amp;#x26; 12 PCM marks → Set programme preferences (CSE / ECE / CND / CLD / CHD / CGD). No changes after submission.&lt;/p&gt;\n          &lt;span class=\&quot;ea-chip blue\&quot;&gt;Portal window: 23 Mar – 22 May 2026&lt;/span&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#059669\&quot;&gt;04&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #059669\&quot;&gt;\n          &lt;h4&gt;💳 Pay INR 8,000 Application Fee&lt;/h4&gt;\n          &lt;p&gt;Pay non-refundable fee online through the portal during form submission. Net banking / debit / credit card accepted.&lt;/p&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#1A5DC8\&quot;&gt;05&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #1A5DC8\&quot;&gt;\n          &lt;h4&gt;📋 Await Allotment → Accept Seat Promptly&lt;/h4&gt;\n          &lt;p&gt;IIIT-H ranks by total SAT score. If allotted, accept within the deadline window. Failure to accept forfeits your seat to the next candidate permanently.&lt;/p&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#059669\&quot;&gt;06&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #059669\&quot;&gt;\n          &lt;h4&gt;🏛️ Report to IIIT Hyderabad Campus&lt;/h4&gt;\n          &lt;p&gt;Report to Gachibowli, Hyderabad with originals. Upload final Class 12 marks by deadline in offer letter. Pay remaining tuition + hostel registration.&lt;/p&gt;\n          &lt;span class=\&quot;ea-chip green\&quot;&gt;ugadmissions@iiit.ac.in | +91-40-6653-1250&lt;/span&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n\n  &lt;!-- TAB B: IIIT-B --&gt;\n  &lt;div class=\&quot;ea-tab-pane\&quot; id=\&quot;ea-pane-1\&quot;&gt;\n    &lt;div class=\&quot;ea-notice green\&quot;&gt;\n      &lt;h3&gt;📌 IIIT Bangalore — 2026 Confirmed Dates&lt;/h3&gt;\n      &lt;ul&gt;\n        &lt;li&gt;&lt;strong&gt;Exam Required:&lt;/strong&gt; JEE Main 2026 OR JEE Advanced 2026 rank — SAT is NOT accepted.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Process:&lt;/strong&gt; Own independent counselling at &lt;a href=\&quot;https://www.iiitb.ac.in/admissions\&quot; target=\&quot;_blank\&quot;&gt;iiitb.ac.in&lt;/a&gt; — NOT via dasanit.org.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Pre-Registration:&lt;/strong&gt; Opened 25 February 2026 — apply now at iiitb.ac.in.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Full Application Opens:&lt;/strong&gt; After JEE Main final results (~20 April 2026).&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Last Date to Apply:&lt;/strong&gt; &lt;strong&gt;8 June 2026&lt;/strong&gt;.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Registration Fee:&lt;/strong&gt; INR 1,500.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Min Eligibility:&lt;/strong&gt; 60% aggregate in Class 12 with Mathematics as a subject.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;CIWG:&lt;/strong&gt; ✅ Available — JEE Main rank required.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Programs:&lt;/strong&gt; B.Tech (4-yr) &amp;#x26; Integrated iMTech (5-yr) in CSE, ECE, DSAI.&lt;/li&gt;\n      &lt;/ul&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;ea-steps\&quot;&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#059669\&quot;&gt;01&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #059669\&quot;&gt;\n          &lt;h4&gt;📝 Write JEE Main 2026 (Session 1 &amp;#x26; / or Session 2)&lt;/h4&gt;\n          &lt;p&gt;JEE Main by NTA: Session 1 (Jan 2026) and Session 2 (Apr 2–9, 2026). IIIT-B uses your best All India Rank. JEE Advanced rank also accepted. Target CRL rank within 15,000 for CSE/ECE.&lt;/p&gt;\n          &lt;span class=\&quot;ea-chip green\&quot;&gt;Session 2 results: ~20 April 2026&lt;/span&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#F47920\&quot;&gt;02&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #F47920\&quot;&gt;\n          &lt;h4&gt;📋 Pre-Register at iiitb.ac.in (Open Now)&lt;/h4&gt;\n          &lt;p&gt;Pre-registration is live since 25 Feb 2026 at iiitb.ac.in. Register now with basic details. Full application form opens after JEE Main results in April. Registration fee: INR 1,500 at full application stage.&lt;/p&gt;\n          &lt;span class=\&quot;ea-chip orange\&quot;&gt;Pre-register now → Last date: 8 June 2026&lt;/span&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#059669\&quot;&gt;03&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #059669\&quot;&gt;\n          &lt;h4&gt;📄 Submit Full Application + Documents&lt;/h4&gt;\n          &lt;p&gt;After JEE results (~20 Apr): Upload Class 12 marksheet, JEE scorecard, passport/ID, photos. Choose programme preference. Last date: 8 June 2026.&lt;/p&gt;\n          &lt;span class=\&quot;ea-chip red\&quot;&gt;Hard deadline: 8 June 2026&lt;/span&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#F47920\&quot;&gt;04&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #F47920\&quot;&gt;\n          &lt;h4&gt;🎯 IIIT-B Counselling &amp;#x26; Seat Allotment&lt;/h4&gt;\n          &lt;p&gt;IIIT-B runs its own independent counselling — NOT through JoSAA or dasanit.org. Multiple rounds based on JEE rank + programme preference. Accept allotted seat within deadline.&lt;/p&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#059669\&quot;&gt;05&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #059669\&quot;&gt;\n          &lt;h4&gt;🏛️ Report to IIIT Bangalore Campus&lt;/h4&gt;\n          &lt;p&gt;Electronics City, Hosur Road, Bengaluru. Bring originals + pay semester fee + hostel registration + attend induction.&lt;/p&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n\n  &lt;!-- TAB C: dasanit.org --&gt;\n  &lt;div class=\&quot;ea-tab-pane\&quot; id=\&quot;ea-pane-2\&quot;&gt;\n    &lt;div class=\&quot;ea-notice orange\&quot;&gt;\n      &lt;h3&gt;📌 DASA via dasanit.org — Covers IIIT-Delhi, IIIT-Allahabad, IIIT-Pune, IIIT-Sri City, IIIT-Kottayam + all NITs&lt;/h3&gt;\n      &lt;ul&gt;\n        &lt;li&gt;&lt;strong&gt;Exam Required:&lt;/strong&gt; JEE Main 2026 Paper-1 rank — SAT permanently discontinued since 2021.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Portal:&lt;/strong&gt; &lt;a href=\&quot;https://dasanit.org\&quot; target=\&quot;_blank\&quot;&gt;dasanit.org&lt;/a&gt; (official — brochure not yet released).&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Registration Opens:&lt;/strong&gt; June 2026 (expected — after JoSAA counselling concludes).&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Application Fee:&lt;/strong&gt; USD 300 (non-refundable).&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Min Eligibility:&lt;/strong&gt; 75% in PCM (Class 12) for General; 65% for SC/ST.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Residency:&lt;/strong&gt; Must have studied abroad ≥ 2 years (incl. Gr. 11 &amp;#x26; 12) within the last 8 years.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;CIWG:&lt;/strong&gt; ✅ Sub-category for children of GCC-country workers — JEE Main rank still required.&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Seat Allotment:&lt;/strong&gt; 3 rounds in July–August 2026 (est.).&lt;/li&gt;\n        &lt;li&gt;&lt;strong&gt;Coordinating Institute 2026:&lt;/strong&gt; NIT Calicut (expected).&lt;/li&gt;\n      &lt;/ul&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;ea-steps\&quot;&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#F47920\&quot;&gt;01&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #F47920\&quot;&gt;\n          &lt;h4&gt;📝 Write JEE Main 2026&lt;/h4&gt;\n          &lt;p&gt;NTA conducts JEE Main in 2 sessions — Jan &amp;#x26; Apr 2026. Best rank is used. SAT not accepted here. Target a strong rank — competition is high for top IIITs via DASA.&lt;/p&gt;\n          &lt;span class=\&quot;ea-chip orange\&quot;&gt;Session 2: Apr 2–9, 2026&lt;/span&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#1A5DC8\&quot;&gt;02&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #1A5DC8\&quot;&gt;\n          &lt;h4&gt;🌐 Register on dasanit.org (June 2026)&lt;/h4&gt;\n          &lt;p&gt;Use JEE Main 2026 Application Number as login. Select category: NRI / OCI / PIO / Foreign National / CIWG. Verify eligibility — 75% PCM, 2 yrs study abroad, valid passport.&lt;/p&gt;\n          &lt;span class=\&quot;ea-chip blue\&quot;&gt;Registration: June 2026 (est.)&lt;/span&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#F47920\&quot;&gt;03&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #F47920\&quot;&gt;\n          &lt;h4&gt;📄 Upload Documents&lt;/h4&gt;\n          &lt;p&gt;Class 10 &amp;#x26; 12 marksheets, passport, JEE scorecard, NRI/OCI/PIO proof, photos. For CIWG: parent's Gulf residence visa + valid work permit + employer letter.&lt;/p&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;ea-step\&quot;&gt;\n        &lt;div class=\&quot;ea-step-num\&quot; style=\&quot;background:#1A5DC8\&quot;&gt;04&lt;/div&gt;\n        &lt;div class=\&quot;ea-step-body\&quot; style=\&quot;border-left:4px solid #1A5DC8\&quot;&gt;\n          &lt;h4&gt;💳 Pay USD 300 Application Fee&lt;/h4&gt;\n          &lt;p&gt;Non-refundable fee via SWIFT transfer or international card. Keep payment receipt for upload. CIWG applicants pay same fee but enjoy lower tuition (INR-based).&lt;/p&
