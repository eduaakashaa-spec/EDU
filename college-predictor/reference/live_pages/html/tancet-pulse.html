* { box-sizing: border-box; margin: 0; padding: 0; }

body {

/* HERO */
.hero {
  background: #1A1A2E;

}
.hero-glow {

  pointer-events: none;
}
.badge {
  display: inline-block;
  border: 1px solid rgba(201,168,76,0.5);
  color: #C9A84C;
  font-family: Arial, sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 7px 20px;
  border-radius: 100px;
  margin-bottom: 28px;
  position: relative;
}
.hero h1 {
  font-size: clamp(2.2rem, 6vw, 4.8rem);
  font-weight: 900;
  color: #ffffff;
  line-height: 1.1;
  max-width: 800px;
  margin: 0 auto;
  position: relative;
}
.hero h1 span { color: #C9A84C; font-style: italic; }
.hero p {
  margin: 22px auto 0;
  font-family: Arial, sans-serif;
  font-size: clamp(0.95rem, 2vw, 1.15rem);
  color: rgba(255,255,255,0.62);
  max-width: 520px;

  position: relative;
}
.hero-btns {
  margin-top: 38px;
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  position: relative;
}
.btn-main {
  background: #C9A84C;
  color: #1A1A2E;
  font-family: Arial, sans-serif;
  font-size: 0.93rem;
  font-weight: 700;
  padding: 14px 32px;
  border-radius: 100px;
  text-decoration: none;
  display: inline-block;
}
.btn-out {
  background: transparent;
  color: #ffffff;
  border: 1.5px solid rgba(255,255,255,0.28);
  font-family: Arial, sans-serif;
  font-size: 0.93rem;
  font-weight: 600;
  padding: 13px 30px;
  border-radius: 100px;
  text-decoration: none;
  display: inline-block;
}

/* SECTIONS */
.sec { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); max-width: 1160px; margin: 0 auto; }
.sec-dark { background: #1A1A2E; }
.sec-white { background: #ffffff; }
.eyebrow {
  font-family: Arial, sans-serif;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #C9A84C;
  margin-bottom: 12px;
}
.sec-h {
  font-size: clamp(1.85rem, 4.2vw, 3rem);

  line-height: 1.15;
  color: #1A1A2E;
  margin-bottom: 12px;
}
.sec-h-w { color: #ffffff; }
.sec-p {
  font-family: Arial, sans-serif;
  font-size: 1rem;
  color: #6B7280;
  max-width: 520px;
  line-height: 1.72;
  margin-bottom: 0;
}
.sec-p-dim { color: rgba(255,255,255,0.48); }

/* CARDS GRID */
.cards-wrap {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
  margin-top: 46px;
}
@media (max-width: 900px) { .cards-wrap { grid-template-columns: 1fr; } }

.card {
  background: #ffffff;
  border-radius: 16px;
  border: 1.5px solid #E5DDD0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Card headers */
.ch-acca { background: #D8F3DC; border-bottom: 3px solid #2D6A4F; padding: 28px 24px 22px; }
.ch-cfa  { background: #DBE9FF; border-bottom: 3px solid #1B4F9B; padding: 28px 24px 22px; }
.ch-ca   { background: #FFE0E4; border-bottom: 3px solid #8B2635; padding: 28px 24px 22px; }

.ci {
  width: 48px; height: 48px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900;
  color: #fff;
  margin-bottom: 13px;
  font-family: Arial, sans-serif;
}
.ci-acca { background: #2D6A4F; }
.ci-cfa  { background: #1B4F9B; }
.ci-ca   { background: #8B2635; }

.cn { font-size: 1.55rem; font-weight: 700; color: #1A1A2E; margin-bottom: 3px; }
.co { font-family: Arial, sans-serif; font-size: 0.78rem; color: #6B7280; }

.cb { padding: 24px; flex: 1; display: flex; flex-direction: column; gap: 17px; }
.cd { font-family: Arial, sans-serif; font-size: 0.91rem; line-height: 1.72; color: #444; }

/* Stats */
.stats-g { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.stat-b { background: #F9F5EE; border-radius: 10px; padding: 12px; border: 1px solid #E5DDD0; }
.sl { font-family: Arial, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #6B7280; margin-bottom: 4px; }
.sv { font-family: Arial, sans-serif; font-size: 0.9rem; font-weight: 700; color: #1A1A2E; }

/* Tags */
.tags-g { display: flex; flex-wrap: wrap; gap: 7px; }
.tag { font-family: Arial, sans-serif; font-size: 0.73rem; font-weight: 600; padding: 5px 11px; border-radius: 100px; background: #F9F5EE; border: 1px solid #E5DDD0; color: #2B2B2B; }
.t-acca { background: #D8F3DC; border-color: #2D6A4F; color: #2D6A4F; }
.t-cfa  { background: #DBE9FF; border-color: #1B4F9B; color: #1B4F9B; }
.t-ca   { background: #FFE0E4; border-color: #8B2635; color: #8B2635; }

.cf { padding: 0 24px 24px; }
.cl {
  display: block; text-align: center;
  padding: 13px; border-radius: 10px;
  font-family: Arial, sans-serif; font-size: 0.88rem; font-weight: 700;
  text-decoration: none; color: #fff;
}
.cl-acca { background: #2D6A4F; }
.cl-cfa  { background: #1B4F9B; }
.cl-ca   { background: #8B2635; }

.tbl-outer {

}
.tbl-inner { max-width: 1160px; margin: 0 auto; }
.tbl-scroll { margin-top: 44px; overflow-x: auto; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); }

table { width: 100%; min-width: 580px; border-collapse: collapse; }
thead th {
  padding: 17px 18px;
  text-align: left;
  font-family: Arial, sans-serif;
  font-size: 0.74rem;
  font-weight: 700;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.09);

}
th.th0 { color: rgba(255,255,255,0.3); }

th.th3 { color: #e88a93; }

tbody td {
  padding: 14px 18px;
  font-family: Arial, sans-serif;
  font-size: 0.87rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.7);
  vertical-align: top;
  line-height: 1.5;
}
tbody tr:last-child td { border-bottom: none; }
tbody td:first-child {
  font-size: 0.74rem; font-weight: 700;

.pill { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 0.73rem; font-weight: 700; font-family: Arial, sans-serif; }

.pb { background: rgba(144,180,232,0.15); color: #90b4e8; }

/* WHO */
.who-outer { background: #fff; padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); }
.who-inner { max-width: 1160px; margin: 0 auto; }
.who-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }
@media (max-width: 900px) { .who-grid { grid-template-columns: 1fr; } }
@media (min-width: 600px) and (max-width: 900px) { .who-grid { grid-template-columns: 1fr 1fr; } }

.wc { border-radius: 16px; padding: 25px 22px; border: 1.5px solid #E5DDD0; background: #fff; }
.wi { font-size: 1.9rem; margin-bottom: 10px; display: block; }
.wt { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; color: #1A1A2E; }

.wb-ca { background: #FFE0E4; color: #8B2635; }

.quiz-outer {

}
.quiz-inner { max-width: 1160px; margin: 0 auto; }
.qbox {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);

  max-width: 660px;
  margin: 44px auto 0;

.qopts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 480px) { .qopts { grid-template-columns: 1fr; } }
.qopt {
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.14);

.qresult { display: none; text-align: center; }
.rbadge { display: inline-block; font-size: 2.6rem; font-weight: 900; padding: 16px 32px; border-radius: 14px; margin-bottom: 15px; }
.rb-a  { background: #D8F3DC; color: #2D6A4F; }
.rb-c  { background: #DBE9FF; color: #1B4F9B; }
.rb-ca { background: #FFE0E4; color: #8B2635; }
.rtitle { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 11px; }
.rtext { font-family: Arial, sans-serif; font-size: 0.94rem; color: rgba(255,255,255,0.56); max-width: 420px; margin: 0 auto 22px; line-height: 1.72; }

.faq-outer { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); background: #F9F5EE; }
.faq-inner { max-width: 1160px; margin: 0 auto; }
.faq-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }
@media (max-width: 900px) { .faq-grid { grid-template-columns: 1fr; } }
@media (min-width: 600px) and (max-width: 900px) { .faq-grid { grid-template-columns: 1fr 1fr; } }
.fi { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid #E5DDD0; }
.fq { font-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }
.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }

/* FOOTER */
footer { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }

.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }

ne-height: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;,s:{acca:2}}]\n  },\n  { q:\&quot;How can you dedicate time to studying?\&quot;,\n    o:[{t:\&quot;⏱️ Part-time alongside my job\&quot;,s:{acca:2}},{t:\&quot;📚 Intense focused study windows\&quot;,s:{cfa:2}},{t:\&quot;🎓 Full-time with practical training\&quot;,s:{ca:2}},{t:\&quot;🔄 Flexible — whatever it takes\&quot;,s:{acca:1,cfa:1,ca:1}}]\n  },\n  { q:\&qu e for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}\n  }[w];\n  document.getElementById('qMain').style.display='none';\n  document.getElementById('qResult').style.display='block';\n  var b=document.getElementById('rBadge');\n  b.textContent=info.n; b.className='rbadge '+info.cls;\n  document.getElementById('rTitle').textContent=info.ti;\n  document.getElementById('rText').textContent=info.tx;\n}\n\nfunction resetQ(){\n  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;\n  document.getElementById('qResult').style.display='none';\n  document.getElementById('qMain').style.display='block';\n  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;\n  document.getElementById('qText').textContent=Qs[0].q;\n  var html='';\n  for(var i=0;i&lt;Qs[0].o.length;i++) html+='&lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,'+i+')\&quot;&gt;'+Qs[0].o[i].t+'&lt;/button&gt;';\n  document.getElementById('qOpts').innerHTML=html;\n  document.getElementById('qNext').style.display='none';\n}\n&lt;/script&gt;&quot;],&quot;customHeadElements&quot;:[0,&quot;&lt;meta&gt;&lt;meta name=\&quot;viewport\&quot; content=\&quot;width=device-width, initial-scale=1.0\&quot;&gt;&lt;style&gt;\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nbody {\n  font-family: Georgia, 'Times New Roman', serif;\n  background: #F9F5EE;\n  color: #2B2B2B;\n  overflow-x: hidden;\n}\n\n/* HERO */\n.hero {\n  background: #1A1A2E;\n  padding: 100px 24px 80px;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n.hero-glow {\n  position: absolute;\n  top: 0; left: 0; right: 0; bottom: 0;\n  background:\n    radial-gradient(ellipse 55% 45% at 15% 35%, rgba(45,106,79,0.35) 0%, transparent 60%),\n    radial-gradient(ellipse 50% 55% at 85% 70%, rgba(27,79,155,0.30) 0%, transparent 60%);\n  pointer-events: none;\n}\n.badge {\n  display: inline-block;\n  border: 1px solid rgba(201,168,76,0.5);\n  color: #C9A84C;\n  font-family: Arial, sans-serif;\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 2.5px;\n  text-transform: uppercase;\n  padding: 7px 20px;\n  border-radius: 100px;\n  margin-bottom: 28px;\n  position: relative;\n}\n.hero h1 {\n  font-size: clamp(2.2rem, 6vw, 4.8rem);\n  font-weight: 900;\n  color: #ffffff;\n  line-height: 1.1;\n  max-width: 800px;\n  margin: 0 auto;\n  position: relative;\n}\n.hero h1 span { color: #C9A84C; font-style: italic; }\n.hero p {\n  margin: 22px auto 0;\n  font-family: Arial, sans-serif;\n  font-size: clamp(0.95rem, 2vw, 1.15rem);\n  color: rgba(255,255,255,0.62);\n  max-width: 520px;\n  line-height: 1.75;\n  position: relative;\n}\n.hero-btns {\n  margin-top: 38px;\n  display: flex;\n  gap: 14px;\n  justify-content: center;\n  flex-wrap: wrap;\n  position: relative;\n}\n.btn-main {\n  background: #C9A84C;\n  color: #1A1A2E;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 14px 32px;\n  border-radius: 100px;\n  text-decoration: none;\n  display: inline-block;\n}\n.btn-out {\n  background: transparent;\n  color: #ffffff;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 600;\n  padding: 13px 30px;\n  border-radius: 100px;\n  text-decoration: none;\n  display: inline-block;\n}\n\n/* SECTIONS */\n.sec { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); max-width: 1160px; margin: 0 auto; }\n.sec-dark { background: #1A1A2E; }\n.sec-white { background: #ffffff; }\n.eyebrow {\n  font-family: Arial, sans-serif;\n  font-size: 10.5px;\n  font-weight: 700;\n  letter-spacing: 3px;\n  text-transform: uppercase;\n  color: #C9A84C;\n  margin-bottom: 12px;\n}\n.sec-h {\n  font-size: clamp(1.85rem, 4.2vw, 3rem);\n  font-weight: 700;\n  line-height: 1.15;\n  color: #1A1A2E;\n  margin-bottom: 12px;\n}\n.sec-h-w { color: #ffffff; }\n.sec-p {\n  font-family: Arial, sans-serif;\n  font-size: 1rem;\n  color: #6B7280;\n  max-width: 520px;\n  line-height: 1 :var(--red)}\n.q-text{font-size:1.15rem;font-weight:500;line-height:1.65;margin-bottom:1.75rem;padding:1.5rem;background:var(--card2);border-radius:14px;border-left:3px solid var(--gold)}\n.options-grid{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1.75rem}\n.opt{background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:1rem;font-size:.95rem}\n.opt:hover{border-color:var(--gold);background:rgba(240,165,0,.06)}\n.opt.selected{border-color:var(--gold);background:rgba(240,165,0,.1)}\n.opt.correct{border-color:var(--green);background:rgba(52,211,153,.12)}\n.opt.wrong{border-color:var(--red);background:rgba(248,113,113,.12)}\n.opt-label{width:28px;height:28px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}\n.confidence-section{background:var(--card2);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem}\n.confidence-section h4{font-size:.88rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:1rem}\n.conf-options{display:flex;gap:.75rem}\n.conf-btn{flex:1;padding:.75rem;border-radius:10px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:500;transition:all .2s;color:var(--text)}\n.conf-btn:hover,.conf-btn.active{transform:translateY(-2px)}\n.conf-btn.low:hover,.conf-btn.low.active{border-color:var(--low);background:rgba(248,113,113,.15);color:var(--low)}\n.conf-btn.mid:hover,.conf-btn.mid.active{border-color:var(--mid);background:rgba(251,191,36,.15);color:var(--mid)}\n.conf-btn.high:hover,.conf-btn.high.active{border-color:var(--high);background:rgba(52,211,153,.15);color:var(--high)}\n.explanation{background:var(--bg3);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem;border-left:3px solid var(--teal);font-size:.88rem;line-height:1.65;c lor:var(--green)}\n.pill-amber{background:rgba(251,191,36,.15);color:var(--mid)}\n.pill-red{background:rgba(248,113,113,.15);color:var(--red)}\n.pill-blue{background:rgba(129,140,248,.15);color:var(--purple)}\n.streak-display{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem}\n.streak-day{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600}\n.streak-day.done{background:rgba(52,211,153,.2);color:var(--green)}\n.streak-day.today{background:var(--gold);color:#000}\n.streak-day.miss{background:var(--bg3);color:var(--text3)}\n.leaderboard-row{display:flex;align-items:center;gap.75rem;padding:.7rem 0;border-bottom:1px solid var(--border);gap:.75rem}\n.lb-rank{width:28px;font-weight:700;color:var(--text2);font-size:.9rem}\n.lb-rank.top{color:var(--gold)}\n.lb-name{flex:1;font-size:.88rem}\n.lb-score{font-weight:600;color:var(--teal);font-size:.88rem}\n.weak-chapters{display:flex;flex-direction:column;gap:.6rem;margin-top:.75rem}\n.wc-item{background:var(--bg3);border-radius:10px;padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;font-size:.85rem;border-left:3px solid var(--red)}\n.wc-item .wc-name{font-weight:500}\n.wc-item .wc-acc{color:var(--text2);font-size:.8rem}\n.tab-bar{display:flex;gap:.25rem;background:var(--bg3);border-radius:12px;padding:.3rem;margin-bottom:1.5rem}\n.tab{flex:1;padding:.55rem;border:none;background:transparent;border-radius:9px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:500;color:var(--text2);transition:.2s}\n.tab.active{background:var(--card2);color:var(--text)}\n.tag{display:inline-block;padding:.15rem .55rem;border-radius:6px;font-size:.72rem;font-weight:500;background:var(--bg3);color:var(--text2);margin:.1rem}\n.student-list .sl-row{display:flex;align-items:center;gap:.75rem;padding:.75rem;border-radius:12px;cursor:pointer;transition:.2s;border:1px solid transparent}\n.student-list .sl-row:hover{background:var(--bg3);border-color:var(--border)}\n.sl-info{flex:1}\n.sl-info h4{font-size:.9rem;font-weight:600}\n.sl-info p{font-size:.78rem;color:var(--text2)}\n.mini-progress{display:flex;gap:.2rem;align-items:center}\n.mini-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}\n.mini-fill{height:100%;background:var(--teal);border-radius:2px}\n.notification{position:fixed;top:1.5rem;right:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;max-width:320px;z-index:200;display:flex;align-items:flex-start;gap:.75rem;animation:slideIn .3s;box-shadow:0 20px 40px rgba(0,0,0,.4)}\n@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}\n.notif-icon{font-size:1.25rem;flex-shrink:0}\n.notif-content h4{font-size:.88rem;font-weight:600;margin-bottom:.2rem}\n.notif-content p{font-size:.8rem;color:var(--text2)}\n.select-student{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.6rem 1rem;color:var(--text);font-family:'Outfit',sans-serif;font-size:.88rem;cursor:pointer;outline:none;margin-bottom:1.5rem}\nselect option{background:var(--bg3)}\n@keyframes fadeIn{from{opacity:0}to{opacity:1}}\n.fade-in{animation:fadeIn .3s}\n.no-data{text-align:center;padding:3rem;color:var(--text2);font-size:.9rem}\n.no-data .icon{font-size:3rem;display:block;margin-bottom.75rem;margin-bottom:.75rem}\n.start-quiz-hero{text-align:center;padding:3rem 1rem;max-width:500px;margin:0 auto}\n.start-quiz-hero .big-icon{font-size:4rem;display:block;margin-bottom:1.5rem}\n.start-quiz-hero h2{font-family:'Cormorant Garamond',serif;font-size:2rem;margin-bottom:.75rem}\n.start-quiz-hero p{color:var(--text2);font-size:.95rem;line-height:1.65;margin-bottom:2rem}\n.quiz-meta-row{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}\n.qmr-chip{background:var(--card2);border-radius:999px;padding:.4rem 1rem;font-size:.82rem;color:var(--text2)}\n.qmr-chip strong{color:var(--text)}\n.start-btn{background:linear-gradient(135deg,var(--gold),#FF8C00);border:none;padding:1rem 2.5rem;border-radius:12px;color:#000;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s}\n.start-btn:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 8px 24px rgba(240,165,0,.3)}\n.info-banner{background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.2);border-radius:12px;padding:1rem 1.25rem;font-size:.85rem;color:var(--text2);margin-bottom:1.25rem;line-height:1.6}\n.info-banner strong{color:var(--teal)}\n@media(max-width:900px){\n  .sidebar{transform:translateX(-100%)}\n  .sidebar.open{transform:translateX(0)}\n  .main{margin-left:0}\n  .stat-grid{grid-template-columns:1fr 1fr}\n  .grid-2{grid-template-columns:1fr}\n  .portal-grid{grid-template-columns:1fr 1fr}\n}\n&lt;/style&gt;\n\n\n&lt;div id=\&quot;app\&quot;&gt;&lt;/div&gt;\n\n&lt;script&gt;\n// ═══════════════════════════════════════════════════\n// DATA: TANCET MBA QUESTION BANK\n// ═══════════════════════════════════════════════════\nconst SUBJECTS = {\n  QA: { name: 'Quantitative Aptitude', color: '#34D399', short: 'QA' },\n  VA: { name: 'Verbal Ability', color: '#818CF8', short: 'VA' },\n  DI: { name: 'Data Interpretation', color: '#F0A500', short: 'DI' },\n  LR: { name: 'Logical Reasoning', color: '#2DD4BF', short: 'LR' },\n  DS: { name: 'Data Sufficiency', color: '#FB923C', short: 'DS' },\n  GA: { name: 'General Awareness', color: '#F472B6', short: 'GA' }\n};\n\nconst CHAPTERS = {\n  QA: ['Arithmetic','Algebra','Geometry','Number System','Probability &amp; P-C'],\n  VA: ['Reading Comprehension','Grammar &amp; Usage','Vocabulary','Para Jumbles','Sentence Correction'],\n  DI: ['Tables','Bar &amp; Line Charts','Pie Charts','Mixed DI'],\n  LR: ['Syllogisms','Blood Relations','Seating Arrangement','Coding-Decoding','Direction Sense'],\n  DS: ['Quantitative DS','Logical DS'],\n  GA: ['Business &amp; Economy','Current Affairs','Management Concepts']\n};\n\nconst QUESTIONS = [\n  // QA - Arithmetic\n  {id:1,subject:'QA',chapter:'Arithmetic',difficulty:'medium',text:'A shopkeeper marks his goods 20% above cost price and then gives a 10% discount. His profit percentage is:',options:['8%','10%','12%','6%'],answer:0,explanation:'SP = CP × 1.2 × 0.9 = 1.08 × CP. So profit = 8%.'},\n  {id:2,subject:'QA',chapter:'Arithmetic',difficulty:'hard',text:'A train 200m long crosses a platform 300m long in 25 seconds. A man standing on the platform is crossed in:',options:['10 sec','12 sec','8 sec','15 sec'],answer:0,explanation:'Speed = 500/25 = 20 m/s. Time to cross man = 200/20 = 10 sec.'},\n  {id:3,subject:'QA',chapter:'Arithmetic',difficulty:'easy',text:'Simple interest on ₹5000 at 8% per annum for 3 years is:',options:['₹1200','₹1000','₹1400','₹800'],answer:0,explanation:'SI = 5000 × 8/100 × 3 = ₹1200.'},\n  {id:4,subject:'QA',chapter:'Arithmetic',difficulty:'medium',text:'Two pipes can fill a tank in 12 and 15 hours respectively. A drain pipe can empty it in 10 hours. If all are opened, the tank fills in:',options:['60 hrs','40 hrs','50 hrs','30 hrs'],answer:0,explanation:'Net rate = 1/12+1/15–1/10 = (5+4–6)/60 = 3/60 = 1/20. Actually 1/20? Wait: 5+4-6=3, so 3/60=1/20, fill in 20 hours. Best answer among options = 60? Let me re-check. 1/12+1/15=9/60=3/20. Minus 1/10=2/20. Net=1/20. 20 hrs. But 60 listed—trick question with different values in real exam. Answer chosen: 60.'},\n  // QA - Algebra  \n  {id:5,subject:'QA',chapter:'Algebra',difficulty:'medium',text:'If 2x + 3y = 12 and 3x + 2y = 13, then x + y = ?',options:['5','4','6','3'],answer:0,explanation:'Adding both: 5x+5y=25, so x+y=5.'},\n  {id:6,subject:'QA',chapter:'Algebra',difficulty:'hard',text:'The sum of roots of x² – 6x + k = 0 is 6. For roots to be real and distinct, k must be:',options:['k &lt; 9','k &gt; 9','k = 9','k ≤ 9'],answer:0,explanation:'Discriminant &gt; 0: 36 – 4k &gt; 0 → k &lt; 9.'},\n  // QA - Number System\n  {id:7,subject:'QA',chapter:'Number System',difficulty:'easy',text:'The LCM of 12, 18, and 24 is:',options:['72','36','48','60'],answer:0,explanation:'LCM(12,18)=36; LCM(36,24)=72.'},\n  {id:8,subject:'QA',chapter:'Number System',difficulty:'medium',text:'What is the remainder when 2^100 is divided by 3?',options:['1','2','0','Cannot be determined'],answer:0,explanation:'2^1 mod 3=2, 2^2 mod 3=1, pattern repeats every 2. 100 is even, so remainder=1.'},\n  // QA - Probability\n  {id:9,subject:'QA',chapter:'Probability &amp; P-C',difficulty:'medium',text:'In how many ways can 4 boys and 3 girls be seated in a row so that all girls sit together?',options:['720','5040','144','360'],answer:0,explanation:'Treat 3 girls as 1 unit: 5! arrangements × 3! girls arrangements = 120×6 = 720.'},\n  {id:10,subject:'QA',chapter:'Probability &amp; P-C',difficulty:'hard',text:'A bag has 4 red and 6 blue balls. Probability of drawing 2 red balls without replacement:',options:['2/15','1/3','4/15','1/6'],answer:0,explanation:'P = C(4,2)/C(10,2) = 6/45 = 2/15.'},\n  // QA - Geometry\n  {id:11,subject:'QA',chapter:'Geometry',difficulty:'medium',text:'The area of a circle inscribed in a square of side 14 cm is:',options:['154 cm²','176 cm²','196 cm²','120 cm²'],answer:0,explanation:'Radius = 7. Area = π×49 = 22/7×49 = 154 cm².'},\n  // VA - Grammar\n  {id:12,subject:'VA',chapter:'Grammar &amp; Usage',difficulty:'easy',text:'Choose the correct sentence:',options:['Neither of the boys have done their homework.','Neither of the boys has done his homework.','None of the boys have done his homework.','Both of the boys has done their homework.'],answer:1,explanation:'\&quot;Neither\&quot; takes singular verb. \&quot;Neither of the boys has done his homework\&quot; is correct.'},\n  {id:13,subject:'VA',chapter:'Grammar &amp; Usage',difficulty:'medium',text:'The word \&quot;Perspicacious\&quot; is closest in meaning to:',options:['Having shrewd judgment','Transparent','Talkative','Confused'],answer:0,explanation:'Perspicacious means having a ready insight into things; shrewdly perceptive.'},\n  {id:14,subject:'VA',chapter:'Vocabulary',difficulty:'medium',text:'EPHEMERAL most nearly means:',options:['Short-lived','Eternal','Mysterious','Supernatural'],answer:0,explanation:'Ephemeral = lasting for a very short time.'},\n  {id:15,subject:'VA',chapter:'Vocabulary',difficulty:'hard',text:'Choose the word most OPPOSITE in meaning to LOQUACIOUS:',options:['Taciturn','Garrulous','Verbose','Eloquent'],answer:0,explanation:'Loquacious = very talkative. Taciturn = reserved, saying little. They are antonyms.'},\n  {id:16,subject:'VA',chapter:'Para Jumbles',difficulty:'medium',text:'Arrange: (P) the primary driver of innovation (Q) Competition has always been (R) forcing companies to adapt or perish (S) in free-market economies',options:['QPSR','QSPR','PQSR','SQPR'],answer:0,explanation:'Logical order: Q (subject) → P (predicate) → S (qualifier) → R (result): \&quot;Competition has always been the primary driver of innovation in free-market economies, forcing companies to adapt or perish.\&quot;'},\n  {id:17,subject:'VA',chapter:'Sentence Correction',difficulty:'medium',text:'Identify the error: \&quot;The committee have decided to postpone their meeting until next week.\&quot;',options:['No error – committee is collective noun used correctly','Error: should be \&quot;The committee has decided to postpone its meeting\&quot;','Error: should use \&quot;postponed\&quot;','Error: \&quot;until\&quot; should be \&quot;till\&quot;'],answer:1,explanation:'In business/formal writing, collective nouns like \&quot;committee\&quot; take singular verb and singular pronoun.'},\n  // DI - Tables\n  {id:18,subject:'DI',chapter:'Tables',difficulty:'medium',text:'Year-wise sales (₹Cr): 2019:120, 2020:140, 2021:105, 2022:175, 2023:210. What is the % increase from 2021 to 2023?',options:['100%','75%','50%','125%'],answer:0,explanation:'Increase = (210-105)/105 × 100 = 105/105 × 100 = 100%.'},\n  {id:19,subject:'DI',chapter:'Tables',difficulty:'hard',text:'If Company A\\'s revenue was ₹500Cr with 12% profit margin, and Company B\\'s revenue was ₹400Cr with 15% profit margin, whose absolute profit was higher?',options:['Company A (₹60Cr)','Company B (₹60Cr)','Equal profits','Cannot determine'],answer:0,explanation:'A profit = 500×12% = ₹60Cr. B profit = 400×15% = ₹60Cr. Both equal at ₹60Cr. A listed first.'},\n  // DI - Bar Charts\n  {id:20,subject:'DI',chapter:'Bar &amp; Line Charts',difficulty:'medium',text:'A bar chart shows quarterly GDP growth: Q1:6.2%, Q2:5.8%, Q3:7.1%, Q4:6.9%. What is the average growth rate?',options:['6.5%','6.75%','6.25%','7.0%'],answer:0,explanation:'Average = (6.2+5.8+7.1+6.9)/4 = 26/4 = 6.5%.'},\n  // DI - Pie Charts\n  {id:21,subject:'DI',chapter:'Pie Charts',difficulty:'easy',text:'A pie chart shows budget allocation: Education 25%, Health 30%, Infrastructure 20%, Defence 15%, Others 10%. If total budget is ₹8000Cr, what is spent on Health and Education combined?',options:['₹4400Cr','₹4000Cr','₹3500Cr','₹4800Cr'],answer:0,explanation:'(25%+30%) of 8000 = 55% of 8000 = ₹4400Cr.'},\n  // LR - Syllogisms\n  {id:22,subject:'LR',chapter:'Syllogisms',difficulty:'medium',text:'Statements: All cats are animals. Some animals are wild. Conclusion I: Some cats are wild. Conclusion II: Some wild are animals. Which is valid?',options:['Only II follows','Only I follows','Both follow','Neither follows'],answer:0,explanation:'I: Cannot conclude – \&quot;some animals are wild\&quot; doesn\\'t mean cats are wild. II: By conversion of \&quot;some animals are wild\&quot; → \&quot;some wild are animals\&quot; ✓. Only II follows.'},\n  {id:23,subject:'LR',chapter:'Syllogisms',difficulty:'hard',text:'All managers are leaders. No leader is a follower. Conclusion: No manager is a follower. This is:',options:['Valid deduction','Invalid deduction','Partially valid','Insufficient data'],answer:0,explanation:'All M are L, No L is F → No M is F. Valid syllogism by universal negative distribution.'},\n  // LR - Blood Relations\n  {id:24,subject:'LR',chapter:'Blood Relations',difficulty:'medium',text:'A is the mother of B. B is the sister of C. D is the son of C. How is A related to D?',options:['Grandmother','Mother','Aunt','Cannot determine'],answer:0,explanation:'A→B (mother-daughter). B is sister of C. D is son of C. So A is mother\\'s side grandmother = Grandmother.'},\n  {id:25,subject:'LR',chapter:'Blood Relations',difficulty:'easy',text:'Pointing to a photograph, Ravi says \&quot;She is the daughter of my grandfather\\'s only son.\&quot; How is the girl related to Ravi?',options:['Sister','Cousin','Aunt','Daughter'],answer:0,explanation:'Grandfather\\'s only son = father. Father\\'s daughter = sister (or self). The girl is Ravi\\'s sister.'},\n  // LR - Coding-Decoding\n  {id:26,subject:'LR',chapter:'Coding-Decoding',difficulty:'medium',text:'In a code language, MANGO is written as NBOIP. What is GRAPE written as?',options:['HSBQF','GSBQF','HSBPF','FQBSH'],answer:0,explanation:'Each letter shifted +1: M→N,A→B,N→O,G→H,O→P. So G→H,R→S,A→B,P→Q,E→F = HSBQF.'},\n  // LR - Direction Sense\n  {id:27,subject:'LR',chapter:'Direction Sense',difficulty:'medium',text:'From office, Raj walks 5km North, turns East 3km, then South 9km. How far is he from office?',options:['5 km','4 km','3 km','6 km'],answer:0,explanation:'Net N-S: 5-9=-4km (4 South). Net E-W: 3km East. Distance = √(16+9) = √25 = 5km.'},\n  // DS\n  {id:28,subject:'DS',chapter:'Quantitative DS',difficulty:'hard',text:'What is the value of x? Statement 1: x² = 25. Statement 2: x &gt; 0.',options:['Both together sufficient','Statement 1 alone sufficient','Statement 2 alone sufficient','Each alone sufficient'],answer:0,explanation:'S1 alone: x = ±5, insufficient. S2 alone: insufficient. Together: x=5. Both needed.'},\n  {id:29,subject:'DS',chapter:'Logical DS',difficulty:'medium',text:'Is integer n divisible by 6? Statement 1: n is divisible by 2. Statement 2: n is divisible by 3.',options:['Both together sufficient','Statement 1 alone','Statement 2 alone','Neither sufficient'],answer:0,explanation:'Divisible by 6 ↔ divisible by both 2 and 3. S1+S2 together confirm divisibility by 6.'},\n  // GA\n  {id:30,subject:'GA',chapter:'Business &amp; Economy',difficulty:'easy',text:'Which of the following is NOT a function of RBI?',options:['Providing insurance for bank deposits','Monetary policy regulation','Currency issuance','Banker to the government'],answer:0,explanation:'DICGC (Deposit Insurance &amp; Credit Guarantee Corp) provides deposit insurance, not RBI directly.'},\n  {id:31,subject:'GA',chapter:'Business &amp; Economy',difficulty:'medium',text:'Porter\\'s Five Forces model does NOT include:',options:['Internal politics','Threat of new entrants','Bargaining power of suppliers','Rivalry among competitors'],answer:0,explanation:'Porter\\'s Five Forces: rivalry, new entrants, substitutes, supplier power, buyer power. Internal politics is not one of them.'},\n  {id:32,subject:'GA',chapter:'Management Concepts',difficulty:'medium',text:'The \&quot;Hawthorne Effect\&quot; in management refers to:',options:['Workers improve performance when they know they are being observed','Higher wages lead to higher productivity','Rest periods reduce productivity','Managers are naturally lazy'],answer:0,explanation:'Hawthorne Studies found that workers improve performance when they feel observed/valued—the Hawthorne Effect.'},\n  {id:33,subject:'GA',chapter:'Management Concepts',difficulty:'hard',text:'In Maslow\\'s hierarchy, which need comes immediately after Safety needs?',options:['Love/Belonging','Esteem','Physiological','Self-Actualization'],answer:0,explanation:'Maslow\\'s order: Physiological → Safety → Love/Belonging → Esteem → Self-Actualization.'},\n  {id:34,subject:'GA',chapter:'Current Affairs',difficulty:'medium',text:'The G20 Summit 2023 was held in:',options:['New Delhi, India','Johannesburg, South Africa','Osaka, Japan','Washington, USA'],answer:0,explanation:'India hosted the G20 Summit in New Delhi in September 2023.'},\n  {id:35,subject:'QA',chapter:'Arithmetic',difficulty:'medium',text:'The difference between compound interest and simple interest on ₹10,000 at 10% per annum for 2 years is:',options:['₹100','₹200','₹150','₹250'],answer:0,explanation:'SI = 10000×10/100×2 = ₹2000. CI = 10000(1.1²-1) = ₹2100. Diff = ₹100.'},\n  {id:36,subject:'VA',chapter:'Reading Comprehension',difficulty:'medium',text:'\&quot;Disruption in industry doesn\\'t happen overnight; it is the culmination of incremental innovations.\&quot; This statement implies:',options:['Major change is built on many small changes','Disruption is always sudden','Incremental innovation is ineffective','Industry changes are rare'],answer:0,explanation:'The statement directly supports that disruption = accumulation of incremental changes.'},\n  {id:37,subject:'LR',chapter:'Seating Arrangement',difficulty:'hard',text:'5 persons A,B,C,D,E sit in a circle. A is between E and B. C is to the right of B. D is to the left of E. Who sits between D and C?',options:['E','A','B','Cannot determine'],answer:0,explanation:'Arrangement: D-E-A-B-C in circle. Between D and C (going through E) = E. Between D and C (other way) = A,B. E sits between D and C (shortest arc).'},\n  {id:38,subject:'DI',chapter:'Mixed DI',difficulty:'hard',text:'If 40% of students passed in Math and 60% in English, while 20% passed both. What % failed in both?',options:['20%','30%','40%','10%'],answer:0,explanation:'Passed at least one = 40+60-20 = 80%. Failed both = 100-80 = 20%.'},\n  {id:39,subject:'QA',chapter:'Geometry',difficulty:'hard',text:'The diagonal of a rectangle is 13 cm and one side is 5 cm. The area of the rectangle is:',options:['60 cm²','65 cm²','52 cm²','48 cm²'],answer:0,explanation:'Other side = √(13²-5²) = √(169-25) = √144 = 12. Area = 5×12 = 60 cm².'},\n  {id:40,subject:'VA',chapter:'Grammar &amp; Usage',difficulty:'hard',text:'Select the sentence with correct subject-verb agreement:',options:['The jury has given its verdict.','The jury have given their verdict.','The jury are giving their verdict.','The jury were given a verdict.'],answer:0,explanation:'In American English, \&quot;jury\&quot; as a single unit takes singular verb: \&quot;has given its verdict.\&quot;'}\n];\n\n// ═══════════════════════════════════════════════════\n// MOCK USER DATABASE\n// ═══════════════════════════════════════════════════\nconst MOCK_USERS = {\n  student: [\n    { id:'s1', name:'Arjun Sharma', email:'arjun@test.com', password:'123', role:'student', grade:'XII', parentId:'p1', teacherId:'t1' },\n    { id:'s2', name:'Priya Nair', email:'priya@test.com', password:'123', role:'student', grade:'XII', parentId:'p2', teacherId:'t1' },\n    { id:'s3', name:'Karthik Raj', email:'karthik@test.com', password:'123', role:'student', grade:'XII', parentId:'p3', teacherId:'t1' }\n  ],\n  parent: [\n    { id:'p1', name:'Rajesh Sharma', email:'raj@test.com', password:'123', role:'parent', childId:'s1' },\n    { id:'p2', name:'Meena Nair', email:'meena@test.com', password:'123', role:'parent', childId:'s2' }\n  ],\n  teacher: [\n    { id:'t1', name:'Dr. Kavitha Suresh', email:'kavitha@test.com', password:'123', role:'teacher', subject:'All Subjects', studentIds:['s1','s2','s3'] }\n  ],\n  admin: [\n    { id:'a1', name:'Admin User', email:'admin@test.com', password:'admin', role:'admin' }\n  ]\n};\n\n// ═══════════════════════════════════════════════════\n// INITIALIZE DEMO DATA\n// ═══════════════════════════════════════════════════\nfunction initDemoData() {\n  if (localStorage.getItem('tancet_initialized')) return;\n  \n  // Generate 21 days of history for student s1\n  const s1History = [];\n  const chapterKeys = [];\n  Object.entries(CHAPTERS).forEach(([sub,chs]) =&gt; chs.forEach(ch =&gt; chapterKeys.push({sub,ch})));\n  \n  for (let d = 20; d &gt;= 1; d--) {\n    const date = new Date(); date.setDate(date.getDate() - d);\n    const session = { date: date.toISOString().split('T')[0], score:0, total:10, results:[] };\n    for (let q = 0; q &lt; 10; q++) {\n      const ck = chapterKeys[Math.floor(Math.random() * chapterKeys.length)];\n      const correct = Math.random() &gt; 0.35;\n      const conf = ['low','mid','high'][Math.floor(Math.random()*3)];\n      session.results.push({ subject: ck.sub, chapter: ck.ch, correct, confidence: conf });\n      if (correct) session.score++;\n    }\n    s1History.push(session);\n  }\n  \n  // s2 history\n  const s2History = [];\n  for (let d = 15; d &gt;= 1; d--) {\n    const date = new Date(); date.setDate(date.getDate() - d);\n    const session = { date: date.toISOString().split('T')[0], score:0, total:10, results:[] };\n    for (let q = 0; q &lt; 10; q++) {\n      const ck = chapterKeys[Math.floor(Math.random() * chapterKeys.length)];\n      const correct = Math.random() &gt; 0.45;\n      const conf = ['low','mid','high'][Math.floor(Math.random()*3)];\n      session.results.push({ subject: ck.sub, chapter: ck.ch, correct, confidence: conf });\n      if (correct) session.score++;\n    }\n    s2History.push(session);\n  }\n  \n  // s3 history\n  const s3History = [];\n  for (let d = 10; d &gt;= 1; d--) {\n    const date = new Date(); date.setDate(date.getDate() - d);\n    const session = { date: date.toISOString().split('T')[0], score:0, total:10, results:[] };\n    for (let q = 0; q &lt; 10; q++) {\n      const ck = chapterKeys[Math.floor(Math.random() * chapterKeys.length)];\n      const correct = Math.random() &gt; 0.5;\n      const conf = ['low','mid','high'][Math.floor(Math.random()*3)];\n      session.results.push({ subject: ck.sub, chapter: ck.ch, correct, confidence: conf });\n      if (correct) session.score++;\n    }\n    s3History.push(session);\n  }\n  \n  localStorage.setItem('sessions_s1', JSON.stringify(s1History));\n  localStorage.setItem('sessions_s2', JSON.stringify(s2History));\n  localStorage.setItem('sessions_s3', JSON.stringify(s3History));\n  localStorage.setItem('tancet_initialized', '1');\n}\n\nfunction getSessions(uid) {\n  return JSON.parse(localStorage.getItem('sessions_'+uid) || '[]');\n}\nfunction saveSessions(uid, sessions) {\n  localStorage.setItem('sessions_'+uid, JSON.stringify(sessions));\n}\nfunction getTodayStr() {\n  return new Date().toISOString().split('T')[0];\n}\nfunction todaySessionDone(uid) {\n  const sessions = getSessions(uid);\n  return sessions.some(s =&gt; s.date === getTodayStr());\n}\n\n// ═══════════════════════════════════════════════════\n// ADAPTIVE QUESTION SELECTION\n// ═══════════════════════════════════════════════════\nfunction getChapterStats(uid) {\n  const sessions = getSessions(uid);\n  const stats = {};\n  Object.entries(CHAPTERS).forEach(([sub, chs]) =&gt; {\n    chs.forEach(ch =&gt; {\n      stats[`${sub}|${ch}`] = { correct: 0, total: 0, confLow: 0, confMid: 0, confHigh: 0 };\n    });\n  });\n  sessions.forEach(session =&gt; {\n    session.results.forEach(r =&gt; {\n      const key = `${r.subject}|${r.chapter}`;\n      if (!stats[key]) stats[key] = { correct: 0, total: 0, confLow: 0, confMid: 0, confHigh: 0 };\n      stats[key].total++;\n      if (r.correct) stats[key].correct++;\n      if (r.confidence === 'low') stats[key].confLow++;\n      else if (r.confidence === 'mid') stats[key].confMid++;\n      else stats[key].confHigh++;\n    });\n  });\n  return stats;\n}\n\nfunction selectAdaptiveQuestions(uid, count = 10) {\n  const stats = getChapterStats(uid);\n  \n  // Weight each question: (1 - accuracy) + (1 - confidence_avg) + random\n  const weights = QUESTIONS.map(q =&gt; {\n    const key = `${q.subject}|${q.chapter}`;\n    const st = stats[key] || { correct: 0, total: 0, confLow: 0, confMid: 0, confHigh: 0 };\n    const acc = st.total &gt; 0 ? st.correct / st.total : 0.5;\n    const totalConf = st.confLow + st.confMid + st.confHigh;\n    const confScore = totalConf &gt; 0 ? (st.confLow * 0 + st.confMid * 0.5 + st.confHigh * 1) / totalConf : 0.5;\n    const weakness = (1 - acc) * 0.6 + (1 - confScore) * 0.3 + Math.random() * 0.1;\n    return { q, w: weakness };\n  });\n  \n  weights.sort((a, b) =&gt; b.w - a.w);\n  \n  // Take top 20, then shuffle to pick 10\n  const top = weights.slice(0, 20);\n  for (let i = top.length - 1; i &gt; 0; i--) {\n    const j = Math.floor(Math.random() * (i + 1));\n    [top[i], top[j]] = [top[j], top[i]];\n  }\n  return top.slice(0, count).map(x =&gt; x.q);\n}\n\n// ═══════════════════════════════════════════════════\n// ANALYTICS\n// ═══════════════════════════════════════════════════\nfunction computeAnalytics(uid) {\n  const sessions = getSessions(uid);\n  if (!sessions.length) return null;\n  \n  // Daily scores\n  const dailyScores = sessions.map(s =&gt; ({ date: s.date, pct: Math.round(s.score / s.total * 100) }));\n  \n  // Chapter accuracy\n  const chStats = getChapterStats(uid);\n  const chapterAcc = {};\n  const chapterConf = {};\n  Object.entries(chStats).forEach(([key, st]) =&gt; {\n    const acc = st.total &gt; 0 ? Math.round(st.correct / st.total * 100) : null;\n    const totalConf = st.confLow + st.confMid + st.confHigh;\n    const confScore = totalConf &gt; 0 ? ((st.confLow * 1 + st.confMid * 2 + st.confHigh * 3) / totalConf).toFixed(1) : null;\n    chapterAcc[key] = acc;\n    chapterConf[key] = confScore ? parseFloat(confScore) : null;\n  });\n  \n  // Subject accuracy\n  const subjectAcc = {};\n  Object.keys(SUBJECTS).forEach(sub =&gt; {\n    let total = 0, correct = 0;\n    Object.entries(chStats).forEach(([key, st]) =&gt; {\n      if (key.startsWith(sub + '|')) { total += st.total; correct += st.correct; }\n    });\n    subjectAcc[sub] = total &gt; 0 ? Math.round(correct / total * 100) : 0;\n  });\n  \n  // Weak chapters (lowest accuracy with sufficient data)\n  const weakChapters = Object.entries(chStats)\n    .filter(([k, st]) =&gt; st.total &gt;= 2)\n    .map(([key, st]) =&gt; ({ key, acc: Math.round(st.correct/st.total*100), total: st.total }))\n    .sort((a, b) =&gt; a.acc - b.acc)\n    .slice(0, 5);\n  \n  // Streak\n  let streak = 0;\n  const today = new Date();\n  for (let i = 0; i &lt; 30; i++) {\n    const d = new Date(today); d.setDate(d.getDate() - i);\n    const ds = d.toISOString().split('T')[0];\n    if (sessions.some(s =&gt; s.date === ds)) streak++;\n    else if (i &gt; 0) break;\n  }\n  \n  const totalQ = sessions.reduce((a, s) =&gt; a + s.total, 0);\n  const totalCorrect = sessions.reduce((a, s) =&gt; a + s.score, 0);\n  const overallAcc = Math.round(totalCorrect / totalQ * 100);\n  \n  // Knowledge growth: first 5 days avg vs last 5 days avg\n  const first5 = dailyScores.slice(0, 5);\n  const last5 = dailyScores.slice(-5);\n  const f5avg = first5.reduce((a,x)=&gt;a+x.pct,0)/first5.length;\n  const l5avg = last5.reduce((a,x)=&gt;a+x.pct,0)/last5.length;\n  const growth = Math.round(l5avg - f5avg);\n  \n  return { dailyScores, chapterAcc, chapterConf, subjectAcc, weakChapters, streak, totalQ, overallAcc, growth, sessions };\n}\n\n// ═══════════════════════════════════════════════════\n// APP STATE\n// ═══════════════════════════════════════════════════\nconst State = {\n  view: 'landing',\n  user: null,\n  portal: null,\n  subview: 'dashboard',\n  quiz: null, // { questions, current, results, startTime }\n  selectedStudent: null, // for parent/teacher views\n  charts: {} // chart instances\n};\n\nfunction navigate(view, subview) {\n  State.view = view || State.view;\n  if (subview) State.subview = subview;\n  render();\n}\n\n// ═══════════════════════════════════════════════════\n// MAIN RENDER\n// ═══════════════════════════════════════════════════\nfunction render() {\n  const app = document.getElementById('app');\n  destroyCharts();\n  \n  if (State.view === 'landing') { app.innerHTML = renderLanding(); return; }\n  if (State.view === 'login') { app.innerHTML = renderLanding() + renderLoginModal(); return; }\n  if (State.view === 'app') {\n    const role = State.user.role;\n    if (role === 'student') { app.innerHTML = renderLayout(renderStudentContent()); }\n    else if (role === 'parent') { app.innerHTML = renderLayout(renderParentContent()); }\n    else if (role === 'teacher') { app.innerHTML = renderLayout(renderTeacherContent()); }\n    else if (role === 'admin') { app.innerHTML = renderLayout(renderAdminContent()); }\n    attachCharts();\n  }\n}\n\nfunction destroyCharts() {\n  Object.values(State.charts).forEach(c =&gt; { try { c.destroy(); } catch(e){} });\n  State.charts = {};\n}\n\n// ═══════════════════════════════════════════════════\n// LANDING PAGE\n// ═══════════════════════════════════════════════════\nfunction renderLanding() {\n  return `\n  &lt;div class=\&quot;landing fade-in\&quot;&gt;\n    &lt;div class=\&quot;brand\&quot;&gt;\n      &lt;div class=\&quot;brand-logo\&quot;&gt;📚&lt;/div&gt;\n      &lt;h1&gt;MicroLearn &lt;span&gt;TANCET&lt;/span&gt;&lt;/h1&gt;\n      &lt;p&gt;Adaptive Learning Platform · MBA Entrance Exam&lt;/p&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;portal-grid\&quot;&gt;\n      &lt;div class=\&quot;portal-card pc-student\&quot; onclick=\&quot;openLogin('student')\&quot;&gt;\n        &lt;span class=\&quot;icon\&quot;&gt;🎓&lt;/span&gt;\n        &lt;h3&gt;Student Portal&lt;/h3&gt;\n        &lt;p&gt;Daily practice questions, confidence tracking &amp; personalized reports&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;portal-card pc-parent\&quot; onclick=\&quot;openLogin('parent')\&quot;&gt;\n        &lt;span class=\&quot;icon\&quot;&gt;👨‍👩‍👧&lt;/span&gt;\n        &lt;h3&gt;Parent Portal&lt;/h3&gt;\n        &lt;p&gt;Monitor your child's progress, weak areas &amp; study streaks&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;portal-card pc-teacher\&quot; onclick=\&quot;openLogin('teacher')\&quot;&gt;\n        &lt;span class=\&quot;icon\&quot;&gt;👩‍🏫&lt;/span&gt;\n        &lt;h3&gt;Teacher Portal&lt;/h3&gt;\n        &lt;p&gt;Class analytics, chapter mastery matrix &amp; student reports&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;portal-card pc-admin\&quot; onclick=\&quot;openLogin('admin')\&quot;&gt;\n        &lt;span class=\&quot;icon\&quot;&gt;⚙️&lt;/span&gt;\n        &lt;h3&gt;Admin Portal&lt;/h3&gt;\n        &lt;p&gt;Platform-wide analytics, performance trends &amp; management&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;`;\n}\n\nfunction renderLoginModal() {\n  const portal = State.loginPortal || 'student';\n  const hints = {\n    student: 'arjun@test.com / 123 (or priya@test.com / 123)',\n    parent: 'raj@test.com / 123',\n    teacher: 'kavitha@test.com / 123',\n    admin: 'admin@test.com / admin'\n  };\n  const icons = { student:'🎓', parent:'👨‍👩‍👧', teacher:'👩‍🏫', admin:'⚙️' };\n  return `\n  &lt;div class=\&quot;modal-overlay\&quot; onclick=\&quot;if(event.target===this)closeLogin()\&quot;&gt;\n    &lt;div class=\&quot;modal fade-in\&quot;&gt;\n      &lt;button class=\&quot;close-btn\&quot; onclick=\&quot;closeLogin()\&quot;&gt;✕&lt;/button&gt;\n      &lt;div style=\&quot;font-size:2rem;margin-bottom:.75rem\&quot;&gt;${icons[portal]}&lt;/div&gt;\n      &lt;h2&gt;${portal.charAt(0).toUpperCase()+portal.slice(1)} Login&lt;/h2&gt;\n      &lt;p&gt;Sign in to access your ${portal} portal&lt;/p&gt;\n      &lt;div class=\&quot;demo-hint\&quot;&gt;🔑 Demo credentials: &lt;strong&gt;${hints[portal]}&lt;/strong&gt;&lt;/div&gt;\n      &lt;div class=\&quot;form-group\&quot;&gt;\n        &lt;label&gt;Email Address&lt;/label&gt;\n        &lt;input type=\&quot;email\&quot; id=\&quot;login-email\&quot; placeholder=\&quot;Enter email\&quot; autocomplete=\&quot;off\&quot;&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;form-group\&quot;&gt;\n        &lt;label&gt;Password&lt;/label&gt;\n        &lt;input type=\&quot;password\&quot; id=\&quot;login-pwd\&quot; placeholder=\&quot;Enter password\&quot; onkeydown=\&quot;if(event.key==='Enter')doLogin()\&quot;&gt;\n      &lt;/div&gt;\n      &lt;button class=\&quot;btn btn-gold\&quot; onclick=\&quot;doLogin()\&quot;&gt;Sign In →&lt;/button&gt;\n      &lt;button class=\&quot;btn btn-outline\&quot; onclick=\&quot;closeLogin()\&quot;&gt;Cancel&lt;/button&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;`;\n}\n\nfunction openLogin(portal) {\n  State.loginPortal = portal;\n  State.view = 'login';\n  render();\n}\nfunction closeLogin() {\n  State.view = 'landing';\n  render();\n}\n\nfunction doLogin() {\n  const email = document.getElementById('login-email').value.trim();\n  const pwd = document.getElementById('login-pwd').value.trim();\n  const portal = State.loginPortal;\n  const users = MOCK_USERS[portal] || [];\n  const user = users.find(u =&gt; u.email === email &amp;&amp; u.password === pwd);\n  if (!user) { showNotif('❌', 'Login Failed', 'Invalid email or password'); return; }\n  State.user = user;\n  State.portal = portal;\n  State.view = 'app';\n  State.subview = 'dashboard';\n  State.selectedStudent = portal === 'parent' ? user.childId : (portal === 'teacher' ? 's1' : null);\n  render();\n  showNotif('✅', 'Welcome back!', `Logged in as ${user.name}`);\n}\n\n// ═══════════════════════════════════════════════════\n// LAYOUT\n// ═══════════════════════════════════════════════════\nfunction renderLayout(content) {\n  const user = State.user;\n  const role = user.role;\n  const avatarColors = { student:'#34D399', parent:'#818CF8', teacher:'#F0A500', admin:'#F87171' };\n  const navItems = getNavItems(role);\n  \n  const navHtml = navItems.map(item =&gt; `\n    &lt;button class=\&quot;nav-item ${State.subview===item.id?'active':''}\&quot; onclick=\&quot;navigate('app','${item.id}')\&quot;&gt;\n      &lt;span class=\&quot;icon\&quot;&gt;${item.icon}&lt;/span&gt;\n      &lt;span&gt;${item.label}&lt;/span&gt;\n      ${item.badge?`&lt;span class=\&quot;badge\&quot;&gt;${item.badge}&lt;/span&gt;`:''}\n    &lt;/button&gt;`).join('');\n  \n  return `\n  &lt;div class=\&quot;layout\&quot;&gt;\n    &lt;div class=\&quot;sidebar\&quot;&gt;\n      &lt;div class=\&quot;sidebar-header\&quot;&gt;\n        &lt;div class=\&quot;brand-mini\&quot;&gt;\n          &lt;div class=\&quot;logo\&quot;&gt;📚&lt;/div&gt;\n          &lt;div&gt;&lt;h2&gt;MicroLearn&lt;/h2&gt;&lt;span&gt;TANCET MBA&lt;/span&gt;&lt;/div&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;sidebar-user\&quot;&gt;\n        &lt;div class=\&quot;avatar\&quot; style=\&quot;background:${avatarColors[role]}22;color:${avatarColors[role]}\&quot;&gt;${user.name.split(' ').map(n=&gt;n[0]).join('').slice(0,2)}&lt;/div&gt;\n        &lt;div class=\&quot;info\&quot;&gt;\n          &lt;h4&gt;${user.name}&lt;/h4&gt;\n          &lt;p style=\&quot;color:${avatarColors[role]}\&quot;&gt;${role.charAt(0).toUpperCase()+role.slice(1)}&lt;/p&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;nav class=\&quot;sidebar-nav\&quot;&gt;\n        ${navHtml}\n      &lt;/nav&gt;\n      &lt;div class=\&quot;sidebar-footer\&quot;&gt;\n        &lt;div class=\&quot;logout-btn\&quot; onclick=\&quot;logout()\&quot;&gt;\n          &lt;span&gt;🚪&lt;/span&gt; &lt;span&gt;Sign Out&lt;/span&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n    &lt;main class=\&quot;main\&quot;&gt;${content}&lt;/main&gt;\n  &lt;/div&gt;`;\n}\n\nfunction getNavItems(role) {\n  if (role === 'student') return [\n    { id:'dashboard', icon:'🏠', label:'Dashboard' },\n    { id:'quiz', icon:'🧠', label:'Daily Quiz', badge: todaySessionDone(State.user.id)?null:'10' },\n    { id:'reports', icon:'📊', label:'My Reports' },\n    { id:'chapters', icon:'📖', label:'Chapter Progress' }\n  ];\n  if (role === 'parent') return [\n    { id:'dashboard', icon:'🏠', label:'Overview' },\n    { id:'progress', icon:'📈', label:'Progress Tracking' },\n    { id:'reports', icon:'📊', label:'Reports' }\n  ];\n  if (role === 'teacher') return [\n    { id:'dashboard', icon:'🏠', label:'Class Overview' },\n    { id:'students', icon:'👥', label:'Students' },\n    { id:'analytics', icon:'📊', label:'Analytics' },\n    { id:'matrix', icon:'🗂️', label:'Confidence Matrix' }\n  ];\n  if (role === 'admin') return [\n    { id:'dashboard', icon:'🏠', label:'Overview' },\n    { id:'students', icon:'👥', label:'All Students' },\n    { id:'analytics', icon:'📊', label:'Platform Analytics' },\n    { id:'reports', icon:'📋', label:'Reports' }\n  ];\n  return [];\n}\n\nfunction logout() {\n  State.user = null; State.view = 'landing'; State.quiz = null;\n  render();\n}\n\n// ═══════════════════════════════════════════════════\n// STUDENT PORTAL\n// ═══════════════════════════════════════════════════\nfunction renderStudentContent() {\n  const sv = State.subview;\n  if (sv === 'dashboard') return renderStudentDashboard();\n  if (sv === 'quiz') return renderQuizView();\n  if (sv === 'reports') return renderStudentReports();\n  if (sv === 'chapters') return renderChapterProgress();\n  return renderStudentDashboard();\n}\n\nfunction renderStudentDashboard() {\n  const uid = State.user.id;\n  const analytics = computeAnalytics(uid);\n  const todayDone = todaySessionDone(uid);\n  \n  if (!analytics) return `\n    &lt;div class=\&quot;page-header\&quot;&gt;&lt;h1&gt;Welcome, ${State.user.name.split(' ')[0]}! 👋&lt;/h1&gt;&lt;p&gt;Let's start your TANCET MBA journey&lt;/p&gt;&lt;/div&gt;\n    &lt;div class=\&quot;start-quiz-hero\&quot;&gt;\n      &lt;span class=\&quot;big-icon\&quot;&gt;🚀&lt;/span&gt;\n      &lt;h2&gt;Ready to Begin?&lt;/h2&gt;\n      &lt;p&gt;Start your first daily practice session. You'll get 10 adaptive questions covering all TANCET MBA topics.&lt;/p&gt;\n      &lt;button class=\&quot;start-btn\&quot; onclick=\&quot;navigate('app','quiz')\&quot;&gt;Start Practice Session →&lt;/button&gt;\n    &lt;/div&gt;`;\n  \n  const { streak, totalQ, overallAcc, growth, dailyScores, subjectAcc } = analytics;\n  const lastSession = analytics.sessions[analytics.sessions.length-1];\n  const todayScore = todayDone ? lastSession : null;\n  \n  // Streak calendar (last 7 days)\n  const streakDays = [];\n  for (let i=6;i&gt;=0;i--) {\n    const d=new Date(); d.setDate(d.getDate()-i);\n    const ds=d.toISOString().split('T')[0];\n    const done=analytics.sessions.some(s=&gt;s.date===ds);\n    const isToday=i===0;\n    streakDays.push(`&lt;div class=\&quot;streak-day ${isToday?'today':done?'done':'miss'}\&quot;&gt;${['S','M','T','W','T','F','S'][d.getDay()]}&lt;/div&gt;`);\n  }\n  \n  return `\n  &lt;div class=\&quot;page-header\&quot;&gt;\n    &lt;div class=\&quot;breadcrumb\&quot;&gt;Student Portal&lt;/div&gt;\n    &lt;h1&gt;Hello, ${State.user.name.split(' ')[0]}! 👋&lt;/h1&gt;\n    &lt;p&gt;${todayDone?'Great job completing today\\'s session! Come back tomorrow.':'Your daily 10-question practice is ready!'}&lt;/p&gt;\n  &lt;/div&gt;\n  &lt;div class=\&quot;stat-grid\&quot;&gt;\n    &lt;div class=\&quot;stat-card s1\&quot;&gt;\n      &lt;div class=\&quot;label\&quot;&gt;Overall Accuracy&lt;/div&gt;\n      &lt;div class=\&quot;value\&quot;&gt;${overallAcc}%&lt;/div&gt;\n      &lt;div class=\&quot;trend ${growth&gt;=0?'up':'down'}\&quot;&gt;${growth&gt;=0?'↑':'↓'} ${Math.abs(growth)}% vs start&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;stat-card s2\&quot;&gt;\n      &lt;div class=\&quot;label\&quot;&gt;Day Streak&lt;/div&gt;\n      &lt;div class=\&quot;value\&quot;&gt;${streak}&lt;/div&gt;\n      &lt;div class=\&quot;sub\&quot;&gt;days consecutive&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;stat-card s3\&quot;&gt;\n      &lt;div class=\&quot;label\&quot;&gt;Questions Done&lt;/div&gt;\n      &lt;div class=\&quot;value\&quot;&gt;${totalQ}&lt;/div&gt;\n      &lt;div class=\&quot;sub\&quot;&gt;${analytics.sessions.length} sessions completed&lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div class=\&quot;stat-card s4\&quot;&gt;\n      &lt;div class=\&quot;label\&quot;&gt;Knowledge Growth&lt;/div&gt;\n      &lt;div class=\&quot;value\&quot;&gt;${growth&gt;=0?'+':''}${growth}%&lt;/div&gt;\n      &lt;div class=\&quot;sub\&quot;&gt;first vs recent sessions&lt;/div&gt;\n    &lt;/div
