.brand p{color:var(--text2);margin-top:.5rem;font-size:.95rem;letter-spacing:.05em;text-transform:uppercase}
.portal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.25rem;max-width:600px;width:100%}
.portal-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem 1.75rem;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.portal-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--pc1,.1) 0%,transparent 60%);opacity:0;transition:.3s}
.portal-card:hover{transform:translateY(-4px);border-color:var(--pc1,var(--gold));box-shadow:0 20px 40px rgba(0,0,0,.4)}
.portal-card:hover::before{opacity:1}
.portal-card .icon{font-size:2.2rem;margin-bottom:1rem;display:block}
.portal-card h3{font-size:1.15rem;font-weight:600;margin-bottom:.3rem}
.portal-card p{font-size:.82rem;color:var(--text2);line-height:1.5}
.pc-student{--pc1:rgba(45,212,191,.15)}
.pc-parent{--pc1:rgba(129,140,248,.15)}
.pc-teacher{--pc1:rgba(240,165,0,.15)}
.pc-admin{--pc1:rgba(248,113,113,.15)}

/* ─── LOGIN MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);animation:fadeIn .2s}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:2.5rem;width:100%;max-width:420px;position:relative}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;margin-bottom:.3rem}
.modal p{color:var(--text2);font-size:.88rem;margin-bottom:1.75rem}
.form-group{margin-bottom:1.25rem}
.form-group label{display:block;font-size:.82rem;font-weight:500;color:var(--text2);margin-bottom:.45rem;letter-spacing:.03em;text-transform:uppercase}
.form-group input,select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;color:var(--text);font-family:'Outfit',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.form-group input:focus,select:focus{border-color:var(--gold)}
select{cursor:pointer}
select option{background:var(--bg3)}
.btn{width:100%;padding:.9rem;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.btn-gold{background:linear-gradient(135deg,var(--gold),#FF8C00);color:#000}
.btn-gold:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 20px rgba(240,165,0,.3)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);margin-top:.75rem}
.btn-outline:hover{border-color:var(--text2);color:var(--text)}
.demo-hint{background:var(--bg3);border-radius:10px;padding:.85rem 1rem;font-size:.8rem;color:var(--text2);margin-bottom:1.25rem;line-height:1.6}
.demo-hint strong{color:var(--gold)}
.close-btn{position:absolute;top:1.25rem;right:1.25rem;background:var(--bg3);border:none;color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center}
.close-btn:hover{color:var(--text)}

/* ─── LAYOUT ─── */
.layout{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:10;transition:transform .3s}
.sidebar-header{padding:1.5rem 1.25rem;border-bottom:1px solid var(--border)}
.sidebar-header .brand-mini{display:flex;align-items:center;gap:.75rem}
.brand-mini .logo{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),#FF8C00);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.brand-mini h2{font-family:'Cormorant Garamond',serif;font-size:1.25rem;line-height:1}
.brand-mini span{display:block;font-size:.7rem;color:var(--text2);letter-spacing:.05em;text-transform:uppercase}
.sidebar-user{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0}
.sidebar-user .info h4{font-size:.9rem;font-weight:600}
.sidebar-user .info p{font-size:.75rem;color:var(--text2)}
.sidebar-nav{flex:1;padding:1rem .75rem;overflow-y:auto}
.nav-section{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:.5rem .5rem .3rem;margin-top:.5rem}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .75rem;border-radius:10px;cursor:pointer;transition:all .2s;font-size:.9rem;color:var(--text2);border:none;background:transparent;width:100%;text-align:left;position:relative}
.nav-item .icon{font-size:1.1rem;width:22px;text-align:center;flex-shrink:0}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--card2);color:var(--gold)}
.nav-item .badge{position:absolute;right:.75rem;background:var(--gold);color:#000;font-size:.65rem;font-weight:700;padding:.1rem .4rem;border-radius:999px}
.sidebar-footer{padding:1rem 1.25rem;border-top:1px solid var(--border)}
.logout-btn{display:flex;align-items:center;gap:.75rem;color:var(--text2);cursor:pointer;font-size:.85rem;padding:.5rem 0}
.logout-btn:hover{color:var(--red)}
.main{margin-left:260px;flex:1;min-height:100vh;padding:2rem}
.page-header{margin-bottom:2rem}
.page-header h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700}
.page-header p{color:var(--text2);font-size:.9rem;margin-top:.25rem}
.breadcrumb{font-size:.8rem;color:var(--text3);margin-bottom:.5rem}

/* ─── CARDS ─── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;opacity:.08}
.stat-card.s1::after{background:var(--teal)}
.stat-card.s2::after{background:var(--gold)}
.stat-card.s3::after{background:var(--purple)}
.stat-card.s4::after{background:var(--red)}
.stat-card .label{font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:.5rem}
.stat-card .value{font-size:1.9rem;font-weight:700;font-family:'Cormorant Garamond',serif;line-height:1}
.stat-card .sub{font-size:.78rem;color:var(--text2);margin-top:.35rem}
.stat-card .trend{font-size:.8rem;font-weight:600;margin-top:.4rem}
.trend.up{color:var(--green)}.trend.down{color:var(--red)}.trend.neutral{color:var(--text2)}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem}
.card-title{font-size:1rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.card-title .icon{font-size:1.1rem;margin-right:.4rem}
.card-sub{font-size:.82rem;color:var(--text2)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}

/* ─── QUIZ ─── */
.quiz-wrap{max-width:720px;margin:0 auto}
.quiz-progress{display:flex;gap:.4rem;margin-bottom:2rem}
.qp-dot{flex:1;height:6px;border-radius:3px;background:var(--bg3);transition:.3s}
.qp-dot.done{background:var(--green)}
.qp-dot.current{background:var(--gold);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.q-meta{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem}
.q-num{background:var(--gold);color:#000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0}
.q-subject{background:var(--bg3);border-radius:8px;padding:.25rem .75rem;font-size:.78rem;color:var(--text2)}
.q-chapter{background:var(--bg3);border-radius:8px;padding:.25rem .75rem;font-size:.78rem;color:var(--teal)}
.q-difficulty{background:var(--bg3);border-radius:8px;padding:.25rem .75rem;font-size:.78rem}
.diff-easy{color:var(--green)}.diff-medium{color:var(--gold)}.diff-hard{color:var(--red)}
.q-text{font-size:1.15rem;font-weight:500;line-height:1.65;margin-bottom:1.75rem;padding:1.5rem;background:var(--card2);border-radius:14px;border-left:3px solid var(--gold)}
.options-grid{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1.75rem}
.opt{background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:1rem;font-size:.95rem}
.opt:hover{border-color:var(--gold);background:rgba(240,165,0,.06)}
.opt.selected{border-color:var(--gold);background:rgba(240,165,0,.1)}
.opt.correct{border-color:var(--green);background:rgba(52,211,153,.12)}
.opt.wrong{border-color:var(--red);background:rgba(248,113,113,.12)}
.opt-label{width:28px;height:28px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.confidence-section{background:var(--card2);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem}
.confidence-section h4{font-size:.88rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:1rem}
.conf-options{display:flex;gap:.75rem}
.conf-btn{flex:1;padding:.75rem;border-radius:10px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:500;transition:all .2s;color:var(--text)}
.conf-btn:hover,.conf-btn.active{transform:translateY(-2px)}
.conf-btn.low:hover,.conf-btn.low.active{border-color:var(--low);background:rgba(248,113,113,.15);color:var(--low)}
.conf-btn.mid:hover,.conf-btn.mid.active{border-color:var(--mid);background:rgba(251,191,36,.15);color:var(--mid)}
.conf-btn.high:hover,.conf-btn.high.active{border-color:var(--high);background:rgba(52,211,153,.15);color:var(--high)}
.explanation{background:var(--bg3);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem;border-left:3px solid var(--teal);font-size:.88rem;line-height:1.65;color:var(--text2);display:none}
.explanation strong{color:var(--teal);display:block;margin-bottom:.3rem}
.btn-next{width:100%;padding:1rem;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gold),#FF8C00);color:#000;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.03em}
.btn-next:hover{opacity:.9;transform:translateY(-1px)}
.btn-next:disabled{opacity:.4;cursor:not-allowed;transform:none}
.timer-bar{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));transition:width .5s linear;border-radius:2px}

/* ─── SESSION COMPLETE ─── */
.session-complete{text-align:center;max-width:600px;margin:0 auto;padding:3rem 1rem}
.session-complete .score-ring{width:140px;height:140px;margin:0 auto 2rem;position:relative}
.session-complete canvas{position:absolute;inset:0}
.score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-inner .num{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:700;line-height:1;color:var(--gold)}
.score-inner .denom{font-size:.8rem;color:var(--text2)}
.session-complete h2{font-family:'Cormorant Garamond',serif;font-size:2rem;margin-bottom:.5rem}
.session-complete p{color:var(--text2);margin-bottom:2rem}
.session-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
.sb-card{background:var(--card);border-radius:14px;padding:1.25rem;text-align:left}
.sb-card .val{font-size:1.5rem;font-weight:700;font-family:'Cormorant Garamond',serif}
.sb-card .lbl{font-size:.78rem;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-top:.25rem}
.chapter-results{text-align:left;margin-bottom:2rem}
.chapter-results h3{font-size:.9rem;font-weight:600;margin-bottom.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
.cr-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.88rem}
.cr-conf{padding:.2rem .6rem;border-radius:6px;font-size:.75rem;font-weight:600}
.conf-low{background:rgba(248,113,113,.2);color:var(--low)}
.conf-mid{background:rgba(251,191,36,.2);color:var(--mid)}
.conf-high{background:rgba(52,211,153,.2);color:var(--high)}

/* ─── CHARTS &amp; REPORTS ─── */
.chart-wrap{position:relative;height:220px}
.chart-wrap.tall{height:280px}
.heatmap{display:grid;gap:.3rem;margin-top:1rem}
.hm-row{display:grid;gap:.3rem;align-items:center}
.hm-cell{border-radius:6px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;cursor:pointer;transition:.2s;position:relative}
.hm-cell:hover{transform:scale(1.15);z-index:1}
.hm-label{font-size:.72rem;color:var(--text2);padding-right:.5rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hm-header{font-size:.7rem;color:var(--text3);text-align:center;font-weight:500}
.progress-bar-wrap{margin-bottom:1rem}
.progress-bar-label{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:.35rem}
.progress-bar-label span:last-child{color:var(--text2)}
.progress-bar-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
.chapter-table{width:100%;border-collapse:collapse;font-size:.85rem}
.chapter-table th{text-align:left;padding:.6rem .75rem;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border)}
.chapter-table td{padding:.65rem .75rem;border-bottom:1px solid rgba(255,255,255,.04)}
.chapter-table tr:hover td{background:var(--bg3)}
.pill{display:inline-block;padding:.2rem .65rem;border-radius:999px;font-size:.72rem;font-weight:600}
.pill-green{background:rgba(52,211,153,.15);color:var(--green)}
.pill-amber{background:rgba(251,191,36,.15);color:var(--mid)}
.pill-red{background:rgba(248,113,113,.15);color:var(--red)}
.pill-blue{background:rgba(129,140,248,.15);color:var(--purple)}
.streak-display{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem}
.streak-day{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600}
.streak-day.done{background:rgba(52,211,153,.2);color:var(--green)}
.streak-day.today{background:var(--gold);color:#000}
.streak-day.miss{background:var(--bg3);color:var(--text3)}
.leaderboard-row{display:flex;align-items:center;gap.75rem;padding:.7rem 0;border-bottom:1px solid var(--border);gap:.75rem}
.lb-rank{width:28px;font-weight:700;color:var(--text2);font-size:.9rem}
.lb-rank.top{color:var(--gold)}
.lb-name{flex:1;font-size:.88rem}
.lb-score{font-weight:600;color:var(--teal);font-size:.88rem}
.weak-chapters{display:flex;flex-direction:column;gap:.6rem;margin-top:.75rem}
.wc-item{background:var(--bg3);border-radius:10px;padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;font-size:.85rem;border-left:3px solid var(--red)}
.wc-item .wc-name{font-weight:500}
.wc-item .wc-acc{color:var(--text2);font-size:.8rem}
.tab-bar{display:flex;gap:.25rem;background:var(--bg3);border-radius:12px;padding:.3rem;margin-bottom:1.5rem}
.tab{flex:1;padding:.55rem;border:none;background:transparent;border-radius:9px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:500;color:var(--text2);transition:.2s}
.tab.active{background:var(--card2);color:var(--text)}
.tag{display:inline-block;padding:.15rem .55rem;border-radius:6px;font-size:.72rem;font-weight:500;background:var(--bg3);color:var(--text2);margin:.1rem}
.student-list .sl-row{display:flex;align-items:center;gap:.75rem;padding:.75rem;border-radius:12px;cursor:pointer;transition:.2s;border:1px solid transparent}
.student-list .sl-row:hover{background:var(--bg3);border-color:var(--border)}
.sl-info{flex:1}
.sl-info h4{font-size:.9rem;font-weight:600}
.sl-info p{font-size:.78rem;color:var(--text2)}
.mini-progress{display:flex;gap:.2rem;align-items:center}
.mini-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;background:var(--teal);border-radius:2px}
.notification{position:fixed;top:1.5rem;right:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;max-width:320px;z-index:200;display:flex;align-items:flex-start;gap:.75rem;animation:slideIn .3s;box-shadow:0 20px 40px rgba(0,0,0,.4)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.notif-icon{font-size:1.25rem;flex-shrink:0}
.notif-content h4{font-size:.88rem;font-weight:600;margin-bottom:.2rem}
.notif-content p{font-size:.8rem;color:var(--text2)}
.select-student{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.6rem 1rem;color:var(--text);font-family:'Outfit',sans-serif;font-size:.88rem;cursor:pointer;outline:none;margin-bottom:1.5rem}
select option{background:var(--bg3)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-in{animation:fadeIn .3s}
.no-data{text-align:center;padding:3rem;color:var(--text2);font-size:.9rem}
.no-data .icon{font-size:3rem;display:block;margin-bottom.75rem;margin-bottom:.75rem}
.start-quiz-hero{text-align:center;padding:3rem 1rem;max-width:500px;margin:0 auto}
.start-quiz-hero .big-icon{font-size:4rem;display:block;margin-bottom:1.5rem}
.start-quiz-hero h2{font-family:'Cormorant Garamond',serif;font-size:2rem;margin-bottom:.75rem}
.start-quiz-hero p{color:var(--text2);font-size:.95rem;line-height:1.65;margin-bottom:2rem}
.quiz-meta-row{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}
.qmr-chip{background:var(--card2);border-radius:999px;padding:.4rem 1rem;font-size:.82rem;color:var(--text2)}
.qmr-chip strong{color:var(--text)}
.start-btn{background:linear-gradient(135deg,var(--gold),#FF8C00);border:none;padding:1rem 2.5rem;border-radius:12px;color:#000;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s}
.start-btn:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 8px 24px rgba(240,165,0,.3)}
.info-banner{background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.2);border-radius:12px;padding:1rem 1.25rem;font-size:.85rem;color:var(--text2);margin-bottom:1.25rem;line-height:1.6}
.info-banner strong{color:var(--teal)}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .stat-grid{grid-template-columns:1fr 1fr}
  .grid-2{grid-template-columns:1fr}
  .portal-grid{grid-template-columns:1fr 1fr}
}

// ADAPTIVE QUESTION SELECTION
// ═══════════════════════════════════════════════════
function getChapterStats(uid) {
  const sessions = getSessions(uid);
  const stats = {};
  Object.entries(CHAPTERS).forEach(([sub, chs]) =&gt; {
    chs.forEach(ch =&gt; {
      stats[`${sub}|${ch}`] = { correct: 0, total: 0, confLow: 0, confMid: 0, confHigh: 0 };
    });
  });
  sessions.forEach(session =&gt; {
    session.results.forEach(r =&gt; {
      const key = `${r.subject}|${r.chapter}`;
      if (!stats[key]) stats[key] = { correct: 0, total: 0, confLow: 0, confMid: 0, confHigh: 0 };
      stats[key].total++;
      if (r.correct) stats[key].correct++;
      if (r.confidence === 'low') stats[key].confLow++;
      else if (r.confidence === 'mid') stats[key].confMid++;
      else stats[key].confHigh++;
    });
  });
  return stats;
}

function selectAdaptiveQuestions(uid, count = 10) {
  const stats = getChapterStats(uid);
  
  // Weight each question: (1 - accuracy) + (1 - confidence_avg) + random
  const weights = QUESTIONS.map(q =&gt; {
    const key = `${q.subject}|${q.chapter}`;
    const st = stats[key] || { correct: 0, total: 0, confLow: 0, confMid: 0, confHigh: 0 };
    const acc = st.total &gt; 0 ? st.correct / st.total : 0.5;
    const totalConf = st.confLow + st.confMid + st.confHigh;
    const confScore = totalConf &gt; 0 ? (st.confLow * 0 + st.confMid * 0.5 + st.confHigh * 1) / totalConf : 0.5;
    const weakness = (1 - acc) * 0.6 + (1 - confScore) * 0.3 + Math.random() * 0.1;
    return { q, w: weakness };
  });
  
  weights.sort((a, b) =&gt; b.w - a.w);
  
  // Take top 20, then shuffle to pick 10
  const top = weights.slice(0, 20);
  for (let i = top.length - 1; i &gt; 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [top[i], top[j]] = [top[j], top[i]];
  }
  return top.slice(0, count).map(x =&gt; x.q);
}

// ═══════════════════════════════════════════════════
// ANALYTICS
// ═══════════════════════════════════════════════════
function computeAnalytics(uid) {
  const sessions = getSessions(uid);
  if (!sessions.length) return null;
  
  // Daily scores
  const dailyScores = sessions.map(s =&gt; ({ date: s.date, pct: Math.round(s.score / s.total * 100) }));
  
  // Chapter accuracy
  const chStats = getChapterStats(uid);
  const chapterAcc = {};
  const chapterConf = {};
  Object.entries(chStats).forEach(([key, st]) =&gt; {
    const acc = st.total &gt; 0 ? Math.round(st.correct / st.total * 100) : null;
    const totalConf = st.confLow + st.confMid + st.confHigh;
    const confScore = totalConf &gt; 0 ? ((st.confLow * 1 + st.confMid * 2 + st.confHigh * 3) / totalConf).toFixed(1) : null;
    chapterAcc[key] = acc;
    chapterConf[key] = confScore ? parseFloat(confScore) : null;
  });
  
  // Subject accuracy
  const subjectAcc = {};
  Object.keys(SUBJECTS).forEach(sub =&gt; {
    let total = 0, correct = 0;
    Object.entries(chStats).forEach(([key, st]) =&gt; {
      if (key.startsWith(sub + '|')) { total += st.total; correct += st.correct; }
    });
    subjectAcc[sub] = total &gt; 0 ? Math.round(correct / total * 100) : 0;
  });
  
  // Weak chapters (lowest accuracy with sufficient data)
  const weakChapters = Object.entries(chStats)
    .filter(([k, st]) =&gt; st.total &gt;= 2)
    .map(([key, st]) =&gt; ({ key, acc: Math.round(st.correct/st.total*100), total: st.total }))
    .sort((a, b) =&gt; a.acc - b.acc)
    .slice(0, 5);
  
  // Streak
  let streak = 0;
  const today = new Date();
  for (let i = 0; i &lt; 30; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    if (sessions.some(s =&gt; s.date === ds)) streak++;
    else if (i &gt; 0) break;
  }
  
  const totalQ = sessions.reduce((a, s) =&gt; a + s.total, 0);
  const totalCorrect = sessions.reduce((a, s) =&gt; a + s.score, 0);
  const overallAcc = Math.round(totalCorrect / totalQ * 100);
  
  // Knowledge growth: first 5 days avg vs last 5 days avg
  const first5 = dailyScores.slice(0, 5);
  const last5 = dailyScores.slice(-5);
  const f5avg = first5.reduce((a,x)=&gt;a+x.pct,0)/first5.length;
  const l5avg = last5.reduce((a,x)=&gt;a+x.pct,0)/last5.length;
  const growth = Math.round(l5avg - f5avg);
  
  return { dailyScores, chapterAcc, chapterConf, subjectAcc, weakChapters, streak, totalQ, overallAcc, growth, sessions };
}

    const role = State.user.role;
    if (role === 'student') { app.innerHTML = renderLayout(renderStudentContent()); }
    else if (role === 'parent') { app.innerHTML = renderLayout(renderParentContent()); }
    else if (role === 'teacher') { app.innerHTML = renderLayout(renderTeacherContent()); }
    else if (role === 'admin') { app.innerHTML = renderLayout(renderAdminContent()); }
    attachCharts();
  }
}

function destroyCharts() {

function startQuiz() {
  const questions = selectAdaptiveQuestions(State.user.id, 10);
  State.quiz = {
    questions,
    current: 0,
    results: [],
    selectedAnswer: null,
    selectedConf: null,
    answered: false
  };
  render();
}

function renderQuestion() {
  const { questions, current, answered, selectedAnswer } = State.quiz;
  const q = questions[current];
  const dots = questions.map((_, i) =&gt; {
    const cls = i &lt; current ? 'done' : i === current ? 'current' : '';
    return `&lt;div class=&quot;qp-dot ${cls}&quot;&gt;&lt;/div&gt;`;
  }).join('');
  
  const diffLabel = { easy:'🟢 Easy', medium:'🟡 Medium', hard:'🔴 Hard' };
  
  const opts = q.options.map((opt, i) =&gt; {
    let cls = '';
    if (answered) {
      if (i === q.answer) cls = 'correct';
      else if (i === selectedAnswer &amp;&amp; i !== q.answer) cls = 'wrong';
    } else if (i === selectedAnswer) cls = 'selected';
    const labels = ['A','B','C','D'];
    return `&lt;div class=&quot;opt ${cls}&quot; onclick=&quot;${answered?'':'selectAnswer('+i+')'}&quot;&gt;
      &lt;div class=&quot;opt-label&quot;&gt;${labels[i]}&lt;/div&gt;
      &lt;div&gt;${opt}&lt;/div&gt;
    &lt;/div&gt;`;
  }).join('');
  
  return `
  &lt;div class=&quot;quiz-wrap fade-in&quot;&gt;
    &lt;div class=&quot;page-header&quot;&gt;&lt;h1&gt;Question ${current+1} of 10&lt;/h1&gt;&lt;/div&gt;
    &lt;div class=&quot;quiz-progress&quot;&gt;${dots}&lt;/div&gt;
    &lt;div class=&quot;q-meta&quot;&gt;
      &lt;div class=&quot;q-num&quot;&gt;${current+1}&lt;/div&gt;
      &lt;div class=&quot;q-subject&quot;&gt;${SUBJECTS[q.subject].name}&lt;/div&gt;
      &lt;div class=&quot;q-chapter&quot;&gt;${q.chapter}&lt;/div&gt;
      &lt;div class=&quot;q-difficulty ${q.difficulty==='easy'?'diff-easy':q.difficulty==='medium'?'diff-medium':'diff-hard'}&quot;&gt;${diffLabel[q.difficulty]}&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;q-text&quot;&gt;${q.text}&lt;/div&gt;
    &lt;div class=&quot;options-grid&quot;&gt;${opts}&lt;/div&gt;
    ${answered?`
    &lt;div class=&quot;explanation&quot; id=&quot;expl&quot; style=&quot;display:block&quot;&gt;
      &lt;strong&gt;📝 Explanation&lt;/strong&gt;${q.explanation}
    &lt;/div&gt;
    &lt;div class=&quot;confidence-section&quot;&gt;
      &lt;h4&gt;🤔 How confident were you in this answer?&lt;/h4&gt;
      &lt;div class=&quot;conf-options&quot;&gt;
        &lt;button class=&quot;conf-btn low ${State.quiz.selectedConf==='low'?'active':''}&quot; onclick=&quot;selectConf('low')&quot;&gt;😟 Low&lt;/button&gt;
        &lt;button class=&quot;conf-btn mid ${State.quiz.selectedConf==='mid'?'active':''}&quot; onclick=&quot;selectConf('mid')&quot;&gt;🤔 Medium&lt;/button&gt;
        &lt;button class=&quot;conf-btn high ${State.quiz.selectedConf==='high'?'active':''}&quot; onclick=&quot;selectConf('high')&quot;&gt;😊 High&lt;/button&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;button class=&quot;btn-next&quot; onclick=&quot;nextQuestion()&quot; ${!State.quiz.selectedConf?'disabled':''}&gt;
      ${current===9?'Complete Session 🎉':'Next Question →'}
    &lt;/button&gt;
    `:`&lt;button class=&quot;btn-next&quot; disabled&gt;Select an answer to continue&lt;/button&gt;`}

function selectAnswer(i) {
  if (State.quiz.answered) return;
  State.quiz.selectedAnswer = i;
  State.quiz.answered = true;
  State.quiz.selectedConf = null;
  render();
}

function selectConf(c) {
  State.quiz.selectedConf = c;
  const btns = document.querySelectorAll('.conf-btn');
  btns.forEach(b =&gt; b.classList.remove('active'));
  document.querySelector(`.conf-btn.${c}`)?.classList.add('active');
  document.querySelector('.btn-next').disabled = false;
}

function nextQuestion() {
  const { questions, current, selectedAnswer, selectedConf } = State.quiz;
  const q = questions[current];
  State.quiz.results.push({
    subject: q.subject,
    chapter: q.chapter,
    question: q.id,
    correct: selectedAnswer === q.answer,
    confidence: selectedConf
  });
  
  if (current === 9) {
    // Save session
    const score = State.quiz.results.filter(r =&gt; r.correct).length;
    const session = {
      date: getTodayStr(),
      score,
      total: 10,
      results: State.quiz.results
    };
    const sessions = getSessions(State.user.id);
    sessions.push(session);
    saveSessions(State.user.id, sessions);
    State.quiz.complete = true;
    State.quiz.finalScore = score;
    render();
    return;
  }
  
  State.quiz.current++;
  State.quiz.answered = false;
  State.quiz.selectedAnswer = null;
  State.quiz.selectedConf = null;
  render();
}

  const { results, finalScore } = State.quiz;
  const uid = State.user.id;
  const analytics = computeAnalytics(uid);
  
  // Chapter summary
  const chapterMap = {};
  results.forEach(r =&gt; {
    if (!chapterMap[r.chapter]) chapterMap[r.chapter] = { correct:0, total:0, conf: r.confidence };

      &lt;div class=&quot;sb-card&quot;&gt;&lt;div class=&quot;val&quot; style=&quot;color:var(--red)&quot;&gt;${lowConf}&lt;/div&gt;&lt;div class=&quot;lbl&quot;&gt;Low Confidence&lt;/div&gt;&lt;/div&gt;

function renderHeatmap(chapterAcc, chapterConf) {
  const subjects = Object.keys(SUBJECTS);
  const confLevels = ['Low Confidence', 'Mid Confidence', 'High Confidence'];
  
  // Header row
  const headerCells = subjects.map(s =&gt; `&lt;div class=&quot;hm-header&quot; style=&quot;font-size:.68rem&quot;&gt;${SUBJECTS[s].short}&lt;/div&gt;`).join('');
  
  let rows = `&lt;div class=&quot;hm-row&quot; style=&quot;grid-template-columns:100px repeat(${subjects.length},1fr)&quot;&gt;
    &lt;div&gt;&lt;/div&gt;${headerCells}
  &lt;/div&gt;`;
  
  // For each chapter in each confidence tier
  const tiers = ['low','mid','high'];
  const tierLabels = ['🔴 Low','🟡 Mid','🟢 High'];
  
  tiers.forEach((tier, ti) =&gt; {
    // Row label
    let rowCells = `&lt;div class=&quot;hm-label&quot;&gt;${tierLabels[ti]}&lt;/div&gt;`;
    subjects.forEach(sub =&gt; {
      const chapters = CHAPTERS[sub];
      // Average accuracy for chapters where conf = this tier
      let accVals = [];
      chapters.forEach(ch =&gt; {
        const key = `${sub}|${ch}`;
        if (chapterAcc[key] !== null &amp;&amp; chapterConf[key] !== null) {
          accVals.push(chapterAcc[key] || 0);
        }
      });
      const avg = accVals.length ? Math.round(accVals.reduce((a,b)=&gt;a+b,0)/accVals.length) : null;
      const color = tier==='low'?`rgba(248,113,113,${avg?avg/100*0.8+0.1:0.1})`:tier==='mid'?`rgba(251,191,36,${avg?avg/100*0.8+0.1:0.1}):`:`rgba(52,211,153,${avg?avg/100*0.8+0.1:0.1})`;
      const textColor = tier==='low'?'#F87171':tier==='mid'?'#FBBF24':'#34D399';
      rowCells += `&lt;div class=&quot;hm-cell&quot; style=&quot;background:${avg?color:'rgba(255,255,255,0.03)'};color:${avg?textColor:'var(--text3)'};&quot; title=&quot;${SUBJECTS[sub].name}: ${avg?avg+'%':'No data'}&quot;&gt;${avg?avg+'%':'—'}&lt;/div&gt;`;
    });
    rows += `&lt;div class=&quot;hm-row&quot; style=&quot;grid-template-columns:100px repeat(${subjects.length},1fr)&quot;&gt;${rowCells}&lt;/div&gt;`;
  });
  
  return `&lt;div class=&quot;heatmap&quot;&gt;${rows}&lt;/div&gt;`;
}

function renderChapterTable(chapterAcc, chapterConf) {
  let rows = '';
  Object.entries(SUBJECTS).forEach(([sub, subData]) =&gt; {
    CHAPTERS[sub].forEach(ch =&gt; {
      const key = `${sub}|${ch}`;
      const acc = chapterAcc[key];
      const conf = chapterConf[key];
      if (acc === null) return;
      const accPill = acc&gt;=70?'pill-green':acc&gt;=40?'pill-amber':'pill-red';
      const confLabel = conf?conf&lt;=1.5?'Low':conf&lt;=2.5?'Medium':'High':'N/A';
      const confPill = conf?conf&lt;=1.5?'pill-red':conf&lt;=2.5?'pill-amber':'pill-green':'';
      rows += `&lt;tr&gt;
        &lt;td&gt;${ch}&lt;/td&gt;
        &lt;td&gt;&lt;span class=&quot;tag&quot; style=&quot;color:${subData.color};background:${subData.color}22&quot;&gt;${subData.short}&lt;/span&gt;&lt;/td&gt;
        &lt;td&gt;&lt;span class=&quot;pill ${accPill}&quot;&gt;${acc}%&lt;/span&gt;&lt;/td&gt;
        &lt;td&gt;&lt;span class=&quot;pill ${confPill}&quot;&gt;${confLabel}&lt;/span&gt;&lt;/td&gt;
        &lt;td style=&quot;color:var(--text2);font-size:.8rem&quot;&gt;${acc&gt;=70&amp;&amp;conf&amp;&amp;conf&gt;2?'✅ Mastered':acc&lt;40?'⚠️ Needs Focus':conf&amp;&amp;conf&lt;1.5?'📚 Low Confidence':'🔄 Practice More'}&lt;/td&gt;
      &lt;/tr&gt;`;
    });
  });
  
  return `&lt;table class=&quot;chapter-table&quot;&gt;
    &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Chapter&lt;/th&gt;&lt;th&gt;Subject&lt;/th&gt;&lt;th&gt;Accuracy&lt;/th&gt;&lt;th&gt;Confidence&lt;/th&gt;&lt;th&gt;Status&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
    &lt;tbody&gt;${rows}&lt;/tbody&gt;
  &lt;/table&gt;`;
}

function renderChapterProgress() {
  const uid = State.user.id;
  const analytics = computeAnalytics(uid);
  if (!analytics) return `&lt;div class=&quot;no-data&quot;&gt;&lt;span class=&quot;icon&quot;&gt;📖&lt;/span&gt;No data yet. Complete your first session!&lt;/div&gt;`;
  
  const { chapterAcc } = analytics;
  
  let content = '';
  Object.entries(SUBJECTS).forEach(([sub, subData]) =&gt; {
    let chBars = '';
    let subTotal = 0, subCount = 0;
    CHAPTERS[sub].forEach(ch =&gt; {
      const acc = chapterAcc[`${sub}|${ch}`];
      if (acc !== null) { subTotal += acc; subCount++; }
      const pct = acc || 0;
      const color = pct&gt;=70?'var(--green)':pct&gt;=40?'var(--gold)':'var(--red)';
      chBars += `&lt;div class=&quot;progress-bar-wrap&quot;&gt;
        &lt;div class=&quot;progress-bar-label&quot;&gt;&lt;span&gt;${ch}&lt;/span&gt;&lt;span&gt;${acc!==null?acc+'%':'—'}&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;progress-bar-track&quot;&gt;&lt;div class=&quot;progress-bar-fill&quot; style=&quot;width:${pct}%;background:${color}&quot;&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;`;
    });
    const subAvg = subCount ? Math.round(subTotal/subCount) : 0;
    content += `&lt;div class=&quot;card&quot; style=&quot;margin-bottom:1.25rem&quot;&gt;
      &lt;div class=&quot;card-title&quot;&gt;
        &lt;span class=&quot;icon&quot;&gt;📖&lt;/span&gt;${subData.name}
        &lt;span class=&quot;pill ${subAvg&gt;=70?'pill-green':subAvg&gt;=40?'pill-amber':'pill-red'}&quot;&gt;${subAvg}% avg&lt;/span&gt;
      &lt;/div&gt;
      ${chBars}
    &lt;/div&gt;`;
  });
  
  return `&lt;div class=&quot;page-header&quot;&gt;&lt;h1&gt;Chapter Progress 📖&lt;/h1&gt;&lt;p&gt;Subject-wise chapter mastery levels&lt;/p&gt;&lt;/div&gt;${content}`;
}

function renderTeacherMatrix() {
  // Aggregate confidence matrix for all students
  const studentIds = State.user.studentIds;
  
  let allChapterAcc = {};
  let allChapterConf = {};
  
  studentIds.forEach(id =&gt; {
    const a = computeAnalytics(id);
    if (!a) return;
    Object.entries(a.chapterAcc).forEach(([key, val]) =&gt; {
      if (val !== null) {
        if (!allChapterAcc[key]) allChapterAcc[key] = [];
        allChapterAcc[key].push(val);
      }
    });
    Object.entries(a.chapterConf).forEach(([key, val]) =&gt; {
      if (val !== null) {
        if (!allChapterConf[key]) allChapterConf[key] = [];
        allChapterConf[key].push(val);
      }
    });
  });
  
  const avgAcc = {};
  const avgConf = {};
  Object.entries(allChapterAcc).forEach(([key, vals]) =&gt; {
    avgAcc[key] = Math.round(vals.reduce((a,b)=&gt;a+b,0)/vals.length);
  });
  Object.entries(allChapterConf).forEach(([key, vals]) =&gt; {
    avgConf[key] = parseFloat((vals.reduce((a,b)=&gt;a+b,0)/vals.length).toFixed(1));
  });
  
  return `
  &lt;div class=&quot;page-header&quot;&gt;&lt;h1&gt;Confidence Matrix 🗂️&lt;/h1&gt;&lt;p&gt;Class-wide confidence vs accuracy by chapter&lt;/p&gt;&lt;/div&gt;

    &lt;p style=&quot;font-size:.82rem;color:var(--text2);margin-bottom:1rem&quot;&gt;Average across all students · Darker cells = higher accuracy&lt;/p&gt;

  &lt;/div&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;📋 Chapter Mastery Table (Class Average)&lt;/div&gt;
    ${renderChapterTable(avgAcc, avgConf)}
  &lt;/div&gt;`;
}

function renderAdminWeakChapters(allAnalytics) {
  const chMap = {};
  allAnalytics.forEach(s =&gt; {
    const stats = getChapterStats(s.id);
    Object.entries(stats).forEach(([key, st]) =&gt; {
      if (!chMap[key]) chMap[key] = { correct:0, total:0 };
      chMap[key].correct += st.correct;
      chMap[key].total += st.total;
    });
  });
  
  const sorted = Object.entries(chMap)
    .filter(([k,v]) =&gt; v.total &gt;= 3)
    .map(([key,v]) =&gt; ({ key, acc: Math.round(v.correct/v.total*100), total: v.total }))
    .sort((a,b) =&gt; a.acc - b.acc)
    .slice(0, 8);
  
  return `&lt;table class=&quot;chapter-table&quot;&gt;
    &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Chapter&lt;/th&gt;&lt;th&gt;Subject&lt;/th&gt;&lt;th&gt;Class Accuracy&lt;/th&gt;&lt;th&gt;Attempts&lt;/th&gt;&lt;th&gt;Action&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
    &lt;tbody&gt;
      ${sorted.map(w=&gt;{
        const [sub,ch]=w.key.split('|');
        return `&lt;tr&gt;
          &lt;td&gt;${ch}&lt;/td&gt;
          &lt;td&gt;&lt;span class=&quot;tag&quot; style=&quot;color:${SUBJECTS[sub].color};background:${SUBJECTS[sub].color}22&quot;&gt;${SUBJECTS[sub].name}&lt;/span&gt;&lt;/td&gt;
          &lt;td&gt;&lt;span class=&quot;pill ${w.acc&gt;=70?'pill-green':w.acc&gt;=40?'pill-amber':'pill-red'}&quot;&gt;${w.acc}%&lt;/span&gt;&lt;/td&gt;
          &lt;td style=&quot;color:var(--text2)&quot;&gt;${w.total}&lt;/td&gt;
          &lt;td style=&quot;font-size:.8rem;color:var(--text2)&quot;&gt;${w.acc&lt;40?'🔴 High Priority':w.acc&lt;60?'🟡 Monitor':'🟢 OK'}&lt;/td&gt;

      }).join('')}
    &lt;/tbody&gt;
  &lt;/table&gt;`;
}

const chartDefaults = {

  font: { family: &quot;'Outfit', sans-serif&quot; }
};
Chart.defaults.color = chartDefaults.color;
Chart.defaults.font.family = chartDefaults.font.family;

function makeChart(id, config) {
  const el = document.getElementById(id);
  if (!el) return;
  if (State.charts[id]) { try { State.charts[id].destroy(); } catch(e){} }
  State.charts[id] = new Chart(el, config);
}

function attachCharts() {
  setTimeout(() =&gt; {
    const uid = State.user?.id;
    const role = State.user?.role;
    const sv = State.subview;
    
    const gridLines = { color: 'rgba(255,255,255,0.04)' };
    const commonScales = {
      x: { grid: gridLines, ticks: { font: { size: 11 } } },
      y: { grid: gridLines, ticks: { font: { size: 11 } } }
    };
    
    // ── Student: Dashboard trend chart ──
    if (document.getElementById('trendChart') &amp;&amp; uid) {
      const a = computeAnalytics(uid);
      if (a) {
        const last7 = a.dailyScores.slice(-7);
        makeChart('trendChart', {
          type: 'line',
          data: {
            labels: last7.map(d =&gt; d.date.slice(5)),
            datasets: [{
              data: last7.map(d =&gt; d.pct),
              borderColor: '#F0A500', backgroundColor: 'rgba(240,165,0,0.1)',
              borderWidth: 2.5, pointRadius: 5, pointBackgroundColor: '#F0A500',
              tension: 0.4, fill: true
            }]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: commonScales }
        });
      }
    }
    
    // ── Student: Subject chart ──
    if (document.getElementById('subjectChart') &amp;&amp; uid) {
      const a = computeAnalytics(uid);
      if (a) {
        const subs = Object.keys(SUBJECTS);
        const colors = subs.map(s =&gt; SUBJECTS[s].color);
        makeChart('subjectChart', {
          type: 'bar',
          data: {
            labels: subs.map(s =&gt; SUBJECTS[s].short),
            datasets: [{ data: subs.map(s =&gt; a.subjectAcc[s] || 0), backgroundColor: colors.map(c =&gt; c+'99'), borderColor: colors, borderWidth: 1.5, borderRadius: 6 }]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { ...commonScales, y: { ...commonScales.y, min: 0, max: 100 } } }
        });
      }
    }
    
    // ── Student Reports: trend chart ──
    if (document.getElementById('rptTrendChart') &amp;&amp; uid) {
      const a = computeAnalytics(uid);

 */\n.who-outer { background: #fff; padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); }\n.who-inner { max-width: 1160px; margin: 0 auto; }\n.who-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .who-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .who-grid { grid-template-columns: 1fr 1fr; } }\n\n.wc { border-radius: 16px; padding: 25px 22px; border: 1.5px solid #E5DDD0; background: #fff; }\n.wi { font-size: 1.9rem; margin-bottom: 10px; display: block; }\n.wt { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; color: #1A1A2E; }\n.wp { font-family: Arial, sans-serif; font-size: 0.86rem; line-height: 1.72; color: #6B7280; }\n.wb { display: inline-block; margin-top: 13px; font-family: Arial, sans-serif; font-size: 0.73rem; font-weight: 700; padding: 4px 13px; border-radius: 100px; }\n.wb-a  { background: #D8F3DC; color: #2D6A4F; }\n.wb-c  { background: #DBE9FF; color: #1B4F9B; }\n.wb-ca { background: #FFE0E4; color: #8B2635; }\n\n/* QUIZ */\n.quiz-outer {\n  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 55%, #0F3460 100%);\n  padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px);\n  text-align: center;\n}\n.quiz-inner { max-width: 1160px; margin: 0 auto; }\n.qbox {\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.12);\n  border-radius: 20px;\n  padding: clamp(24px,5vw,48px);\n  max-width: 660px;\n  margin: 44px auto 0;\n}\n.qprog { font-family: Arial, sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.32); margin-bottom: 7px; letter-spacing: 1.2px; text-transform: uppercase; }\n.qtext { font-family: Arial, sans-serif; font-size: clamp(1rem,2.5vw,1.25rem); font-weight: 700; color: #fff; margin-bottom: 22px; line-height: 1.5; }\n.qopts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }\n@media (max-width: 480px) { .qopts { grid-template-columns: 1fr; } }\n.qopt {\n  background: rgba(255,255,255,0.07);\n  border: 1.5px solid rgba(255,255,255,0.14);\n  border-radius: 12px;\n  padding: 14px 15px;\n  text-align: left;\n  color: rgba(255,255,255,0.78);\n  font-family: Arial, sans-serif;\n  font-size: 0.87rem;\n  font-weight: 600;\n  cursor: pointer;\n  transition: all 0.18s;\n  line-height: 1.4;\n}\n.qopt:hover, .qopt.sel {\n  background: rgba(201,168,76,0.18);\n  border-color: #C9A84C;\n  color: #fff;\n}\n.qnav { margin-top: 22px; }\n.qnext {\n  background: transparent;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  color: #fff;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 13px 30px;\n  border-radius: 100px;\n  cursor: pointer;\n  display: none;\n}\n.qresult { display: none; text-align: center; }\n.rbadge { display: inline-block; font-size: 2.6rem; font-weight: 900; padding: 16px 32px; border-radius: 14px; margin-bottom: 15px; }\n.rb-a  { background: #D8F3DC; color: #2D6A4F; }\n.rb-c  { background: #DBE9FF; color: #1B4F9B; }\n.rb-ca { background: #FFE0E4; color: #8B2635; }\n.rtitle { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 11px; }\n.rtext { font-family: Arial, sans-serif; font-size: 0.94rem; color: rgba(255,255,255,0.56); max-width: 420px; margin: 0 auto 22px; line-height: 1.72; }\n.btn-retry { background: #C9A84C; color: #1A1A2E; font-family: Arial, sans-serif; font-size: 0.93rem; font-weight: 700; padding: 13px 30px; border-radius: 100px; border: none; cursor: pointer; }\n\n/* FAQ */\n.faq-outer { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); background: #F9F5EE; }\n.faq-inner { max-width: 1160px; margin: 0 auto; }\n.faq-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .faq-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .faq-grid { grid-template-columns: 1fr 1fr; } }\n.fi { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid #E5DDD0; }\n.fq { font-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }\n.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }\n\n/* FOOTER */\nfooter { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;     o:[{t:"🌐 Global recognition / working abroad",s:{acca:3}},{t:"💰 Highest salary in investment finance",s:{cfa:3}},{t:"🏆 Prestigious local qualification",s:{ca:3}},{t:"⚡ Fastest route to a finance career",s:{acca:2}}]
  }
];

var cur=0, sc={acca:0,cfa:0,ca:0}, pend=null;

function pick(btn,idx){
  var all=document.querySelectorAll('.qopt');
  for(var i=0;i<all.length;i++) all[i].classList.remove('sel');
  btn.classList.add('sel');
  pend=Qs[cur].o[idx].s;
  document.getElementById('qNext').style.display='inline-block';
}

function nextQ(){
  if(!pend) return;
  for(var k in pend) sc[k]=(sc[k]||0)+pend[k];
  pend=null; cur++;
  if(cur>=Qs.length){ showRes(); return; }
  document.getElementById('qProg').textContent='Question '+(cur+1)+' of '+Qs.length;
  document.getElementById('qText').textContent=Qs[cur].q;
  var html='';
  for(var i=0;i<Qs[cur].o.length;i++) html+='<button class="qopt" onclick="pick(this,'+i+')">'+Qs[cur].o[i].t+'</button>';
  document.getElementById('qOpts').innerHTML=html;
  document.getElementById('qNext').style.display='none';
}

function showRes(){
  var keys=Object.keys(sc).sort(function(a,b){return sc[b]-sc[a];});
  var w=keys[0];
  var info={
    acca:{n:'ACCA',cls:'rb-a', ti:'ACCA is your ideal match!', tx:'Your goals align with ACCA — global flexibility, modular study structure, and recognition in 180+ countries.'},
    cfa:{n:'CFA',cls:'rb-c', ti:'CFA is your ideal match!', tx:'Your passion for investment and markets points to the CFA Charter — the gold standard for finance professionals worldwide.'},
    ca:{n:'CA',cls:'rb-ca', ti:'CA is your ideal match!', tx:'Your preference for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}
  }[w];
  document.getElementById('qMain').style.display='none';
  document.getElementById('qResult').style.display='block';
  var b=document.getElementById('rBadge');
  b.textContent=info.n; b.className='rbadge '+info.cls;
  document.getElementById('rTitle').textContent=info.ti;
  document.getElementById('rText').textContent=info.tx;
}

function resetQ(){
  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;
  document.getElementById('qResult').style.display='none';
  document.getElementById('qMain').style.display='block';
  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;
  document.getElementById('qText').textContent=Qs[0].q;
  var html='';
  for(var i=0;i<Qs[0].o.length;i++) html+='<button class="qopt" onclick="pick(this,'+i+')">'+Qs[0].o[i].t+'</button>';
  document.getElementById('qOpts').innerHTML=html;
  document.getElementById('qNext').style.display='none';
}
</script>  </body></html>
