-family: Arial, sans-serif;\n  font-size: clamp(0.95rem, 2vw, 1.15rem);\n  color: rgba(255,255,255,0.62);\n  max-width: 520px;\n  line-height: 1.75;\n  position: relative;\n}\n.hero-btns {\n  margin-top: 38px;\n  display: flex;\n  gap: 14px;\n  justify-content: center;\n  flex-wrap: wrap;\n  position: relative;\n}\n.btn-main {\n  background: #C9A84C;\n  color: #1A1A2E;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 14px 32px;\n  border-radius: 100px;\n  text-decoration: none;\n  display: inline-block;\n}\n.btn-out {\n  background: transparent;\n  color: #ffffff;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 600;\n  padding: 13px 30px;\n  border-radius: 100px;\n  text-decoration: none;\n  display: inline-block;\n}\n\n/* SECTIONS */\n.sec { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); max-width: 1160px; margin: 0 auto; }\n.sec-dark { background: #1A1A2E; }\n.sec-white { background: #ffffff; }\n.eyebrow {\n  font-family: Arial, sans-serif;\n  font-size: 10.5px;\n  font-weight: 700;\n  letter-spacing: 3px;\n  text-transform: uppercase;\n  color: #C9A84C;\n  margin-bottom: 12px;\n}\n.sec-h {\n  font-size: clamp(1.85rem, 4.2vw, 3rem);\n  font-weight: 700;\n  line-height: 1.15;\n  color: #1A1A2E;\n  margin-bottom: 12px;\n}\n.sec-h-w { color: #ffffff; }\n.sec-p {\n  font-family: Arial, sans-serif;\n  font-size: 1rem;\n  color: #6B7280;\n  max-width: 520px;\n  line-height: 1.72;\n  margin-bottom: 0;\n}\n.sec-p-dim { color: rgba(255,255,255,0.48); }\n\n/* CARDS GRID */\n.cards-wrap {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 22px;\n  margin-top: 46px;\n}\n@media (max-width: 900px) { .cards-wrap { grid-template-columns: 1fr; } }\n\n.card {\n  background: #ffffff;\n  border-radius: 16px;\n  border: 1.5px solid #E5DDD0;\n  overflow: hidden;\n  display: flex;\n  flex-direction: column;\n}\n\n/* Card headers */\n.ch-acca { background: #D8F3DC; border-bottom: 3px solid #2D6A4F; padding: 28px 24px 22px; }\n.ch-cfa  { background: #DBE9FF; border-bottom: 3px solid #1B4F9B; padding: 28px 24px 22px; }\n.ch-ca   { background: #FFE0E4; border-bottom: 3px solid #8B2635; padding: 28px 24px 22px; }\n\n.ci {\n  width: 48px; height: 48px;\n  border-radius: 11px;\n  display: flex; align-items: center; justify-content: center;\n  font-size: 15px; font-weight: 900;\n  color: #fff;\n  margin-bottom: 13px;\n  font-family: Arial, sans-serif;\n}\n.ci-acca { background: #2D6A4F; }\n.ci-cfa  { background: #1B4F9B; }\n.ci-ca   { background: #8B2635; }\n\n.cn { font-size: 1.55rem; font-weight: 700; color: #1A1A2E; margin-bottom: 3px; }\n.co { font-family: Arial, sans-serif; font-size: 0.78rem; color: #6B7280; }\n\n.cb { padding: 24px; flex: 1; display: flex; flex-direction: column; gap: 17px; }\n.cd { font-family: Arial, sans-serif; font-size: 0.91rem; line-height: 1.72; color: #444; }\n\n/* Stats */\n.stats-g { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }\n.stat-b { background: #F9F5EE; border-radius: 10px; padding: 12px; border: 1px solid #E5DDD0; }\n.sl { font-family: Arial, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #6B7280; margin-bottom: 4px; }\n.sv { font-family: Arial, sans-serif; font-size: 0.9rem; font-weight: 700; color: #1A1A2E; }\n\n/* Tags */\n.tags-g { display: flex; flex-wrap: wrap; gap: 7px; }\n.tag { font-family: Arial, sans-serif; font-size: 0.73rem; font-weight: 600; padding: 5px 11px; border-radius: 100px; background: #F9F5EE; border: 1px solid #E5DDD0; color: #2B2B2B; }\n.t-acca { background: #D8F3DC; border-color: #2D6A4F; color: #2D6A4F; }\n.t-cfa  { background: #DBE9FF; border-color: #1B4F9B; color: #1B4F9B; }\n.t-ca   { background: #FFE0E4; border-color: #8B2635; color: #8B2635; }\n\n.cf { padding: 0 24px 24px; }\n.cl {\n  display: block; text-align: center;\n  padding: 13px; border-radius: 10px;\n  font-family: Arial, sans-serif; font-size: 0.88rem; font-weight: 700;\n  text-decoration: none; color: #fff;\n}\n.cl-acca { background: #2D6A4F; }\n.cl-cfa  { background: #1B4F9B; }\n.cl-ca   { background: #8B2635; }\n\n/* TABLE */\n.tbl-outer {\n  background: #1A1A2E;\n  padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px);\n}\n.tbl-inner { max-width: 1160px; margin: 0 auto; }\n.tbl-scroll { margin-top: 44px; overflow-x: auto; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); }\n\ntable { width: 100%; min-width: 580px; border-collapse: collapse; }\nthead th {\n  padding: 17px 18px;\n  text-align: left;\n  font-family: Arial, sans-serif;\n  font-size: 0.74rem;\n  font-weight: 700;\n  letter-spacing: 1.8px;\n  text-transform: uppercase;\n  border-bottom: 1px solid rgba(255,255,255,0.09);\n  background: rgba(255,255,255,0.03);\n}\nth.th0 { color: rgba(255,255,255,0.3); }\nth.th1 { color: #74c69d; }\nth.th2 { color: #90b4e8; }\nth.th3 { color: #e88a93; }\n\ntbody td {\n  padding: 14px 18px;\n  font-family: Arial, sans-serif;\n  font-size: 0.87rem;\n  border-bottom: 1px solid rgba(255,255,255,0.05);\n  color: rgba(255,255,255,0.7);\n  vertical-align: top;\n  line-height: 1.5;\n}\ntbody tr:last-child td { border-bottom: none; }\ntbody td:first-child {\n  font-size: 0.74rem; font-weight: 700;\n  letter-spacing: 0.6px; text-transform: uppercase;\n  color: rgba(255,255,255,0.3); white-space: nowrap;\n}\n\n.pill { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 0.73rem; font-weight: 700; font-family: Arial, sans-serif; }\n.pg { background: rgba(116,198,157,0.15); color: #74c69d; }\n.pb { background: rgba(144,180,232,0.15); color: #90b4e8; }\n.pr { background: rgba(232,138,147,0.15); color: #e88a93; }\n\n/* WHO */\n.who-outer { background: #fff; padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); }\n.who-inner { max-width: 1160px; margin: 0 auto; }\n.who-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .who-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .who-grid { grid-template-columns: 1fr 1fr; } }\n\n.wc { border-radius: 16px; padding: 25px 22px; border: 1.5px solid #E5DDD0; background: #fff; }\n.wi { font-size: 1.9rem; margin-bottom: 10px; display: block; }\n.wt { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; color: #1A1A2E; }\n.wp { font-family: Arial, sans-serif; font-size: 0.86rem; line-height: 1.72; color: #6B7280; }\n.wb { display: inline-block; margin-top: 13px; font-family: Arial, sans-serif; font-size: 0.73rem; font-weight: 700; padding: 4px 13px; border-radius: 100px; }\n.wb-a  { background: #D8F3DC; color: #2D6A4F; }\n.wb-c  { background: #DBE9FF; color: #1B4F9B; }\n.wb-ca { background: #FFE0E4; color: #8B2635; }\n\n/* QUIZ */\n.quiz-outer {\n  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 55%, #0F3460 100%);\n  padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px);\n  text-align: center;\n}\n.quiz-inner { max-width: 1160px; margin: 0 auto; }\n.qbox {\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.12);\n  border-radius: 20px;\n  padding: clamp(24px,5vw,48px);\n  max-width: 660px;\n  margin: 44px auto 0;\n}\n.qprog { font-family: Arial, sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.32); margin-bottom: 7px; letter-spacing: 1.2px; text-transform: uppercase; }\n.qtext { font-family: Arial, sans-serif; font-size: clamp(1rem,2.5vw,1.25rem); font-weight: 700; color: #fff; margin-bottom: 22px; line-height: 1.5; }\n.qopts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }\n@media (max-width: 480px) { .qopts { grid-template-columns: 1fr; } }\n.qopt {\n  background: rgba(255,255,255,0.07);\n  border: 1.5px solid rgba(255,255,255,0.14);\n  border-radius: 12px;\n  padding: 14px 15px;\n  text-align: left;\n  color: rgba(255,255,255,0.78);\n  font-family: Arial, sans-serif;\n  font-size: 0.87rem;\n  font-weight: 600;\n  cursor: pointer;\n  transition: all 0.18s;\n  line-height: 1.4;\n}\n.qopt:hover, .qopt.sel {\n  background: rgba(201,168,76,0.18);\n  border-color: #C9A84C;\n  color: #fff;\n}\n.qnav { margin-top: 22px; }\n.qnext {\n  background: transparent;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  color: #fff;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 13px 30px;\n  border-radius: 100px;\n  cursor: pointer;\n  display: none;\n}\n.qresult { display: none; text-align: center; }\n.rbadge { display: inline-block; font-size: 2.6rem; font-weight: 900; padding: 16px 32px; border-radius: 14px; margin-bottom: 15px; }\n.rb-a  { background: #D8F3DC; color: #2D6A4F; }\n.rb-c  { background: #DBE9FF; color: #1B4F9B; }\n.rb-ca { background: #FFE0E4; color: #8B2635; }\n.rtitle { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 11px; }\n.rtext { font-family: Arial, sans-serif; font-size: 0.94rem; color: rgba(255,255,255,0.56); max-width: 420px; margin: 0 auto 22px; line-height: 1.72; }\n.btn-retry { background: #C9A84C; color: #1A1A2E; font-family: Arial, sans-serif; font-size: 0.93rem; font-weight: 700; padding: 13px 30px; border-radius: 100px; border: none; cursor: pointer; }\n\n/* FAQ */\n.faq-outer { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); background: #F9F5EE; }\n.faq-inner { max-width: 1160px; margin: 0 auto; }\n.faq-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .faq-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .faq-grid { grid-template-columns: 1fr 1fr; } }\n.fi { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid #E5DDD0; }\n.fq { font-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }\n.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }\n\n/* FOOTER */\nfooter { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;,s:{acca:2}}]\n  },\n  { q:\&quot;How can you dedicate time to studying?\&quot;,\n    o:[{t:\&quot;⏱️ Part-time alongside my job\&quot;,s:{acca:2}},{t:\&quot;📚 Intense focused study windows\&quot;,s:{cfa:2}},{t:\&quot;🎓 Full-time with practical train   border: 2px solid rgba(255,255,255,0.4); color: #ffffff; font-weight: 700;
  font-size: 15px; padding: 11px 30px; border-radius: 8px; text-decoration: none;
}
.hero-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;
}
.stat-card {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px; padding: 1.2rem; text-align: center;
}
.stat-num { font-size: 2rem; font-weight: 900; color: #FF6600; }
.stat-label { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 4px; line-height: 1.4; }

/* SECTIONS */
section { padding: 4rem 0; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
.section-tag {
  display: inline-block; background: rgba(17,75,172,0.08);
  color: #114BAC; border-left: 4px solid #FF6600;
  padding: 4px 12px; font-size: 12px; font-weight: 700;
  letter-spacing: 1px; margin-bottom: 0.75rem;
}
.section-title { font-size: 2rem; font-weight: 900; color: #114BAC; margin-bottom: 0.5rem; }
.section-sub { font-size: 1rem; color: #555577; max-width: 600px; line-height: 1.65; margin-bottom: 2rem; }

/* NRI PROCESS CARDS */
.process-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
}
.process-card {
  background: #EEF4FF; border-radius: 12px; padding: 1.5rem;
  border-left: 4px solid #114BAC;
}
.process-icon { font-size: 1.5rem; margin-bottom: 8px; }
.process-name { font-weight: 900; color: #114BAC; margin-bottom: 6px; font-size: 0.95rem; }
.process-desc { font-size: 13px; color: #333355; line-height: 1.6; }

/* QUADRANT */
.quadrant-section { background: #0A2E7A; }
.quadrant-section .section-tag { background: rgba(255,102,0,0.15); color: #FF6600; }
.quadrant-section .section-title { color: #FF6600; }
.quadrant-section .section-sub { color: rgba(255,255,255,0.7); }
.quadrant-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
.quad-card { border-radius: 12px; padding: 1.8rem; }
.q1 { background: #0A3A20; border: 2px solid #1A7A4A; }
.q2 { background: #0D2A40; border: 2px solid #0D7377; }
.q3 { background: #2A1040; border: 2px solid #7B2D8B; }
.q4 { background: #3A0A10; border: 2px solid #C0392B; }
.quad-rank { font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; color: rgba(255,255,255,0.7); }
.quad-range { font-size: 1.4rem; font-weight: 900; color: #FF6600; margin-bottom: 12px; }
.quad-title { font-size: 1.05rem; font-weight: 900; color: #ffffff; margin-bottom: 10px; }
.quad-items { list-style: none; }
.quad-items li { font-size: 13px; color: rgba(255,255,255,0.85); padding: 4px 0 4px 18px; position: relative; }
.quad-items li::before { content: &quot;→&quot;; position: absolute; left: 0; color: #FF6600; font-weight: 700; }
.insight-box {
  margin-top: 2rem; background: rgba(255,102,0,0.1);
  border: 1px solid rgba(255,102,0,0.4); border-radius: 12px;
  padding: 1.5rem; text-align: center;
}
.insight-box .label { color: #FF6600; font-weight: 900; font-size: 1rem; margin-bottom: 8px; }
.insight-box p { color: rgba(255,255,255,0.85); font-size: 14px; line-height: 1.7; }
.insight-box strong { color: #FF6600; }

/* FRAMEWORK */
.framework-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 1.5rem; }
.framework-card { border-radius: 12px; padding: 2rem; border: 2px solid; }
.fw-college { border-color: #0D7377; background: #E6F7F8; }
.fw-branch  { border-color: #D97706; background: #FFF7ED; }
.fw-header { font-size: 1rem; font-weight: 900; padding: 10px 16px; border-radius: 8px; text-align: center; margin-bottom: 1rem; color: #ffffff; }
.fw-college .fw-header { background: #0D7377; }
.fw-branch  .fw-header { background: #D97706; }
.fw-list { list-style: none; }
.fw-list li { font-size: 13.5px; color: #2A2A3A; padding: 5px 0 5px 20px; position: relative; line-height: 1.5; }
.fw-list li::before { content: &quot;✓&quot;; position: absolute; left: 0; font-weight: 900; }
.fw-college .fw-list li::before { color: #0D7377; }
.fw-branch  .fw-list li::before { color: #D97706; }
.fw-insight { margin-top: 1rem; padding: 10px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; line-height: 1.5; }
.fw-college .fw-insight { background: rgba(13,115,119,0.1); color: #0D7377; }
.fw-branch  .fw-insight { background: rgba(217,119,6,0.1); color: #B45309; }

/* BRANCHES */
.branches-section { background: #EEF4FF; }
.branch-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
.branch-card {
  background: #ffffff; border-radius: 12px; padding: 1.8rem;
  border-top: 4px solid #114BAC;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
}
.branch-card.ece { border-top-color: #0D7377; }
.branch-card.mech { border-top-color: #8B4513; }
.branch-card.civil { border-top-color: #5C6BC0; }
.branch-name { font-size: 1.05rem; font-weight: 900; color: #114BAC; }
.branch-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin: 1rem 0; }
.metric { background: #EEF4FF; border-radius: 8px; padding: 0.7rem; }
.metric-val { font-size: 1.1rem; font-weight: 900; color: #114BAC; }
.metric-key { font-size: 10px; color: #555577; margin-top: 2px; }
.branch-insight { font-size: 12px; color: #555577; font-style: italic; border-left: 3px solid #FF6600; padding-left: 10px; }

/* CAREER */
.career-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
.career-card { border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.career-header { padding: 1.2rem 1.5rem; background: #114BAC; }
.career-header.teal { background: #0D7377; }
.career-header.dark { background: #0A2E7A; }
.career-icon { font-size: 2rem; margin-bottom: 6px; }
.career-title { font-size: 1rem; font-weight: 900; color: #ffffff; }
.career-body { padding: 1.3rem 1.5rem; background: #EEF4FF; }
.career-body ul { list-style: none; }
.career-body li { font-size: 12.5px; color: #1A1A3A; padding: 4px 0 4px 14px; position: relative; line-height: 1.5; }
.career-body li::before { content: &quot;•&quot;; position: absolute; left: 0; color: #FF6600; font-size: 16px; top: -2px; font-weight: 900; }

/* TABLES */
.comparison-section { background: #EEF4FF; }
.comp-table-wrap { overflow-x: auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
table { width: 100%; border-collapse: collapse; background: #ffffff; }
thead tr { background: #114BAC; }
thead th { color: #ffffff; font-size: 13px; font-weight: 900; padding: 14px 12px; text-align: center; }
thead th:first-child { text-align: left; }
thead th:nth-child(2) { background: #0A2E7A; color: #FF6600; }
tbody tr:nth-child(even) { background: #EEF4FF; }
tbody td { padding: 11px 12px; font-size: 12.5px; text-align: center; border-bottom: 1px solid #E0E8F5; }
tbody td:first-child { text-align: left; font-weight: 700; color: #114BAC; }
tbody tr:last-child td { background: #FFF3DC; font-weight: 900; }

/* POSITION TABLE */
.position-table { width: 100%; border-collapse: collapse; background: #ffffff; border-radius: 12px; overflow: hidden; }
.position-table th { background: #114BAC; color: #ffffff; padding: 12px 10px; font-size: 12px; text-align: left; }
.position-table td { padding: 10px; font-size: 12px; border-bottom: 1px solid #E0E8F5; vertical-align: top; line-height: 1.5; }
.position-table tr:nth-child(even) td { background: #EEF4FF; }
.pos-tag { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700; }
.pos-elite { background: #D1FAE5; color: #065F46; }
.pos-premium { background: #CFFAFE; color: #065A7A; }
.pos-strategic { background: #EDE9FE; color: #4C1D95; }
.pos-risk { background: #FEE2E2; color: #7F1D1D; }
.pos-nri { background: #FEF3C7; color: #78350F; }

/* NRI ADVANTAGE */
.nri-section { background: #0A2E7A; }
.nri-section .section-tag { background: rgba(255,102,0,0.15); color: #FF6600; }
.nri-section .section-title { color: #FF6600; }
.nri-section .section-sub { color: rgba(255,255,255,0.7); }
.nri-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; }
.nri-card {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 1.5rem;
}
.nri-card:hover { border-color: #FF6600; }
.nri-icon { font-size: 2rem; margin-bottom: 10px; }
.nri-title { font-size: 0.95rem; font-weight: 900; color: #FF6600; margin-bottom: 6px; }
.nri-desc { font-size: 12.5px; color: rgba(255,255,255,0.8); line-height: 1.6; }

/* CTA */
.cta-section {
  background: #0A2E7A;
  text-align: center; padding: 5rem 2rem;
}
.cta-inner { max-width: 750px; margin: 0 auto; }
.cta-section h2 { font-size: 2.4rem; font-weight: 900; color: #FF6600; margin-bottom: 1rem; }
.cta-section p { font-size: 1.05rem; color: rgba(255,255,255,0.8); margin-bottom: 2rem; line-height: 1.7; }
.cta-contact-row { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
.cta-contact-item {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,102,0,0.4);
  border-radius: 10px; padding: 14px 28px;
  font-size: 15px; font-weight: 700; color: #ffffff; text-decoration: none;
}
.cta-contact-item span { color: #FF6600; }
.cta-tag { font-size: 11px; color: #FF6600; letter-spacing: 2px; font-weight: 700; margin-bottom: 12px; }

/* FOOTER */
footer {
  background: #080F2A; color: rgba(255,255,255,0.5);
  text-align: center; padding: 1.5rem 2rem; font-size: 12px;
}
footer span { color: #FF6600; font-weight: 700; }
footer a { color: #FF6600; text-decoration: none; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .hero-stats, .quadrant-grid, .framework-grid, .branch-grid,
  .career-grid, .nri-grid, .process-grid { grid-template-columns: 1fr; }
  nav ul { display: none; }
  .hero h1 { font-size: 2rem; }
}

&lt;section id=&quot;overview&quot; style=&quot;background:#ffffff;&quot;&gt;
  &lt;div class=&quot;container&quot;&gt;
    &lt;div class=&quot;section-tag&quot;&gt;NRI ADMISSION PROCESS&lt;/div&gt;
    &lt;h2 class=&quot;section-title&quot;&gt;How NRI Admissions Work at VIT&lt;/h2&gt;
    &lt;p class=&quot;section-sub&quot;&gt;The NRI admission route is fundamentally different — and more favourable — than the regular VITEEE route.&lt;/p&gt;
    &lt;div class=&quot;process-grid&quot;&gt;
      &lt;div class=&quot;process-card&quot; style=&quot;border-left-color:#114BAC;&quot;&gt;
        &lt;div class=&quot;process-icon&quot;&gt;📋&lt;/div&gt;
        &lt;div class=&quot;process-name&quot; style=&quot;color:#114BAC;&quot;&gt;No VITEEE Needed&lt;/div&gt;
        &lt;div class=&quot;process-desc&quot;&gt;NRI quota students are selected based on Class 10 + 12 academic merit — not VITEEE rank. This is a massive strategic advantage.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;process-card&quot; style=&quot;border-left-color:#0D7377;&quot;&gt;
        &lt;div class=&quot;process-icon&quot;&gt;📊&lt;/div&gt;
        &lt;div class=&quot;process-name&quot; style=&quot;color:#0D7377;&quot;&gt;Separate Merit List&lt;/div&gt;
        &lt;div class=&quot;process-desc&quot;&gt;NRI applicants compete only among NRI students — a much smaller pool vs 2L+ VITEEE takers. Better odds for better branches.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;process-card&quot; style=&quot;border-left-color:#FF6600;&quot;&gt;
        &lt;div class=&quot;process-icon&quot;&gt;💰&lt;/div&gt;
        &lt;div class=&quot;process-name&quot; style=&quot;color:#FF6600;&quot;&gt;Fee: USD 3,000–5,000/yr&lt;/div&gt;
        &lt;div class=&quot;process-desc&quot;&gt;Higher than regular (~₹2L/yr), but the ROI is excellent — VIT CSE grads average ₹7.5L+, recovering the premium in ~18 months.&lt;/div&gt;
      &lt;/div&gt;

 */\n.who-outer { background: #fff; padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); }\n.who-inner { max-width: 1160px; margin: 0 auto; }\n.who-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .who-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .who-grid { grid-template-columns: 1fr 1fr; } }\n\n.wc { border-radius: 16px; padding: 25px 22px; border: 1.5px solid #E5DDD0; background: #fff; }\n.wi { font-size: 1.9rem; margin-bottom: 10px; display: block; }\n.wt { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; color: #1A1A2E; }\n.wp { font-family: Arial, sans-serif; font-size: 0.86rem; line-height: 1.72; color: #6B7280; }\n.wb { display: inline-block; margin-top: 13px; font-family: Arial, sans-serif; font-size: 0.73rem; font-weight: 700; padding: 4px 13px; border-radius: 100px; }\n.wb-a  { background: #D8F3DC; color: #2D6A4F; }\n.wb-c  { background: #DBE9FF; color: #1B4F9B; }\n.wb-ca { background: #FFE0E4; color: #8B2635; }\n\n/* QUIZ */\n.quiz-outer {\n  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 55%, #0F3460 100%);\n  padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px);\n  text-align: center;\n}\n.quiz-inner { max-width: 1160px; margin: 0 auto; }\n.qbox {\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.12);\n  border-radius: 20px;\n  padding: clamp(24px,5vw,48px);\n  max-width: 660px;\n  margin: 44px auto 0;\n}\n.qprog { font-family: Arial, sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.32); margin-bottom: 7px; letter-spacing: 1.2px; text-transform: uppercase; }\n.qtext { font-family: Arial, sans-serif; font-size: clamp(1rem,2.5vw,1.25rem); font-weight: 700; color: #fff; margin-bottom: 22px; line-height: 1.5; }\n.qopts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }\n@media (max-width: 480px) { .qopts { grid-template-columns: 1fr; } }\n.qopt {\n  background: rgba(255,255,255,0.07);\n  border: 1.5px solid rgba(255,255,255,0.14);\n  border-radius: 12px;\n  padding: 14px 15px;\n  text-align: left;\n  color: rgba(255,255,255,0.78);\n  font-family: Arial, sans-serif;\n  font-size: 0.87rem;\n  font-weight: 600;\n  cursor: pointer;\n  transition: all 0.18s;\n  line-height: 1.4;\n}\n.qopt:hover, .qopt.sel {\n  background: rgba(201,168,76,0.18);\n  border-color: #C9A84C;\n  color: #fff;\n}\n.qnav { margin-top: 22px; }\n.qnext {\n  background: transparent;\n  border: 1.5px solid rgba(255,255,255,0.28);\n  color: #fff;\n  font-family: Arial, sans-serif;\n  font-size: 0.93rem;\n  font-weight: 700;\n  padding: 13px 30px;\n  border-radius: 100px;\n  cursor: pointer;\n  display: none;\n}\n.qresult { display: none; text-align: center; }\n.rbadge { display: inline-block; font-size: 2.6rem; font-weight: 900; padding: 16px 32px; border-radius: 14px; margin-bottom: 15px; }\n.rb-a  { background: #D8F3DC; color: #2D6A4F; }\n.rb-c  { background: #DBE9FF; color: #1B4F9B; }\n.rb-ca { background: #FFE0E4; color: #8B2635; }\n.rtitle { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 11px; }\n.rtext { font-family: Arial, sans-serif; font-size: 0.94rem; color: rgba(255,255,255,0.56); max-width: 420px; margin: 0 auto 22px; line-height: 1.72; }\n.btn-retry { background: #C9A84C; color: #1A1A2E; font-family: Arial, sans-serif; font-size: 0.93rem; font-weight: 700; padding: 13px 30px; border-radius: 100px; border: none; cursor: pointer; }\n\n/* FAQ */\n.faq-outer { padding: clamp(56px,8vw,96px) clamp(18px,5vw,60px); background: #F9F5EE; }\n.faq-inner { max-width: 1160px; margin: 0 auto; }\n.faq-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 44px; }\n@media (max-width: 900px) { .faq-grid { grid-template-columns: 1fr; } }\n@media (min-width: 600px) and (max-width: 900px) { .faq-grid { grid-template-columns: 1fr 1fr; } }\n.fi { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid #E5DDD0; }\n.fq { font-weight: 700; font-size: 0.91rem; color: #1A1A2E; margin-bottom: 9px; line-height: 1.4; }\n.fa { font-family: Arial, sans-serif; font-size: 0.85rem; line-height: 1.72; color: #6B7280; }\n\n/* FOOTER */\nfooter { background: #1A1A2E; color: rgba(255,255,255,0.35); text-align: center; padding: 34px 24px; font-family: Arial, sans-serif; font-size: 0.82rem; line-height: 1.8; }\nfooter strong { color: #C9A84C; }\n\n/* DIVIDER */\n.div-line { height: 1px; background: #E5DDD0; max-width: 1160px; margin: 0 auto; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n&lt;!-- ════════ HERO ════════ --&gt;\n&lt;div class=\&quot;hero\&quot;&gt;\n  &lt;div class=\&quot;hero-glow\&quot;&gt;&lt;/div&gt;\n  &lt;div class=\&quot;badge\&quot;&gt;Professional Qualifications Guide&lt;/div&gt;\n  &lt;h1&gt;Find Your &lt;span&gt;Perfect&lt;/span&gt;&lt;br&gt;Certification&lt;/h1&gt;\n  &lt;p&gt;ACCA, CFA, or CA — each opens a different door. We break down everything so you can choose with confidence.&lt;/p&gt;\n  &lt;div class=\&quot;hero-btns\&quot;&gt;\n    &lt;a href=\&quot;#exams\&quot; class=\&quot;btn-main\&quot;&gt;Explore Exams&lt;/a&gt;\n    &lt;a href=\&quot;#quiz\&quot; class=\&quot;btn-out\&quot;&gt;Take the Quiz →&lt;/a&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ EXAM CARDS ════════ --&gt;\n&lt;div id=\&quot;exams\&quot; style=\&quot;background:#F9F5EE;\&quot;&gt;\n  &lt;div class=\&quot;sec\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;The Big Three&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Three Qualifications,&lt;br&gt;Three Career Paths&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Deep-dive into what each certification truly offers — from syllabus to salary.&lt;/p&gt;\n\n    &lt;div class=\&quot;cards-wrap\&quot;&gt;\n\n      &lt;!-- ACCA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-acca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-acca\&quot;&gt;A&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;ACCA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Association of Chartered Certified Accountants&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;A globally recognised accountancy qualification from the UK. ACCA is the most internationally flexible credential, with members in 180+ countries. Ideal for careers in audit, finance, or accounting across borders.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Exams&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;13 Papers&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3–4 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–50%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Recognition&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;180+ Countries&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Global Mobility&lt;/span&gt;\n            &lt;span class=\&quot;tag t-acca\&quot;&gt;Flexible Entry&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit &amp;amp; Tax&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Corporate Finance&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Big 4 Ready&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Applied Knowledge → Applied Skills → Strategic Professional. Covers financial reporting, taxation, audit, ethics, and advanced financial management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-acca\&quot;&gt;Compare ACCA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CFA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-cfa\&quot;&gt;\n          &lt;div class=\&quot;ci ci-cfa\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CFA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Financial Analyst — CFA Institute (USA)&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The gold standard for investment management and financial analysis. Highly respected on Wall Street and in global asset management. If markets, portfolios, and valuations excite you — this is your path.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~40–45%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Study Hours&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~900 hrs&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Investment Mgmt&lt;/span&gt;\n            &lt;span class=\&quot;tag t-cfa\&quot;&gt;Portfolio Analysis&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Equity Research&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Asset Management&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Private Equity&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Ethics, quantitative methods, economics, financial statement analysis, equity, fixed income, derivatives, alternatives, and portfolio management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-cfa\&quot;&gt;Compare CFA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n      &lt;!-- CA --&gt;\n      &lt;div class=\&quot;card\&quot;&gt;\n        &lt;div class=\&quot;ch-ca\&quot;&gt;\n          &lt;div class=\&quot;ci ci-ca\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;cn\&quot;&gt;CA&lt;/div&gt;\n          &lt;div class=\&quot;co\&quot;&gt;Chartered Accountant — ICAI / ICAEW / ICAS&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cb\&quot;&gt;\n          &lt;p class=\&quot;cd\&quot;&gt;The most prestigious domestic accountancy qualification in countries like India, UK, and Australia. CA is rigorous, deeply respected, and a gateway to top positions in finance, taxation, and consulting.&lt;/p&gt;\n          &lt;div class=\&quot;stats-g\&quot;&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Levels&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Levels&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Duration&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;4–5 Years&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Pass Rate&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;~10–20%&lt;/div&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-b\&quot;&gt;&lt;div class=\&quot;sl\&quot;&gt;Articleship&lt;/div&gt;&lt;div class=\&quot;sv\&quot;&gt;3 Years&lt;/div&gt;&lt;/div&gt;\n          &lt;/div&gt;\n          &lt;div class=\&quot;tags-g\&quot;&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Domestic Prestige&lt;/span&gt;\n            &lt;span class=\&quot;tag t-ca\&quot;&gt;Taxation Expert&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Audit&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Financial Advisory&lt;/span&gt;\n            &lt;span class=\&quot;tag\&quot;&gt;Consulting&lt;/span&gt;\n          &lt;/div&gt;\n          &lt;div&gt;\n            &lt;div class=\&quot;sl\&quot; style=\&quot;margin-bottom:7px\&quot;&gt;Syllabus Snapshot&lt;/div&gt;\n            &lt;p class=\&quot;cd\&quot;&gt;Foundation → Intermediate → Final. Covers accounting, law, taxation, cost management, auditing, financial management, and strategic management.&lt;/p&gt;\n          &lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;cf\&quot;&gt;&lt;a href=\&quot;#compare\&quot; class=\&quot;cl cl-ca\&quot;&gt;Compare CA ↓&lt;/a&gt;&lt;/div&gt;\n      &lt;/div&gt;\n\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ COMPARISON TABLE ════════ --&gt;\n&lt;div id=\&quot;compare\&quot; class=\&quot;tbl-outer\&quot;&gt;\n  &lt;div class=\&quot;tbl-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Side by Side&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Compare at a Glance&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot;&gt;All the key facts in one place — no fluff.&lt;/p&gt;\n\n    &lt;div class=\&quot;tbl-scroll\&quot;&gt;\n      &lt;table&gt;\n        &lt;thead&gt;\n          &lt;tr&gt;\n            &lt;th class=\&quot;th0\&quot;&gt;Criteria&lt;/th&gt;\n            &lt;th class=\&quot;th1\&quot;&gt;ACCA&lt;/th&gt;\n            &lt;th class=\&quot;th2\&quot;&gt;CFA&lt;/th&gt;\n            &lt;th class=\&quot;th3\&quot;&gt;CA&lt;/th&gt;\n          &lt;/tr&gt;\n        &lt;/thead&gt;\n        &lt;tbody&gt;\n          &lt;tr&gt;&lt;td&gt;Governing Body&lt;/td&gt;&lt;td&gt;ACCA (UK)&lt;/td&gt;&lt;td&gt;CFA Institute (USA)&lt;/td&gt;&lt;td&gt;ICAI / ICAEW / ICAS&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Best For&lt;/td&gt;&lt;td&gt;Accounting, Audit, Global Finance&lt;/td&gt;&lt;td&gt;Investment &amp;amp; Portfolio Management&lt;/td&gt;&lt;td&gt;Domestic Accounting &amp;amp; Tax&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Entry Requirement&lt;/td&gt;&lt;td&gt;10+2 / Degree (flexible)&lt;/td&gt;&lt;td&gt;Bachelor's degree required&lt;/td&gt;&lt;td&gt;10+2 / After graduation&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Total Exams&lt;/td&gt;&lt;td&gt;13 papers across 3 levels&lt;/td&gt;&lt;td&gt;3 levels (L1, L2, L3)&lt;/td&gt;&lt;td&gt;~20 papers across 3 levels&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Exam Format&lt;/td&gt;&lt;td&gt;CBE &amp;amp; Paper-based&lt;/td&gt;&lt;td&gt;Computer-based only&lt;/td&gt;&lt;td&gt;Paper-based (May &amp;amp; Nov)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Attempt Frequency&lt;/td&gt;&lt;td&gt;4 times/year&lt;/td&gt;&lt;td&gt;2–3 times/year per level&lt;/td&gt;&lt;td&gt;Twice a year&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Pass Rate&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pg\&quot;&gt;~40–50%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pb\&quot;&gt;~40–45%&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=\&quot;pill pr\&quot;&gt;~10–20%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Practical Training&lt;/td&gt;&lt;td&gt;3 years relevant experience&lt;/td&gt;&lt;td&gt;4,000 hrs work experience&lt;/td&gt;&lt;td&gt;3-year articleship (mandatory)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Estimated Cost&lt;/td&gt;&lt;td&gt;$1,500–$3,000+&lt;/td&gt;&lt;td&gt;$3,000–$5,000+&lt;/td&gt;&lt;td&gt;₹40,000–₹1,00,000 (India)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Global Reach&lt;/td&gt;&lt;td&gt;Very High (180+ countries)&lt;/td&gt;&lt;td&gt;High (finance sector globally)&lt;/td&gt;&lt;td&gt;Moderate (country-specific)&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Career Outcomes&lt;/td&gt;&lt;td&gt;Big 4, MNCs, CFO roles&lt;/td&gt;&lt;td&gt;Fund manager, analyst, CIO&lt;/td&gt;&lt;td&gt;Tax partner, CFO, consultant&lt;/td&gt;&lt;/tr&gt;\n          &lt;tr&gt;&lt;td&gt;Avg. Starting Salary&lt;/td&gt;&lt;td&gt;£28k–£45k (UK)&lt;/td&gt;&lt;td&gt;$80k–$120k (USA)&lt;/td&gt;&lt;td&gt;₹6–12 LPA (India)&lt;/td&gt;&lt;/tr&gt;\n        &lt;/tbody&gt;\n      &lt;/table&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ WHO IS IT FOR ════════ --&gt;\n&lt;div class=\&quot;who-outer\&quot;&gt;\n  &lt;div class=\&quot;who-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Find Your Fit&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Who Should Choose What?&lt;/div&gt;\n    &lt;p class=\&quot;sec-p\&quot;&gt;Your personality, goals, and lifestyle all play a role in picking the right path.&lt;/p&gt;\n\n    &lt;div class=\&quot;who-grid\&quot;&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;✈️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Global Explorer&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You want to work across multiple countries, build a career in international accounting or audit, and need a qualification employers everywhere recognise.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;📈&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Markets Enthusiast&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You love financial modelling, equity research, and investment analysis. You want to work in asset management, hedge funds, or investment banking.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🏛️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Prestige Seeker&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;You're in India (or a country with a strong CA tradition) and want the most respected domestic qualification, with deep expertise in taxation and audit.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;⚖️&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Career Switcher&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Already working and need a flexible path? ACCA's modular structure lets you study alongside your job without quitting for a full-time programme.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-a\&quot;&gt;→ ACCA is for you&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;🎓&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Fresh Graduate&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Just finished your degree? CFA requires a bachelor's, ACCA is highly flexible, and CA in India can be pursued straight from 10+2 level.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-c\&quot;&gt;→ CFA or ACCA&lt;/span&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;wc\&quot;&gt;\n        &lt;span class=\&quot;wi\&quot;&gt;💼&lt;/span&gt;\n        &lt;div class=\&quot;wt\&quot;&gt;The Entrepreneur&lt;/div&gt;\n        &lt;p class=\&quot;wp\&quot;&gt;Planning to run your own firm? CA gives you the deepest grounding in taxation, compliance, and advisory — essential tools for business ownership.&lt;/p&gt;\n        &lt;span class=\&quot;wb wb-ca\&quot;&gt;→ CA is for you&lt;/span&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ QUIZ ════════ --&gt;\n&lt;div id=\&quot;quiz\&quot; class=\&quot;quiz-outer\&quot;&gt;\n  &lt;div class=\&quot;quiz-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;2-Minute Quiz&lt;/div&gt;\n    &lt;div class=\&quot;sec-h sec-h-w\&quot;&gt;Not Sure Yet?&lt;br&gt;Let Us Help You Choose&lt;/div&gt;\n    &lt;p class=\&quot;sec-p sec-p-dim\&quot; style=\&quot;margin:12px auto 0; max-width:480px\&quot;&gt;Answer 4 quick questions and we'll point you in the right direction.&lt;/p&gt;\n\n    &lt;div class=\&quot;qbox\&quot;&gt;\n      &lt;div id=\&quot;qMain\&quot;&gt;\n        &lt;div class=\&quot;qprog\&quot; id=\&quot;qProg\&quot;&gt;Question 1 of 4&lt;/div&gt;\n        &lt;div class=\&quot;qtext\&quot; id=\&quot;qText\&quot;&gt;Where do you want to build your career?&lt;/div&gt;\n        &lt;div class=\&quot;qopts\&quot; id=\&quot;qOpts\&quot;&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,0)\&quot;&gt;🌍 Internationally — anywhere&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,1)\&quot;&gt;💹 Finance hubs (NYC, London, HK)&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,2)\&quot;&gt;🏙️ Primarily in my home country&lt;/button&gt;\n          &lt;button class=\&quot;qopt\&quot; onclick=\&quot;pick(this,3)\&quot;&gt;🤷 Not decided yet&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;qnav\&quot;&gt;&lt;button class=\&quot;qnext\&quot; id=\&quot;qNext\&quot; onclick=\&quot;nextQ()\&quot;&gt;Next →&lt;/button&gt;&lt;/div&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;qresult\&quot; id=\&quot;qResult\&quot;&gt;\n        &lt;div class=\&quot;rbadge\&quot; id=\&quot;rBadge\&quot;&gt;ACCA&lt;/div&gt;\n        &lt;div class=\&quot;rtitle\&quot; id=\&quot;rTitle\&quot;&gt;ACCA is your ideal match!&lt;/div&gt;\n        &lt;p class=\&quot;rtext\&quot; id=\&quot;rText\&quot;&gt;Based on your answers, ACCA offers the flexibility and global recognition that suits you best.&lt;/p&gt;\n        &lt;button class=\&quot;btn-retry\&quot; onclick=\&quot;resetQ()\&quot;&gt;Retake Quiz&lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FAQ ════════ --&gt;\n&lt;div class=\&quot;faq-outer\&quot;&gt;\n  &lt;div class=\&quot;faq-inner\&quot;&gt;\n    &lt;div class=\&quot;eyebrow\&quot;&gt;Common Questions&lt;/div&gt;\n    &lt;div class=\&quot;sec-h\&quot;&gt;Frequently Asked&lt;/div&gt;\n    &lt;div class=\&quot;faq-grid\&quot;&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I do ACCA and CFA together?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Technically yes, but extremely demanding. Most candidates recommend completing one first. ACCA + CFA is a powerful combination for investment banking or CFO-level roles.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Is CFA harder than CA?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Both are rigorous in different ways. CA (India) has a very low pass rate (~10–20%) and mandatory articleship. CFA demands ~900 hours of self-study per level. CA is harder to pass; CFA demands more total study time.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Does ACCA give exemptions to graduates?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;Yes. ACCA offers exemptions based on your degree. Accounting and finance graduates can receive up to 9 paper exemptions, significantly shortening the overall qualification period.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which qualification pays the most?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;CFA charterholders in senior investment roles often command the highest global salaries. ACCA and CA salaries vary heavily by region. All three lead to strong earning potential at senior levels.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Can I study while working full-time?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;ACCA is the most flexible — attempt papers one at a time. CFA requires intense dedicated study windows. CA's articleship is itself a full-time commitment for 3 years.&lt;/p&gt;\n      &lt;/div&gt;\n      &lt;div class=\&quot;fi\&quot;&gt;\n        &lt;div class=\&quot;fq\&quot;&gt;Which is best for Big 4 firms?&lt;/div&gt;\n        &lt;p class=\&quot;fa\&quot;&gt;All three are respected at Big 4 (Deloitte, PwC, EY, KPMG). ACCA and CA dominate in audit and tax. CFA is preferred for Big 4 advisory or transactions divisions.&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- ════════ FOOTER ════════ --&gt;\n&lt;footer&gt;\n  &lt;p&gt;Built to help students make &lt;strong&gt;informed decisions&lt;/strong&gt;. Information is for guidance only — always verify with official exam bodies.&lt;/p&gt;\n  &lt;p style=\&quot;margin-top:6px; opacity:0.6\&quot;&gt;ACCA.com &amp;nbsp;·&amp;nbsp; cfainstitute.org &amp;nbsp;·&amp;nbsp; ICAI.org&lt;/p&gt;\n&lt;/footer&gt;\n\n&lt;script&gt;\nvar Qs = [\n  { q:\&quot;Where do you want to build your career?\&quot;,\n    o:[{t:\&quot;🌍 Internationally — anywhere\&quot;,s:{acca:2}},{t:\&quot;💹 Finance hubs (NYC, London, HK)\&quot;,s:{cfa:2}},{t:\&quot;🏙️ Primarily in my home country\&quot;,s:{ca:2}},{t:\&quot;🤷 Not decided yet\&quot;,s:{acca:1}}]\n  },\n  { q:\&quot;What kind of work excites you most?\&quot;,\n    o:[{t:\&quot;📊 Auditing &amp; financial reporting\&quot;,s:{acca:2,ca:1}},{t:\&quot;📈 Stock analysis &amp; portfolio management\&quot;,s:{cfa:3}},{t:\&quot;🧾 Tax, compliance &amp; advisory\&quot;,s:{ca:2}},{t:\&quot;🔀 A mix of all finance areas\&quot;     o:[{t:"🌐 Global recognition / working abroad",s:{acca:3}},{t:"💰 Highest salary in investment finance",s:{cfa:3}},{t:"🏆 Prestigious local qualification",s:{ca:3}},{t:"⚡ Fastest route to a finance career",s:{acca:2}}]
  }
];

var cur=0, sc={acca:0,cfa:0,ca:0}, pend=null;

function pick(btn,idx){
  var all=document.querySelectorAll('.qopt');
  for(var i=0;i<all.length;i++) all[i].classList.remove('sel');
  btn.classList.add('sel');
  pend=Qs[cur].o[idx].s;
  document.getElementById('qNext').style.display='inline-block';
}

function nextQ(){
  if(!pend) return;
  for(var k in pend) sc[k]=(sc[k]||0)+pend[k];
  pend=null; cur++;
  if(cur>=Qs.length){ showRes(); return; }
  document.getElementById('qProg').textContent='Question '+(cur+1)+' of '+Qs.length;
  document.getElementById('qText').textContent=Qs[cur].q;
  var html='';
  for(var i=0;i<Qs[cur].o.length;i++) html+='<button class="qopt" onclick="pick(this,'+i+')">'+Qs[cur].o[i].t+'</button>';
  document.getElementById('qOpts').innerHTML=html;
  document.getElementById('qNext').style.display='none';
}

function showRes(){
  var keys=Object.keys(sc).sort(function(a,b){return sc[b]-sc[a];});
  var w=keys[0];
  var info={
    acca:{n:'ACCA',cls:'rb-a', ti:'ACCA is your ideal match!', tx:'Your goals align with ACCA — global flexibility, modular study structure, and recognition in 180+ countries.'},
    cfa:{n:'CFA',cls:'rb-c', ti:'CFA is your ideal match!', tx:'Your passion for investment and markets points to the CFA Charter — the gold standard for finance professionals worldwide.'},
    ca:{n:'CA',cls:'rb-ca', ti:'CA is your ideal match!', tx:'Your preference for domestic prestige, taxation, and comprehensive accounting makes CA the perfect qualification.'}
  }[w];
  document.getElementById('qMain').style.display='none';
  document.getElementById('qResult').style.display='block';
  var b=document.getElementById('rBadge');
  b.textContent=info.n; b.className='rbadge '+info.cls;
  document.getElementById('rTitle').textContent=info.ti;
  document.getElementById('rText').textContent=info.tx;
}

function resetQ(){
  cur=0; sc={acca:0,cfa:0,ca:0}; pend=null;
  document.getElementById('qResult').style.display='none';
  document.getElementById('qMain').style.display='block';
  document.getElementById('qProg').textContent='Question 1 of '+Qs.length;
  document.getElementById('qText').textContent=Qs[0].q;
  var html='';
  for(var i=0;i<Qs[0].o.length;i++) html+='<button class="qopt" onclick="pick(this,'+i+')">'+Qs[0].o[i].t+'</button>';
  document.getElementById('qOpts').innerHTML=html;
  document.getElementById('qNext').style.display='none';
}
</script>  </body></html>
